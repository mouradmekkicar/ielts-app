/* ============================================================
   ADMIN — ANALYTICS (global; never shown to normal users)
   ============================================================ */
function renderAnalytics(){
  const users = UserStore.all();
  const sessions = Sessions.all().filter(s=>s.scored);
  const tokens = TokenStore.all();
  const requests = RequestStore.all();
  const avg = sessions.length ? (sessions.reduce((a,s)=>a+s.scored.overall,0)/sessions.length) : null;
  const tokBy = tokens.reduce((a,t)=>{ a[t.status]=(a[t.status]||0)+1; return a; },{});
  const pending = requests.filter(r=>r.status==="pending").length;

  const header = el("div",{class:"mm-page__header"},[
    el("div",{class:"mm-page__eyebrow"},"Administration"),
    el("h2",{class:"mm-page__title"},"Platform analytics"),
    el("div",{class:"mm-page__rule"}),
    el("p",{class:"mm-page__sub",style:"margin-top:10px;"},"Platform-wide metrics are visible to administrators only.")
  ]);

  function statCard(label,value,note){
    return el("div",{class:"mm-stat-card"},[
      el("div",{class:"mm-stat-card__label"},label),
      el("div",{class:"mm-stat-card__value"},value),
      note?el("div",{class:"mm-stat-card__note"},note):null
    ].filter(Boolean));
  }

  // Simple band distribution
  const buckets = {"<5":0,"5–6":0,"6–7":0,"7–8":0,"8+":0};
  sessions.forEach(s=>{ const b=s.scored.overall;
    if(b<5)buckets["<5"]++; else if(b<6)buckets["5–6"]++; else if(b<7)buckets["6–7"]++; else if(b<8)buckets["7–8"]++; else buckets["8+"]++; });
  const maxB = Math.max(1,...Object.values(buckets));
  const dist = el("div",{class:"mm-card",style:"padding:22px;margin-top:20px;"},[
    el("div",{class:"mm-stat-card__label",style:"margin-bottom:14px;"},"Band distribution"),
    el("div",{style:"display:flex;align-items:flex-end;gap:14px;height:140px;"},
      Object.entries(buckets).map(([k,v])=>el("div",{style:"flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end;"},[
        el("div",{style:"font-size:12px;font-weight:600;color:var(--mm-navy-700);"}, String(v)),
        el("div",{style:`width:100%;border-radius:6px 6px 0 0;background:var(--mm-gold-400);height:${Math.round((v/maxB)*100)}%;min-height:4px;`}),
        el("div",{style:"font-size:11px;color:var(--mm-fg-tertiary);"}, k)
      ])))
  ]);

  const grid = el("div",{class:"mm-stat-grid"},[
    statCard("Registered users", String(users.length), `${users.filter(u=>u.role==="admin").length} admin · ${users.filter(u=>u.disabled).length} disabled`),
    statCard("Sessions served", String(sessions.length), "platform lifetime"),
    statCard("Platform average", avg!=null?avg.toFixed(1):"—", sessions.length?"overall band":"no data"),
    statCard("Pending requests", String(pending), "awaiting action"),
    statCard("Tokens issued", String(tokens.length), `${tokBy.consumed||0} used · ${tokBy.unused||0} unused`),
    statCard("Tokens revoked", String((tokBy.revoked||0)+(tokBy.expired||0)), `${tokBy.revoked||0} revoked · ${tokBy.expired||0} expired`)
  ]);

  return el("section",{class:"mm-page"},[ header, grid, dist ]);
}


/* ============================================================================
   SUPABASE CLOUD INTEGRATION
   ----------------------------------------------------------------------------
   When SUPABASE_URL + SUPABASE_ANON_KEY are set, the access layer is backed by
   Supabase (Auth + Postgres + Row-Level Security) instead of localStorage, so
   accounts, tokens, requests, notifications and reports are shared across all
   devices and every sensitive rule is enforced server-side. Leave the two
   constants blank to keep the original local-only prototype behaviour.

   Design: the render functions stay SYNCHRONOUS. A small in-memory cache
   (Cloud.cache) mirrors the user's RLS-scoped rows; it is hydrated
   asynchronously after login and refreshed after each mutation, then the app
   re-renders. The store objects are monkey-patched to read this cache; mutating
   methods call the SECURITY DEFINER rpc() functions defined in the SQL schema.
   ============================================================================ */

// ── CONFIG — paste your project values here (Supabase → Settings → API) ──────
const SUPABASE_URL      = "https://fpoypzwnzdrdrggpvzhb.supabase.co";   // e.g. "https://abcdwxyz.supabase.co"
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwb3lwenduemRyZHJnZ3B2emhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODYyNjEsImV4cCI6MjA5NTU2MjI2MX0.BGqtvSSwk63VF7xl-EMOcLKdG4q0UIncX9RLwaEfQUA";   // your "anon / public" key (safe for the browser)
// ─────────────────────────────────────────────────────────────────────────────

const Cloud = {
  enabled: false,
  ready: false,            // true once the first hydrate completes
  sb: null,
  cache: { profile:null, users:[], tokens:[], requests:[], notifs:[], sessions:[] },

  init(){
    if(!(SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase && window.supabase.createClient)) return false;
    this.sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth:{ persistSession:true, autoRefreshToken:true }
    });
    this.enabled = true;
    applyCloudOverrides();
    this.sb.auth.onAuthStateChange((_evt,_sess)=>{ Cloud.hydrate().then(()=>state._emit()); });
    return true;
  },

  // map DB snake_case → the camelCase shapes the existing UI already expects
  _profile(p){ return p && { id:p.id, fullName:p.full_name, ageRange:p.age_range, nationality:p.nationality,
                role:p.role, deviceId:p.device_id, disabled:p.disabled, createdAt:p.created_at }; },
  _token(t){ return { tokenId:t.token_id, tokenHash:t.token_hash, displayTokenLast4:t.display_last4,
                userId:t.user_id, deviceId:t.device_id, status:t.status, createdAt:t.created_at,
                grantedAt:t.granted_at, grantedBy:t.granted_by, expiresAt:t.expires_at,
                consumedAt:t.consumed_at, consumedForTestId:t.consumed_for_test_id,
                consumedForTestTitle:t.consumed_for_title, revokedAt:t.revoked_at, revokedBy:t.revoked_by,
                revokeReason:t.revoke_reason, requestId:t.request_id }; },
  _req(r){ return { requestId:r.request_id, userId:r.user_id, fullName:(Cloud.cache.users.find(u=>u.id===r.user_id)||{}).fullName||"—",
                ageRange:(Cloud.cache.users.find(u=>u.id===r.user_id)||{}).ageRange, nationality:(Cloud.cache.users.find(u=>u.id===r.user_id)||{}).nationality,
                deviceId:r.device_id, status:r.status, requestedFor:r.requested_for, requestedForTitle:r.requested_title,
                requestedAt:r.requested_at, adminNote:r.admin_note, grantedTokenId:r.granted_token_id }; },
  _notif(n){ return { notificationId:n.notification_id, userId:n.user_id, type:n.type, title:n.title,
                message:n.message, tokenId:n.token_id, rawTokenForDisplay:n.raw_token,
                createdAt:n.created_at, readAt:n.read_at, expiresAt:n.expires_at }; },
  _session(s){ const p = s.payload||{}; return Object.assign({}, p, { id:s.id, userId:s.user_id, testId:s.test_id, scored:p.scored }); },

  async hydrate(){
    if(!this.enabled) return;
    try{
      const { data:{ session } } = await this.sb.auth.getSession();
      if(!session){ this.cache = { profile:null, users:[], tokens:[], requests:[], notifs:[], sessions:[] }; this.ready=true; return; }
      const uid = session.user.id;
      const { data:prof } = await this.sb.from("profiles").select("*").eq("id",uid).maybeSingle();
      this.cache.profile = this._profile(prof);
      const admin = prof && prof.role==="admin";
      // RLS returns exactly what this user may see (own rows, or everything for admin)
      const [usersRes, tokRes, reqRes, ntfRes, sesRes] = await Promise.all([
        admin ? this.sb.from("profiles").select("*") : Promise.resolve({ data:[prof] }),
        this.sb.from("tokens").select("*"),
        this.sb.from("token_requests").select("*"),
        this.sb.from("notifications").select("*").order("created_at",{ascending:false}),
        this.sb.from("sessions").select("*")
      ]);
      this.cache.users    = (usersRes.data||[]).map(p=>this._profile(p)).filter(Boolean);
      this.cache.tokens   = (tokRes.data||[]).map(t=>this._token(t));
      this.cache.requests = (reqRes.data||[]).map(r=>this._req(r));
      this.cache.notifs   = (ntfRes.data||[]).map(n=>this._notif(n));
      this.cache.sessions = (sesRes.data||[]).map(s=>this._session(s));
    }catch(e){ console.warn("Cloud.hydrate failed", e); }
    this.ready = true;
  },
  async refresh(){ await this.hydrate(); state._emit(); }
};

/* ---- monkey-patch the access layer onto the cloud cache + rpc -------------- */
function applyCloudOverrides(){
  const sb = Cloud.sb, C = Cloud.cache, dev = ()=>DeviceId.get();

  // stores read from the cache (synchronous → render code unchanged)
  UserStore.all   = ()=>Cloud.cache.users;
  UserStore.byId  = (id)=>Cloud.cache.users.find(u=>u.id===id)||null;
  UserStore.byName= ()=>null;                       // login is by email in cloud mode
  UserStore.hasAdmin = ()=>Cloud.cache.users.some(u=>u.role==="admin");

  TokenStore.all     = ()=>Cloud.cache.tokens;
  TokenStore.byId    = (id)=>Cloud.cache.tokens.find(t=>t.tokenId===id)||null;
  TokenStore.byHash  = (h)=>Cloud.cache.tokens.find(t=>t.tokenHash===h)||null;
  TokenStore.forUser = (uid)=>Cloud.cache.tokens.filter(t=>t.userId===uid);

  RequestStore.all     = ()=>Cloud.cache.requests;
  RequestStore.byId    = (id)=>Cloud.cache.requests.find(r=>r.requestId===id)||null;
  RequestStore.forUser = (uid)=>Cloud.cache.requests.filter(r=>r.userId===uid);

  NotificationStore.all     = ()=>Cloud.cache.notifs;
  NotificationStore.forUser = (uid)=>Cloud.cache.notifs.filter(n=>n.userId===uid)
                                .sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  NotificationStore.byId    = (id)=>Cloud.cache.notifs.find(n=>n.notificationId===id)||null;

  Sessions.all     = ()=>Cloud.cache.sessions;
  Sessions.get     = (id)=>Cloud.cache.sessions.find(s=>s.id===id)||null;
  Sessions.forUser = (uid)=>Cloud.cache.sessions.filter(s=>s.userId===uid);
  Sessions.legacy  = ()=>Cloud.cache.sessions.filter(s=>!s.userId);
  const _localDelete = Sessions.delete.bind(Sessions);
  Sessions.delete  = (id)=>{ Cloud.cache.sessions = Cloud.cache.sessions.filter(s=>s.id!==id);
                             sb.from("sessions").delete().eq("id",id).then(()=>{}, ()=>{});
                             try{ AudioStore.deleteSession(id); }catch(e){} };
  const _localSave = Sessions.save.bind(Sessions);
  Sessions.save = (session)=>{
    // optimistic cache update so the report renders immediately…
    const i = Cloud.cache.sessions.findIndex(s=>s.id===session.id);
    if(i>=0) Cloud.cache.sessions[i]=session; else Cloud.cache.sessions.push(session);
    // …then persist (RLS enforces user_id = the signed-in user)
    const u = AuthAccess.currentUser();
    sb.from("sessions").upsert({
      id:session.id, user_id: u?u.id:session.userId||null, test_id:session.testId,
      overall_band: session.scored ? session.scored.overall : null, payload: session
    }).then(()=>{}, (e)=>console.warn("session upsert failed", e));
  };

  // AuthAccess — auth via Supabase Auth
  AuthAccess.currentUser = ()=>{ const p=Cloud.cache.profile; return (p && !p.disabled)?p:null; };
  AuthAccess.isAdmin     = ()=>{ const p=Cloud.cache.profile; return !!p && p.role==="admin" && !p.disabled; };
  AuthAccess.signup = async ({fullName, ageRange, nationality, password, email})=>{
    const name = normName(fullName);
    if(name.split(" ").filter(Boolean).length<2) return {ok:false,error:"Please enter your real full name (at least two words)."};
    if(!ageRange) return {ok:false,error:"Please select your age range."};
    if(!normName(nationality)) return {ok:false,error:"Please enter your nationality."};
    if(!email || !/^\S+@\S+\.\S+$/.test(email)) return {ok:false,error:"Please enter a valid email address."};
    if(!password || password.length<6) return {ok:false,error:"Password must be at least 6 characters long."};
    const { data, error } = await sb.auth.signUp({ email, password, options:{ data:{
      full_name:name, age_range:ageRange, nationality:normName(nationality), device_id:dev() }}});
    if(error) return {ok:false,error:error.message};
    if(!data.session) return {ok:false,error:"Account created — please confirm via the email we sent, then sign in. (Tip: the admin can disable email confirmation in Supabase → Authentication.)"};
    await Cloud.hydrate();
    const u = AuthAccess.currentUser();
    return u ? {ok:true,user:u} : {ok:false,error:"Account created. Please sign in."};
  };
  AuthAccess.login = async ({email, password})=>{
    if(!email) return {ok:false,error:"Please enter your email."};
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if(error) return {ok:false,error:"Incorrect email or password."};
    await Cloud.hydrate();
    const u = AuthAccess.currentUser();
    if(!u){ await sb.auth.signOut(); return {ok:false,error:"This account is unavailable or has been disabled."}; }
    return {ok:true,user:u};
  };
  AuthAccess.logout = async ()=>{ try{ await sb.auth.signOut(); }catch(e){} Cloud.cache.profile=null; };

  // mutations → rpc
  const rpc = async (name, params)=>{ const { data, error } = await sb.rpc(name, params);
    if(error) return {ok:false,error:error.message}; return data; };

  AuthAccess.createTokenRequest = async (testId)=>{ const r = await rpc("request_token",{p_test_id:testId||null, p_device:dev()}); await Cloud.refresh(); return r; };
  AuthAccess.grantToken = async (requestId,{expiryPreset="7"}={})=>{
    const r = await rpc("grant_token",{p_request_id:requestId, p_expiry_preset:expiryPreset});
    await Cloud.refresh();
    if(!r||!r.ok) return r||{ok:false,error:"Grant failed."};
    const req = Cloud.cache.requests.find(x=>x.requestId===requestId);
    return {ok:true, token:{ tokenId:r.token_id, rawTokenForDisplay:r.raw_token, expiresAt:r.expires_at,
            displayTokenLast4:r.display_last4, fullName:(req&&req.fullName)||"the candidate" }};
  };
  AuthAccess.rejectTokenRequest = async (requestId, reason)=>{ const r=await rpc("reject_request",{p_request_id:requestId,p_reason:reason||null}); await Cloud.refresh(); return r; };
  AuthAccess.revokeToken = async (tokenId, reason)=>{ const r=await rpc("revoke_token",{p_token_id:tokenId,p_reason:reason||null}); await Cloud.refresh(); return r; };
  AuthAccess.revokeUserAccess = async (userId, disabled=true)=>{ const r=await rpc("set_user_disabled",{p_user:userId,p_disabled:!!disabled}); await Cloud.refresh(); return r; };
  AuthAccess.consumeValidatedToken = async (tokenId, testId, testTitle)=>{
    // the token's raw value isn't in the cache; find it via the unconsumed notification
    const ntf = Cloud.cache.notifs.find(n=>n.tokenId===tokenId && n.rawTokenForDisplay);
    const raw = ntf ? ntf.rawTokenForDisplay : null;
    if(!raw) return {ok:false,error:"Token is no longer available. Please copy it again from your notifications."};
    const r = await rpc("validate_and_consume_token",{p_raw:raw, p_test_id:testId, p_test_title:testTitle, p_device:dev()});
    await Cloud.refresh();
    return r && r.ok ? {ok:true, token:{tokenId}} : (r||{ok:false,error:"Token could not be used."});
  };
  AuthAccess.markAllRead = async ()=>{ await rpc("mark_notifications_read",{}); await Cloud.hydrate(); };
  AuthAccess.assignLegacySessionsToCurrentUser = async ()=>{ const u=AuthAccess.currentUser(); if(!u) return 0;
    const r = await rpc("assign_legacy_sessions",{p_user:u.id}); await Cloud.refresh(); return (r&&r.assigned)||0; };
}

function mount(){
  const root = $("#app");
  if(!root) return;

  // CLOUD: while Supabase restores the session, show a brief connecting splash.
  if(Cloud.enabled && !Cloud.ready){
    root.innerHTML = "";
    root.className = "mm-app mm-app--auth";
    root.appendChild(el("div",{class:"mm-auth"},[
      el("div",{class:"mm-auth__card",style:"text-align:center;padding:48px 32px;"},[
        el("div",{class:"mm-auth__mark",style:"margin-bottom:18px;"},"M"),
        el("div",{class:"mm-auth__brand"},"Mourad Mekki Teacher Toolkit"),
        el("div",{class:"mm-auth__sub",style:"margin-top:14px;"},"Connecting securely…")
      ])
    ]));
    return;
  }

  // ACCESS LAYER: auth gate. Nothing protected renders without a session.
  if(!AuthAccess.requireLogin()){
    root.innerHTML = "";
    root.className = "mm-app mm-app--auth";
    root.appendChild(renderAuth());
    return;
  }

  // ACCESS LAYER: programmatic route guards (not CSS-only). A non-admin who
  // manually sets state.view to an admin route is bounced to the library.
  const ADMIN_VIEWS = new Set(["settings","builder","requests","users","analytics"]);
  if(ADMIN_VIEWS.has(state.view) && !AuthAccess.isAdmin()){
    toast("Access restricted");
    state.view = "library"; state.viewParams = {};
  }

  root.innerHTML = "";
  root.className = state.view === "runner" || state.view === "processing" || state.view === "setup" ? "mm-app mm-app--runner" : "mm-app";
  const topbar = renderTopbar();
  if(topbar) root.appendChild(topbar);
  const main = el("main",{class:"mm-main"});
  let view;
  switch(state.view){
    case "home": view = renderHome(); break;
    case "guide": view = renderGuide(); break;
    case "library": view = renderLibrary(); break;
    case "sessions": view = renderSessions(); break;
    case "settings": view = renderSettings(); break;
    case "builder": view = renderBuilder(); break;
    case "setup": view = renderSetup(); break;
    case "runner": view = renderRunner(); break;
    case "processing": view = renderProcessing(); break;
    case "report": view = renderReport(); break;
    // --- access layer views ---
    case "profile": view = renderProfile(); break;
    case "notifications": view = renderNotifications(); break;
    case "requests": view = renderAccessRequests(); break;
    case "users": view = renderUsers(); break;
    case "analytics": view = renderAnalytics(); break;
    default: view = renderHome();
  }
  main.appendChild(view);
  root.appendChild(main);
}

state.on(()=>mount());

/* ------------------------------------------------------------
   KEYBOARD SHORTCUTS
   ------------------------------------------------------------ */
document.addEventListener("keydown",(e)=>{
  if(e.target.matches("input,textarea,select")) return;
  if(state.view === "runner"){
    const s = RunnerState.stage;
    if(s === "ready" && (e.code==="Space"||e.code==="Enter")){e.preventDefault();startPart("part1");}
    else if((s==="part1"||s==="part3") && e.code==="ArrowRight"){e.preventDefault();advanceQuestion();}
    else if((s==="part1"||s==="part3"||s==="part2") && e.code==="Space"){e.preventDefault();togglePause();}
  }
  if(e.code==="Escape" && (state.view==="home"||state.view==="library"||state.view==="builder")){
    // no-op
  }
});

/* ------------------------------------------------------------
   INIT
   ------------------------------------------------------------ */
Library.init();
DeviceId.get();   // ACCESS LAYER: ensure a stable device id exists on first visit
// CLOUD: if Supabase is configured, switch the access layer to it and hydrate.
if(Cloud.init()){
  Cloud.hydrate().then(()=>state._emit());
} else {
  Cloud.ready = true;   // local-only prototype mode
}

/* ------------------------------------------------------------
   DEVELOPER-ONLY CONTENT VALIDATION (console output only)
   Never surfaces warnings to students. Run validateTestLibrary()
   from the console at any time, or read the summary logged below.
   ------------------------------------------------------------ */
function validateTestLibrary(){
  const tests = Library.all();
  const issues = [];
  const ids = new Set(), titles = new Set(), cues = new Set();
  const themeCounts = {};
  for(const t of tests){
    const tag = t.id || "(no id)";
    if(!t.id) issues.push("Missing id on a test");
    else if(ids.has(t.id)) issues.push(`Duplicate id: ${t.id}`);
    ids.add(t.id);
    if(!t.title) issues.push(`${tag}: missing title`);
    else if(titles.has(t.title)) issues.push(`Duplicate title: ${t.title}`);
    titles.add(t.title);
    if(!t.difficulty) issues.push(`${tag}: missing difficulty`);
    if(!t.theme) issues.push(`${tag}: missing theme`);
    themeCounts[t.theme] = (themeCounts[t.theme]||0)+1;
    // Part 1
    if(!t.part1 || !Array.isArray(t.part1.topics)) issues.push(`${tag}: missing Part 1`);
    else {
      const p1 = t.part1.topics.reduce((a,x)=>a+(x.questions?x.questions.length:0),0);
      if(p1 < 8) issues.push(`${tag}: Part 1 has only ${p1} questions`);
    }
    // Part 2
    if(!t.part2 || !t.part2.cueCard) issues.push(`${tag}: missing Part 2 cue card`);
    else {
      if(!t.part2.cueCard.topic) issues.push(`${tag}: Part 2 has no cue card topic`);
      const b = t.part2.cueCard.bullets ? t.part2.cueCard.bullets.length : 0;
      if(b < 3) issues.push(`${tag}: Part 2 has ${b} bullets`);
    }
    // Part 3
    if(!t.part3 || !Array.isArray(t.part3.questions)) issues.push(`${tag}: missing Part 3`);
    else if(t.part3.questions.length < 5) issues.push(`${tag}: Part 3 has only ${t.part3.questions.length} questions`);
  }
  const result = {
    totalTests: tests.length,
    byDifficulty: tests.reduce((a,t)=>{a[t.difficulty]=(a[t.difficulty]||0)+1;return a;},{}),
    themesInUse: Object.keys(themeCounts).length,
    issues
  };
  if(issues.length){
    console.warn("[Mourad Mekki Teacher Toolkit] Test library validation found issues:", result);
  } else {
    console.info("[Mourad Mekki Teacher Toolkit] Test library OK —", result.totalTests, "tests:", result.byDifficulty);
  }
  return result;
}
try { validateTestLibrary(); } catch(e){ /* never disturb the student-facing UI */ }

mount();
Backend.probe().then(()=>{
  if(Backend.available()){
    syncSessionsFromBackend().then(()=>state._emit()).catch(()=>state._emit());
  }
  state._emit();
});

})();
</script>
