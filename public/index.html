/* ---- guide helpers that operate on the live DOM ---- */
function guideScrollTo(id){
  const target = document.getElementById(`mm-guide-${id}`);
  if(target) target.scrollIntoView({behavior:"smooth",block:"start"});
}
function guideUpdateProgress(){
  const el0 = document.getElementById("mm-guide-progress");
  if(!el0) return;
  const total = $$(".mm-guide-check").length;
  const done = $$(".mm-guide-check.is-checked").length;
  el0.textContent = `${done} of ${total} ready`;
}
function guideAttachScroll(){
  if(GuideState._scrollHandler){
    window.removeEventListener("scroll", GuideState._scrollHandler);
    GuideState._scrollHandler = null;
  }
  const handler = ()=>{
    const guideRoot = document.getElementById("mm-guide-root");
    if(!guideRoot){ window.removeEventListener("scroll", handler); GuideState._scrollHandler=null; return; }
    // back-to-top visibility
    const btn = guideRoot.querySelector(".mm-guide-top");
    if(btn) btn.classList.toggle("is-visible", window.scrollY > 600);
    // active jump link (closest section above the offset line)
    const offset = 170;
    let active = null;
    for(const [id] of GUIDE_SECTIONS){
      const sec = document.getElementById(`mm-guide-${id}`);
      if(sec && sec.getBoundingClientRect().top - offset <= 0) active = id;
    }
    guideRoot.querySelectorAll(".mm-guide-jump__link").forEach(l=>{
      l.classList.toggle("is-active", l.getAttribute("data-jump")===active);
    });
  };
  GuideState._scrollHandler = handler;
  window.addEventListener("scroll", handler, {passive:true});
  handler();
}

/* ------------------------------------------------------------
   SETTINGS VIEW — transcription provider configuration
   ------------------------------------------------------------ */
const SettingsState = { hydrated:false, draft:null, status:null };
function hydrateSettings(){
  if(!SettingsState.hydrated){
    SettingsState.draft = getTranscriptionSettings();
    SettingsState.draft.backendUrl = getBackendUrl();
    SettingsState.hydrated = true;
  }
  return SettingsState.draft;
}
function renderSettings(){
  const d = hydrateSettings();
  const speechAvailable = Transcriber.available();

  const providerBtn = (val,title,sub)=>el("button",{
    class:`mm-seg__btn ${d.provider===val?"is-active":""}`,
    onclick:()=>{ d.provider=val; SettingsState.status=null; state._emit(); }
  },[ el("div",{class:"mm-seg__btn-title"},title), el("div",{class:"mm-seg__btn-sub"},sub) ]);

  const presetBtn = (key)=>{
    const p = TRANSCRIPTION_PRESETS[key];
    return el("button",{
      class:`mm-seg__btn ${d.preset===key?"is-active":""}`,
      onclick:()=>{
        d.preset = key;
        if(key!=="custom"){ d.baseUrl = p.baseUrl; d.model = p.model; }
        SettingsState.status=null; state._emit();
      }
    },[ el("div",{class:"mm-seg__btn-title"},p.label),
        el("div",{class:"mm-seg__btn-sub"}, key==="custom" ? "Any OpenAI-compatible server" : p.baseUrl.replace("https://","")) ]);
  };

  const input = (label,key,opts={})=>el("div",{class:"mm-settings__field"},[
    el("label",{class:"mm-label"},label),
    el("input",{class:"mm-input",type:opts.type||"text",placeholder:opts.placeholder||"",
      value:d[key]||"",autocomplete:"off",spellcheck:"false",
      oninput:(e)=>{ d[key]=e.target.value; SettingsState.status=null; }})
  ]);

  const whisperFields = d.provider==="whisper" ? el("div",{},[
    el("div",{class:"mm-settings__field"},[
      el("label",{class:"mm-label"},"Provider preset"),
      el("div",{class:"mm-seg"},[presetBtn("openai"),presetBtn("groq"),presetBtn("custom")])
    ]),
    input("API base URL","baseUrl",{placeholder:"https://api.openai.com/v1"}),
    input("API key","apiKey",{type:"password",placeholder:"sk-… (stored only on this device)"}),
    input("Model","model",{placeholder:"whisper-1"}),
    el("div",{class:"mm-settings__field"},[
      el("label",{class:"mm-label"},"Spoken language"),
      el("select",{class:"mm-input",onchange:(e)=>{ d.language=e.target.value; }},
        [["en","English"],["auto","Auto-detect"],["ar","Arabic"],["fr","French"],["es","Spanish"],["de","German"],["zh","Chinese"],["hi","Hindi"]]
          .map(([v,l])=>el("option",{value:v,selected:d.language===v},l)))
    ])
  ]) : el("div",{class:"mm-settings__hint",style:"margin-top:16px;"},
      speechAvailable
        ? "The browser's built-in speech recognition will be used. It runs live during recording, works best in Chrome/Edge, and needs an internet connection."
        : "This browser has no built-in speech recognition. Switch to a hosted Whisper API above, or use Chrome/Edge.");

  let statusEl = null;
  if(SettingsState.status){
    const s = SettingsState.status;
    statusEl = el("div",{class:`mm-settings__status mm-settings__status--${s.kind}`},[
      s.kind==="ok"?el("span",{html:ICONS.check}):null, s.text
    ]);
  }

  const save = ()=>{
    saveBackendUrl(d.backendUrl||"");
    saveTranscriptionSettings({
      provider:d.provider, preset:d.preset, baseUrl:(d.baseUrl||"").trim(),
      apiKey:(d.apiKey||"").trim(), model:(d.model||"whisper-1").trim(), language:d.language||"en"
    });
    toast("Settings saved");
    SettingsState.status = {kind:"ok", text:"Saved. These settings apply to your next assessment."};
    state._emit();
  };

  const testConnection = async (btn)=>{
    if(d.provider!=="whisper"){ SettingsState.status={kind:"busy",text:"Connection test only applies to the hosted Whisper API."}; state._emit(); return; }
    if(!d.baseUrl || !d.apiKey){ SettingsState.status={kind:"err",text:"Enter both an API base URL and an API key first."}; state._emit(); return; }
    SettingsState.status = {kind:"busy", text:"Testing connection…"}; state._emit();
    const orig = btn ? btn.innerHTML : null;
    if(btn){ btn.disabled=true; btn.textContent="Testing…"; }
    try{
      const wav = makeSilentWav(1);
      await WhisperClient.transcribe(wav, {baseUrl:d.baseUrl.trim(), apiKey:d.apiKey.trim(), model:d.model.trim(), language:d.language});
      SettingsState.status = {kind:"ok", text:"Connection successful — the endpoint accepted the request."};
    }catch(err){
      SettingsState.status = {kind:"err", text:"Failed: " + (err.message||String(err))};
    }finally{
      if(btn){ btn.disabled=false; btn.innerHTML=orig; }
      state._emit();
    }
  };

  const reconnect = async (btn)=>{
    saveBackendUrl(d.backendUrl||"");
    SettingsState.status = {kind:"busy", text:"Connecting to server…"}; state._emit();
    const orig = btn ? btn.innerHTML : null;
    if(btn){ btn.disabled=true; btn.textContent="Connecting…"; }
    await Backend.probe();
    if(Backend.available()){
      const i = Backend.info();
      await syncSessionsFromBackend().catch(()=>{});
      const storeTxt = i.sessions && i.sessions.store ? `; storage: ${i.sessions.store==="postgres"?"Postgres (durable)":i.sessions.store}` : "";
      SettingsState.status = {kind:"ok", text:`Connected. Transcription: ${i.transcription.model}; scoring: ${i.scoring.model}${i.mock?" (mock mode)":""}${storeTxt}.`};
    } else {
      SettingsState.status = {kind:"err", text:"No server reachable at that address. Leave the URL blank if the page is served by the backend."};
    }
    if(btn){ btn.disabled=false; btn.innerHTML=orig; }
    state._emit();
  };

  const backendConnected = Backend.available();
  const backendInfo = Backend.info();
  const storeDriver = backendConnected && backendInfo.sessions ? backendInfo.sessions.store : null;
  const storageIndicator = backendConnected ? el("div",{
      class:`mm-settings__status mm-settings__status--${storeDriver==="postgres"?"ok":"busy"}`
    },[
      storeDriver==="postgres" ? el("span",{html:ICONS.check}) : null,
      storeDriver==="postgres"
        ? "Storage: Postgres — history is durable and shared across devices."
        : storeDriver==="file"
          ? "Storage: local file — good for testing, but resets on redeploy on most hosts. Set DATABASE_URL (e.g. a free Neon database) on the server for durable history."
          : "Storage: connected."
    ]) : null;
  const backendSection = el("div",{class:"mm-settings__section"},[
    el("h3",{class:"mm-settings__legend"},"Assessment server (backend)"),
    el("p",{class:"mm-settings__hint"},
      "Recommended. With a backend connected, transcription and AI scoring run on the server and your API key never touches the browser. Leave the URL blank when this page is served by the backend itself (same origin)."),
    backendConnected
      ? el("div",{class:"mm-settings__status mm-settings__status--ok"},[
          el("span",{html:ICONS.check}),
          `Connected — transcription: ${backendInfo.transcription.model}, scoring: ${backendInfo.scoring.model}${backendInfo.mock?" (mock mode — add a Groq key on the server)":""}.`
        ])
      : el("div",{class:"mm-settings__hint",style:"color:var(--mm-warning);"},"Not connected. The app will use the browser/direct options below instead."),
    storageIndicator,
    el("div",{class:"mm-settings__field"},[
      el("label",{class:"mm-label"},"Backend URL"),
      el("input",{class:"mm-input",type:"text",placeholder:"blank = same origin, e.g. http://localhost:8787",
        value:d.backendUrl||"",autocomplete:"off",spellcheck:"false",
        oninput:(e)=>{ d.backendUrl=e.target.value; }})
    ]),
    el("div",{class:"mm-settings__actions"},[
      el("button",{class:"mm-btn mm-btn--primary",onclick:(e)=>reconnect(e.currentTarget)},"Connect / reconnect")
    ])
  ]);

  return el("section",{class:"mm-page"},[
    el("div",{class:"mm-page__header"},[
      el("div",{class:"mm-page__eyebrow"},"Configuration"),
      el("h2",{class:"mm-page__title"},"Settings"),
      el("div",{class:"mm-page__rule"})
    ]),
    el("div",{class:"mm-settings"},[
      el("div",{class:"mm-settings__card"},[
        backendSection,
        el("div",{class:"mm-settings__section"},[
          el("h3",{class:"mm-settings__legend"},"Transcription"),
          el("p",{class:"mm-settings__hint"},
            "Choose how candidate speech is turned into text for assessment. A hosted Whisper-style API is recommended: it transcribes the saved recording after each part, works in any browser, and is far more accurate than the browser engine."),
          el("div",{class:"mm-seg"},[
            providerBtn("whisper","Hosted Whisper API","Accurate · any browser · recommended"),
            providerBtn("browser","Browser engine","Live · Chrome/Edge only · free")
          ]),
          whisperFields,
          statusEl,
          el("div",{class:"mm-settings__actions"},[
            el("button",{class:"mm-btn mm-btn--primary",onclick:save},[el("span",{html:ICONS.check}),"Save settings"]),
            d.provider==="whisper" ? el("button",{class:"mm-btn mm-btn--secondary",onclick:(e)=>testConnection(e.currentTarget)},"Test connection") : null
          ])
        ]),
        el("div",{class:"mm-settings__section"},[

function renderSessions(){

  // ACCESS LAYER: users see only their own sessions; admins see everything.
  const all = (_admin ? Sessions.all() : AuthAccess.getUserScopedSessions()).filter(s=>s.scored)
    .sort((a,b)=>new Date(b.completedAt||b.startedAt)-new Date(a.completedAt||a.startedAt));

  const header = el("div",{class:"mm-page__header"},[
    el("div",{class:"mm-page__eyebrow"},_admin?"History":"Your history"),
    el("h2",{class:"mm-page__title"},_admin?"Assessment sessions":"My reports"),
    el("div",{class:"mm-page__rule"}),
    el("p",{class:"mm-page__sub",style:"margin-top:10px;"},"You can view your previous reports any time — no token is required to revisit past results.")
  ]);

  if(!all.length){
    return el("section",{class:"mm-page"},[
      header,
      el("div",{class:"mm-empty"},[
        el("div",{class:"mm-empty__icon",html:ICONS.waveform}),
        el("div",{class:"mm-empty__title"},"No sessions yet"),
        el("div",{class:"mm-empty__text"},"Completed assessments will appear here with their band scores and recordings."),
        el("button",{class:"mm-btn mm-btn--primary mm-mt-5",onclick:()=>state.go("library")},
          [el("span",{html:ICONS.book}),"  Browse the test library"])
      ])
    ]);
  }

  // Group by student
  const groups = {};
  for(const s of all){
    const name = (s.studentName||"Unnamed candidate").trim() || "Unnamed candidate";
    (groups[name] = groups[name] || []).push(s);
  }
  const groupNames = Object.keys(groups).sort((a,b)=>a.localeCompare(b));

  const row = (s)=>{
    const test = Library.get(s.testId) || s.test;
    const hasAudio = s.parts && ["part1","part2","part3"].some(k=>s.parts[k] && s.parts[k].audioKey);
    return el("div",{class:"mm-session-row"},[
      el("div",{class:"mm-session-row__main",onclick:()=>state.go("report",{sessionId:s.id})},[
        el("div",{class:"mm-session-row__title"}, test?.title || "Archived test"),
        el("div",{class:"mm-session-row__sub"},[
          fmt.dateTimeMed(s.completedAt||s.startedAt),
          " · ",
          (s.mode==="exam"?"Exam mode":"Practice mode"),
          hasAudio ? el("span",{class:"mm-session-row__audio-dot",style:"margin-left:8px;",html:ICONS.play+" audio"}) : null
        ])
      ]),
      el("div",{class:`mm-session-row__band ${hasAudio?"mm-session-row__band--audio":""}`},
        `Band ${s.scored.overall.toFixed(1)}`),
      el("button",{class:"mm-session-row__del",title:"Delete session",html:ICONS.trash,
        onclick:async(e)=>{
          e.stopPropagation();
          const ok = await modal({
            title:"Delete this session?",
            body:`This permanently removes the assessment report${hasAudio?" and its recordings":""} for ${s.studentName||"this candidate"}. This cannot be undone.`,
            actions:[{label:"Cancel",value:false},{label:"Delete",kind:"danger",value:true}]
          });
          if(ok){ Sessions.delete(s.id); if(Backend.available()) Backend.deleteSession(s.id); toast("Session deleted"); state._emit(); }
        }})
    ]);
  };

  const groupEls = groupNames.map(name=>{
    const items = groups[name];
    const avg = items.reduce((a,s)=>a+s.scored.overall,0)/items.length;
    return el("div",{class:"mm-sessions-group"},[
      el("div",{class:"mm-sessions-group__head"},[
        el("span",{class:"mm-sessions-group__name"},name),
        el("span",{class:"mm-sessions-group__count"},
          `${items.length} session${items.length!==1?"s":""} · avg band ${avg.toFixed(1)}`)
      ]),
      el("div",{}, items.map(row))
    ]);
  });

  return el("section",{class:"mm-page"},[
    header,
    el("div",{class:"mm-sessions-list"}, groupEls)
  ]);
}

const LibraryState = {search:"", theme:"all", difficulty:"all", sort:"recommended"};

function renderLibrary(){
  const tests = Library.all().filter(t=>!t.isArchived);

  let filtered = tests;
  if(LibraryState.search){
    const q = LibraryState.search.toLowerCase();
    filtered = filtered.filter(t=>
      t.title.toLowerCase().includes(q) ||
      (t.description||"").toLowerCase().includes(q) ||
      (t.theme||"").toLowerCase().includes(q)
    );
  }
  if(LibraryState.theme!=="all") filtered = filtered.filter(t=>t.theme===LibraryState.theme);
  if(LibraryState.difficulty!=="all") filtered = filtered.filter(t=>t.difficulty===LibraryState.difficulty);

  if(LibraryState.sort==="alphabetical") filtered.sort((a,b)=>a.title.localeCompare(b.title));
  else if(LibraryState.sort==="difficulty") filtered.sort((a,b)=>{
    const order={foundation:0,standard:1,challenging:2};
    return (order[a.difficulty]||1)-(order[b.difficulty]||1);
  });
  else if(LibraryState.sort==="recent") filtered.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  else { // recommended
    filtered.sort((a,b)=>{
      const aNew = BadgeService.shouldShowNew(a)?1:0;
      const bNew = BadgeService.shouldShowNew(b)?1:0;
      if(aNew!==bNew) return bNew-aNew;
      const order={foundation:0,standard:1,challenging:2};
      return (order[a.difficulty]||1)-(order[b.difficulty]||1);
    });
  }

  const header = el("div",{class:"mm-page__header"},[
    el("div",{class:"mm-page__eyebrow"},"Test Library"),
    el("h2",{class:"mm-page__title"},"A curated library of IELTS Speaking tests"),
    el("p",{class:"mm-page__sub"},`Explore a growing library of ${tests.length} full IELTS Speaking tests across foundation, standard, and challenging levels, plus any custom tests you've created. Each test is fully specified with Part 1, Part 2 cue card, and Part 3 discussion.`),
    el("div",{class:"mm-page__rule"})
  ]);

  const toolbar = el("div",{class:"mm-toolbar"},[
    el("div",{class:"mm-search"},[
      el("span",{html:ICONS.search}),
      el("input",{type:"text",placeholder:"Search tests…",value:LibraryState.search,oninput:(e)=>{
        LibraryState.search = e.target.value;
        state._emit();
      }})
    ]),
    el("div",{class:"mm-filter"},[
      el("label",{},"Theme"),
      el("select",{onchange:(e)=>{LibraryState.theme=e.target.value;state._emit();}},
        (()=>{
          // Build the theme list dynamically from the live library so every
          // theme (seed, Phase 6, or custom) is filterable without code changes.
          const present = Array.from(new Set(tests.map(t=>t.theme||"custom"))).sort((a,b)=>a.localeCompare(b));
          return ["all",...present].map(t=>
            el("option",{value:t,selected:LibraryState.theme===t?true:false},t==="all"?"All themes":t[0].toUpperCase()+t.slice(1)));
        })())
    ]),
    el("div",{class:"mm-filter"},[
      el("label",{},"Difficulty"),
      el("select",{onchange:(e)=>{LibraryState.difficulty=e.target.value;state._emit();}},
        ["all","foundation","standard","challenging"].map(d=>
          el("option",{value:d,selected:LibraryState.difficulty===d?true:false},d==="all"?"All levels":d[0].toUpperCase()+d.slice(1))))
    ]),
    el("div",{class:"mm-filter"},[
      el("label",{},"Sort"),
      el("select",{onchange:(e)=>{LibraryState.sort=e.target.value;state._emit();}},
        [["recommended","Recommended"],["alphabetical","A → Z"],["difficulty","By difficulty"],["recent","Most recent"]].map(([v,l])=>
          el("option",{value:v,selected:LibraryState.sort===v?true:false},l)))
    ]),
    el("div",{class:"mm-toolbar__right"},[
      el("button",{class:"mm-btn mm-btn--primary",onclick:()=>state.go("builder")},
        [el("span",{html:ICONS.plus}),"Create a test"])
    ])
  ]);

  const grid = filtered.length
    ? el("div",{class:"mm-test-grid"}, filtered.map(renderTestCard))
    : el("div",{class:"mm-empty"},[
        el("div",{class:"mm-empty__icon",html:ICONS.book}),
        el("h3",{class:"mm-empty__title"},"No tests match your filters"),

/* ------------------------------------------------------------
   BUILDER VIEW — Test creation with paste-parser
   ------------------------------------------------------------ */
const BuilderState = {
  mode:"paste",
  title:"",
  theme:"custom",
  difficulty:"standard",
  timePressure:"medium",
  expectedMin:6.0,
  expectedMax:7.5,
  rawPart1:"",
  rawPart2:"",
  rawPart3:"",
  parsed:null,
  validation:null
};

function parsePart1(raw){
  if(!raw.trim()) return null;
  const lines = raw.split(/\n+/).map(l=>l.trim()).filter(Boolean);
  const topics = [];
  let current = null;
  for(const line of lines){
    if(/^(topic\s*[:\-]|##\s*|[A-Z][a-zA-Z\s]{2,30}:)/i.test(line) && !/\?/.test(line)){
      if(current) topics.push(current);
      const topic = line.replace(/^(topic\s*[:\-]?|##\s*)/i,"").replace(/:$/,"").trim();
      current = {topic, questions:[]};
    } else if(/\?/.test(line)){
      if(!current) current = {topic:"General", questions:[]};
      const qt = line.replace(/^[\d\.\)\-•]+\s*/,"").replace(/^[qQ]\d*[:\.]?\s*/,"").trim();
      if(qt) current.questions.push({q:qt, skills:[]});
    }
  }
  if(current) topics.push(current);
  return topics.length ? {instructions:"Let's start with some introductory questions.", topics} : null;
}
function parsePart2(raw){
  if(!raw.trim()) return null;
  const text = raw.trim();
  // Split into lines & try to identify topic line and bullets
  const lines = text.split(/\n+/).map(l=>l.trim()).filter(Boolean);
  let topic = "";
  const bullets = [];
  let followUp = [];
  let inFollowUp = false;
  for(let i=0;i<lines.length;i++){
    const line = lines[i];
    if(/^follow[- ]?up/i.test(line)){inFollowUp=true;continue;}
    if(inFollowUp){
      if(/\?/.test(line)){followUp.push({q:line.replace(/^[\d\.\)\-•]+\s*/,""),skills:[]});}
      continue;
    }
    if(i===0){topic = line.replace(/^(describe\s*[:\-]?\s*)?/i,"Describe ").replace(/^Describe\s+Describe\s+/i,"Describe ");continue;}
    if(/^(you\s+should\s+say|say)\s*:?$/i.test(line)) continue;
    // Bullets
    const bm = line.match(/^[•\-\*\d\.\)]+\s*(.+)/);
    if(bm && bm[1]){bullets.push(bm[1]);}
    else if(!topic) topic = line;
    else if(bullets.length<5 && !/\?/.test(line)) bullets.push(line);
  }
  if(!topic) return null;
  return {
    cueCard:{topic, bullets: bullets.length? bullets : ["what it is","when it happened","who was involved","and explain why it matters to you."], followUp},
    prepSeconds:60, speakSeconds:120, speakSecondsMin:60,
    skills:["description","narrative","justification","extended discourse"]
  };
}
function parsePart3(raw){
  if(!raw.trim()) return null;
  const lines = raw.split(/\n+/).map(l=>l.trim()).filter(Boolean);
  let topicLabel = "Discussion";
  const questions = [];
  for(const line of lines){
    if(!/\?/.test(line)){
      // possible topic heading
      if(!questions.length && line.length < 60) topicLabel = line.replace(/[:\-]$/,"");
      continue;
    }
    const qt = line.replace(/^[\d\.\)\-•]+\s*/,"").replace(/^[qQ]\d*[:\.]?\s*/,"").trim();
    if(qt) questions.push({q:qt, skills:[]});
  }
  return questions.length ? {topic:topicLabel, questions} : null;
}

function runParser(){
  const p1 = parsePart1(BuilderState.rawPart1);
  const p2 = parsePart2(BuilderState.rawPart2);
  const p3 = parsePart3(BuilderState.rawPart3);
  BuilderState.parsed = {part1:p1, part2:p2, part3:p3};
  return validateBuilder();
}
function validateBuilder(){
  const errors = [];
  const warnings = [];
  if(!BuilderState.title || BuilderState.title.trim().length<3) errors.push("Title is required (at least 3 characters).");
  const p = BuilderState.parsed || {};
  if(!p.part1 || !p.part1.topics?.length) errors.push("Part 1 must include at least one topic block with questions.");
  else {
    const qCount = p.part1.topics.reduce((a,t)=>a+t.questions.length,0);
    if(qCount < 6) warnings.push(`Part 1 has only ${qCount} questions — typical Part 1 has 8–12.`);
  }
  if(!p.part2) errors.push("Part 2 must include a cue-card topic.");
  else if(!p.part2.cueCard.bullets?.length) warnings.push("Part 2 has no bullets — default bullets will be used.");
  if(!p.part3) errors.push("Part 3 must include at least one discussion question.");
  else if(p.part3.questions.length < 4) warnings.push(`Part 3 has only ${p.part3.questions.length} questions — typical Part 3 has 5–7.`);
  if(BuilderState.expectedMin >= BuilderState.expectedMax) errors.push("Expected band minimum must be less than maximum.");
  BuilderState.validation = {errors,warnings,valid:errors.length===0};
  return BuilderState.validation;
}

  if(!v.valid){
    state._emit();
    toast("Please resolve errors before saving");
    return;
  }
  const now = new Date().toISOString();
  const id = `custom_${shortHash(BuilderState.title+now)}_${Date.now().toString(36).slice(-4)}`;
  const p = BuilderState.parsed;
  const test = {
    id, schema:"v1.1",
    title:BuilderState.title.trim(),
    theme:BuilderState.theme,
    difficulty:BuilderState.difficulty,
    expectedBandRange:{min:BuilderState.expectedMin,max:BuilderState.expectedMax},
    partDifficulty:{part1:BuilderState.difficulty,part2:BuilderState.difficulty,part3:BuilderState.difficulty},
    timePressure:BuilderState.timePressure,
    estimatedDurationSec:720,
    description:(p.part3?.topic ? `Custom test · ${p.part3.topic}` : "Custom teacher-authored test"),
    source:"custom", version:1,
    createdAt:now, updatedAt:now, firstSeenAt:now,
    lastOpenedAt:null, openCount:0, sessionCount:0, isArchived:false,
    part1:p.part1, part2:p.part2, part3:p.part3,
    modelResponses:null
  };
  Library.save(test);
  // Reset builder
  Object.assign(BuilderState,{
    mode:"paste",title:"",theme:"custom",difficulty:"standard",timePressure:"medium",
    expectedMin:6.0,expectedMax:7.5,rawPart1:"",rawPart2:"",rawPart3:"",parsed:null,validation:null
  });
  toast("Test saved to library");
  state.go("library");
}

function capabilityNotice(){
  const t = getTranscriptionSettings();
  const mode = activeTranscriptionMode();
  const isFileUrl = location.protocol === "file:";
  const settingsLink = el("button",{
    style:"background:none;border:none;padding:0;margin:0;color:var(--mm-gold-300);text-decoration:underline;cursor:pointer;font:inherit;",
    onclick:()=>state.go("settings")
  },"Settings");

  if(mode === "backend"){
    const i = Backend.info() || {};
    const tm = i.transcription ? i.transcription.model : "server";
    const sm = i.scoring ? i.scoring.model : "server";
    return el("div",{class:"mm-capnotice mm-capnotice--ok"},[
      el("strong",{},"Connected to your assessment server. "),
      `Transcription (${tm}) and AI scoring (${sm}) run server-side — no API key in this browser, works in any browser. `,
      i.mock ? "The server is in mock mode; add a Groq key to its .env to enable real AI." : ""
    ]);
  }
  if(mode === "whisper"){
    const presetLabel = (TRANSCRIPTION_PRESETS[t.preset]||{}).label || "custom endpoint";
    return el("div",{class:"mm-capnotice mm-capnotice--ok"},[
      el("strong",{},"Hosted transcription ready. "),
      `Recordings will be transcribed by ${presetLabel} (${t.model}) when each part ends — this works in any browser. Change it in `, settingsLink, "."
    ]);
  }
  if(t.provider === "whisper" && mode === "browser"){
    // Whisper selected but not configured → falling back to the browser engine
    return el("div",{class:"mm-capnotice"},[
      el("strong",{},"Whisper API isn't configured yet. "),
      "Falling back to this browser's built-in speech recognition, which is less accurate and only works well in Chrome/Edge. ",
      isFileUrl ? "Running from a file:// path also tends to block it. " : "",
      "Add your API key in ", settingsLink, " for accurate transcription in any browser. Audio is recorded either way."
    ]);
  }
  if(mode === "browser"){
    return el("div",{class:"mm-capnotice"},[
      el("strong",{},"Using the browser speech engine. "),
      "This works best in Chrome or Edge with an internet connection. ",
      isFileUrl ? "Running from file:// can prevent it from returning text — host at an https:// address if the transcript comes back empty. " : "",
      "For higher accuracy in any browser, switch to a hosted Whisper API in ", settingsLink, "."
    ]);
  }
  // mode === "none"
  return el("div",{class:"mm-capnotice"},[
    el("strong",{},"No transcription provider available. "),
    "Audio will still be recorded and acoustic measures assessed, but lexical and grammatical scoring need a transcript. ",
    "Configure a hosted Whisper API in ", settingsLink, " (recommended), or use Chrome/Edge for the browser engine."
  ]);
}

/* Zero-cost microphone check card (setup screen). */
function micCheckCard(){
  const mt = SetupState.micTest;
  const statusMeta = {
    pass:   { color:"var(--mm-gold-300)", label:"Microphone check passed",
              text:"Your recording quality is suitable for pronunciation scoring." },
    weak:   { color:"#E9B872", label:"Microphone signal is weak",
              text:"You can still continue — pronunciation will be marked audio-limited and scored more cautiously." },
    unusable:{color:"#E08D7A", label:"Microphone not usable",
              text:"Almost no signal was detected. Check your microphone before recording." },
    denied: { color:"#E08D7A", label:"Microphone access blocked",
              text:"Permission was not granted. Allow microphone access in your browser, then re-test." }
  };

  const runCheck = async (e)=>{
    if(SetupState.micTesting) return;
    SetupState.micTesting = true;
    const btn = e.currentTarget;
    btn.disabled = true;
    const card = btn.closest(".mm-miccheck");
    const meter = card ? card.querySelector(".mm-miccheck__meter-fill") : null;
    const hint = card ? card.querySelector(".mm-miccheck__hint") : null;
    if(hint) hint.textContent = "Listening… please speak normally for three seconds.";
    btn.textContent = "Listening…";
    const result = await MicTest.run(3000, (lvl)=>{ if(meter) meter.style.width = Math.round(lvl*100)+"%"; });
    SetupState.micTest = result;
    SetupState.micTesting = false;
    state._emit();   // re-render to show the verdict
  };

  const meterRow = el("div",{class:"mm-miccheck__meter"},[ el("div",{class:"mm-miccheck__meter-fill"}) ]);

  const resultBlock = mt ? (()=>{
    const meta = statusMeta[mt.status] || statusMeta.weak;
    return el("div",{class:"mm-miccheck__result",style:`border-left:3px solid ${meta.color};`},[
      el("div",{class:"mm-miccheck__result-label",style:`color:${meta.color};`}, meta.label),
      el("div",{class:"mm-miccheck__result-text"}, meta.text),
      (mt.warnings && mt.warnings.length) ? el("ul",{class:"mm-miccheck__warnings"},
        mt.warnings.map(w=>el("li",{},w))) : null,
      (typeof mt.score==="number" && mt.status!=="denied")
        ? el("div",{class:"mm-miccheck__score"}, `Signal quality: ${mt.score}/100`) : null
    ]);
  })() : null;

  return el("div",{class:"mm-miccheck"},[
    el("div",{class:"mm-miccheck__head"},[
      el("span",{class:"mm-miccheck__title",html:ICONS.mic + "<span>Microphone check</span>"}),
      el("span",{class:"mm-miccheck__optional"},"Recommended · 3 seconds")
    ]),
    el("div",{class:"mm-miccheck__hint"}, mt
      ? "Re-test any time if you change microphone or move rooms."
      : "Run a quick check so pronunciation scoring has clean audio to work with."),
    meterRow,
    resultBlock,
    el("button",{class:"mm-btn mm-btn--secondary",style:"width:100%;color:var(--mm-navy-50);box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.25);background:rgba(255,255,255,.04);margin-top:4px;",
      onclick:runCheck},
      mt ? "Re-test microphone" : "Run microphone check")
  ]);
}

/* ------------------------------------------------------------
   RUNNER — full recording orchestration
   ------------------------------------------------------------ */
// Runner substate (separate from state.view to avoid re-render thrash)
const RunnerState = {
  test:null,
  mode:"practice",
  studentName:"",
  examinerName:"",
  stage:"loading",     // loading|setup|ready|part1|part2_prep|part2|part3|done
  partKey:null,        // part1|part2|part3
  qIndex:0,
  paused:false,
  transMode:null,      // "whisper" | "browser" | "none"
  pauseUsed:false,
  timer:null,
  waveRenderer:null,
  vad:null,
  liveCaption:"",
  timeUpShown:false,
  _rafMeta:null,
  partMeta:{part1:null,part2:null,part3:null},
  startedAt:null,
  sessionId:null,
  examinerTurns:[],
  candidateTurns:{part1:[],part2:[],part3:[]},
  micTest:null
};

async function launchRunner(test){
  RunnerState.test = test;
  RunnerState.mode = SetupState.mode;
  RunnerState.studentName = SetupState.studentName.trim();
  RunnerState.examinerName = SetupState.examinerName.trim() || "Mourad Mekki";
  RunnerState.stage = "loading";
  RunnerState.partKey = null;
  RunnerState.qIndex = 0;
  RunnerState.paused = false;
  RunnerState.pauseUsed = false;
  RunnerState.liveCaption = "";
  RunnerState.timeUpShown = false;
  RunnerState.partMeta = {part1:null,part2:null,part3:null};
  RunnerState.startedAt = Date.now();
  RunnerState.sessionId = uid();
  RunnerState.examinerTurns = [];
  RunnerState.candidateTurns = {part1:[],part2:[],part3:[]};
  RunnerState.transMode = activeTranscriptionMode();
  RunnerState.micTest = SetupState.micTest;   // pre-flight microphone check (may be null)
  RunnerState._tokenConsumed = false;
  RunnerState.consumedTokenId = null;

  state.go("runner",{testId:test.id});
  // Initialize recorder
  try{
    await Recorder.init();
    // ACCESS LAYER: the test has now actually started → consume the token (once).
    if(SetupState.pendingToken && !RunnerState._tokenConsumed){
      const res = await Promise.resolve(AuthAccess.consumeValidatedToken(SetupState.pendingToken.tokenId, test.id, test.title));
      if(res.ok){ RunnerState._tokenConsumed = true; RunnerState.consumedTokenId = res.token.tokenId; }
      else { toast(res.error || "Token could not be used."); }
      SetupState.pendingToken = null;
    }
    RunnerState.stage = "ready";
    state._emit();
  }catch(err){
    RunnerState.stage = "permission-denied";
    state._emit();
  }
}

async function startPart(partKey){
  const test = RunnerState.test;
  RunnerState.partKey = partKey;
  RunnerState.stage = partKey;
  RunnerState.qIndex = 0;
  RunnerState.liveCaption = "";
  RunnerState.timeUpShown = false;
  state._emit();

  // Compute duration for this part
  let durationMs;
  if(partKey==="part1") durationMs = 4.5 * 60000;        // ~4.5 min
  else if(partKey==="part2") durationMs = test.part2.speakSeconds * 1000;
  else durationMs = 4.5 * 60000;                          // Part 3 ~4.5 min

  // Setup VAD
  RunnerState.vad = new VAD();

  // Wait a tick for the canvas to be in DOM
  await new Promise(r=>requestAnimationFrame(r));
  const waveCanvas = $("#mm-wave-canvas");
  if(waveCanvas){
    RunnerState.waveRenderer = new WaveRenderer(waveCanvas);
    RunnerState.waveRenderer.start(()=>Recorder.readFrame());
  }

  // Setup analysis loop (VAD)
  const vadLoop = ()=>{
    if(RunnerState.stage !== partKey) return;
    const buf = Recorder.readFrame();
    if(buf && !RunnerState.paused){
      RunnerState.vad.processFrame(buf, RunnerState.timer ? RunnerState.timer.elapsed() : 0);
    }
    RunnerState._rafMeta = requestAnimationFrame(vadLoop);
  };
  RunnerState._rafMeta = requestAnimationFrame(vadLoop);

  // Start recorder + transcriber
  Recorder.start();
  if(RunnerState.transMode === "browser"){
    Transcriber.onPartial((text)=>{
      RunnerState.liveCaption = text;
      const live = $("#mm-live-caption");
      if(live) live.textContent = text;
    });
    Transcriber.onFinal((text)=>{
      RunnerState.candidateTurns[partKey].push({text, at:RunnerState.timer?.elapsed()||0});
    });
    Transcriber.start();
  }
  // (Whisper mode transcribes the saved recording after the part ends.)

  // Timer
  const timerDigits = ()=>$("#mm-timer-digits");
  const timerProg = ()=>$("#mm-timer-prog");
  const timerWrap = ()=>$("#mm-timer-wrap");
  RunnerState.timer = new Timer(durationMs, {
    onTick:(remaining)=>{
      const d = timerDigits();
      if(d) d.textContent = fmt.mmss(remaining);
      const prog = timerProg();
      if(prog){
        const ratio = remaining/durationMs;
        const CIRC = 2 * Math.PI * 96;  // r=96
        prog.setAttribute("stroke-dashoffset", String(CIRC * (1-ratio)));
      }
    },
    onApproach:()=>{
      const p = timerProg();if(p) p.classList.add("mm-timer__prog--warn");
      const w = timerWrap();if(w) w.classList.add("is-warn");
    },
    onWarning:()=>{
      const p = timerProg();if(p){p.classList.remove("mm-timer__prog--warn");p.classList.add("mm-timer__prog--danger");}
      const w = timerWrap();if(w){w.classList.remove("is-warn");w.classList.add("is-danger");}
    },
    onFlash:(n)=>{
      // Silent flashes — visual pulse
      const w = timerWrap();if(w){w.style.transform="scale(1.04)";setTimeout(()=>{w.style.transform="";},180);}
    },
    onExpired:()=>{
      finishPart(partKey);
    }
  });
  RunnerState.timer.start();

  // Record that the part started
  const partStartMs = performance.now();
  RunnerState._partStartMs = partStartMs;

  // Examiner cue: first question / cue card presented
  recordExaminerCue(partKey, 0);
}

function recordExaminerCue(partKey, index){
  const test = RunnerState.test;
  let cue = "";
  if(partKey==="part1"){
    const topics = test.part1.topics;
    let count = 0;
    for(const topic of topics){
      for(const q of topic.questions){
        if(count === index){cue = q.q; break;}
        count++;
      }
      if(cue) break;
    }
  } else if(partKey==="part2"){
    cue = test.part2.cueCard.topic;
  } else if(partKey==="part3"){
    cue = test.part3.questions[index]?.q || "";
  }
  if(cue){
    RunnerState.examinerTurns.push({partKey, text:cue, at:RunnerState.timer?.elapsed()||0});
  }
}

/* Fills transcript-derived fields on a part's metadata: turn reconstruction
   (bucketing segments by examiner cue) and speaking-time reconciliation.
   Shared by the live browser path (finishPart) and the Whisper path
   (processAndReport). Operates on RunnerState. */
function applyTranscriptionToPartMeta(partKey, transResult){
  const pm = RunnerState.partMeta[partKey];
  if(!pm) return;
  pm.transcriptionResult = transResult;
  pm.pendingTranscription = false;
  pm.sourceTagsAvailable = (transResult.segments && transResult.segments.length) ? ["audio","transcript"] : ["audio","rule"];

  // --- Reconstruct candidate turns from segments using examiner-cue boundaries ---
  const exCues = RunnerState.examinerTurns.filter(t=>t.partKey===partKey).sort((a,b)=>a.at-b.at);
  const segs = transResult.segments || [];
  const reconstructed = [];
  if(segs.length && exCues.length){
    const offset = segs[0].startMs - exCues[0].at; // transcript clock − timer clock
    for(let i=0;i<exCues.length;i++){
      const thisCueAt = exCues[i].at + offset;
      const nextCueAt = i+1 < exCues.length ? exCues[i+1].at + offset : Infinity;
      const segsForThis = segs.filter(s => s.startMs >= thisCueAt - 500 && s.startMs < nextCueAt);
      if(segsForThis.length){
        const text = segsForThis.map(s=>s.text).join(" ").trim();
        if(text) reconstructed.push({text, at: exCues[i].at + 1});
      }
    }
    const capturedText = reconstructed.map(r=>r.text).join(" ");
    const fullText = transResult.text || "";
    if(capturedText.length < fullText.length * 0.5 && fullText.length > 20){
      reconstructed.length = 0;
      reconstructed.push({text: fullText, at: exCues[0].at + 1});
    }
  } else if(transResult.text && exCues.length){
    reconstructed.push({text: transResult.text, at: exCues[0].at + 1});
  }
  if(reconstructed.length) RunnerState.candidateTurns[partKey] = reconstructed;

  // --- Speaking-time reconciliation against transcript word count ---
  const wordCount = (transResult.text||"").trim().split(/\s+/).filter(Boolean).length;
  const wpmFloor = 135;
  const impliedSpeakingMs = (wordCount / wpmFloor) * 60000;
  let finalSpeakingMs = pm.speakingTimeMsVAD || 0;
  let finalSpeechRatio = pm.durationMs ? (finalSpeakingMs / pm.durationMs) : 0;
  if(impliedSpeakingMs > finalSpeakingMs * 1.5 && wordCount >= 20){
    finalSpeakingMs = Math.min(pm.durationMs, Math.round((finalSpeakingMs + impliedSpeakingMs)/2));
    finalSpeechRatio = pm.durationMs ? finalSpeakingMs / pm.durationMs : 0;
  }
  pm.speakingTimeMs = finalSpeakingMs;
  pm.speechRatio = finalSpeechRatio;
  pm.speakingTimeMsTranscriptImplied = Math.round(impliedSpeakingMs);
  pm.silenceTimeMs = Math.max(0, pm.durationMs - finalSpeakingMs);
}

async function finishPart(partKey){
  if(RunnerState.timer) RunnerState.timer.stop();
  if(RunnerState._rafMeta) cancelAnimationFrame(RunnerState._rafMeta);
  if(RunnerState.waveRenderer) RunnerState.waveRenderer.stop();

  // Show "Time's up" ceremony if this was timer-driven
  if(!RunnerState.timeUpShown){
    RunnerState.timeUpShown = true;
    state._emit();
    await new Promise(r=>setTimeout(r,1500));
  }

  // Stop recorder and capture acoustic metrics
  const recResult = await Recorder.stop();
  const vadMetrics = RunnerState.vad.finalize(recResult.durationMs);
  const micQ = micQualityScore(vadMetrics);

  // Persist the recording (for playback and, in Whisper mode, post-hoc transcription).
  const audioKey = `${RunnerState.sessionId}:${partKey}`;
  let audioStored = false;
  if(recResult.blob && recResult.blob.size > 0){
    audioStored = await AudioStore.put(audioKey, recResult.blob);
  }

  // Acquire the transcript now ONLY for the live browser engine.
  // Whisper transcribes the saved clip later, on the processing screen.
  let transResult = null;
  let pending = false;
  if(RunnerState.transMode === "browser"){
    transResult = await Transcriber.stop();
  } else if(RunnerState.transMode === "whisper" || RunnerState.transMode === "backend"){
    if(audioStored){ pending = true; }
    else { transResult = emptyTranscriptionResult(["recording-not-saved"]); }
  } else {
    transResult = emptyTranscriptionResult(["no-transcription-provider"]);
  }

  // Base (acoustic) part metadata. Transcript-derived fields are filled by
  // applyTranscriptionToPartMeta() — now for browser, later for Whisper.
  RunnerState.partMeta[partKey] = {
    durationMs: recResult.durationMs,
    speakingTimeMs: vadMetrics.speakingTimeMs,
    speakingTimeMsVAD: vadMetrics.speakingTimeMs,
    speakingTimeMsTranscriptImplied: 0,
    silenceTimeMs: Math.max(0, recResult.durationMs - vadMetrics.speakingTimeMs),
    speechRatio: vadMetrics.speechRatio,
    silenceBlockCount: vadMetrics.silenceBlockCount,
    avgSilenceBlockMs: vadMetrics.avgSilenceBlockMs,
    longestSilenceMs: vadMetrics.longestSilenceMs,
    silenceBlocks: vadMetrics.silenceBlocks || [],   // per-part pause timeline (pronunciation engine)
    audioAnalysis: null,                              // filled offline on the processing screen
    peakRms: vadMetrics.peakRms,
    noiseFloorRms: vadMetrics.noiseFloorRms,
    noiseVariance: vadMetrics.noiseVariance,
    clippingFrameRatio: vadMetrics.clippingFrameRatio,
    micQualityScore: micQ.score,
    micQualityComponents: micQ.components,
    transcriptionResult: null,
    pendingTranscription: pending,
    audioKey: audioStored ? audioKey : null,
    audioMime: recResult.mime || "audio/webm",
    audioDurationMs: recResult.durationMs,
    sourceTagsAvailable: ["audio","rule"]
  };

  if(transResult) applyTranscriptionToPartMeta(partKey, transResult);

  // Proceed to next stage
  if(partKey === "part1"){
    // Prep for Part 2
    RunnerState.stage = "part2_prep";
    RunnerState.timeUpShown = false;
    state._emit();
    // Reinit recorder for next part
    Recorder.destroy();
    try{await Recorder.init();}catch(e){toast("Microphone reconnection needed");}
  } else if(partKey === "part2"){
    RunnerState.stage = "part3_intro";
    RunnerState.timeUpShown = false;
    state._emit();
    Recorder.destroy();
    try{await Recorder.init();}catch(e){toast("Microphone reconnection needed");}
  } else if(partKey === "part3"){
    RunnerState.stage = "done";
    state._emit();
    Recorder.destroy();
    // Immediately transition to processing
    setTimeout(()=>processAndReport(),400);
  }
}

async function processAndReport(){
  state.go("processing");

  const progressFill = ()=>$("#mm-progress-fill");
  const stepEls = ()=>$$(".mm-processing__step");
  const setStepText = (i,txt)=>{ const e=stepEls()[i]; if(e) e.textContent=txt; };

  // === Phase 1: Real transcription (Whisper) for any deferred parts ===
  const pendingKeys = ["part1","part2","part3"].filter(k=>{
    const pm = RunnerState.partMeta[k];
    return pm && pm.pendingTranscription && pm.audioKey;
  });
  const partLabel = {part1:"Part 1",part2:"Part 2",part3:"Part 3"};
  if(pendingKeys.length){
    const cfg = getTranscriptionSettings();
    const els0 = stepEls(); if(els0[0]) els0[0].classList.add("is-active");
    for(let i=0;i<pendingKeys.length;i++){
      const k = pendingKeys[i];
      setStepText(0, `Transcribing ${partLabel[k]}…`);
      if(progressFill()) progressFill().style.width = `${Math.round(((i)/pendingKeys.length)*40)}%`;
      let result;
      try{
        const blob = await AudioStore.get(RunnerState.partMeta[k].audioKey);
        if(!blob || !blob.size) throw new Error("Recording not found on this device");
        if(RunnerState.transMode === "backend"){
          result = await Backend.transcribe(blob, cfg.language);
        } else {
          const json = await WhisperClient.transcribe(blob, cfg);
          result = whisperToResult(json, RunnerState.partMeta[k].durationMs);
        }
      }catch(err){
        console.warn("Transcription failed for", k, err);
        toast(`${partLabel[k]} transcription failed: ${err.message || err}`);
        result = emptyTranscriptionResult(["transcription-error: " + (err.message || String(err))]);
      }
      applyTranscriptionToPartMeta(k, result);
    }
    setStepText(0, "Transcribed audio");
    const els1 = stepEls(); if(els1[0]){els1[0].classList.remove("is-active");els1[0].classList.add("is-done");}
    if(progressFill()) progressFill().style.width = "40%";
  }

  // === Phase 2: Synthetic staged progress for the analysis steps ===
  const analysisStages = pendingKeys.length
    ? [ {i:1,d:450},{i:2,d:450},{i:3,d:450},{i:4,d:450},{i:5,d:400},{i:6,d:550} ]
    : [ {i:0,d:500},{i:1,d:500},{i:2,d:450},{i:3,d:450},{i:4,d:500},{i:5,d:400},{i:6,d:600} ];
  const startPct = pendingKeys.length ? 40 : 0;
  for(let n=0;n<analysisStages.length;n++){
    const idx = analysisStages[n].i;
    const els = stepEls();
    if(els[idx]) els[idx].classList.add("is-active");
    if(progressFill()) progressFill().style.width = `${Math.round(startPct + ((n+1)/analysisStages.length)*(100-startPct))}%`;
    await new Promise(r=>setTimeout(r,analysisStages[n].d));
    if(els[idx]){els[idx].classList.remove("is-active");els[idx].classList.add("is-done");}
  }

  // === Phase 2.5: Offline audio analysis (zero-cost, browser-only) ===
  // Decode each saved clip once to extract energy + an approximate pitch
  // contour for the PronunciationEngine. Failures degrade gracefully to the
  // realtime VAD metrics already captured (e.g. Safari + webm).
  for(const k of ["part1","part2","part3"]){
    const pm = RunnerState.partMeta[k];
    if(!pm || !pm.audioKey) continue;
    try{
      const blob = await AudioStore.get(pm.audioKey);
      if(blob && blob.size){
        pm.audioAnalysis = await decodeAndAnalyzeAudio(blob);
      }
    }catch(e){
      console.warn("Offline audio analysis failed for", k, e);
      pm.audioAnalysis = { ok:false, reason:"exception" };
    }
  }

  // Build full session object
  const _owner = AuthAccess.currentUser();
  const session = {
    id: RunnerState.sessionId,
    testId: RunnerState.test.id,
    test: RunnerState.test,
    userId: _owner ? _owner.id : null,   // ACCESS LAYER: ownership for data isolation
    studentName: RunnerState.studentName,
    examinerName: RunnerState.examinerName,
    mode: RunnerState.mode,
    transcriptionMode: RunnerState.transMode,
    startedAt: new Date(RunnerState.startedAt).toISOString(),
    completedAt: new Date().toISOString(),
    parts: RunnerState.partMeta,
    examinerTurns: RunnerState.examinerTurns,
    candidateTurns: RunnerState.candidateTurns,
    micTest: RunnerState.micTest || null
  };
  // Score it — rule-based baseline first (instant, always valid)
  let scored = ScoringEngine_analyze(session);
  // Then refine with server-side AI scoring if a backend is connected.
  if(Backend.scoringAvailable()){
    const els = stepEls(); const li = els.length - 1;
    if(els[li]){ els[li].classList.remove("is-done"); els[li].classList.add("is-active"); els[li].textContent = "Scoring with AI examiner…"; }
    try{
      const ai = await Backend.score(session, scored);
      if(ai && ai.criteria) scored = ai;
    }catch(e){
      console.warn("AI scoring failed", e);
      toast("AI scoring unavailable — using rule-based score.");
    }
    if(els[li]){ els[li].classList.remove("is-active"); els[li].classList.add("is-done"); els[li].textContent = "Composing report"; }
  }
  session.scored = scored;
  Sessions.save(session);
  if(Backend.available()) Backend.saveSession(session);
  // Increment test session count
  const t = Library.get(RunnerState.test.id);
  if(t){t.sessionCount = (t.sessionCount||0)+1;Library.save(t);}
  // Navigate to report
  state.go("report",{sessionId:session.id});
}

function renderPrepTimer(){
  // 60s prep timer
  const prepDuration = (RunnerState.test.part2.prepSeconds||60) * 1000;
  setTimeout(()=>{
    if(RunnerState.stage !== "part2_prep") return;
    const startedAt = performance.now();
    const tick = ()=>{
      if(RunnerState.stage !== "part2_prep") return;
      const elapsed = performance.now() - startedAt;
      const remaining = Math.max(0, prepDuration - elapsed);
      const d = $("#mm-prep-digits");
      if(d) d.textContent = fmt.mmss(remaining);
      const prog = $("#mm-prep-prog");
      if(prog){
        const ratio = remaining/prepDuration;
        const CIRC = 2 * Math.PI * 96;
        prog.setAttribute("stroke-dashoffset", String(CIRC * (1-ratio)));
      }
      if(remaining <= 0){
        skipPrep();
        return;
      }
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, 50);
  return el("div",{class:"mm-timer"},[
    el("svg",{viewBox:"0 0 200 200"},[
      (()=>{const c=document.createElementNS("http://www.w3.org/2000/svg","circle");c.setAttribute("class","mm-timer__track");c.setAttribute("cx","100");c.setAttribute("cy","100");c.setAttribute("r","96");return c;})(),
      (()=>{
        const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
        c.setAttribute("class","mm-timer__prog");c.setAttribute("id","mm-prep-prog");
        c.setAttribute("cx","100");c.setAttribute("cy","100");c.setAttribute("r","96");
        const CIRC = 2 * Math.PI * 96;
        c.setAttribute("stroke-dasharray",String(CIRC));
        c.setAttribute("stroke-dashoffset","0");
        return c;
      })()
    ]),
    el("div",{class:"mm-timer__inner"},[
      el("div",{class:"mm-timer__digits",id:"mm-prep-digits"},"01:00"),
      el("div",{class:"mm-timer__label"},"Preparation")
    ])
  ]);
}

function skipPrep(){
  startPart("part2");
}

function advanceQuestion(){
  RunnerState.qIndex++;
  RunnerState.liveCaption = "";
  // Record new examiner cue
  recordExaminerCue(RunnerState.partKey, RunnerState.qIndex);
  state._emit();
}

function togglePause(){
  if(RunnerState.paused){
    RunnerState.paused = false;
    RunnerState.timer.resume();
    Recorder.resume();
  } else {
    if(RunnerState.mode==="exam" && RunnerState.pauseUsed){
      toast("Pause already used — Exam Mode permits one pause");
      return;
    }
    RunnerState.paused = true;
    RunnerState.pauseUsed = true;
    RunnerState.timer.pause();
    Recorder.pause();
    if(RunnerState.mode === "exam"){
      // Auto-resume after 30s in exam mode
      setTimeout(()=>{
        if(RunnerState.paused){
          RunnerState.paused=false;
          RunnerState.timer.resume();
          Recorder.resume();
          state._emit();
          toast("Pause limit reached — resuming");
        }
      }, 30000);
    }
  }
  state._emit();
}

        el("div",{class:"mm-empty__icon",html:ICONS.lock}),
        el("div",{class:"mm-empty__title"},"Access restricted"),
        el("div",{class:"mm-empty__text"},"This report belongs to another candidate."),
        el("button",{class:"mm-btn mm-btn--primary mm-mt-5",onclick:()=>state.go("sessions")},"Back to my reports")
      ])
    ]);
  }
  const sc = session.scored;
  const test = Library.get(session.testId) || session.test;

  // ---- Derived summary values (executive snapshot + verdict) -------------
  const CRIT = [
    {key:"fluencyCoherence", label:"Fluency and Coherence", short:"Fluency"},
    {key:"lexical",          label:"Lexical Resource",       short:"Lexis"},
    {key:"grammar",          label:"Grammatical Range and Accuracy", short:"Grammar"},
    {key:"pronunciation",    label:"Pronunciation",          short:"Pronunciation"}
  ];
  // Rank only criteria that carry a numeric band (pronunciation may be provisional/null).
  const ranked = CRIT
    .map(c=>({...c, band:sc.criteria[c.key]}))
    .filter(c=>typeof c.band==="number");
  let strongest=null, weakest=null;
  if(ranked.length){
    strongest = ranked.reduce((a,b)=>b.band>a.band?b:a);
    weakest   = ranked.reduce((a,b)=>b.band<a.band?b:a);
  }
  const totalSpeakingMs = ["part1","part2","part3"]
    .reduce((a,k)=>a+(session.parts[k]?.speakingTimeMs||0),0);
  const speakingTimeLabel = totalSpeakingMs>0
    ? `${Math.floor(totalSpeakingMs/60000)}m ${String(Math.round((totalSpeakingMs%60000)/1000)).padStart(2,"0")}s`
    : "—";
  const reportId = shortHash(session.id).toUpperCase();
  const examinerName = session.examinerName || "Mourad Mekki";
  const candidateName = session.studentName || "—";
  const testTitle = test?.title || "—";
  const fmtBandShort = (n)=> typeof n==="number" ? n.toFixed(1).replace(".0","") : "—";

  // ---- Overall examiner verdict (teacher-friendly prose) -----------------
  const verdictParas = (()=>{
    const out = [];
    if(typeof sc.overall==="number"){
      const bandFloor = Math.floor(sc.overall);
      const range = sc.overall%1!==0 ? `Band ${bandFloor}–${bandFloor+1}` : `Band ${bandFloor}`;
      let s1 = `The candidate is currently performing within the ${range} range overall, equivalent to CEFR ${sc.cefr.level} (${sc.cefr.label}).`;
      if(strongest && weakest && strongest.key!==weakest.key){
        s1 += ` The strongest performance area is ${strongest.label.toLowerCase()}, while the main improvement priority is ${weakest.label.toLowerCase()}.`;
      } else if(strongest){
        s1 += ` Performance is most secure in ${strongest.label.toLowerCase()}.`;
      }
      out.push(s1);
    } else {
      out.push("An overall band could not be finalised for this session; the notes below explain why and what to capture next time.");
    }
    // Second sentence: confidence framing + next focus, in plain language.
    const tierWord = {high:"can be read with high confidence",medium:"should be read as a sound working estimate",low:"should be treated with caution"}[sc.confidence.tier] || "is an estimate";
    let s2 = `This assessment ${tierWord}. `;
    if(weakest){
      s2 += `Targeted work on ${weakest.label.toLowerCase()} offers the clearest route to the next half-band.`;
    } else {
      s2 += `A longer sample would allow a firmer judgement across all four criteria.`;
    }
    out.push(s2);
    return out;
  })();

  // Report content
  const report = el("div",{class:"mm-report"},[
    // Mode badge
    el("div",{class:`mm-report__mode-badge mm-report__mode-badge--${session.mode}`},session.mode==="exam"?"Exam Mode":"Practice Mode"),

    // Cover
    el("div",{class:"mm-report__cover"},[
      el("div",{class:"mm-report__brand"},[
        el("div",{class:"mm-report__brand-name"},"Mourad Mekki Teacher Toolkit"),
        el("div",{class:"mm-report__brand-sys"},"IELTS Speaking Assessment System"),
        el("div",{class:"mm-report__brand-divider"})
      ]),
      el("div",{class:"mm-report__crest"},"M"),
      el("div",{class:"mm-report__eyebrow"},"IELTS Speaking Assessment"),
      el("h1",{class:"mm-report__title"},"Candidate Assessment Report")
    ]),

    // === 01 · Assessment Overview ===
    sectionHead("01","Candidate File","Assessment Overview"),
    el("div",{class:"mm-report__meta"},[
      metaItem("Candidate",candidateName),
      metaItem("Date",fmt.dateMed(session.completedAt)),
      metaItem("Test",testTitle),
      metaItem("Examiner",examinerName),
      metaItem("Speaking time",speakingTimeLabel),
      metaItem("Report ID",reportId)
    ]),
    el("div",{class:"mm-snapshot"},[
      snapshotTile("Overall Band", typeof sc.overall==="number"?fmtBandShort(sc.overall):"—"),
      snapshotTile("CEFR Level", sc.cefr.level||"—"),
      snapshotTile("Confidence", ({high:"High",medium:"Moderate",low:"Low"}[sc.confidence.tier])||"—", true),
      snapshotTile("Strongest Area", strongest?strongest.short:"—", true),
      snapshotTile("Focus Priority", weakest?weakest.short:"—", true)
    ]),

    // === 02 · Band Summary ===
    sectionHead("02","Scores","Band Summary"),
    renderScoresBlock(sc),

    // === 03 · Overall Examiner Verdict ===
    sectionHead("03","Examiner's View","Overall Examiner Verdict"),
    el("div",{class:"mm-verdict"}, verdictParas.map(p=>el("p",{class:"mm-verdict__text"},p))),
    renderConfidenceBlock(sc.confidence),
    sc.ceilingApplied ? el("div",{class:"mm-low-conf-banner"},[
      el("strong",{},"Band ceiling applied — "),
      sc.ceilingReason || "the overall band has been limited by the weakest criterion."
    ]) : null,
    (sc.feedback.performanceSummary && sc.feedback.performanceSummary.length)
      ? el("div",{class:"mm-summary"}, sc.feedback.performanceSummary.map((s,i)=>
          el("p",{style:i===0?"margin-top:0;":""}, s)))
      : null,

    // === 04 · Criterion-by-Criterion Analysis ===
    sectionHead("04","Detailed Breakdown","Criterion-by-Criterion Analysis"),
    renderCriterionAnalysis(sc, session),

    // === 05 · Pronunciation Evidence ===
    sc.pronunciationDetail ? sectionHead("05","Pronunciation","Pronunciation Evidence") : null,
    sc.pronunciationDetail ? renderPronunciationSection(sc, session) : null,

    // === 06 · Transcript Evidence ===
    sectionHead(sc.pronunciationDetail?"06":"05","Evidence","Transcript Evidence"),
    renderTranscript(session, test),

    // === 07 · Recommendations for Improvement ===
    sectionHead(sc.pronunciationDetail?"07":"06","Way Forward","Recommendations for Improvement"),
    renderRecommendations(sc.recommendations),

    // === 08 · Assessment Notes (provenance + signature) ===
    sectionHead(sc.pronunciationDetail?"08":"07","Provenance","Assessment Notes"),

    // Provenance
    el("div",{class:"mm-provenance"},[
      el("strong",{},"About this report · "),
      (()=>{
        const sp = sc.scoringProvider;
        if(sp && sp !== "mock" && /groq|llama|gpt|claude|ai/i.test(sp)){
          return `Fluency, lexical resource and grammar were assessed by an AI examiner model (${sp}) grounded in the transcript; pronunciation is derived acoustically. `;
        }
        return "Assessment is generated by a rule-based scoring engine mapping candidate performance to IELTS public band descriptors across the four criteria. ";
      })(),
      (()=>{
        const providers = ["part1","part2","part3"]
          .map(k=>session.parts[k]?.transcriptionResult?.provider).filter(p=>p&&p!=="none");
        const prov = providers[0];
        const label = prov==="whisper" ? "a hosted Whisper-style speech-to-text API"
          : prov==="web-speech" ? "the browser speech-recognition engine" : null;
        return label ? `Transcription was produced by ${label}. ` : "";
      })(),
      (()=>{
        const pdv = sc.pronunciationDetail;
        if(pdv){
          const vtxt = {
            reliable:"Pronunciation was assessed by the browser-based engine as a reliable estimate. ",
            provisional:"Pronunciation is marked provisional because some signals were weak or uncertain. ",
            "audio-limited":"Pronunciation is audio-limited: recording quality was not strong enough for a confident band, so a range is shown. ",
            "too-short":"Pronunciation could not be confidently judged because the candidate spoke too little. ",
            unscorable:"Pronunciation was not scorable from this recording. "
          }[pdv.verdict] || "";
          return vtxt + "Scores rely on intelligibility, listener effort, rhythm, pausing and speech clarity; accent is not penalised. Bands above 7.0 are treated cautiously as no phoneme-level forced alignment is performed. " + (pdv.providerNote ? pdv.providerNote + " " : "");
        }
        return sc.pronunciationVerdict === "provisional"
          ? "Pronunciation is marked provisional due to insufficient audio quality for confident assessment. "
          : "Pronunciation is capped at Band 7.0 in the absence of phoneme-level analysis — bands above 7.0 require dedicated acoustic analysis. ";
      })(),
      `Confidence: ${sc.confidence.tier.toUpperCase()} (${sc.confidence.evidence})`
    ]),

    // Assessor seal
    el("div",{class:"mm-stamp"},[
      el("div",{class:"mm-stamp__inner"},[
        el("div",{class:"mm-stamp__star"},"★"),
        el("div",{class:"mm-stamp__top"},"Assessed by"),
        el("div",{class:"mm-stamp__name"},examinerName),
        el("div",{class:"mm-stamp__role"},"Mourad Mekki Teacher Toolkit")
      ])
    ]),

    // Signature / provenance line
    el("div",{class:"mm-signature"},[
      el("div",{class:"mm-signature__rule"}),
      el("div",{class:"mm-signature__label"},"Assessed through Mourad Mekki Teacher Toolkit"),
      el("div",{class:"mm-signature__name"},`Designed by ${examinerName}`),
      el("div",{class:"mm-signature__credentials"},[
        "English Teacher",el("span",{},"·"),"IELTS Coach",el("span",{},"·"),"EdTech Innovator"
      ]),
      el("div",{class:"mm-signature__meta"},
        `Report ID · ${reportId}  |  Engine v${sc.engineVersion}  |  ${fmt.dateTimeMed(sc.computedAt)}`)
    ])
  ]);

  // ---- Running footer + watermark (print only; stamped per page) ---------
  const printFooter = el("div",{class:"mm-print-footer"},[
    el("div",{class:"mm-print-footer__rule"}),
    el("div",{class:"mm-print-footer__row"},[
      el("div",{class:"mm-print-footer__brand"},"Mourad Mekki Teacher Toolkit · IELTS Speaking Assessment"),
      el("div",{class:"mm-print-footer__page"},`Candidate: ${candidateName} · Test: ${testTitle}`)
    ])
  ]);
  const printWatermark = el("div",{class:"mm-print-watermark"},"MOURAD MEKKI TEACHER TOOLKIT");

  // Actions panel (non-printing)
  const btnStyle = "width:100%;justify-content:flex-start;padding:10px 12px;letter-spacing:.03em;";
  const actions = el("aside",{class:"mm-report-actions","data-print":"hide"},[
    el("div",{class:"mm-report-actions__title"},"Report actions"),
    el("button",{class:"mm-btn mm-btn--primary",style:btnStyle,onclick:()=>rgOpenExportPanel(session, sc, test)},
      [el("span",{html:ICONS.book}),"Choose report type…"]),
    el("button",{class:"mm-btn mm-btn--secondary",style:btnStyle,onclick:(e)=>downloadPDF(session, e.currentTarget)},
      [el("span",{html:ICONS.download}),"Download full PDF"]),
    el("button",{class:"mm-btn mm-btn--secondary",style:btnStyle,onclick:()=>window.print()},
      [el("span",{html:ICONS.print}),"Print report"]),
    el("button",{class:"mm-btn mm-btn--secondary",style:btnStyle,onclick:()=>downloadJSON(session)},
      [el("span",{html:ICONS.download}),"Export JSON"]),
    el("button",{class:"mm-btn mm-btn--ghost",style:btnStyle,onclick:()=>state.go("sessions")},"← All sessions"),
    el("hr",{style:"border:0;border-top:1px dashed var(--mm-border-subtle);margin:12px 0;"}),
    el("div",{style:"font-size:11px;color:var(--mm-fg-tertiary);line-height:1.5;"},
      "Download PDF saves a branded A4 report with a footer and page numbers on every page. Print → Save as PDF is a reliable fallback (the running footer repeats per page; for numbered footers prefer Download PDF). Recordings play back in the Transcript section above.")
  ]);
  actions.setAttribute("data-print","hide");

  return el("section",{class:"mm-report-wrap"},[report, actions, printFooter, printWatermark]);
}
