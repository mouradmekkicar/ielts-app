const HESITATION_RE = /\b(uh|um|er|erm|ah|hmm|mhm)\b/gi;
const FILLED_RE = /\b(you know|i mean|sort of|kind of)\b/gi;

const COHESIVE = {
  addition:["moreover","furthermore","in addition","besides","also","as well","what's more"],
  contrast:["however","on the other hand","in contrast","whereas","while","although","even though","nevertheless","nonetheless","that said","having said that"],
  cause:["because","since","as","given that","due to","owing to"],
  effect:["so","therefore","thus","consequently","as a result","which is why","hence"],
  example:["for example","for instance","such as","like","namely","in particular","specifically"],
  sequence:["first","firstly","to begin with","then","next","after that","finally","lastly","in the end"],
  summary:["in summary","to sum up","in conclusion","overall","all in all","on the whole"],
  concession:["admittedly","to be fair","granted","of course","true","naturally"],
  emphasis:["indeed","in fact","actually","clearly","obviously","certainly","undoubtedly"],
  opinion:["i think","i believe","in my view","in my opinion","from my perspective","as i see it","it seems to me"],
  qualification:["in a sense","to some extent","to a degree","in some ways","more or less","broadly speaking"]
};

function tokenize(text){
  return (text||"").toLowerCase().replace(/[^\p{L}\s'-]+/gu," ").split(/\s+/).filter(Boolean);
}
function lemmatize(w){
  // ultra-light stemmer
  if(w.length<4) return w;
  if(w.endsWith("ies")) return w.slice(0,-3)+"y";
  if(w.endsWith("ied")) return w.slice(0,-3)+"y";
  if(w.endsWith("ing") && w.length>5) return w.slice(0,-3);
  if(w.endsWith("ed") && w.length>4) return w.slice(0,-2);
  if(w.endsWith("es") && w.length>4) return w.slice(0,-2);
  if(w.endsWith("s") && !w.endsWith("ss") && w.length>3) return w.slice(0,-1);
  return w;
}
function contentWords(tokens){return tokens.filter(t=>!STOPWORDS.has(t)&&t.length>2);}
function countPhrase(text,phrase){
  const re = new RegExp(`\\b${phrase.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")}\\b`,"gi");
  return (text.match(re)||[]).length;
}

/* ------------------------------------------------------------
   SCORING ANALYZERS
   ------------------------------------------------------------ */
function analyzePart(partMeta, test, partKey){
  const text = partMeta.transcriptionResult.text || "";
  const tokens = tokenize(text);
  const wordCount = tokens.length;
  const speakingMinutes = Math.max(partMeta.speakingTimeMs/60000, 0.001);
  const totalMinutes = Math.max(partMeta.durationMs/60000, 0.001);

  // === FLUENCY ===
  const trueWPM = wordCount / speakingMinutes;
  const wallWPM = wordCount / totalMinutes;
  const hesitations = (text.match(HESITATION_RE)||[]).length + 0.5*(text.match(FILLED_RE)||[]).length;
  const hesitationRate = wordCount ? (hesitations / wordCount) * 100 : 0;
  const selfCorrections = (text.match(/—|--| - /g)||[]).length;
  const selfCorrectionRate = wordCount ? selfCorrections / wordCount : 0;

  // Discourse markers
  let markerCount = 0, categoriesHit = new Set();
  for(const [cat, markers] of Object.entries(COHESIVE)){
    for(const m of markers){
      const c = countPhrase(text, m);
      if(c>0){ markerCount += c; categoriesHit.add(cat); }
    }
  }
  const markerDensity = wordCount ? (markerCount/wordCount)*100 : 0;
  const markerDiversity = categoriesHit.size/11;

  // === LEXICAL ===
  const content = contentWords(tokens).map(lemmatize);
  const uniqueContent = new Set(content);
  const ttr = content.length ? uniqueContent.size/content.length : 0;
  // Moving-average TTR (100-word windows)
  let ttrMA = ttr;
  if(content.length>=100){
    const ttrs = [];
    for(let i=0;i<=content.length-100;i+=50){
      const win = content.slice(i,i+100);
      ttrs.push(new Set(win).size/100);
    }
    ttrMA = mean(ttrs);
  }
  // Advanced word ratio (weighted B2+C1+C2)
  let advScore = 0, rareCount = 0, advItems = [];
  for(const lem of content){
    if(CEFR_LIST.C2.has(lem)){ advScore+=1.5; rareCount++; advItems.push(lem); }
    else if(CEFR_LIST.C1.has(lem)){ advScore+=1.0; rareCount++; advItems.push(lem); }
    else if(CEFR_LIST.B2.has(lem)){ advScore+=0.5; advItems.push(lem); }
  }
  const advancedWordRatio = content.length ? advScore/content.length : 0;
  const rareWordProportion = content.length ? rareCount/content.length : 0;
  // Repetition
  const freq = new Map();
  for(const w of content) freq.set(w, (freq.get(w)||0)+1);
  const sortedFreq = [...freq.values()].sort((a,b)=>b-a);
  const top10Sum = sortedFreq.slice(0,10).reduce((a,b)=>a+b,0);
  const lexicalRepetition = content.length ? top10Sum/content.length : 0;

  // === GRAMMAR ===
  // Simple sentence segmentation
  const sentences = text.split(/[.!?]+/).map(s=>s.trim()).filter(s=>s.length>2);
  const avgSentLen = sentences.length ? mean(sentences.map(s=>tokenize(s).length)) : 0;
  const sentLenVariance = std(sentences.map(s=>tokenize(s).length));
  // Subordination: count subordinating conjunctions + relative pronouns
  const SUB_RE = /\b(because|although|though|whereas|while|since|if|unless|when|whenever|where|which|who|whom|whose|that|even though|provided that|given that|so that|in order to)\b/gi;
  const subCount = (text.match(SUB_RE)||[]).length;
  const subordinationRatio = sentences.length ? subCount/sentences.length : 0;
  // Complex sentence ratio
  let complexCount = 0;
  for(const s of sentences){
    if(SUB_RE.test(s)) complexCount++;
    SUB_RE.lastIndex = 0;
  }
  const complexSentenceRatio = sentences.length ? complexCount/sentences.length : 0;
  // Tense variety (coarse detection)
  const tenseFlags = {
    past: /\b(was|were|did|had|went|came|saw|said|thought|used to)\b/i.test(text),
    pastCont: /\b(was|were)\s+\w+ing\b/i.test(text),
    pastPerf: /\bhad\s+\w+(ed|en)\b/i.test(text),
    present: /\b(am|is|are|do|does|have|has|go|goes|think|believe)\b/i.test(text),
    presentCont: /\b(am|is|are)\s+\w+ing\b/i.test(text),
    presentPerf: /\b(have|has)\s+\w+(ed|en)\b/i.test(text),
    future: /\b(will|going to|shall|'ll)\b/i.test(text)
  };
  const tenseVariety = Object.values(tenseFlags).filter(Boolean).length/7;
  // Conditionals
  const cond0 = /\bif\s+\w+\s+\w+s\b/i.test(text);
  const cond1 = /\bif\s+[\w\s]{3,20}\s+(will|won't|'ll)\b/i.test(text);
  const cond2 = /\bif\s+[\w\s]{3,20}\s+(were|was)\b[^.!?]*\b(would|could|might)\b/i.test(text);
  const cond3 = /\bif\s+[\w\s]{3,20}\s+had\s+\w+/i.test(text);
  const conditionalVariety = [cond0,cond1,cond2,cond3].filter(Boolean).length/4;
  // Error detection (precision-first)
  const errors = [];
  const svaMatches = text.match(/\b(he|she|it)\s+(don't|have(?!\s+(to|been|had))|was\s+\w+ing\s+and\s+\w+)\b/gi)||[];
  for(const m of svaMatches) errors.push({type:"sva",text:m});
  const artMatches = text.match(/\b(have|has|bought|want|wanted|need|needed)\s+(car|book|phone|job|house|problem|question|idea)\b/gi)||[];
  for(const m of artMatches) errors.push({type:"article",text:m});
  const prepMatches = text.match(/\b(discuss about|depend in|different than|married with)\b/gi)||[];
  for(const m of prepMatches) errors.push({type:"preposition",text:m});
  const errorDensity = wordCount ? (errors.length/wordCount)*100 : 0;

  // Structural range index
  const structuralRangeIndex =
    0.25*clamp01(complexSentenceRatio/0.5) +
    0.20*clamp01(subordinationRatio/0.4) +
    0.20*clamp01(tenseVariety) +
    0.20*clamp01(conditionalVariety) +
    0.15*clamp01(sentLenVariance/8);

  // === PRONUNCIATION (transcript + audio proxies) ===
  const avgTranscriptConfidence = partMeta.transcriptionResult.confidence||0;
  const segments = partMeta.transcriptionResult.segments||[];
  const lowConfSegs = segments.filter(s=>s.confidence<0.6).length;
  const lowConfidenceWordRate = segments.length ? lowConfSegs/segments.length : 0;

  // === TOPIC RELEVANCE ===
  // For part1/part3 we use all questions' anchors; for part2 the cue card.
  let relevanceScore = 1.0;
  let missedAnchors = [];
  if(partKey==="part2" && test.part2?.cueCard){
    const cueText = [test.part2.cueCard.topic,...test.part2.cueCard.bullets].join(" ");
    const cueAnchors = [...new Set(contentWords(tokenize(cueText)).map(lemmatize))];
    const respLems = new Set(content);
    const hits = cueAnchors.filter(a=>respLems.has(a) || [...respLems].some(r=>r.startsWith(a.slice(0,4))));
    relevanceScore = cueAnchors.length ? hits.length/cueAnchors.length : 1;
    missedAnchors = cueAnchors.filter(a=>!hits.includes(a));
  } else {
    const qs = partKey==="part1"
      ? (test.part1?.topics||[]).flatMap(t=>t.questions)
      : (test.part3?.questions||[]);
    if(qs.length){
      const allAnchors = new Set();
      for(const obj of qs){
        const qt = tokenize(obj.q||"");
        for(const w of contentWords(qt).map(lemmatize)) allAnchors.add(w);
      }
      const respLems = new Set(content);
      const hits = [...allAnchors].filter(a=>respLems.has(a));
      relevanceScore = allAnchors.size ? hits.length/allAnchors.size : 1;
    }
  }

  return {
    partKey,
    metrics:{
      wordCount,speakingMs:partMeta.speakingTimeMs,durationMs:partMeta.durationMs,
      trueWPM,wallWPM,
      hesitationRate,selfCorrectionRate,
      markerDensity,markerDiversity,categoriesHit:[...categoriesHit],
      typeTokenRatio:ttr,typeTokenRatioMA:ttrMA,
      advancedWordRatio,rareWordProportion,advancedItems:advItems.slice(0,12),
      lexicalRepetition,
      avgSentenceLength:avgSentLen,sentenceLengthVariance:sentLenVariance,
      subordinationRatio,complexSentenceRatio,tenseVariety,conditionalVariety,
      structuralRangeIndex,
      errorDensity,errors:errors.slice(0,8),
      avgTranscriptConfidence,lowConfidenceWordRate,
      relevanceScore,missedAnchors:missedAnchors.slice(0,5),
      speechRatio:partMeta.speechRatio,
      longestSilenceMs:partMeta.longestSilenceMs,
      avgSilenceBlockMs:partMeta.avgSilenceBlockMs,
      micQualityScore:partMeta.micQualityScore
    }
  };
}

/* Band mapping — Phase 5.5 descriptor anchor logic, condensed */
function bandForFluency(m, timePressure){
  // trueWPM with time-pressure shift
  const shift = timePressure==="low"?-10 : timePressure==="high"?10 : 0;
  const wpm = m.trueWPM;
  let bWPM;
  if(wpm < 80+shift) bWPM = 4.0;
  else if(wpm < 100+shift) bWPM = 5.0;
  else if(wpm < 120+shift) bWPM = 5.5;
  else if(wpm < 140+shift) bWPM = 6.5;
  else if(wpm < 160+shift) bWPM = 7.0;
  else if(wpm < 180+shift) bWPM = 7.5;
  else if(wpm < 200+shift) bWPM = 8.0;
  else bWPM = 7.5;

  let bRatio;
  const r = m.speechRatio;
  if(r < 0.40) bRatio = 4.5;
  else if(r < 0.55) bRatio = 5.5;
  else if(r < 0.70) bRatio = 6.5;
  else if(r < 0.85) bRatio = 7.5;
  else if(r <= 0.95) bRatio = 8.0;
  else bRatio = 7.0;

  else if(r < 0.05) bRare = 6.0;
  else if(r < 0.10) bRare = 7.0;
  else if(r < 0.15) bRare = 7.5;

  else if(sri < 0.58) bRange = 6.5;
  else if(sri < 0.72) bRange = 7.5;

  const ed = m.errorDensity;
  if(ed < 1.0) bAcc = 8.0;
  else if(ed < 2.0) bAcc = 7.0;
  else if(ed < 4.0) bAcc = 6.0;
  else if(ed < 7.0) bAcc = 5.0;
  else bAcc = 4.0;

  let combined;
  if(gap >= 2.0){
    combined = Math.min(bRange, bAcc) + 0.5;
  } else {
    combined = 0.45*bRange + 0.55*bAcc;
  }

/* ============================================================
   PRONUNCIATION ENGINE  ·  v2  (zero-cost, browser-only)
   ------------------------------------------------------------
   Honest, fairness-first pronunciation estimation built ONLY on
   signals the browser can produce for free:
     • realtime VAD acoustic metrics (RMS, clipping, silence)
     • offline Web-Audio decode (energy + pitch contour)
     • the speech-to-text transcript and its confidence

   WHAT IS MEASURED DIRECTLY:
     silence ratio, pause lengths, peak/RMS level, clipping,
     speaking duration, word count, transcript confidence values.
   WHAT IS ESTIMATED (approximation, clearly labelled):
     signal-to-noise ratio, speech rhythm regularity,
     intonation / pitch movement, intelligibility, listener effort.
   WHAT CANNOT BE KNOWN WITHOUT A DEDICATED BACKEND MODEL:
     true phoneme accuracy, specific vowel/consonant diagnoses,
     word- and sentence-stress correctness, forced alignment.
   The engine never claims phoneme-level precision in browser-free mode.
   ============================================================ */

/* Optional future hook — INACTIVE by default. When an advanced
   phoneme / forced-alignment backend is wired up later, flip mode
   to "advanced-backend"; nothing here depends on it being present. */
const PronunciationProvider = {
  mode: "browser-free",            // "browser-free" | "advanced-backend"
  capabilities: {
    phonemeAnalysis: false,
    forcedAlignment: false,
    pitchContour: "approximate",   // energy/autocorrelation estimate only
    wordStress: "estimated",
    sentenceStress: "estimated"
  },
  describe(){
    return this.mode === "advanced-backend"
      ? "Advanced phoneme analysis is connected."
      : "Advanced phoneme analysis is not connected — this is a browser-based approximation.";
  }
};

const PronunciationEngine = (function(){
  "use strict";

  /* ---- small local helpers (engine is self-contained) ---- */
  const _clamp = (v,lo,hi)=>Math.max(lo,Math.min(hi,v));
  const _clamp01 = v=>_clamp(v,0,1);
  const _mean = a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
  const _std = a=>{ if(a.length<2) return 0; const m=_mean(a); return Math.sqrt(_mean(a.map(v=>(v-m)**2))); };
  const _roundHalf = x=>Math.round(x*2)/2;
  const _pct = (a,p)=>{ if(!a.length) return 0; const s=[...a].sort((x,y)=>x-y); const i=_clamp(Math.floor(p*(s.length-1)),0,s.length-1); return s[i]; };

  const SEVERE_MS   = { part1: 25000, part2: 30000, part3: 30000 };

  /* ============================================================
     1) AudioQualityAnalyzer — is the recording usable at all?
     Combines realtime VAD metrics with the offline decode when
     available. Returns a 0–100 quality score + plain-language
     warnings. Directly measured: level, clipping, silence.
     ============================================================ */
  function AudioQualityAnalyzer(mic){
    const warnings = [];
    const aa = mic && mic.audioAnalysis;          // offline decode (may be absent)
    const hasOffline = !!(aa && aa.ok);

    // Level / loudness (direct).
    const peakRms = mic.peakRms || 0;
    const TARGET_PEAK = 40;                        // matches existing mic model
    let inputLevel = _clamp01(peakRms / TARGET_PEAK) * 100;
    if(hasOffline){
      // Blend with decoded peak amplitude (0..1) for a steadier estimate.
      const ampLevel = _clamp01(aa.peakAmp / 0.6) * 100;
      inputLevel = 0.5*inputLevel + 0.5*ampLevel;

    if(inputLevel < 28) warnings.push("Recording level was low — the speaker may have been far from the microphone.");

    // Clipping / distortion (direct).
    const clipRatio = hasOffline ? aa.clipRatio : (mic.clippingFrameRatio || 0);
    const clippingPenalty = _clamp(100 - clipRatio * 600, 0, 100);
    if(clipRatio > 0.02) warnings.push("Some distortion/clipping was detected — the input may have been too loud.");

    // Background-noise approximation (estimated).
    let noiseQuality;
    if(hasOffline && typeof aa.snrApprox === "number"){
      noiseQuality = _clamp01((aa.snrApprox - 3) / 22) * 100; // ~3dB poor … 25dB clean

    const score = Math.round(_clamp(

    const tier = score >= 70 ? "good" : score >= 45 ? "fair" : "poor";
    if(tier === "poor") warnings.push("Overall audio quality was not strong enough for a confident pronunciation judgement.");

      components:{ inputLevel:Math.round(inputLevel), clippingPenalty:Math.round(clippingPenalty),
        noiseQuality:Math.round(noiseQuality), dynamicRange:Math.round(dr) },

     2) SpeechActivityAnalyzer — how much real speech is present?

     ============================================================ */
  function SpeechActivityAnalyzer(mic, speakingMs, totalMs, expectedMs, partKey){
    const aa = mic && mic.audioAnalysis;
    const silenceRatio = (aa && aa.ok && typeof aa.silenceRatio === "number")

     7) ListenerEffortEstimator — how hard is it to follow?

  function ListenerEffortEstimator(ctx){

     ============================================================ */
  function SpeechClarityEstimator(mic, lowConfRate, audioQ){

    let volStability = 70;

     8) PronunciationFairnessGate — protect the student.

     ============================================================ */
  function PronunciationFairnessGate(g){
    const adjustments = [];

    const { hasAudio, audioTier, activity, hasText, transcriptionConfidence,

    // Hard gates first.
    if(!hasAudio){
      caveats.push("No audio was available for this part, so pronunciation cannot be scored.");
      return { verdict:"unscorable", confidence:"unscorable", adjustments, caveats };
    }
    if(hasAudio && !hasText){

      caveats.push("A transcript was not produced, so intelligibility evidence is limited to acoustic signals.");
    }

    // Length sufficiency.
    if(activity.tooShort){

      caveats.push("The response was too short for a confident pronunciation judgement.");

      adjustments.push("Weak audio lowered confidence only — it did not reduce the band on its own.");

    } else if(audioTier === "fair"){
      caveats.push("Audio quality was moderate; the estimate is treated with some caution.");
    }

    // Accent fairness — always stated, never penalised.
    caveats.push("Accent is not penalised; the estimate focuses on intelligibility, listener effort, rhythm, pausing and clarity.");

    // Transcript fairness.
    if(hasText && transcriptionConfidence < 0.7){
      adjustments.push("Low transcript confidence was treated as supporting evidence only, not as proof of mispronunciation.");
    }
    if(hasText && segmentsCount < 2){
      caveats.push("Few transcript segments were available, which limits rhythm and unclear-span evidence.");
    }

    // Browser-limitation fairness — always present in browser-free mode.
    if(PronunciationProvider.mode === "browser-free"){
      caveats.push("This is a browser-based approximation; phoneme-level confirmation would require a dedicated speech model.");
    }

    // Determine verdict + confidence from the combined picture.
    let verdict, confidence;
    if(activity.tooShort){

      confidence = "low";

      confidence = hasText ? "low" : "unscorable";
    } else {
      // Reliable requires: good/fair audio, enough speech, usable transcript.
      const enough = activity.sufficiency >= 0.55;
      const goodText = hasText && transcriptionConfidence >= 0.7 && lowConfRate < 0.18 && segmentsCount >= 2;
      if(audioTier === "good" && enough && goodText){
        verdict = "reliable"; confidence = "high";
      } else if(enough && hasText){
        verdict = "provisional"; confidence = "medium";
      } else {
        verdict = "provisional"; confidence = "low";
      }

  }

  /* ============================================================
     9) PronunciationBandMapper — evidence → IELTS half-bands.
     Weighted composite (spec weights), then honesty caps:
       • browser-free mode caps point bands at 7.0 in most cases;
       • 7.5–8.0 only with HIGH confidence, good audio, no warnings;
       • 8.5–9.0 are not awarded in browser-only mode.
     Low confidence → a band RANGE instead of an exact band.
     ============================================================ */
  function compositeToBand(E){
    if(E >= 90) return 8.0;
    if(E >= 82) return 7.5;
    if(E >= 74) return 7.0;
    if(E >= 64) return 6.5;
    if(E >= 54) return 6.0;
    if(E >= 44) return 5.5;
    if(E >= 34) return 5.0;
    if(E >= 24) return 4.5;
    return 4.0;

  function PronunciationBandMapper(sub, confidence, audioTier, warningCount){
    // Spec weights. Listener-effort score is "ease" (higher = better).
    const parts = [
      { v:sub.intelligibility,           w:0.35 },
      { v:sub.listenerEffort,            w:0.25 },
      { v:sub.speechClarity,             w:0.15 },
      { v:sub.pausingChunking,           w:0.10 },
      { v:sub.rhythm,                    w:0.10 },
      { v:sub.intonationApproximation,   w:0.05 }
    ];
    // Renormalise over the subscores that are actually available.
    let sum=0, wsum=0;
    for(const p of parts){ if(p.v!=null){ sum += p.v*p.w; wsum += p.w; } }
    if(wsum === 0) return { band:null, roundedBand:null, range:{low:null,high:null}, composite:null };
    const E = sum/wsum;                                 // 0..100 evidence composite
    let band = compositeToBand(E);

    // Honesty caps (browser-free mode). Browser evidence cannot confirm
    // phonemes, so Band 7.0 is the default ceiling. Higher bands require
    // genuinely exceptional, limitation-free evidence — and a flat,
    // unverified intonation reading must never reach Band 8.
    if(PronunciationProvider.mode === "browser-free"){
      const present = parts.filter(p=>p.v!=null).map(p=>p.v);
      const minSub  = present.length ? Math.min(...present) : 0;
      const inton   = sub.intonationApproximation;
      const baseOk  = confidence === "high" && audioTier === "good" && warningCount === 0;

      // Band 7.5: high confidence, clean audio, strong composite, and
      // intonation that is at least adequate (never flat).
      const allow75 = baseOk && E >= 86 && inton != null && inton >= 60;
      // Band 8.0: only when literally nothing is weak (every subscore ≥ 85)
      // and the composite is near the top — i.e. "no limitations exist".
      const allow80 = baseOk && E >= 94 && minSub >= 85 && inton != null && inton >= 80;

      if(allow80)       band = Math.min(band, 8.0);
      else if(allow75)  band = Math.min(band, 7.5);
      else              band = Math.min(band, 7.0);
      band = Math.min(band, 8.0);                       // never 8.5–9.0 in browser-only mode
    }

    // Confidence governs point vs range.
    if(confidence === "high" || confidence === "medium"){
      return { band, roundedBand:_roundHalf(band), range:{low:null,high:null}, composite:+E.toFixed(1) };
    }
    // Low confidence → a half-band range around the estimate.
    const lo = _clamp(_roundHalf(band - 0.5), 4.0, 9.0);
    const hi = _clamp(_roundHalf(band + 0.5), 4.0, PronunciationProvider.mode==="browser-free" ? 7.0 : 9.0);
    return { band:null, roundedBand:null, range:{ low:lo, high:Math.max(hi,lo) }, composite:+E.toFixed(1) };
  }

  /* ============================================================
     Unclear-span extraction — cautious wording, transcript-derived.
     ============================================================ */
  function extractUnclearSpans(segments){
    const spans = [];
    for(const s of (segments||[])){
      if(typeof s.confidence === "number" && s.confidence < 0.6 && (s.text||"").trim()){
        const t = s.text.trim();
        spans.push(t.length > 60 ? t.slice(0,57)+"…" : t);
      }
    }
    return spans.slice(0,8);
  }
  function extractUnclearWords(transcript, segments){
    // Heuristic: words inside low-confidence segments (no phoneme info available).
    const words = new Set();
    for(const s of (segments||[])){
      if(typeof s.confidence === "number" && s.confidence < 0.55){
        (s.text||"").trim().split(/\s+/).filter(w=>w.length>2).slice(0,3).forEach(w=>words.add(w.replace(/[^\p{L}'-]/gu,"")));
      }
    }
    return [...words].filter(Boolean).slice(0,8);
  }

  /* ============================================================
     Improvement advice — practical, derived from the evidence.
     ============================================================ */
  function buildAdvice(ev, sub, verdict){
    const immediate = [], shortTerm = [], targetBand = [];
    if(ev.unclearWords.length){
      immediate.push(`Re-record these words from your own answer and compare: ${ev.unclearWords.slice(0,5).map(w=>`"${w}"`).join(", ")}.`);
    } else {
      immediate.push("Pick five words from your answer that felt rushed and record them slowly, then at normal speed.");
    }
    if((sub.pausingChunking??100) < 70 || ev.longPauses.length){
      shortTerm.push("Practise chunking long answers into meaning groups of 4–7 words, pausing only at the end of each group.");
    } else {
      shortTerm.push("Mark the stressed word in three of your sentences and reread them with stronger sentence stress.");
    }
    if((sub.intonationApproximation??60) < 60){
      targetBand.push("Read a short paragraph aloud exaggerating rises and falls, then record it naturally to add pitch movement.");
    } else {
      targetBand.push("Shadow a 30-second clip of a fluent speaker, matching their rhythm and intonation as closely as you can.");
    }
    if(verdict === "audio-limited" || verdict === "too-short"){
      immediate.unshift("Record again in a quiet room, close to the microphone, and give a fuller answer so the estimate can be confident.");
    }
    return { immediate, shortTerm, targetBand };
  }

  /* ============================================================
     Examiner comment — honest, professional, verdict-aware.
     ============================================================ */
  function buildExaminerComment(verdict, band, range, sub, effortLevel){
    const ease = sub.listenerEffort;
    const clarity = sub.speechClarity;
    if(verdict === "unscorable")
      return "Pronunciation could not be assessed for this response because no usable audio was available. No band has been assigned.";
    if(verdict === "too-short")
      return "The response was too short to judge pronunciation confidently. Any figure here is indicative only; a fuller answer is needed for a reliable estimate.";
    if(verdict === "audio-limited")
      return `Pronunciation is audio-limited: the recording quality was not strong enough for a confident judgement, so a provisional range (${range.low?.toFixed(1)}–${range.high?.toFixed(1)}) is given rather than an exact band. Where the speech was audible, listener effort was ${effortLevel.toLowerCase()}.`;
    if(verdict === "provisional")
      return `On the available browser-based evidence, delivery was generally understandable with ${effortLevel.toLowerCase()} listener effort. Because of audio or length limits the figure is provisional and shown as a range${range.low!=null?` (${range.low.toFixed(1)}–${range.high.toFixed(1)})`:""}; phoneme-level confirmation would require a dedicated speech model.`;
    // reliable
    return `Speech was clear and generally easy to follow, with ${effortLevel.toLowerCase()} listener effort and stable clarity (${clarity}/100). This is a reliable browser-based estimate; it does not perform phoneme-level forced alignment, so any value is interpreted within that limit.`;
  }

  /* ============================================================
     MAIN ENTRY — analyzePronunciation(input)
     Faithful to the requested signature; returns the full report
     object. Backward-compatible numeric band is exposed for the
     existing aggregation via the thin wrapper bandForPronunciation().
     ============================================================ */
  function analyzePronunciation(input){
    const {
      audioBlob = null,
      transcript = "",
      segments = [],
      wordTimings = [],
      transcriptionConfidence = 0,
      lowConfidenceWords = null,
      micMetrics = {},
      speakingDurationMs = 0,
      totalRecordingDurationMs = 0,
      partKey = "part1",
      expectedDurationMs = null
    } = input || {};

    const mic = micMetrics || {};
    const hasAudio = !!(audioBlob || (mic.audioAnalysis && mic.audioAnalysis.ok) ||
                        (mic.peakRms != null) || (totalRecordingDurationMs > 0));
    const hasText = !!(transcript && transcript.trim().length);

    // Low-confidence word rate (from segments unless supplied).
    let lowConfRate = 0;
    if(typeof lowConfidenceWords === "number" && segments.length){
      lowConfRate = _clamp01(lowConfidenceWords / segments.length);
    } else if(segments.length){
      const low = segments.filter(s=>typeof s.confidence==="number" && s.confidence<0.6).length;
      lowConfRate = low/segments.length;
    }
    const wordCount = hasText ? transcript.trim().split(/\s+/).filter(Boolean).length : 0;

    /* ---- run modules ---- */
    const audio    = AudioQualityAnalyzer(mic);
    const activity = SpeechActivityAnalyzer(mic, speakingDurationMs, totalRecordingDurationMs, expectedDurationMs, partKey);
    const pause    = PauseChunkingAnalyzer(mic);
    const rhythm   = RhythmAnalyzer(segments, speakingDurationMs, wordCount);
    const inton    = IntonationEstimator(mic);

    const intel = IntelligibilityEstimator({
      transcript, segments, transcriptionConfidence, lowConfRate,
      audioQ:audio.score, speechRatio:activity.speechRatio
    });
    const clarity = SpeechClarityEstimator(mic, lowConfRate, audio.score);
    const effort  = ListenerEffortEstimator({
      lowConfRate, silenceRatio:activity.silenceRatio,
      rhythmScore:rhythm.score, clarityScore:clarity.score,
      audioWarnings:audio.warnings.length
    });

    const subscores = {
      intelligibility:        intel.score,
      listenerEffort:         effort.score,       // ease (higher = less effort)
      speechClarity:          clarity.score,
      rhythm:                 rhythm.score,
      pausingChunking:        pause.score,
      intonationApproximation:inton.score,
      audioQuality:           audio.score
    };

    /* ---- fairness gate decides verdict + confidence ---- */
    const gate = PronunciationFairnessGate({
      hasAudio, audioTier:audio.tier, activity, hasText,
      transcriptionConfidence, lowConfRate, segmentsCount:segments.length, partKey
    });

    /* ---- band mapping ---- */
    let band=null, roundedBand=null, bandRange={low:null,high:null}, composite=null;
    if(gate.verdict !== "unscorable"){
      const mapped = PronunciationBandMapper(subscores, gate.confidence, audio.tier, audio.warnings.length);
      band = mapped.band; roundedBand = mapped.roundedBand; bandRange = mapped.range; composite = mapped.composite;
      // too-short: keep numbers indicative only (wide-ish range, no point band).
      if(gate.verdict === "too-short" && roundedBand!=null){
        bandRange = { low:_clamp(_roundHalf(roundedBand-0.5),4,9), high:_clamp(_roundHalf(roundedBand+0.5),4,9) };
        band = null; roundedBand = null;
      }
    }

    /* ---- evidence bundle ---- */
    const evidence = {
      unclearWords:        extractUnclearWords(transcript, segments),
      possibleUnclearSpans:extractUnclearSpans(segments),
      longPauses:          pause.longPauses,
      silenceRatio:        activity.silenceRatio,
      clippingWarnings:    audio.warnings.filter(w=>/distortion|clipping|loud/i.test(w)),
      volumeWarnings:      audio.warnings.filter(w=>/level|far from/i.test(w)),
      rhythmNotes:         rhythm.notes,
      intonationNotes:     inton.notes,
      audioQualityWarnings:audio.warnings
    };

    const examinerComment = buildExaminerComment(gate.verdict, roundedBand, bandRange, subscores, effort.level);
    const improvementAdvice = buildAdvice(evidence, subscores, gate.verdict);

    return {
      band, roundedBand, bandRange,
      verdict: gate.verdict,                  // reliable|provisional|audio-limited|too-short|unscorable
      confidence: gate.confidence,            // high|medium|low|unscorable
      subscores,
      evidence,
      fairnessAdjustments: gate.adjustments,
      caveats: gate.caveats,
      examinerComment,
      improvementAdvice,
      meta:{
        provider: PronunciationProvider.mode,
        composite,
        effortLevel: effort.level,
        intonationBasis: inton.basis,
        usedOfflineAudio: !!audio.hasOffline,
        wordCount, partKey
      }
    };
  }

  return { analyzePronunciation, _compositeToBand:compositeToBand };
})();

/* ============================================================
   OFFLINE AUDIO ANALYSIS  (zero-cost, Web Audio API)
   Decodes the recorded clip once on the processing screen and
   extracts energy + an autocorrelation pitch contour. Runs fully
   in the browser. If decoding fails (e.g. Safari + webm), it
   returns {ok:false} and the engine falls back to realtime VAD
   metrics, marking intonation unavailable. No network, no cost.
   ============================================================ */
async function decodeAndAnalyzeAudio(blob){
  if(!blob || !blob.size) return { ok:false, reason:"no-audio" };
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return { ok:false, reason:"no-webaudio" };
  let audioBuf;
  try{
    const arr = await blob.arrayBuffer();
    const ctx = new AC();
    audioBuf = await ctx.decodeAudioData(arr.slice(0));
    try{ ctx.close(); }catch(e){}
  }catch(e){
    return { ok:false, reason:"decode-failed" };
  }
  try{
    const sr = audioBuf.sampleRate;
    const ch0 = audioBuf.getChannelData(0);
    const n = ch0.length;

    /* ---- frame energy (25 ms hop) — direct ---- */
    const hop = Math.max(1, Math.floor(sr*0.025));
    const framesRms = [];
    let peakAmp = 0, clipped = 0;
    for(let i=0;i<n;i+=hop){
      let sumSq=0; const end=Math.min(i+hop,n);
      for(let j=i;j<end;j++){
        const v = ch0[j];
        sumSq += v*v;
        const a = Math.abs(v);
        if(a>peakAmp) peakAmp=a;
        if(a>0.985) clipped++;
      }
      framesRms.push(Math.sqrt(sumSq/Math.max(1,end-i)));
    }
    const clipRatio = clipped / Math.max(1,n);

    /* ---- speech vs silence via adaptive threshold ---- */
    const sortedR = [...framesRms].sort((a,b)=>a-b);
    const noiseFloor = sortedR[Math.floor(sortedR.length*0.15)] || 0.0001;
    const peakFrame  = sortedR[Math.floor(sortedR.length*0.95)] || noiseFloor*4;
    const thr = Math.max(noiseFloor*2.2, peakFrame*0.18);
    const speechFrames = framesRms.filter(r=>r>thr);
    const silenceRatio = 1 - (speechFrames.length / Math.max(1,framesRms.length));
    const speechRms = speechFrames.length ? speechFrames.reduce((a,b)=>a+b,0)/speechFrames.length : 0;
    const noiseRms  = noiseFloor;
    const snrApprox = noiseRms>0 ? 20*Math.log10((speechRms+1e-6)/(noiseRms+1e-6)) : 30;
    // Volume stability: coefficient of variation across speech frames.
    let volStabilityCv = 0;
    if(speechFrames.length>2){
      const m = speechRms;
      const sd = Math.sqrt(speechFrames.reduce((a,b)=>a+(b-m)*(b-m),0)/speechFrames.length);
      volStabilityCv = m>0 ? sd/m : 0;
    }

    /* ---- pitch contour via autocorrelation on downsampled signal ----
       Estimated, not phoneme-accurate. Downsample to ~8 kHz for speed. */
    const targetSr = 8000;
    const factor = Math.max(1, Math.round(sr/targetSr));
    const dsr = sr/factor;
    const dn = Math.floor(n/factor);
    const ds = new Float32Array(dn);
    for(let i=0;i<dn;i++){
      let s=0; for(let k=0;k<factor;k++) s+=ch0[i*factor+k]||0;
      ds[i]=s/factor;
    }
    const win = Math.floor(dsr*0.045);                 // ~45 ms window
    const phop = Math.floor(dsr*0.020);                // 20 ms hop
    const minLag = Math.floor(dsr/400);                // 400 Hz ceiling
    const maxLag = Math.floor(dsr/70);                 // 70 Hz floor
    const f0s = [];
    let analysed = 0;
    const dThr = thr;                                   // reuse speech threshold (approx scale)
    for(let start=0; start+win<dn && analysed<2200; start+=phop){
      // Frame energy gate (only voiced-ish frames).
      let e=0; for(let j=0;j<win;j++){ const v=ds[start+j]; e+=v*v; }
      const rmsF = Math.sqrt(e/win);
      if(rmsF < dThr*0.8) continue;
      analysed++;
      // Normalised autocorrelation.
      let bestLag=-1, bestVal=0;
      let r0=0; for(let j=0;j<win;j++){ const v=ds[start+j]; r0+=v*v; }
      if(r0<=0) continue;
      for(let lag=minLag; lag<=maxLag; lag++){
        let s=0; for(let j=0;j<win-lag;j++){ s+=ds[start+j]*ds[start+j+lag]; }
        const norm = s/r0;
        if(norm>bestVal){ bestVal=norm; bestLag=lag; }
      }
      if(bestLag>0 && bestVal>0.3){                     // voiced confidence gate
        const f0 = dsr/bestLag;
        if(f0>=70 && f0<=400) f0s.push(f0);
      }
    }
    let pitch;
    if(f0s.length >= 8){
      const semis = f0s.map(f=>12*Math.log2(f/Math.min(...f0s)));
      const sortedSemi = [...semis].sort((a,b)=>a-b);
      const p5  = sortedSemi[Math.floor(sortedSemi.length*0.05)];
      const p95 = sortedSemi[Math.floor(sortedSemi.length*0.95)];
      const med = sortedSemi[Math.floor(sortedSemi.length*0.5)];
      pitch = {
        ok:true,
        voicedRatio: f0s.length/Math.max(1,analysed),
        f0Median: +(f0s.slice().sort((a,b)=>a-b)[Math.floor(f0s.length*0.5)]).toFixed(1),
        f0RangeSemitones: +(p95-p5).toFixed(2),
        f0StdSemitones: 0,
        note:"Pitch contour estimated by autocorrelation (approximate)."
      };
    } else {
      pitch = { ok:false, voicedRatio: analysed?f0s.length/analysed:0, note:"Insufficient voiced frames for pitch tracking." };
    }

    return {
      ok:true,
      durationSec:+audioBuf.duration.toFixed(2),
      sampleRate:sr,
      peakAmp:+peakAmp.toFixed(3),
      clipRatio:+clipRatio.toFixed(4),
      silenceRatio:+silenceRatio.toFixed(3),
      speechRms:+speechRms.toFixed(4),
      noiseRms:+noiseRms.toFixed(5),
      snrApprox:+snrApprox.toFixed(1),
      volStabilityCv:+volStabilityCv.toFixed(3),
      pitch
    };
  }catch(e){
    return { ok:false, reason:"analysis-error" };
  }
}

/* ============================================================
   THIN BACKWARD-COMPATIBLE WRAPPER
   Produces the {band, verdict, rangeLo, rangeHi, caveat} shape the
   existing ScoringEngine expects, plus a `.detail` carrying the full
   v2 report for the renderer. For aggregation, provisional / audio-
   limited parts contribute the MIDPOINT of their range (counted,
   fairer) while too-short / unscorable contribute nothing.
   ============================================================ */
function bandForPronunciationV2(partMeta, metrics, partKey){
  const tr = (partMeta && partMeta.transcriptionResult) || {};
  const detail = PronunciationEngine.analyzePronunciation({
    audioBlob: partMeta && partMeta.audioKey ? {size:1} : null,  // presence flag only
    transcript: tr.text || "",
    segments: tr.segments || [],
    wordTimings: tr.words || [],
    transcriptionConfidence: tr.confidence || 0,
    lowConfidenceWords: null,
    micMetrics: {
      peakRms: partMeta?.peakRms,
      noiseFloorRms: partMeta?.noiseFloorRms,
      noiseVariance: partMeta?.noiseVariance,
      clippingFrameRatio: partMeta?.clippingFrameRatio,
      micQualityScore: partMeta?.micQualityScore,
      speechRatio: partMeta?.speechRatio,
      silenceBlockCount: partMeta?.silenceBlockCount,
      avgSilenceBlockMs: partMeta?.avgSilenceBlockMs,
      longestSilenceMs: partMeta?.longestSilenceMs,
      silenceBlocks: partMeta?.silenceBlocks || [],
      audioAnalysis: partMeta?.audioAnalysis || null
    },
    speakingDurationMs: partMeta?.speakingTimeMs || 0,
    totalRecordingDurationMs: partMeta?.durationMs || 0,
    partKey,
    expectedDurationMs: null
  });

  // Numeric contribution for the cross-part aggregate.
  let aggBand = null;
  if(detail.roundedBand != null) aggBand = detail.roundedBand;
  else if(detail.bandRange && detail.bandRange.low != null && (detail.verdict==="provisional"||detail.verdict==="audio-limited")){
    aggBand = Math.round(((detail.bandRange.low + detail.bandRange.high)/2)*2)/2;
  } // too-short / unscorable → null (not counted)

  return {
    band: aggBand,
    verdict: detail.verdict === "reliable" ? "scored" : "provisional",  // legacy flag
    rangeLo: detail.bandRange?.low ?? null,
    rangeHi: detail.bandRange?.high ?? null,
    caveat: detail.caveats[0] || "",
    detail
  };
}

/* ============================================================
   LEGACY pronunciation banding (kept for reference / fallback).
   The active pronunciation criterion now flows through
   PronunciationEngine.analyzePronunciation via bandForPronunciationV2.
   ============================================================ */
function bandForPronunciation(m){
  let bConf;
  const c = m.avgTranscriptConfidence;
  if(c >= 0.92) bConf = 7.5;
  else if(c >= 0.88) bConf = 7.0;
  else if(c >= 0.82) bConf = 6.0;
  else if(c >= 0.75) bConf = 5.0;
  else bConf = 4.5;

  let bLow;
  const l = m.lowConfidenceWordRate;
  if(l < 0.03) bLow = 7.5;
  else if(l < 0.08) bLow = 7.0;
  else if(l < 0.15) bLow = 6.0;
  else if(l < 0.25) bLow = 5.0;
  else bLow = 4.0;

  let raw = 0.55*bConf + 0.45*bLow;
  // Mic quality gate
  if(m.micQualityScore < 45){
    return {band:null, verdict:"provisional", rangeLo:5.0, rangeHi:7.0, caveat:"Microphone quality insufficient for confident pronunciation assessment."};
  }
  // Cap at 7.0 without phoneme model
  raw = Math.min(raw, 7.0);
  return {band:roundHalf(raw), verdict:"scored", capped:true, caveat:"Pronunciation assessment based on transcript confidence and acoustic signal only; bands above 7.0 require dedicated phoneme analysis."};
}

/* Short-response penalty */
function shortResponsePenalty(metrics, partKey){
  const EXP = {
    part1:{min:140,severe:80},
    part2:{min:120,severe:60},
    part3:{min:150,severe:90}
  }[partKey];
  const w = metrics.wordCount;
  if(w < 15) return {level:"no_response", penalty:null};
  if(partKey==="part2"){
    const sp = metrics.speakingMs;
    if(sp < 45000) return {level:"severe", penalty:-2.0};
    if(sp < 75000) return {level:"significant", penalty:-1.0};
    if(sp < 105000) return {level:"minor", penalty:-0.5};
  }
  if(w < EXP.severe) return {level:"severe", penalty:-1.5};
  if(w < EXP.min) return {level:"moderate", penalty:-0.5};
  return {level:"adequate", penalty:0};
}

/* Topic relevance penalty — Phase 5.75 spec thresholds */
function relevancePenalty(score){
  if(score >= 0.55) return 0;
  if(score >= 0.40) return -0.5;
  if(score >= 0.20) return -1.0;
  return -2.0;
}


/* ------------------------------------------------------------
   SCORING ENGINE — aggregate + feedback
   ------------------------------------------------------------ */
const PART_WEIGHTS = {part1:0.25, part2:0.35, part3:0.40};
const DIFFICULTY_MOD = {foundation:0.90, standard:1.00, challenging:1.15};
const PART3_ABSTRACT = 1.08;

function ScoringEngine_analyze(session){
  const test = session.test;
  const parts = ["part1","part2","part3"];
  const analyzed = {};
  for(const k of parts){
    if(session.parts[k]){
      analyzed[k] = analyzePart(session.parts[k], test, k);
    }
  }

  // Per-part criterion bands
  const partBands = {};
  const partPenalties = {};
  const relFindings = {};
  for(const k of parts){
    if(!analyzed[k]){ partBands[k]=null; continue; }
    const m = analyzed[k].metrics;
    const fBand = bandForFluency(m, test.timePressure);
    const lResult = bandForLexical(m, !!test.modelResponses);
    const gResult = bandForGrammar(m);
    // Pronunciation now flows through the browser-only PronunciationEngine v2.
    const pResult = bandForPronunciationV2(session.parts[k], m, k);

    // Short response penalty applies to all criteria for this part
    const srp = shortResponsePenalty(m, k);
    partPenalties[k] = srp;
    const srPen = srp.penalty || 0;

    // Topic relevance penalty (affects F&C only)
    const relPen = relevancePenalty(m.relevanceScore);
    relFindings[k] = {score:m.relevanceScore, penalty:relPen, missedAnchors:m.missedAnchors};

    partBands[k] = {
      fluencyCoherence: fBand !== null ? Math.max(4.0, fBand + srPen + relPen) : null,
      lexical: lResult.band !== null ? Math.max(4.0, lResult.band + srPen) : null,
      grammar: gResult.band !== null ? Math.max(4.0, gResult.band + srPen) : null,
      pronunciation: pResult.band !== null ? Math.max(4.0, pResult.band + srPen) : null,
      _lexicalInner: lResult,
      _grammarInner: gResult,
      _pronInner: pResult,
      _pronDetail: pResult.detail,   // full v2 report for the renderer
      _raw: {fluencyCoherence:fBand, lexical:lResult.band, grammar:gResult.band, pronunciation:pResult.band}
    };
  }

  // Cross-part aggregation with weights + difficulty mod + Part 3 abstract multiplier
  function aggregate(criterion){
    let sum = 0, wsum = 0;
    for(const k of parts){
      if(!partBands[k] || partBands[k][criterion] == null) continue;
      const base = PART_WEIGHTS[k];
      const diff = DIFFICULTY_MOD[test.partDifficulty?.[k] || test.difficulty] || 1.0;
      const abstractMod = (k === "part3" && (analyzed[k]?.metrics.wordCount||0) >= 50) ? PART3_ABSTRACT : 1.0;
      const w = base * diff * abstractMod;
      sum += partBands[k][criterion] * w;
      wsum += w;
    }
    return wsum ? roundHalf(sum/wsum) : null;
  }

  const criteria = {
    fluencyCoherence: aggregate("fluencyCoherence"),
    lexical: aggregate("lexical"),
    grammar: aggregate("grammar"),
    pronunciation: aggregate("pronunciation")
  };

  // Pronunciation provisional detection
  const anyProvisional = parts.some(k => partBands[k]?._pronInner?.verdict==="provisional");
  const pronVerdict = anyProvisional ? "provisional" : "scored";

  // ---- Aggregate pronunciation detail (PronunciationEngine v2) ----
  // Headline verdict = the most cautious verdict observed across parts.
  const VERDICT_RANK = { "unscorable":0, "too-short":1, "audio-limited":2, "provisional":3, "reliable":4 };
  const CONF_RANK = { "unscorable":0, "low":1, "medium":2, "high":3 };
  const pronParts = {};
  let headlineVerdict = "reliable", headlineConf = "high";
  let sawAny = false;
  for(const k of parts){
    const d = partBands[k]?._pronDetail;
    if(!d) continue;
    sawAny = true;
    pronParts[k] = d;
    if(VERDICT_RANK[d.verdict] < VERDICT_RANK[headlineVerdict]) headlineVerdict = d.verdict;
    if(CONF_RANK[d.confidence] < CONF_RANK[headlineConf]) headlineConf = d.confidence;
  }
  // Aggregate subscores (mean of available per-part subscores).
  const SUBKEYS = ["intelligibility","listenerEffort","speechClarity","rhythm","pausingChunking","intonationApproximation","audioQuality"];
  const aggSub = {};
  for(const sk of SUBKEYS){
    const vals = parts.map(k=>pronParts[k]?.subscores?.[sk]).filter(v=>typeof v==="number");
    aggSub[sk] = vals.length ? Math.round(mean(vals)) : null;
  }
  // Merge evidence + advice across parts (deduped, capped).
  const mergeArr = (sel)=>{ const out=[]; for(const k of parts){ const a=sel(pronParts[k]); if(Array.isArray(a)) out.push(...a);} return [...new Set(out.map(x=>typeof x==="string"?x:JSON.stringify(x)))].map(x=>{try{return JSON.parse(x);}catch(e){return x;}}); };
  const pronunciationDetail = !sawAny ? null : {
    verdict: headlineVerdict,
    confidence: headlineConf,
    band: criteria.pronunciation,                 // numeric headline (may be null)
    bandRange: (()=>{
      const los = parts.map(k=>pronParts[k]?.bandRange?.low).filter(v=>v!=null);
      const his = parts.map(k=>pronParts[k]?.bandRange?.high).filter(v=>v!=null);
      return los.length ? { low:Math.min(...los), high:Math.max(...his) } : { low:null, high:null };
    })(),
    subscores: aggSub,
    parts: pronParts,
    caveats: mergeArr(d=>d.caveats),
    fairnessAdjustments: mergeArr(d=>d.fairnessAdjustments),
    possibleUnclearSpans: mergeArr(d=>d.evidence.possibleUnclearSpans).slice(0,8),
    unclearWords: mergeArr(d=>d.evidence.unclearWords).slice(0,8),
    longPauses: parts.flatMap(k=>(pronParts[k]?.evidence.longPauses||[]).map(p=>({...p,part:k}))).sort((a,b)=>b.durationMs-a.durationMs).slice(0,6),
    rhythmNotes: mergeArr(d=>d.evidence.rhythmNotes).slice(0,4),
    intonationNotes: mergeArr(d=>d.evidence.intonationNotes).slice(0,4),
    audioQualityWarnings: mergeArr(d=>d.evidence.audioQualityWarnings).slice(0,6),
    examinerComment: (()=>{ // use the most cautious part's comment as representative
      let pick=null, rank=99;
      for(const k of parts){ const d=pronParts[k]; if(d && VERDICT_RANK[d.verdict]<rank){ rank=VERDICT_RANK[d.verdict]; pick=d; } }
      return pick?.examinerComment || "";
    })(),
    improvementAdvice: (()=>{
      const imm = mergeArr(d=>d.improvementAdvice.immediate).slice(0,3);
      const st  = mergeArr(d=>d.improvementAdvice.shortTerm).slice(0,3);
      const tb  = mergeArr(d=>d.improvementAdvice.targetBand).slice(0,3);
      return { immediate:imm, shortTerm:st, targetBand:tb };
    })(),
    provider: PronunciationProvider.mode,
    providerNote: PronunciationProvider.describe()
  };

  // Overall — IELTS rounding
  const scoredArr = [criteria.fluencyCoherence, criteria.lexical, criteria.grammar, criteria.pronunciation]
    .filter(v=>v!=null);
  const rawMean = scoredArr.length ? mean(scoredArr) : 0;
  let overall = roundHalf(rawMean);

  // Band Ceiling Limiter — min(criteria) + 1.0
  const minCriterion = scoredArr.length ? Math.min(...scoredArr) : null;
  let ceilingApplied = false;
  if(minCriterion != null && overall > minCriterion + 1.0){
    overall = minCriterion + 1.0;
    ceilingApplied = true;
  }

  // CEFR
  const cefr = mapCEFR(overall);

  // Expected band reconciliation
  const expectedRange = test.expectedBandRange || {min:5.0,max:7.5};
  let reconciliation;
  if(overall < expectedRange.min) reconciliation = {state:"below", label:`below expected range (${expectedRange.min}–${expectedRange.max})`, tone:"warning"};
  else if(overall > expectedRange.max) reconciliation = {state:"above", label:`above expected range (${expectedRange.min}–${expectedRange.max})`, tone:"success"};
  else reconciliation = {state:"within", label:`within expected range (${expectedRange.min}–${expectedRange.max})`, tone:"neutral"};

  // Confidence Index
  const totalSpeakingMs = parts.reduce((a,k)=>a+(session.parts[k]?.speakingTimeMs||0), 0);
  const durationCoverage = clamp01(totalSpeakingMs/360000);
  const transcriptConfs = parts.map(k=>session.parts[k]?.transcriptionResult?.confidence||0).filter(x=>x>0);
  const transcriptStabilities = parts.map(k=>session.parts[k]?.transcriptionResult?.stability||0.5);
  const providerConf = transcriptConfs.length ? mean(transcriptConfs) : 0.5;
  const transcriptQuality = 0.6*providerConf + 0.4*mean(transcriptStabilities);
  const consistencyRaw = scoredArr.length>1 ? 1 - Math.min(std(scoredArr)/1.5, 1) : 0.5;
  const tpTol = test.timePressure==="low"?-0.1 : test.timePressure==="high"?0.1 : 0;
  const consistency = clamp01(consistencyRaw + tpTol);
  const micQualities = parts.map(k=>session.parts[k]?.micQualityScore||60);
  const audioIntegrity = mean(micQualities)/100;
  let confScore = 0.35*durationCoverage + 0.30*transcriptQuality + 0.20*consistency + 0.15*audioIntegrity;
  // Short response cap
  const anySevere = Object.values(partPenalties).some(p=>p.level==="severe"||p.level==="no_response");
  const anyLowSpeech = parts.some(k=>session.parts[k]?.speechRatio < 0.30);
  if(anySevere || anyLowSpeech) confScore = Math.min(confScore, 0.55);
  else if(Object.values(partPenalties).some(p=>p.level==="moderate"||p.level==="minor")) confScore = Math.min(confScore, 0.79);
  confScore = clamp01(confScore);
  const confTier = confScore >= 0.80 ? "high" : confScore >= 0.55 ? "medium" : "low";

  // Feedback — four-move Performance Summary + criterion analyses
  const feedback = generateFeedback(session, criteria, overall, analyzed, partBands, partPenalties, relFindings);
  // Replace the legacy pronunciation analysis line with the v2 examiner comment (honest wording).
  // Always lead with the canonical credibility statement so pronunciation reads as a
  // browser-based pedagogical estimate that IS part of this report (no "assessed separately").
  if(feedback.detailedAnalysis){
    const PRON_CREDIBILITY = "Pronunciation is estimated using browser-based audio and transcript signals. The score reflects intelligibility, listener effort, rhythm, pausing, chunking and speech clarity. It should be interpreted as a reliable classroom estimate, not a certified examiner score. ";
    const tail = (pronunciationDetail && pronunciationDetail.examinerComment)
      ? pronunciationDetail.examinerComment
      : (feedback.detailedAnalysis.pronunciation || "");
    feedback.detailedAnalysis.pronunciation = PRON_CREDIBILITY + tail;
  }
  const recommendations = generateRecommendations(criteria, overall, analyzed, partBands, partPenalties, relFindings, test);

  // Attempt resolution
  const prior = Sessions.forStudent(session.studentName, session.testId).filter(s=>s.id!==session.id && s.scored);
  const prev = prior.length ? prior[prior.length-1] : null;
  const attempt = {
    attemptNumber: prior.length + 1,
    previousBand: prev?.scored?.overall ?? null,
    deltaScore: prev?.scored?.overall != null ? +(overall - prev.scored.overall).toFixed(1) : null
  };

  return {
    engineVersion:"5.75.0",
    computedAt:new Date().toISOString(),
    criteria,
    pronunciationVerdict: pronVerdict,
    pronunciationDetail,
    overall,
    rawMean: +rawMean.toFixed(2),
    ceilingApplied,
    ceilingReason: ceilingApplied ? `Overall limited to min(criteria) + 1.0 due to a ${(rawMean-overall).toFixed(1)}-band gap at the lowest criterion` : null,
    cefr,
    reconciliation,
    partBands,
    partPenalties,
    relFindings,
    analyzed,
    confidence:{
      score:+confScore.toFixed(2),
      tier:confTier,
      components:{
        durationCoverage:+durationCoverage.toFixed(2),
        transcriptQuality:+transcriptQuality.toFixed(2),
        consistency:+consistency.toFixed(2),
        audioIntegrity:+audioIntegrity.toFixed(2)
      },
      evidence: buildConfidenceEvidence(totalSpeakingMs, providerConf, confTier, partPenalties, relFindings)
    },
    feedback,
    recommendations,
    attempt,
    expectedBandRange: expectedRange
  };
}

function mapCEFR(band){
  if(band >= 8.5) return {level:"C2", label:"Proficient"};
  if(band >= 7.5) return {level:"C1", label:"Advanced"};
  if(band >= 6.5) return {level:"B2", label:"Upper-Intermediate"};
  if(band >= 5.0) return {level:"B1", label:"Intermediate"};
  if(band >= 4.0) return {level:"A2", label:"Elementary"};
  return {level:"A1", label:"Beginner"};
}

function buildConfidenceEvidence(speakingMs, providerConf, tier, partPenalties, relFindings){
  const minutes = Math.floor(speakingMs/60000);
  const seconds = Math.floor((speakingMs%60000)/1000);
  const timeStr = `${minutes} minute${minutes!==1?"s":""} ${seconds} seconds`;
  const qualityWord = providerConf > 0.88 ? "high" : providerConf > 0.78 ? "good" : providerConf > 0.65 ? "moderate" : "variable";
  const parts = [`Based on ${timeStr} of speech`, `${qualityWord} transcript quality`];
  const shorts = Object.entries(partPenalties).filter(([_,p])=>p.level!=="adequate"&&p.level!=="no_response");
  if(shorts.length) parts.push(`shortened response${shorts.length>1?"s":""} in ${shorts.map(([k])=>k.replace("part","Part ")).join(", ")}`);
  const drifts = Object.entries(relFindings).filter(([_,f])=>f.penalty<0);
  if(drifts.length) parts.push(`topic-drift signals in ${drifts.map(([k])=>k.replace("part","Part ")).join(", ")}`);
  return parts.join(", ") + ".";
}

function generateFeedback(session, crit, overall, analyzed, partBands, partPenalties, relFindings){
  // Strongest / weakest criteria
  const entries = [
    ["Fluency and Coherence", crit.fluencyCoherence, "fluencyCoherence"],
    ["Lexical Resource", crit.lexical, "lexical"],
    ["Grammatical Range and Accuracy", crit.grammar, "grammar"],
    ["Pronunciation", crit.pronunciation, "pronunciation"]
  ].filter(e=>e[1]!=null);
  const sorted = [...entries].sort((a,b)=>b[1]-a[1]);
  const strongest = sorted[0];
  const weakest = sorted[sorted.length-1];

  // Command level phrase
  const cmd = overall >= 8 ? "a very good" : overall >= 7 ? "a good" : overall >= 6 ? "a competent" : overall >= 5 ? "a modest" : "a limited";
  const disc = overall >= 8 ? "sustaining extended discourse with ease"
            : overall >= 7 ? "sustaining conversation with reasonable flexibility"
            : overall >= 6 ? "sustaining conversation across familiar and moderately abstract topics"
            : overall >= 5 ? "holding conversation at a basic level"
            : "managing short exchanges";

  // Evidence samples
  const allAdvItems = [];
  for(const k of ["part1","part2","part3"]){
    if(analyzed[k]) allAdvItems.push(...(analyzed[k].metrics.advancedItems||[]));
  }
  const advShow = [...new Set(allAdvItems)].slice(0,3);

  // Strongest-specific phrase
  const strongPhrase = {
    fluencyCoherence: "with sustained delivery and clear discourse organisation",
    lexical: advShow.length ? `with controlled use of topic-specific vocabulary and items such as ${advShow.map(w=>`'${w}'`).join(", ")}` : "with a working vocabulary adequate for the topic range",
    grammar: "with an ability to produce complex structures under extended discourse",
    pronunciation: "with intelligible delivery and consistent transcription confidence"
  }[strongest[2]];

  // Weakest-specific phrase
  const grammarErrs = [];
  for(const k of ["part1","part2","part3"]){
    if(analyzed[k]?.metrics.errors) grammarErrs.push(...analyzed[k].metrics.errors);
  }
  const topErrType = {};
  for(const e of grammarErrs) topErrType[e.type] = (topErrType[e.type]||0)+1;
  const dominantErr = Object.entries(topErrType).sort((a,b)=>b[1]-a[1])[0];
  const weakPhrase = {
    fluencyCoherence: "with noticeable hesitation and limited range of cohesive devices",
    lexical: "with reliance on high-frequency vocabulary and limited paraphrase",
    grammar: dominantErr ? `with recurrent ${dominantErr[0]==="sva"?"subject-verb agreement":dominantErr[0]==="article"?"article omission":dominantErr[0]==="preposition"?"preposition choice":"structural"} errors under extended discourse` : "with structural errors that persist under extended discourse",
    pronunciation: "with reduced transcription confidence across several segments"
  }[weakest[2]];

  // Four-move summary
  const lowerBand = Math.floor(overall);
  const upperBand = Math.ceil(overall);
  const strengthCrit = strongest[0].toLowerCase();
  const weakCrit = weakest[0].toLowerCase();
  const summary = [
    `The candidate demonstrates ${cmd} command of spoken English, ${disc} with reasonable effectiveness.`,
    `${strongest[0]} is a particular strength, ${strongPhrase}.`,
    `${weakest[0]}, by contrast, remains the principal constraint, ${weakPhrase}.`,
    `Taken together, these patterns place the performance at Band ${overall.toFixed(1)} — above the Band ${Math.max(4, overall-0.5).toFixed(1)} threshold on ${strongest[0].toLowerCase().split(" and ")[0]}, but held below Band ${Math.min(9, overall+0.5).toFixed(1)} by ${weakest[0].toLowerCase().split(" and ")[0]} under extended discourse.`
  ];

  // Detailed per-criterion analyses
  const totalWords = ["part1","part2","part3"].reduce((a,k)=>a+(analyzed[k]?.metrics.wordCount||0),0);
  const avgWPM = ["part1","part2","part3"]
    .map(k=>analyzed[k]?.metrics.trueWPM||0).filter(x=>x>0);
  const avgTTRMA = mean(["part1","part2","part3"].map(k=>analyzed[k]?.metrics.typeTokenRatioMA||0).filter(x=>x>0));
  const avgAdvRatio = mean(["part1","part2","part3"].map(k=>analyzed[k]?.metrics.advancedWordRatio||0));
  const avgErrDens = mean(["part1","part2","part3"].map(k=>analyzed[k]?.metrics.errorDensity||0));
  const avgSub = mean(["part1","part2","part3"].map(k=>analyzed[k]?.metrics.subordinationRatio||0));
  const avgConf = mean(["part1","part2","part3"].map(k=>analyzed[k]?.metrics.avgTranscriptConfidence||0).filter(x=>x>0));

  const details = {
    fluencyCoherence: `Speech rate averaged ${Math.round(mean(avgWPM))} words per minute when actively speaking. ` +
      `Discourse markers spanned ${Math.max(...Object.values(analyzed).map(a=>a.metrics.categoriesHit?.length||0))} of 11 cohesive categories across the session. ` +
      (partPenalties.part2?.penalty < 0 ? `Part 2 was delivered in under ${Math.round((session.parts.part2?.speakingTimeMs||0)/1000)} seconds, which limited the long-turn signal. ` : "") +
      `Placed at Band ${crit.fluencyCoherence?.toFixed(1) || "—"}.`,
    lexical: `Type-token ratio over a moving window was ${avgTTRMA.toFixed(2)}, with an advanced-word ratio of ${avgAdvRatio.toFixed(3)}` +
      (advShow.length ? ` including items such as ${advShow.map(w=>`'${w}'`).join(", ")}` : "") + `. ` +
      (partBands.part1?._lexicalInner?.penalty > 0 ? `Repetition patterns contributed a −${partBands.part1._lexicalInner.penalty.toFixed(1)} adjustment. ` : "") +
      `Placed at Band ${crit.lexical?.toFixed(1) || "—"}.`,
    grammar: `Error density of ${avgErrDens.toFixed(1)} per 100 words ` +
      (dominantErr ? `was concentrated in ${dominantErr[0]==="sva"?"subject-verb agreement":dominantErr[0]==="article"?"article usage":"preposition choice"} (${dominantErr[1]} instances). ` : `was distributed across multiple categories. `) +
      `Subordination ratio of ${avgSub.toFixed(2)} indicates ${avgSub>0.25?"good":avgSub>0.16?"moderate":"limited"} structural variety. ` +
      `Placed at Band ${crit.grammar?.toFixed(1) || "—"}.`,
    pronunciation: `Average transcription confidence was ${avgConf.toFixed(2)}. ` +
      (crit.pronunciation === null ? `Microphone quality was insufficient for a confident pronunciation band — a provisional assessment is provided in the range 5.0–7.0. ` :
       crit.pronunciation >= 7.0 ? `At this score level, phoneme-level analysis would be required to resolve bands above 7.0. ` :
       ``) +
      `Placed at Band ${crit.pronunciation?.toFixed(1) || "provisional"}.`
  };

  return {performanceSummary: summary, detailedAnalysis: details};
}

function generateRecommendations(crit, overall, analyzed, partBands, partPenalties, relFindings, test){
  const immediate = [], shortTerm = [], targetBand = [];

  // Collect signals
  const allErrs = [];
  for(const k of ["part1","part2","part3"]){
    if(analyzed[k]?.metrics.errors) allErrs.push(...analyzed[k].metrics.errors);
  }
  const errsByType = {};
  for(const e of allErrs) errsByType[e.type] = (errsByType[e.type]||0)+1;
  const topErrs = Object.entries(errsByType).sort((a,b)=>b[1]-a[1]).slice(0,2);

  // IMMEDIATE — top 2 high-frequency errors
  if(topErrs.length){
    for(const [type,count] of topErrs){
      if(type==="sva"){
        immediate.push({
          title:"Strengthen subject-verb agreement under complex subjects",
          body:`${count} instances detected in the session. Before a finite verb, briefly check whether the subject is singular or plural — especially with words like 'people', 'everyone', or complex noun phrases.`,
          descriptorGap:"Grammar Band 7: 'frequently produces error-free sentences'"
        });
      } else if(type==="article"){
        immediate.push({
          title:"Practice article placement before singular countable nouns",
          body:`${count} instances where articles were omitted before singular nouns. Quick mental check: countable + singular → 'a', 'an', or 'the' is required.`,
          descriptorGap:"Grammar Band 7: 'frequently produces error-free sentences'"
        });
      } else if(type==="preposition"){
        immediate.push({
          title:"Refine prepositional collocations",
          body:`${count} preposition errors detected (e.g., 'discuss about', 'depend in'). Build a personal list of verb+preposition collocations you use frequently.`,
          descriptorGap:"Grammar Band 7: 'some grammatical mistakes persist'"
        });
      }
    }
  }
  // Short response in Part 2
  if(partPenalties.part2?.penalty < 0){
    immediate.push({
      title:"Use the full Part 2 long turn",
      body:`Part 2 was delivered in under the 2-minute expectation. IELTS examiners do not interrupt until 2 minutes; a 30/60/30 plan during the 60-second prep (context → development → closing reflection) helps fill the time.`,
      descriptorGap:"Fluency Band 7: 'speaks at length without noticeable effort'"
    });
  }
  // Topic drift
  const driftedParts = Object.entries(relFindings).filter(([_,f])=>f.penalty<0);
  if(driftedParts.length){
    immediate.push({
      title:"Address the specific question asked",
      body:`${driftedParts.length} part(s) showed responses that drifted from the prompt. Listen for the key noun and verb in each question — a Band 7 answer engages those specific terms before elaborating.`,
      descriptorGap:"Coherence Band 7: 'develops topics coherently and appropriately'"
    });
  }

  // SHORT-TERM — weakest criterion gap
  const entries = [
    ["fluencyCoherence", crit.fluencyCoherence],
    ["lexical", crit.lexical],
    ["grammar", crit.grammar],
    ["pronunciation", crit.pronunciation]
  ].filter(e=>e[1]!=null).sort((a,b)=>a[1]-b[1]);
  const weakest = entries[0];
  if(weakest){
    const [crit_, band_] = weakest;
    if(crit_==="grammar"){
      const avgSub = mean(["part1","part2","part3"].map(k=>analyzed[k]?.metrics.subordinationRatio||0));
      if(avgSub < 0.25){
        shortTerm.push({
          title:"Build subordinate clause variety",
          body:`Subordination ratio averaged ${avgSub.toFixed(2)} — below the 0.25+ threshold for Band 7. Practice incorporating 'although', 'whereas', or 'given that' clauses into extended responses.`,
          descriptorGap:"Grammar Range Band 7: 'uses a range of complex structures with some flexibility'"
        });
      }
    } else if(crit_==="lexical"){
      shortTerm.push({
        title:"Expand advanced-vocabulary bank",
        body:"Build a bank of 20–30 B2/C1 items across common IELTS domains (environment, technology, education). Use flashcards with a worked example sentence per item. Deploy two to three per Part 3 response.",
        descriptorGap:"Lexical Band 7: 'uses some less common and idiomatic vocabulary'"
      });
    } else if(crit_==="fluencyCoherence"){
      shortTerm.push({
        title:"Expand cohesive device range",
        body:"Work beyond 'and', 'but', 'so'. Practice each week with one category — concession ('admittedly', 'to be fair'), contrast ('whereas', 'that said'), cause-effect ('which is why', 'as a result').",
        descriptorGap:"Coherence Band 7: 'uses a range of connectives and discourse markers with some flexibility'"
      });
    } else if(crit_==="pronunciation"){
      shortTerm.push({
        title:"Improve recording conditions",
        body:"Current pronunciation assessment is limited by audio quality. Record in a quieter room, with the microphone 10-15 cm from your mouth. This alone will lift the provisional ceiling.",
        descriptorGap:"Pronunciation Band 7: 'generally easy to understand'"
      });
    }
  }
  // Part 2 structure
  if(!shortTerm.length || driftedParts.length){
    shortTerm.push({
      title:"Adopt a Part 2 structure template",
      body:"Every Part 2 response should have three visible parts: a one-sentence framing (15s), development of the four bullets (75s), and a short closing reflection (30s). Practice this shape until it becomes automatic.",
      descriptorGap:"Coherence Band 7: 'develops topics coherently and appropriately'"
    });
  }

  // TARGET BAND — reach expected max + 0.5
  const target = test.expectedBandRange?.max || 7.5;
  const gap = target - overall;
  if(gap > 0){
    targetBand.push({
      title:"Adopt concession-then-claim structures",
      body:`Band 7.5+ responses in IELTS Part 3 reliably use a concession before the main claim ('that said', 'to some extent, but...'). Practice: every Part 3 answer should contain at least one concession before the core opinion.`,
      descriptorGap:`Coherence Band ${(target+0.5).toFixed(1)}: 'develops topics fully and coherently'`
    });
    targetBand.push({
      title:"Move from description to evaluation",
      body:"Describing an example is Band 6 behaviour. Evaluating its significance is Band 7.5+. Follow every example with a sentence that weighs it — 'what that tells us is...', 'the important point here is...'.",
      descriptorGap:"Multiple criteria — Band 7.5+"
    });
  } else {
    targetBand.push({
      title:"Consider a more demanding test",
      body:`Performance exceeds this test's expected range. Attempt a Challenging-tier test (e.g., 'The Natural World Around Us' or 'Success, Work, and Ambition') to locate the candidate's true ceiling.`,
      descriptorGap:"Stretch assessment recommended"
    });
  }

  return {
    immediate:immediate.slice(0,3),
    shortTerm:shortTerm.slice(0,3),
    targetBand:targetBand.slice(0,3)
  };
}

function bandTierColor(band){
  if(band === null || band === undefined) return "var(--mm-ink-500)";
  if(band >= 9) return "var(--mm-band-expert)";
  if(band >= 8) return "var(--mm-band-very-good)";
  if(band >= 7) return "var(--mm-band-good)";
  if(band >= 6) return "var(--mm-band-competent)";
  if(band >= 5) return "var(--mm-band-modest)";
  if(band >= 4) return "var(--mm-band-limited)";
  return "var(--mm-band-below)";
}


/* ------------------------------------------------------------
   UI HELPERS — toast, modal, icons
   ------------------------------------------------------------ */
function toast(msg){
  const t = el("div",{class:"mm-toast"},msg);
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity="0";t.style.transition="opacity 300ms";setTimeout(()=>t.remove(),320);}, 2800);
}
function modal({title,body,actions}){
  return new Promise(resolve=>{
    const close = (val)=>{backdrop.remove();resolve(val);};
    const backdrop = el("div",{class:"mm-modal-backdrop"});
    const sheet = el("div",{class:"mm-modal"},[
      el("h3",{class:"mm-modal__title"},title),
      typeof body === "string" ? el("div",{class:"mm-modal__text"},body) : body,
      el("div",{class:"mm-modal__actions"}, actions.map(a=>{
        const b = el("button",{class:`mm-btn mm-btn--${a.kind||"ghost"}`, onclick:()=>close(a.value)},a.label);
        return b;
      }))
    ]);
    backdrop.appendChild(sheet);
    backdrop.addEventListener("click",(e)=>{if(e.target===backdrop) close(null);});
    document.body.appendChild(backdrop);
  });
}

/* ------------------------------------------------------------

   ------------------------------------------------------------ */
function renderTopbar(){
  const isRunner = state.view === "runner" || state.view === "processing";
  if(isRunner) return null;
  const user = AuthAccess.currentUser();
  if(!user) return null;                       // auth screen renders its own chrome
  const admin = user.role === "admin";

  const link = (view,label,extra)=>el("button",{
    class:`mm-nav__link ${state.view===view?"is-active":""}`,
    onclick:()=>state.go(view)
  },extra?[label,extra]:label);

  // Role-scoped navigation
  let nav;
  if(admin){
    const pending = AuthAccess.listTokenRequests("pending").length;
    nav = [
      link("home","Overview"),
      link("library","Test Library"),
      link("builder","Create Test"),
      link("sessions","Sessions"),
      link("requests","Access Requests", pending?el("span",{class:"mm-req-count"},String(pending)):null),
      link("users","Users"),
      link("analytics","Analytics"),
      link("guide","User Guide"),
      el("button",{class:`mm-nav__link ${state.view==="settings"?"is-active":""}`,
        title:"Settings",style:"display:inline-flex;align-items:center;gap:6px;",
        onclick:()=>state.go("settings")},[el("span",{html:ICONS.gear}),"Settings"])
    ];
  } else {
    nav = [
      link("home","Overview"),
      link("library","Test Library"),
      link("sessions","My Reports"),
      link("guide","User Guide"),
      link("profile","My Profile")
    ];
  }

  // Notification bell (everyone)
  const unread = AuthAccess.unreadCount(user.id);
  const bell = el("button",{class:"mm-bell",title:"Notifications",onclick:()=>state.go("notifications")},[
    el("span",{html:ICONS.bell}),
    unread ? el("span",{class:"mm-bell__badge"}, unread>9?"9+":String(unread)) : null
  ]);

  const initials = user.fullName.split(" ").filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("");
  const cluster = el("div",{class:"mm-user-cluster"},[
    bell,
    el("div",{class:"mm-user-chip"},[
      el("span",{class:"mm-user-chip__name"},user.fullName),
      el("span",{class:`mm-role-pill mm-role-pill--${admin?"admin":"user"}`}, admin?"Admin":"Candidate"),
      el("span",{class:"mm-user-chip__avatar"}, initials || "U")
    ]),
    el("button",{class:"mm-btn mm-btn--ghost mm-btn--mini",title:"Log out",onclick:async()=>{
      const ok = await modal({title:"Log out?",body:"You will need to sign in again to access your tests and reports.",
        actions:[{label:"Cancel",value:false},{label:"Log out",kind:"primary",value:true}]});
      if(ok){ AuthAccess.logout(); toast("Logged out"); state.go("home"); }
    }},"Logout")
  ]);

  return el("header",{class:"mm-topbar"},[
    el("div",{class:"mm-topbar__inner",style:"gap:16px;flex-wrap:wrap;"},[
      el("div",{class:"mm-brand",onclick:()=>state.go("home")},[
        el("div",{class:"mm-brand__mark"},"M"),
        el("div",{class:"mm-brand__text"},[
          el("span",{class:"mm-brand__name"},"Mourad Mekki"),
          el("span",{class:"mm-brand__tag"},"Teacher Toolkit")
        ])
      ]),
      el("nav",{class:"mm-nav"}, nav.filter(Boolean)),
      cluster
    ])
  ]);
}

function renderHome(){
  const _admin = AuthAccess.isAdmin();
  const _user = AuthAccess.currentUser();
  const tests = Library.all();
  // ACCESS LAYER: admins see platform-wide data; users see only their own.
  const sessions = _admin ? Sessions.all() : AuthAccess.getUserScopedSessions();
  const scoredSessions = sessions.filter(s=>s.scored);
  const avgBand = scoredSessions.length ? (scoredSessions.reduce((a,s)=>a+s.scored.overall,0)/scoredSessions.length) : null;
  const recent = [...scoredSessions].sort((a,b)=>new Date(b.completedAt||0)-new Date(a.completedAt||0)).slice(0,4);

  const hero = el("section",{class:"mm-hero"},[
    el("div",{class:"mm-hero__eyebrow"},"IELTS Speaking Assessment Platform"),
    el("h1",{class:"mm-hero__title",html:"Diagnostic assessment<br/>with <em>examiner-grade</em> rigour."}),
    el("p",{class:"mm-hero__sub"},"A complete IELTS Speaking suite — library, recording studio, and descriptor-grounded reports — built by an educator for the classroom and the candidate."),
    el("div",{class:"mm-hero__actions"},[
      el("button",{class:"mm-btn mm-btn--primary mm-btn--large",onclick:()=>state.go("library")},["Browse test library ", el("span",{html:ICONS.arrow})]),
      _admin ? el("button",{class:"mm-btn mm-btn--secondary mm-btn--large",onclick:()=>state.go("builder")},"Create a custom test") : null
    ].filter(Boolean)),
    el("div",{class:"mm-hero__ornament"},"Descriptor-grounded · Examiner-calibrated")
  ]);

  const strip = el("section",{class:"mm-strip"}, _admin ? [
    tile("Tests available",String(tests.length),"full tests + custom"),
    tile("Sessions served",String(scoredSessions.length),scoredSessions.length?"platform lifetime":"awaiting first session"),
    tile("Platform average",avgBand?avgBand.toFixed(1):"—",avgBand?`across ${scoredSessions.length} session${scoredSessions.length!==1?"s":""}`:"no data yet"),
    tile("Active users",String(UserStore.all().filter(u=>!u.disabled).length),"registered accounts")
  ] : [
    tile("Tests available",String(tests.length),"ready to attempt"),
    tile("Your sessions",String(scoredSessions.length),scoredSessions.length?"completed by you":"none yet"),
    tile("Your average band",avgBand?avgBand.toFixed(1):"—",avgBand?`across your ${scoredSessions.length} session${scoredSessions.length!==1?"s":""}`:"no data yet"),
    tile("Latest band",scoredSessions.length?recent[0].scored.overall.toFixed(1):"—",scoredSessions.length?"most recent attempt":"awaiting first session")
  ]);
  function tile(label,value,note){
    return el("div",{class:"mm-strip__tile"},[
      el("div",{class:"mm-strip__label"},label),
      el("div",{class:"mm-strip__value"},value),
      el("div",{class:"mm-strip__note"},note)
    ]);
  }

  let recentBlock = null;
  if(recent.length){
    const rows = recent.map(s=>{
      const test = Library.get(s.testId);
      return el("div",{
        class:"mm-card mm-card--interactive",
        style:"padding:16px 20px;display:flex;align-items:center;gap:20px;",
        onclick:()=>state.go("report",{sessionId:s.id})
      },[
        el("div",{style:"flex:1;min-width:0;"},[
          el("div",{style:"font-family:var(--mm-f-display);font-size:16px;font-weight:500;color:var(--mm-navy-900);"},test?.title || "Archived test"),
          el("div",{style:"font-size:12px;color:var(--mm-fg-tertiary);margin-top:2px;"},
            `${s.studentName || "—"} · ${fmt.rel(s.completedAt)}`)
        ]),
        el("div",{style:"font-family:var(--mm-f-mono);font-size:13px;color:var(--mm-navy-700);font-weight:600;"},`Band ${s.scored.overall.toFixed(1)}`),
        el("span",{style:"font-size:18px;color:var(--mm-ink-300);"},"→")
      ]);
    });
    recentBlock = el("section",{class:"mm-page",style:"padding-top:0;"},[
      el("div",{class:"mm-page__header"},[
        el("div",{class:"mm-page__eyebrow"},"Recent activity"),
        el("h2",{class:"mm-page__title",style:"font-size:28px;"},"Last sessions"),
        el("div",{class:"mm-page__rule"})
      ]),
      el("div",{style:"display:flex;flex-direction:column;gap:12px;"},rows)
    ]);
  }
  // Speaking Tip of the Day — links to the User Guide
  const tipText = SPEAKING_TIPS[Math.floor(Math.random()*SPEAKING_TIPS.length)];
  const tipCard = el("section",{class:"mm-tip-card"},[
    el("div",{class:"mm-tip-card__inner"},[
      el("div",{class:"mm-tip-card__icon",html:ICONS.book}),
      el("div",{class:"mm-tip-card__body"},[
        el("div",{class:"mm-tip-card__label"},"Speaking tip of the day"),
        el("div",{class:"mm-tip-card__text"},tipText)
      ]),
      el("div",{class:"mm-tip-card__link"},
        el("button",{class:"mm-btn mm-btn--secondary mm-btn--mini",onclick:()=>state.go("guide")},"Open User Guide"))
    ])
  ]);

  return el("div",{},[hero, strip, tipCard, recentBlock].filter(Boolean));
}

function printGuide(){
  document.body.classList.add("mm-guide-printing");
  // expand all collapsible panels so nothing is lost in print
  $$(".mm-guide-acc__item").forEach(i=>i.classList.add("is-open"));
  $$(".mm-guide-warm__item").forEach(i=>i.classList.add("is-open"));
  const cleanup = ()=>document.body.classList.remove("mm-guide-printing");
  window.addEventListener("afterprint", function once(){ cleanup(); window.removeEventListener("afterprint", once); });
  setTimeout(()=>{ window.print(); setTimeout(cleanup, 1200); }, 60);
}
