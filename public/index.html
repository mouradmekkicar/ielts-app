const STOPWORDS = new Set(["the","a","an","and","or","but","if","then","so","of","in","on","at","to","for","with","from","by","is","am","are","was","were","be","been","being","have","has","had","do","does","did","will","would","shall","should","may","might","must","can","could","i","you","he","she","it","we","they","my","your","his","her","its","our","their","me","him","them","us","this","that","these","those","what","which","who","whom","whose","when","where","why","how","not","no","yes","all","any","some","any","each","every","very","really","just","also","too","only","even","such","much","more","most","less","least","many","few","several","other","another","both","either","neither","well","there","here","as","than","because","although","while","whereas","since","until","unless","before","after","about","over","under","into","onto","out","off","down","up","yeah","ok","okay","um","uh","er","erm","ah","hmm","like","get","got","go","went","come","came","say","said","make","made"]);

const HESITATION_RE = /\b(uh|um|er|erm|ah|hmm|mhm)\b/gi;
const FILLED_RE = /\b(you know|i mean|sort of|kind of)\b/gi;

const COHESIVE = {
  addition:["moreover","furthermore","in addition","besides","also","as well","what's more"],
  contrast:["however","on the other hand","in contrast","whereas","while","although","even though","nevertheless","nonetheless","that said","having said that"],
  cause:["because","since","as","given that","due to","owing to"],
  effect:["so","therefore","thus","consequently","as a result","which is why","hence"],
  example:["for example","for instance","such as","like","namely","in particular","specifically"],
  sequence:["first","firstly","to begin with","then","next","after that","finally","lastly","in the end"],
  summary:["in summary","to sum up","in conclusion","overall","all in all","on the whole"],
  concession:["admittedly","to be fair","granted","of course","true","naturally"],
  emphasis:["indeed","in fact","actually","clearly","obviously","certainly","undoubtedly"],
  opinion:["i think","i believe","in my view","in my opinion","from my perspective","as i see it","it seems to me"],
  qualification:["in a sense","to some extent","to a degree","in some ways","more or less","broadly speaking"]
};

function tokenize(text){
  return (text||"").toLowerCase().replace(/[^\p{L}\s'-]+/gu," ").split(/\s+/).filter(Boolean);
}
function lemmatize(w){
  // ultra-light stemmer
  if(w.length<4) return w;
  if(w.endsWith("ies")) return w.slice(0,-3)+"y";
  if(w.endsWith("ied")) return w.slice(0,-3)+"y";
  if(w.endsWith("ing") && w.length>5) return w.slice(0,-3);
  if(w.endsWith("ed") && w.length>4) return w.slice(0,-2);
  if(w.endsWith("es") && w.length>4) return w.slice(0,-2);
  if(w.endsWith("s") && !w.endsWith("ss") && w.length>3) return w.slice(0,-1);
  return w;
}
function contentWords(tokens){return tokens.filter(t=>!STOPWORDS.has(t)&&t.length>2);}
function countPhrase(text,phrase){
  const re = new RegExp(`\\b${phrase.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")}\\b`,"gi");
  return (text.match(re)||[]).length;
}

/* ------------------------------------------------------------
   SCORING ANALYZERS
   ------------------------------------------------------------ */
function analyzePart(partMeta, test, partKey){
  const text = partMeta.transcriptionResult.text || "";
  const tokens = tokenize(text);
  const wordCount = tokens.length;
  const speakingMinutes = Math.max(partMeta.speakingTimeMs/60000, 0.001);
  const totalMinutes = Math.max(partMeta.durationMs/60000, 0.001);

  // === FLUENCY ===
  const trueWPM = wordCount / speakingMinutes;
  const wallWPM = wordCount / totalMinutes;
  const hesitations = (text.match(HESITATION_RE)||[]).length + 0.5*(text.match(FILLED_RE)||[]).length;
  const hesitationRate = wordCount ? (hesitations / wordCount) * 100 : 0;
  const selfCorrections = (text.match(/—|--| - /g)||[]).length;
  const selfCorrectionRate = wordCount ? selfCorrections / wordCount : 0;

  // Discourse markers
  let markerCount = 0, categoriesHit = new Set();
  for(const [cat, markers] of Object.entries(COHESIVE)){
    for(const m of markers){
      const c = countPhrase(text, m);
      if(c>0){ markerCount += c; categoriesHit.add(cat); }
    }
  }
  const markerDensity = wordCount ? (markerCount/wordCount)*100 : 0;
  const markerDiversity = categoriesHit.size/11;

  // === LEXICAL ===
  const content = contentWords(tokens).map(lemmatize);
  const uniqueContent = new Set(content);
  const ttr = content.length ? uniqueContent.size/content.length : 0;
  // Moving-average TTR (100-word windows)
  let ttrMA = ttr;
  if(content.length>=100){
    const ttrs = [];
    for(let i=0;i<=content.length-100;i+=50){
      const win = content.slice(i,i+100);
      ttrs.push(new Set(win).size/100);
    }
    ttrMA = mean(ttrs);
  }
  // Advanced word ratio (weighted B2+C1+C2)
  let advScore = 0, rareCount = 0, advItems = [];
  for(const lem of content){
    if(CEFR_LIST.C2.has(lem)){ advScore+=1.5; rareCount++; advItems.push(lem); }
    else if(CEFR_LIST.C1.has(lem)){ advScore+=1.0; rareCount++; advItems.push(lem); }
    else if(CEFR_LIST.B2.has(lem)){ advScore+=0.5; advItems.push(lem); }
  }
  const advancedWordRatio = content.length ? advScore/content.length : 0;
  const rareWordProportion = content.length ? rareCount/content.length : 0;
  // Repetition
  const freq = new Map();
  for(const w of content) freq.set(w, (freq.get(w)||0)+1);
  const sortedFreq = [...freq.values()].sort((a,b)=>b-a);
  const top10Sum = sortedFreq.slice(0,10).reduce((a,b)=>a+b,0);
  const lexicalRepetition = content.length ? top10Sum/content.length : 0;

  // === GRAMMAR ===
  // Simple sentence segmentation
  const sentences = text.split(/[.!?]+/).map(s=>s.trim()).filter(s=>s.length>2);
  const avgSentLen = sentences.length ? mean(sentences.map(s=>tokenize(s).length)) : 0;
  const sentLenVariance = std(sentences.map(s=>tokenize(s).length));
  // Subordination: count subordinating conjunctions + relative pronouns
  const SUB_RE = /\b(because|although|though|whereas|while|since|if|unless|when|whenever|where|which|who|whom|whose|that|even though|provided that|given that|so that|in order to)\b/gi;
  const subCount = (text.match(SUB_RE)||[]).length;
  const subordinationRatio = sentences.length ? subCount/sentences.length : 0;
  // Complex sentence ratio
  let complexCount = 0;
  for(const s of sentences){
    if(SUB_RE.test(s)) complexCount++;
    SUB_RE.lastIndex = 0;
  }
  const complexSentenceRatio = sentences.length ? complexCount/sentences.length : 0;
  // Tense variety (coarse detection)
  const tenseFlags = {
    past: /\b(was|were|did|had|went|came|saw|said|thought|used to)\b/i.test(text),
    pastCont: /\b(was|were)\s+\w+ing\b/i.test(text),
    pastPerf: /\bhad\s+\w+(ed|en)\b/i.test(text),
    present: /\b(am|is|are|do|does|have|has|go|goes|think|believe)\b/i.test(text),
    presentCont: /\b(am|is|are)\s+\w+ing\b/i.test(text),
    presentPerf: /\b(have|has)\s+\w+(ed|en)\b/i.test(text),
    future: /\b(will|going to|shall|'ll)\b/i.test(text)
  };
  const tenseVariety = Object.values(tenseFlags).filter(Boolean).length/7;
  // Conditionals
  const cond0 = /\bif\s+\w+\s+\w+s\b/i.test(text);
  const cond1 = /\bif\s+[\w\s]{3,20}\s+(will|won't|'ll)\b/i.test(text);
  const cond2 = /\bif\s+[\w\s]{3,20}\s+(were|was)\b[^.!?]*\b(would|could|might)\b/i.test(text);
  const cond3 = /\bif\s+[\w\s]{3,20}\s+had\s+\w+/i.test(text);
  const conditionalVariety = [cond0,cond1,cond2,cond3].filter(Boolean).length/4;
  // Error detection (precision-first)
  const errors = [];
  const svaMatches = text.match(/\b(he|she|it)\s+(don't|have(?!\s+(to|been|had))|was\s+\w+ing\s+and\s+\w+)\b/gi)||[];
  for(const m of svaMatches) errors.push({type:"sva",text:m});
  const artMatches = text.match(/\b(have|has|bought|want|wanted|need|needed)\s+(car|book|phone|job|house|problem|question|idea)\b/gi)||[];
  for(const m of artMatches) errors.push({type:"article",text:m});
  const prepMatches = text.match(/\b(discuss about|depend in|different than|married with)\b/gi)||[];
  for(const m of prepMatches) errors.push({type:"preposition",text:m});
  const errorDensity = wordCount ? (errors.length/wordCount)*100 : 0;

  // Structural range index
  const structuralRangeIndex =
    0.25*clamp01(complexSentenceRatio/0.5) +
    0.20*clamp01(subordinationRatio/0.4) +
    0.20*clamp01(tenseVariety) +
    0.20*clamp01(conditionalVariety) +
    0.15*clamp01(sentLenVariance/8);

  // === PRONUNCIATION (transcript + audio proxies) ===
  const avgTranscriptConfidence = partMeta.transcriptionResult.confidence||0;
  const segments = partMeta.transcriptionResult.segments||[];
  const lowConfSegs = segments.filter(s=>s.confidence<0.6).length;
  const lowConfidenceWordRate = segments.length ? lowConfSegs/segments.length : 0;

  // === TOPIC RELEVANCE ===
  // For part1/part3 we use all questions' anchors; for part2 the cue card.
  let relevanceScore = 1.0;
  let missedAnchors = [];
  if(partKey==="part2" && test.part2?.cueCard){
    const cueText = [test.part2.cueCard.topic,...test.part2.cueCard.bullets].join(" ");
    const cueAnchors = [...new Set(contentWords(tokenize(cueText)).map(lemmatize))];
    const respLems = new Set(content);
    const hits = cueAnchors.filter(a=>respLems.has(a) || [...respLems].some(r=>r.startsWith(a.slice(0,4))));
    relevanceScore = cueAnchors.length ? hits.length/cueAnchors.length : 1;
    missedAnchors = cueAnchors.filter(a=>!hits.includes(a));
  } else {
    const qs = partKey==="part1"
      ? (test.part1?.topics||[]).flatMap(t=>t.questions)
      : (test.part3?.questions||[]);
    if(qs.length){
      const allAnchors = new Set();
      for(const obj of qs){
        const qt = tokenize(obj.q||"");
        for(const w of contentWords(qt).map(lemmatize)) allAnchors.add(w);
      }
      const respLems = new Set(content);
      const hits = [...allAnchors].filter(a=>respLems.has(a));
      relevanceScore = allAnchors.size ? hits.length/allAnchors.size : 1;
    }
  }

  return {
    partKey,
    metrics:{
      wordCount,speakingMs:partMeta.speakingTimeMs,durationMs:partMeta.durationMs,
      trueWPM,wallWPM,
      hesitationRate,selfCorrectionRate,
      markerDensity,markerDiversity,categoriesHit:[...categoriesHit],
      typeTokenRatio:ttr,typeTokenRatioMA:ttrMA,
      advancedWordRatio,rareWordProportion,advancedItems:advItems.slice(0,12),
      lexicalRepetition,
      avgSentenceLength:avgSentLen,sentenceLengthVariance:sentLenVariance,
      subordinationRatio,complexSentenceRatio,tenseVariety,conditionalVariety,
      structuralRangeIndex,
      errorDensity,errors:errors.slice(0,8),
      avgTranscriptConfidence,lowConfidenceWordRate,
      relevanceScore,missedAnchors:missedAnchors.slice(0,5),
      speechRatio:partMeta.speechRatio,
      longestSilenceMs:partMeta.longestSilenceMs,
      avgSilenceBlockMs:partMeta.avgSilenceBlockMs,
      micQualityScore:partMeta.micQualityScore
    }
  };
}

/* Band mapping — Phase 5.5 descriptor anchor logic, condensed */
function bandForFluency(m, timePressure){
  // trueWPM with time-pressure shift
  const shift = timePressure==="low"?-10 : timePressure==="high"?10 : 0;
  const wpm = m.trueWPM;
  let bWPM;
  if(wpm < 80+shift) bWPM = 4.0;
  else if(wpm < 100+shift) bWPM = 5.0;
  else if(wpm < 120+shift) bWPM = 5.5;
  else if(wpm < 140+shift) bWPM = 6.5;
  else if(wpm < 160+shift) bWPM = 7.0;
  else if(wpm < 180+shift) bWPM = 7.5;
  else if(wpm < 200+shift) bWPM = 8.0;
  else bWPM = 7.5;

  let bRatio;
  const r = m.speechRatio;
  if(r < 0.40) bRatio = 4.5;
  else if(r < 0.55) bRatio = 5.5;
  else if(r < 0.70) bRatio = 6.5;
  else if(r < 0.85) bRatio = 7.5;
  else if(r <= 0.95) bRatio = 8.0;
  else bRatio = 7.0;

  let bSilence;
  const ls = m.longestSilenceMs;
  if(ls < 1200) bSilence = 8.5;
  else if(ls < 2000) bSilence = 7.5;
  else if(ls < 3000) bSilence = 6.5;
  else if(ls < 5000) bSilence = 5.5;
  else bSilence = 4.5;

  let bHes;
  const h = m.hesitationRate;
  if(h < 1.5) bHes = 8.0;
  else if(h < 3.0) bHes = 7.0;
  else if(h < 5.0) bHes = 6.0;
  else if(h < 8.0) bHes = 5.0;
  else bHes = 4.0;

  let bDisc;
  const d = m.markerDensity;
  if(d < 1.0) bDisc = 5.0;
  else if(d < 2.0) bDisc = 6.0;
  else if(d < 3.5) bDisc = 7.0;
  else if(d <= 5.0) bDisc = 8.0;
  else bDisc = 7.0;

  const raw = bWPM*0.30 + bRatio*0.22 + bSilence*0.16 + bHes*0.18 + bDisc*0.14;
  return roundHalf(raw);
}
function bandForLexical(m, hasModel){
  let bTTR;
  const t = m.typeTokenRatioMA;
  if(t < 0.40) bTTR = 5.0;
  else if(t < 0.50) bTTR = 6.0;
  else if(t < 0.60) bTTR = 6.5;
  else if(t < 0.70) bTTR = 7.5;
  else bTTR = 8.0;

  let bAdv;
  const a = m.advancedWordRatio;
  if(a < 0.01) bAdv = 4.5;
  else if(a < 0.03) bAdv = 5.5;
  else if(a < 0.07) bAdv = 6.5;
  else if(a < 0.12) bAdv = 7.0;
  else if(a < 0.18) bAdv = 8.0;
  else bAdv = 8.5;

  let bRare;
  const r = m.rareWordProportion;
  if(r < 0.02) bRare = 5.0;
  else if(r < 0.05) bRare = 6.0;
  else if(r < 0.10) bRare = 7.0;
  else if(r < 0.15) bRare = 7.5;
  else bRare = 8.0;

  const raw = bTTR*0.35 + bAdv*0.40 + bRare*0.25;
  // Repetition penalty
  let penalty = 0;
  const lr = m.lexicalRepetition;
  if(lr > 0.35) penalty += 0.5;
  if(lr > 0.45) penalty += 0.5;
  if(lr > 0.55) penalty += 0.5;

  return {band:roundHalf(Math.max(4.0, raw - penalty)), rawPreRepetition:roundHalf(raw), penalty};
}
function bandForGrammar(m){
  // Range
  let bRange;
  const sri = m.structuralRangeIndex;
  if(sri < 0.28) bRange = 5.0;
  else if(sri < 0.42) bRange = 6.0;
  else if(sri < 0.58) bRange = 6.5;
  else if(sri < 0.72) bRange = 7.5;
  else bRange = 8.0;

  // Accuracy
  let bAcc;
  const ed = m.errorDensity;
  if(ed < 1.0) bAcc = 8.0;
  else if(ed < 2.0) bAcc = 7.0;
  else if(ed < 4.0) bAcc = 6.0;
  else if(ed < 7.0) bAcc = 5.0;
  else bAcc = 4.0;

  const gap = Math.abs(bRange - bAcc);
  let combined;
  if(gap >= 2.0){
    combined = Math.min(bRange, bAcc) + 0.5;
  } else {
    combined = 0.45*bRange + 0.55*bAcc;
  }
  return {band:roundHalf(combined), range:bRange, accuracy:bAcc};
}
function bandForPronunciation(m){
  let bConf;
  const c = m.avgTranscriptConfidence;
  if(c >= 0.92) bConf = 7.5;
  else if(c >= 0.88) bConf = 7.0;
  else if(c >= 0.82) bConf = 6.0;
  else if(c >= 0.75) bConf = 5.0;
  else bConf = 4.5;

  let bLow;
  const l = m.lowConfidenceWordRate;
  if(l < 0.03) bLow = 7.5;
  else if(l < 0.08) bLow = 7.0;
  else if(l < 0.15) bLow = 6.0;
  else if(l < 0.25) bLow = 5.0;
  else bLow = 4.0;

  let raw = 0.55*bConf + 0.45*bLow;
  // Mic quality gate
  if(m.micQualityScore < 45){
    return {band:null, verdict:"provisional", rangeLo:5.0, rangeHi:7.0, caveat:"Microphone quality insufficient for confident pronunciation assessment."};
  }
  // Cap at 7.0 without phoneme model
  raw = Math.min(raw, 7.0);
  return {band:roundHalf(raw), verdict:"scored", capped:true, caveat:"Pronunciation assessment based on transcript confidence and acoustic signal only; bands above 7.0 require dedicated phoneme analysis."};
}

/* Short-response penalty */
function shortResponsePenalty(metrics, partKey){
  const EXP = {
    part1:{min:140,severe:80},
    part2:{min:120,severe:60},
    part3:{min:150,severe:90}
  }[partKey];
  const w = metrics.wordCount;
  if(w < 15) return {level:"no_response", penalty:null};
  if(partKey==="part2"){
    const sp = metrics.speakingMs;
    if(sp < 45000) return {level:"severe", penalty:-2.0};
    if(sp < 75000) return {level:"significant", penalty:-1.0};
    if(sp < 105000) return {level:"minor", penalty:-0.5};
  }
  if(w < EXP.severe) return {level:"severe", penalty:-1.5};
  if(w < EXP.min) return {level:"moderate", penalty:-0.5};
  return {level:"adequate", penalty:0};
}

/* Topic relevance penalty — Phase 5.75 spec thresholds */
function relevancePenalty(score){
  if(score >= 0.55) return 0;
  if(score >= 0.40) return -0.5;
  if(score >= 0.20) return -1.0;
  return -2.0;
}


/* ------------------------------------------------------------
   SCORING ENGINE — aggregate + feedback
   ------------------------------------------------------------ */
const PART_WEIGHTS = {part1:0.25, part2:0.35, part3:0.40};
const DIFFICULTY_MOD = {foundation:0.90, standard:1.00, challenging:1.15};
const PART3_ABSTRACT = 1.08;

function ScoringEngine_analyze(session){
  const test = session.test;
  const parts = ["part1","part2","part3"];
  const analyzed = {};
  for(const k of parts){
    if(session.parts[k]){
      analyzed[k] = analyzePart(session.parts[k], test, k);
    }
  }

  // Per-part criterion bands
  const partBands = {};
  const partPenalties = {};
  const relFindings = {};
  for(const k of parts){
    if(!analyzed[k]){ partBands[k]=null; continue; }
    const m = analyzed[k].metrics;
    const fBand = bandForFluency(m, test.timePressure);
    const lResult = bandForLexical(m, !!test.modelResponses);
    const gResult = bandForGrammar(m);
    const pResult = bandForPronunciation(m);

    // Short response penalty applies to all criteria for this part
    const srp = shortResponsePenalty(m, k);
    partPenalties[k] = srp;
    const srPen = srp.penalty || 0;

    // Topic relevance penalty (affects F&C only)
    const relPen = relevancePenalty(m.relevanceScore);
    relFindings[k] = {score:m.relevanceScore, penalty:relPen, missedAnchors:m.missedAnchors};

    partBands[k] = {
      fluencyCoherence: fBand !== null ? Math.max(4.0, fBand + srPen + relPen) : null,
      lexical: lResult.band !== null ? Math.max(4.0, lResult.band + srPen) : null,
      grammar: gResult.band !== null ? Math.max(4.0, gResult.band + srPen) : null,
      pronunciation: pResult.band !== null ? Math.max(4.0, pResult.band + srPen) : null,
      _lexicalInner: lResult,
      _grammarInner: gResult,
      _pronInner: pResult,
      _raw: {fluencyCoherence:fBand, lexical:lResult.band, grammar:gResult.band, pronunciation:pResult.band}
    };
  }

  // Cross-part aggregation with weights + difficulty mod + Part 3 abstract multiplier
  function aggregate(criterion){
    let sum = 0, wsum = 0;
    for(const k of parts){
      if(!partBands[k] || partBands[k][criterion] == null) continue;
      const base = PART_WEIGHTS[k];
      const diff = DIFFICULTY_MOD[test.partDifficulty?.[k] || test.difficulty] || 1.0;
      const abstractMod = (k === "part3" && (analyzed[k]?.metrics.wordCount||0) >= 50) ? PART3_ABSTRACT : 1.0;
      const w = base * diff * abstractMod;
      sum += partBands[k][criterion] * w;
      wsum += w;
    }
    return wsum ? roundHalf(sum/wsum) : null;
  }

  const criteria = {
    fluencyCoherence: aggregate("fluencyCoherence"),
    lexical: aggregate("lexical"),
    grammar: aggregate("grammar"),
    pronunciation: aggregate("pronunciation")
  };

  // Pronunciation provisional detection
  const anyProvisional = parts.some(k => partBands[k]?._pronInner?.verdict==="provisional");
  const pronVerdict = anyProvisional ? "provisional" : "scored";

  // Overall — IELTS rounding
  const scoredArr = [criteria.fluencyCoherence, criteria.lexical, criteria.grammar, criteria.pronunciation]
    .filter(v=>v!=null);
  const rawMean = scoredArr.length ? mean(scoredArr) : 0;
  let overall = roundHalf(rawMean);

  // Band Ceiling Limiter — min(criteria) + 1.0
  const minCriterion = scoredArr.length ? Math.min(...scoredArr) : null;
  let ceilingApplied = false;
  if(minCriterion != null && overall > minCriterion + 1.0){
    overall = minCriterion + 1.0;
    ceilingApplied = true;
  }

  // CEFR
  const cefr = mapCEFR(overall);

  // Expected band reconciliation
  const expectedRange = test.expectedBandRange || {min:5.0,max:7.5};
  let reconciliation;
  if(overall < expectedRange.min) reconciliation = {state:"below", label:`below expected range (${expectedRange.min}–${expectedRange.max})`, tone:"warning"};
  else if(overall > expectedRange.max) reconciliation = {state:"above", label:`above expected range (${expectedRange.min}–${expectedRange.max})`, tone:"success"};
  else reconciliation = {state:"within", label:`within expected range (${expectedRange.min}–${expectedRange.max})`, tone:"neutral"};

  // Confidence Index
  const totalSpeakingMs = parts.reduce((a,k)=>a+(session.parts[k]?.speakingTimeMs||0), 0);
  const durationCoverage = clamp01(totalSpeakingMs/360000);
  const transcriptConfs = parts.map(k=>session.parts[k]?.transcriptionResult?.confidence||0).filter(x=>x>0);
  const transcriptStabilities = parts.map(k=>session.parts[k]?.transcriptionResult?.stability||0.5);
  const providerConf = transcriptConfs.length ? mean(transcriptConfs) : 0.5;
  const transcriptQuality = 0.6*providerConf + 0.4*mean(transcriptStabilities);
  const consistencyRaw = scoredArr.length>1 ? 1 - Math.min(std(scoredArr)/1.5, 1) : 0.5;
  const tpTol = test.timePressure==="low"?-0.1 : test.timePressure==="high"?0.1 : 0;
  const consistency = clamp01(consistencyRaw + tpTol);
  const micQualities = parts.map(k=>session.parts[k]?.micQualityScore||60);
  const audioIntegrity = mean(micQualities)/100;
  let confScore = 0.35*durationCoverage + 0.30*transcriptQuality + 0.20*consistency + 0.15*audioIntegrity;
  // Short response cap
  const anySevere = Object.values(partPenalties).some(p=>p.level==="severe"||p.level==="no_response");
  const anyLowSpeech = parts.some(k=>session.parts[k]?.speechRatio < 0.30);
  if(anySevere || anyLowSpeech) confScore = Math.min(confScore, 0.55);
  else if(Object.values(partPenalties).some(p=>p.level==="moderate"||p.level==="minor")) confScore = Math.min(confScore, 0.79);
  confScore = clamp01(confScore);
  const confTier = confScore >= 0.80 ? "high" : confScore >= 0.55 ? "medium" : "low";

  // Feedback — four-move Performance Summary + criterion analyses
  const feedback = generateFeedback(session, criteria, overall, analyzed, partBands, partPenalties, relFindings);
  const recommendations = generateRecommendations(criteria, overall, analyzed, partBands, partPenalties, relFindings, test);

  // Attempt resolution
  const prior = Sessions.forStudent(session.studentName, session.testId).filter(s=>s.id!==session.id && s.scored);
  const prev = prior.length ? prior[prior.length-1] : null;
  const attempt = {
    attemptNumber: prior.length + 1,
    previousBand: prev?.scored?.overall ?? null,
    deltaScore: prev?.scored?.overall != null ? +(overall - prev.scored.overall).toFixed(1) : null
  };

  return {
    engineVersion:"5.75.0",
    computedAt:new Date().toISOString(),
    criteria,
    pronunciationVerdict: pronVerdict,
    overall,
    rawMean: +rawMean.toFixed(2),
    ceilingApplied,
    ceilingReason: ceilingApplied ? `Overall limited to min(criteria) + 1.0 due to a ${(rawMean-overall).toFixed(1)}-band gap at the lowest criterion` : null,
    cefr,
    reconciliation,
    partBands,
    partPenalties,
    relFindings,
    analyzed,
    confidence:{
      score:+confScore.toFixed(2),
      tier:confTier,
      components:{
        durationCoverage:+durationCoverage.toFixed(2),
        transcriptQuality:+transcriptQuality.toFixed(2),
        consistency:+consistency.toFixed(2),
        audioIntegrity:+audioIntegrity.toFixed(2)
      },
      evidence: buildConfidenceEvidence(totalSpeakingMs, providerConf, confTier, partPenalties, relFindings)
    },
    feedback,
    recommendations,
    attempt,
    expectedBandRange: expectedRange
  };
}

function mapCEFR(band){
  if(band >= 8.5) return {level:"C2", label:"Proficient"};
  if(band >= 7.5) return {level:"C1", label:"Advanced"};
  if(band >= 6.5) return {level:"B2", label:"Upper-Intermediate"};
  if(band >= 5.0) return {level:"B1", label:"Intermediate"};
  if(band >= 4.0) return {level:"A2", label:"Elementary"};
  return {level:"A1", label:"Beginner"};
}

function buildConfidenceEvidence(speakingMs, providerConf, tier, partPenalties, relFindings){
  const minutes = Math.floor(speakingMs/60000);
  const seconds = Math.floor((speakingMs%60000)/1000);
  const timeStr = `${minutes} minute${minutes!==1?"s":""} ${seconds} seconds`;
  const qualityWord = providerConf > 0.88 ? "high" : providerConf > 0.78 ? "good" : providerConf > 0.65 ? "moderate" : "variable";
  const parts = [`Based on ${timeStr} of speech`, `${qualityWord} transcript quality`];
  const shorts = Object.entries(partPenalties).filter(([_,p])=>p.level!=="adequate"&&p.level!=="no_response");
  if(shorts.length) parts.push(`shortened response${shorts.length>1?"s":""} in ${shorts.map(([k])=>k.replace("part","Part ")).join(", ")}`);
  const drifts = Object.entries(relFindings).filter(([_,f])=>f.penalty<0);
  if(drifts.length) parts.push(`topic-drift signals in ${drifts.map(([k])=>k.replace("part","Part ")).join(", ")}`);
  return parts.join(", ") + ".";
}

function generateFeedback(session, crit, overall, analyzed, partBands, partPenalties, relFindings){
  // Strongest / weakest criteria
  const entries = [
    ["Fluency and Coherence", crit.fluencyCoherence, "fluencyCoherence"],
    ["Lexical Resource", crit.lexical, "lexical"],
    ["Grammatical Range and Accuracy", crit.grammar, "grammar"],
    ["Pronunciation", crit.pronunciation, "pronunciation"]
  ].filter(e=>e[1]!=null);
  const sorted = [...entries].sort((a,b)=>b[1]-a[1]);
  const strongest = sorted[0];
  const weakest = sorted[sorted.length-1];

  // Command level phrase
  const cmd = overall >= 8 ? "a very good" : overall >= 7 ? "a good" : overall >= 6 ? "a competent" : overall >= 5 ? "a modest" : "a limited";
  const disc = overall >= 8 ? "sustaining extended discourse with ease"
            : overall >= 7 ? "sustaining conversation with reasonable flexibility"
            : overall >= 6 ? "sustaining conversation across familiar and moderately abstract topics"
            : overall >= 5 ? "holding conversation at a basic level"
            : "managing short exchanges";

  // Evidence samples
  const allAdvItems = [];
  for(const k of ["part1","part2","part3"]){
    if(analyzed[k]) allAdvItems.push(...(analyzed[k].metrics.advancedItems||[]));
  }
  const advShow = [...new Set(allAdvItems)].slice(0,3);

  // Strongest-specific phrase
  const strongPhrase = {
    fluencyCoherence: "with sustained delivery and clear discourse organisation",
    lexical: advShow.length ? `with controlled use of topic-specific vocabulary and items such as ${advShow.map(w=>`'${w}'`).join(", ")}` : "with a working vocabulary adequate for the topic range",
    grammar: "with an ability to produce complex structures under extended discourse",
    pronunciation: "with intelligible delivery and consistent transcription confidence"
  }[strongest[2]];

  // Weakest-specific phrase
  const grammarErrs = [];
  for(const k of ["part1","part2","part3"]){
    if(analyzed[k]?.metrics.errors) grammarErrs.push(...analyzed[k].metrics.errors);
  }
  const topErrType = {};
  for(const e of grammarErrs) topErrType[e.type] = (topErrType[e.type]||0)+1;
  const dominantErr = Object.entries(topErrType).sort((a,b)=>b[1]-a[1])[0];
  const weakPhrase = {
    fluencyCoherence: "with noticeable hesitation and limited range of cohesive devices",
    lexical: "with reliance on high-frequency vocabulary and limited paraphrase",
    grammar: dominantErr ? `with recurrent ${dominantErr[0]==="sva"?"subject-verb agreement":dominantErr[0]==="article"?"article omission":dominantErr[0]==="preposition"?"preposition choice":"structural"} errors under extended discourse` : "with structural errors that persist under extended discourse",
    pronunciation: "with reduced transcription confidence across several segments"
  }[weakest[2]];

  // Four-move summary
  const lowerBand = Math.floor(overall);
  const upperBand = Math.ceil(overall);
  const strengthCrit = strongest[0].toLowerCase();
  const weakCrit = weakest[0].toLowerCase();
  const summary = [
    `The candidate demonstrates ${cmd} command of spoken English, ${disc} with reasonable effectiveness.`,
    `${strongest[0]} is a particular strength, ${strongPhrase}.`,
    `${weakest[0]}, by contrast, remains the principal constraint, ${weakPhrase}.`,
    `Taken together, these patterns place the performance at Band ${overall.toFixed(1)} — above the Band ${Math.max(4, overall-0.5).toFixed(1)} threshold on ${strongest[0].toLowerCase().split(" and ")[0]}, but held below Band ${Math.min(9, overall+0.5).toFixed(1)} by ${weakest[0].toLowerCase().split(" and ")[0]} under extended discourse.`
  ];

  // Detailed per-criterion analyses
  const totalWords = ["part1","part2","part3"].reduce((a,k)=>a+(analyzed[k]?.metrics.wordCount||0),0);
  const avgWPM = ["part1","part2","part3"]
    .map(k=>analyzed[k]?.metrics.trueWPM||0).filter(x=>x>0);
  const avgTTRMA = mean(["part1","part2","part3"].map(k=>analyzed[k]?.metrics.typeTokenRatioMA||0).filter(x=>x>0));
  const avgAdvRatio = mean(["part1","part2","part3"].map(k=>analyzed[k]?.metrics.advancedWordRatio||0));
  const avgErrDens = mean(["part1","part2","part3"].map(k=>analyzed[k]?.metrics.errorDensity||0));
  const avgSub = mean(["part1","part2","part3"].map(k=>analyzed[k]?.metrics.subordinationRatio||0));
  const avgConf = mean(["part1","part2","part3"].map(k=>analyzed[k]?.metrics.avgTranscriptConfidence||0).filter(x=>x>0));

  const details = {
    fluencyCoherence: `Speech rate averaged ${Math.round(mean(avgWPM))} words per minute when actively speaking. ` +
      `Discourse markers spanned ${Math.max(...Object.values(analyzed).map(a=>a.metrics.categoriesHit?.length||0))} of 11 cohesive categories across the session. ` +
      (partPenalties.part2?.penalty < 0 ? `Part 2 was delivered in under ${Math.round((session.parts.part2?.speakingTimeMs||0)/1000)} seconds, which limited the long-turn signal. ` : "") +
      `Placed at Band ${crit.fluencyCoherence?.toFixed(1) || "—"}.`,
    lexical: `Type-token ratio over a moving window was ${avgTTRMA.toFixed(2)}, with an advanced-word ratio of ${avgAdvRatio.toFixed(3)}` +
      (advShow.length ? ` including items such as ${advShow.map(w=>`'${w}'`).join(", ")}` : "") + `. ` +
      (partBands.part1?._lexicalInner?.penalty > 0 ? `Repetition patterns contributed a −${partBands.part1._lexicalInner.penalty.toFixed(1)} adjustment. ` : "") +
      `Placed at Band ${crit.lexical?.toFixed(1) || "—"}.`,
    grammar: `Error density of ${avgErrDens.toFixed(1)} per 100 words ` +
      (dominantErr ? `was concentrated in ${dominantErr[0]==="sva"?"subject-verb agreement":dominantErr[0]==="article"?"article usage":"preposition choice"} (${dominantErr[1]} instances). ` : `was distributed across multiple categories. `) +
      `Subordination ratio of ${avgSub.toFixed(2)} indicates ${avgSub>0.25?"good":avgSub>0.16?"moderate":"limited"} structural variety. ` +
      `Placed at Band ${crit.grammar?.toFixed(1) || "—"}.`,
    pronunciation: `Average transcription confidence was ${avgConf.toFixed(2)}. ` +
      (crit.pronunciation === null ? `Microphone quality was insufficient for a confident pronunciation band — a provisional assessment is provided in the range 5.0–7.0. ` :
       crit.pronunciation >= 7.0 ? `At this score level, phoneme-level analysis would be required to resolve bands above 7.0. ` :
       ``) +
      `Placed at Band ${crit.pronunciation?.toFixed(1) || "provisional"}.`
  };

  return {performanceSummary: summary, detailedAnalysis: details};
}

function generateRecommendations(crit, overall, analyzed, partBands, partPenalties, relFindings, test){
  const immediate = [], shortTerm = [], targetBand = [];

  // Collect signals
  const allErrs = [];
  for(const k of ["part1","part2","part3"]){
    if(analyzed[k]?.metrics.errors) allErrs.push(...analyzed[k].metrics.errors);
  }
  const errsByType = {};
  for(const e of allErrs) errsByType[e.type] = (errsByType[e.type]||0)+1;
  const topErrs = Object.entries(errsByType).sort((a,b)=>b[1]-a[1]).slice(0,2);

  // IMMEDIATE — top 2 high-frequency errors
  if(topErrs.length){
    for(const [type,count] of topErrs){
      if(type==="sva"){
        immediate.push({
          title:"Strengthen subject-verb agreement under complex subjects",
          body:`${count} instances detected in the session. Before a finite verb, briefly check whether the subject is singular or plural — especially with words like 'people', 'everyone', or complex noun phrases.`,
          descriptorGap:"Grammar Band 7: 'frequently produces error-free sentences'"
        });
      } else if(type==="article"){
        immediate.push({
          title:"Practice article placement before singular countable nouns",
          body:`${count} instances where articles were omitted before singular nouns. Quick mental check: countable + singular → 'a', 'an', or 'the' is required.`,
          descriptorGap:"Grammar Band 7: 'frequently produces error-free sentences'"
        });
      } else if(type==="preposition"){
        immediate.push({
          title:"Refine prepositional collocations",
          body:`${count} preposition errors detected (e.g., 'discuss about', 'depend in'). Build a personal list of verb+preposition collocations you use frequently.`,
          descriptorGap:"Grammar Band 7: 'some grammatical mistakes persist'"
        });
      }
    }
  }
  // Short response in Part 2
  if(partPenalties.part2?.penalty < 0){
    immediate.push({
      title:"Use the full Part 2 long turn",
      body:`Part 2 was delivered in under the 2-minute expectation. IELTS examiners do not interrupt until 2 minutes; a 30/60/30 plan during the 60-second prep (context → development → closing reflection) helps fill the time.`,
      descriptorGap:"Fluency Band 7: 'speaks at length without noticeable effort'"
    });
  }
  // Topic drift
  const driftedParts = Object.entries(relFindings).filter(([_,f])=>f.penalty<0);
  if(driftedParts.length){
    immediate.push({
      title:"Address the specific question asked",
      body:`${driftedParts.length} part(s) showed responses that drifted from the prompt. Listen for the key noun and verb in each question — a Band 7 answer engages those specific terms before elaborating.`,
      descriptorGap:"Coherence Band 7: 'develops topics coherently and appropriately'"
    });
  }

  // SHORT-TERM — weakest criterion gap
  const entries = [
    ["fluencyCoherence", crit.fluencyCoherence],
    ["lexical", crit.lexical],
    ["grammar", crit.grammar],
    ["pronunciation", crit.pronunciation]
  ].filter(e=>e[1]!=null).sort((a,b)=>a[1]-b[1]);
  const weakest = entries[0];
  if(weakest){
    const [crit_, band_] = weakest;
    if(crit_==="grammar"){
      const avgSub = mean(["part1","part2","part3"].map(k=>analyzed[k]?.metrics.subordinationRatio||0));
      if(avgSub < 0.25){
        shortTerm.push({
          title:"Build subordinate clause variety",
          body:`Subordination ratio averaged ${avgSub.toFixed(2)} — below the 0.25+ threshold for Band 7. Practice incorporating 'although', 'whereas', or 'given that' clauses into extended responses.`,
          descriptorGap:"Grammar Range Band 7: 'uses a range of complex structures with some flexibility'"
        });
      }
    } else if(crit_==="lexical"){
      shortTerm.push({
        title:"Expand advanced-vocabulary bank",
        body:"Build a bank of 20–30 B2/C1 items across common IELTS domains (environment, technology, education). Use flashcards with a worked example sentence per item. Deploy two to three per Part 3 response.",
        descriptorGap:"Lexical Band 7: 'uses some less common and idiomatic vocabulary'"
      });
    } else if(crit_==="fluencyCoherence"){
      shortTerm.push({
        title:"Expand cohesive device range",
        body:"Work beyond 'and', 'but', 'so'. Practice each week with one category — concession ('admittedly', 'to be fair'), contrast ('whereas', 'that said'), cause-effect ('which is why', 'as a result').",
        descriptorGap:"Coherence Band 7: 'uses a range of connectives and discourse markers with some flexibility'"
      });
    } else if(crit_==="pronunciation"){
      shortTerm.push({
        title:"Improve recording conditions",
        body:"Current pronunciation assessment is limited by audio quality. Record in a quieter room, with the microphone 10-15 cm from your mouth. This alone will lift the provisional ceiling.",
        descriptorGap:"Pronunciation Band 7: 'generally easy to understand'"
      });
    }
  }
  // Part 2 structure
  if(!shortTerm.length || driftedParts.length){
    shortTerm.push({
      title:"Adopt a Part 2 structure template",
      body:"Every Part 2 response should have three visible parts: a one-sentence framing (15s), development of the four bullets (75s), and a short closing reflection (30s). Practice this shape until it becomes automatic.",
      descriptorGap:"Coherence Band 7: 'develops topics coherently and appropriately'"
    });
  }

  // TARGET BAND — reach expected max + 0.5
  const target = test.expectedBandRange?.max || 7.5;
  const gap = target - overall;
  if(gap > 0){
    targetBand.push({
      title:"Adopt concession-then-claim structures",
      body:`Band 7.5+ responses in IELTS Part 3 reliably use a concession before the main claim ('that said', 'to some extent, but...'). Practice: every Part 3 answer should contain at least one concession before the core opinion.`,
      descriptorGap:`Coherence Band ${(target+0.5).toFixed(1)}: 'develops topics fully and coherently'`
    });
    targetBand.push({
      title:"Move from description to evaluation",
      body:"Describing an example is Band 6 behaviour. Evaluating its significance is Band 7.5+. Follow every example with a sentence that weighs it — 'what that tells us is...', 'the important point here is...'.",
      descriptorGap:"Multiple criteria — Band 7.5+"
    });
  } else {
    targetBand.push({
      title:"Consider a more demanding test",
      body:`Performance exceeds this test's expected range. Attempt a Challenging-tier test (e.g., 'The Natural World Around Us' or 'Success, Work, and Ambition') to locate the candidate's true ceiling.`,
      descriptorGap:"Stretch assessment recommended"
    });
  }

  return {
    immediate:immediate.slice(0,3),
    shortTerm:shortTerm.slice(0,3),
    targetBand:targetBand.slice(0,3)
  };
}

function bandTierColor(band){
  if(band === null || band === undefined) return "var(--mm-ink-500)";
  if(band >= 9) return "var(--mm-band-expert)";
  if(band >= 8) return "var(--mm-band-very-good)";
  if(band >= 7) return "var(--mm-band-good)";
  if(band >= 6) return "var(--mm-band-competent)";
  if(band >= 5) return "var(--mm-band-modest)";
  if(band >= 4) return "var(--mm-band-limited)";
  return "var(--mm-band-below)";
}

function toast(msg){
  const t = el("div",{class:"mm-toast"},msg);
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity="0";t.style.transition="opacity 300ms";setTimeout(()=>t.remove(),320);}, 2800);

function modal({title,body,actions}){
  return new Promise(resolve=>{
    const close = (val)=>{backdrop.remove();resolve(val);};
    const backdrop = el("div",{class:"mm-modal-backdrop"});
    const sheet = el("div",{class:"mm-modal"},[
      el("h3",{class:"mm-modal__title"},title),
      typeof body === "string" ? el("div",{class:"mm-modal__text"},body) : body,
      el("div",{class:"mm-modal__actions"}, actions.map(a=>{
        const b = el("button",{class:`mm-btn mm-btn--${a.kind||"ghost"}`, onclick:()=>close(a.value)},a.label);
        return b;
      }))
    ]);
    backdrop.appendChild(sheet);
    backdrop.addEventListener("click",(e)=>{if(e.target===backdrop) close(null);});
    document.body.appendChild(backdrop);
  });
}

function renderHome(){
  const tests = Library.all();
  const sessions = Sessions.all();
  const scoredSessions = sessions.filter(s=>s.scored);
  const avgBand = scoredSessions.length ? (scoredSessions.reduce((a,s)=>a+s.scored.overall,0)/scoredSessions.length) : null;
  const recent = [...scoredSessions].sort((a,b)=>new Date(b.completedAt||0)-new Date(a.completedAt||0)).slice(0,4);

  const hero = el("section",{class:"mm-hero"},[
    el("div",{class:"mm-hero__eyebrow"},"IELTS Speaking Assessment Platform"),
    el("h1",{class:"mm-hero__title",html:"Diagnostic assessment<br/>with <em>examiner-grade</em> rigour."}),
    el("p",{class:"mm-hero__sub"},"A complete IELTS Speaking suite — library, recording studio, and descriptor-grounded reports — built by an educator for the classroom and the candidate."),
    el("div",{class:"mm-hero__actions"},[
      el("button",{class:"mm-btn mm-btn--primary mm-btn--large",onclick:()=>state.go("library")},["Browse test library ", el("span",{html:ICONS.arrow})]),
      el("button",{class:"mm-btn mm-btn--secondary mm-btn--large",onclick:()=>state.go("builder")},"Create a custom test")
    ]),
    el("div",{class:"mm-hero__ornament"},"Descriptor-grounded · Examiner-calibrated")
  ]);

  const strip = el("section",{class:"mm-strip"},[
    tile("Tests available",String(tests.length),"6 seed + custom"),
    tile("Sessions completed",String(scoredSessions.length),scoredSessions.length?"lifetime":"awaiting first session"),
    tile("Average band",avgBand?avgBand.toFixed(1):"—",avgBand?`across ${scoredSessions.length} session${scoredSessions.length!==1?"s":""}`:"no data yet"),
    tile("Assessment confidence","High","rule-based scoring engine")
  ]);
  function tile(label,value,note){
    return el("div",{class:"mm-strip__tile"},[
      el("div",{class:"mm-strip__label"},label),
      el("div",{class:"mm-strip__value"},value),
      el("div",{class:"mm-strip__note"},note)
    ]);
  }

  let recentBlock = null;
  if(recent.length){
    const rows = recent.map(s=>{
      const test = Library.get(s.testId);
      return el("div",{
        class:"mm-card mm-card--interactive",
        style:"padding:16px 20px;display:flex;align-items:center;gap:20px;",
        onclick:()=>state.go("report",{sessionId:s.id})
      },[
        el("div",{style:"flex:1;min-width:0;"},[
          el("div",{style:"font-family:var(--mm-f-display);font-size:16px;font-weight:500;color:var(--mm-navy-900);"},test?.title || "Archived test"),
          el("div",{style:"font-size:12px;color:var(--mm-fg-tertiary);margin-top:2px;"},
            `${s.studentName || "—"} · ${fmt.rel(s.completedAt)}`)
        ]),
        el("div",{style:"font-family:var(--mm-f-mono);font-size:13px;color:var(--mm-navy-700);font-weight:600;"},`Band ${s.scored.overall.toFixed(1)}`),
        el("span",{style:"font-size:18px;color:var(--mm-ink-300);"},"→")
      ]);
    });
    recentBlock = el("section",{class:"mm-page",style:"padding-top:0;"},[
      el("div",{class:"mm-page__header"},[
        el("div",{class:"mm-page__eyebrow"},"Recent activity"),
        el("h2",{class:"mm-page__title",style:"font-size:28px;"},"Last sessions"),
        el("div",{class:"mm-page__rule"})
      ]),
      el("div",{style:"display:flex;flex-direction:column;gap:12px;"},rows)
    ]);
  }
  return el("div",{},[hero, strip, recentBlock].filter(Boolean));
}

/* ------------------------------------------------------------
   SETTINGS VIEW — transcription provider configuration
   ------------------------------------------------------------ */
const SettingsState = { hydrated:false, draft:null, status:null };
function hydrateSettings(){
  if(!SettingsState.hydrated){
    SettingsState.draft = getTranscriptionSettings();
    SettingsState.draft.backendUrl = getBackendUrl();
    SettingsState.hydrated = true;
  }
  return SettingsState.draft;
}
function renderSettings(){
  const d = hydrateSettings();
  const speechAvailable = Transcriber.available();

  const providerBtn = (val,title,sub)=>el("button",{
    class:`mm-seg__btn ${d.provider===val?"is-active":""}`,
    onclick:()=>{ d.provider=val; SettingsState.status=null; state._emit(); }
  },[ el("div",{class:"mm-seg__btn-title"},title), el("div",{class:"mm-seg__btn-sub"},sub) ]);

  const presetBtn = (key)=>{
    const p = TRANSCRIPTION_PRESETS[key];
    return el("button",{
      class:`mm-seg__btn ${d.preset===key?"is-active":""}`,
      onclick:()=>{
        d.preset = key;
        if(key!=="custom"){ d.baseUrl = p.baseUrl; d.model = p.model; }
        SettingsState.status=null; state._emit();
      }
    },[ el("div",{class:"mm-seg__btn-title"},p.label),
        el("div",{class:"mm-seg__btn-sub"}, key==="custom" ? "Any OpenAI-compatible server" : p.baseUrl.replace("https://","")) ]);
  };

  const input = (label,key,opts={})=>el("div",{class:"mm-settings__field"},[
    el("label",{class:"mm-label"},label),
    el("input",{class:"mm-input",type:opts.type||"text",placeholder:opts.placeholder||"",
      value:d[key]||"",autocomplete:"off",spellcheck:"false",
      oninput:(e)=>{ d[key]=e.target.value; SettingsState.status=null; }})
  ]);

  const whisperFields = d.provider==="whisper" ? el("div",{},[
    el("div",{class:"mm-settings__field"},[
      el("label",{class:"mm-label"},"Provider preset"),
      el("div",{class:"mm-seg"},[presetBtn("openai"),presetBtn("groq"),presetBtn("custom")])
    ]),
    input("API base URL","baseUrl",{placeholder:"https://api.openai.com/v1"}),
    input("API key","apiKey",{type:"password",placeholder:"sk-… (stored only on this device)"}),
    input("Model","model",{placeholder:"whisper-1"}),
    el("div",{class:"mm-settings__field"},[
      el("label",{class:"mm-label"},"Spoken language"),
      el("select",{class:"mm-input",onchange:(e)=>{ d.language=e.target.value; }},
        [["en","English"],["auto","Auto-detect"],["ar","Arabic"],["fr","French"],["es","Spanish"],["de","German"],["zh","Chinese"],["hi","Hindi"]]
          .map(([v,l])=>el("option",{value:v,selected:d.language===v},l)))
    ])
  ]) : el("div",{class:"mm-settings__hint",style:"margin-top:16px;"},
      speechAvailable
        ? "The browser's built-in speech recognition will be used. It runs live during recording, works best in Chrome/Edge, and needs an internet connection."
        : "This browser has no built-in speech recognition. Switch to a hosted Whisper API above, or use Chrome/Edge.");

  let statusEl = null;
  if(SettingsState.status){
    const s = SettingsState.status;
    statusEl = el("div",{class:`mm-settings__status mm-settings__status--${s.kind}`},[
      s.kind==="ok"?el("span",{html:ICONS.check}):null, s.text
    ]);
  }

  const save = ()=>{
    saveBackendUrl(d.backendUrl||"");
    saveTranscriptionSettings({
      provider:d.provider, preset:d.preset, baseUrl:(d.baseUrl||"").trim(),
      apiKey:(d.apiKey||"").trim(), model:(d.model||"whisper-1").trim(), language:d.language||"en"
    });
    toast("Settings saved");
    SettingsState.status = {kind:"ok", text:"Saved. These settings apply to your next assessment."};
    state._emit();
  };

  const testConnection = async (btn)=>{
    if(d.provider!=="whisper"){ SettingsState.status={kind:"busy",text:"Connection test only applies to the hosted Whisper API."}; state._emit(); return; }
    if(!d.baseUrl || !d.apiKey){ SettingsState.status={kind:"err",text:"Enter both an API base URL and an API key first."}; state._emit(); return; }
    SettingsState.status = {kind:"busy", text:"Testing connection…"}; state._emit();
    const orig = btn ? btn.innerHTML : null;
    if(btn){ btn.disabled=true; btn.textContent="Testing…"; }
    try{
      const wav = makeSilentWav(1);
      await WhisperClient.transcribe(wav, {baseUrl:d.baseUrl.trim(), apiKey:d.apiKey.trim(), model:d.model.trim(), language:d.language});
      SettingsState.status = {kind:"ok", text:"Connection successful — the endpoint accepted the request."};
    }catch(err){
      SettingsState.status = {kind:"err", text:"Failed: " + (err.message||String(err))};
    }finally{
      if(btn){ btn.disabled=false; btn.innerHTML=orig; }
      state._emit();
    }
  };

  const reconnect = async (btn)=>{
    saveBackendUrl(d.backendUrl||"");
    SettingsState.status = {kind:"busy", text:"Connecting to server…"}; state._emit();
    const orig = btn ? btn.innerHTML : null;
    if(btn){ btn.disabled=true; btn.textContent="Connecting…"; }
    await Backend.probe();
    if(Backend.available()){
      const i = Backend.info();
      await syncSessionsFromBackend().catch(()=>{});
      const storeTxt = i.sessions && i.sessions.store ? `; storage: ${i.sessions.store==="postgres"?"Postgres (durable)":i.sessions.store}` : "";
      SettingsState.status = {kind:"ok", text:`Connected. Transcription: ${i.transcription.model}; scoring: ${i.scoring.model}${i.mock?" (mock mode)":""}${storeTxt}.`};
    } else {
      SettingsState.status = {kind:"err", text:"No server reachable at that address. Leave the URL blank if the page is served by the backend."};
    }
    if(btn){ btn.disabled=false; btn.innerHTML=orig; }
    state._emit();
  };

  const backendConnected = Backend.available();
  const backendInfo = Backend.info();
  const storeDriver = backendConnected && backendInfo.sessions ? backendInfo.sessions.store : null;
  const storageIndicator = backendConnected ? el("div",{
      class:`mm-settings__status mm-settings__status--${storeDriver==="postgres"?"ok":"busy"}`
    },[
      storeDriver==="postgres" ? el("span",{html:ICONS.check}) : null,
      storeDriver==="postgres"
        ? "Storage: Postgres — history is durable and shared across devices."
        : storeDriver==="file"
          ? "Storage: local file — good for testing, but resets on redeploy on most hosts. Set DATABASE_URL (e.g. a free Neon database) on the server for durable history."
          : "Storage: connected."
    ]) : null;
  const backendSection = el("div",{class:"mm-settings__section"},[
    el("h3",{class:"mm-settings__legend"},"Assessment server (backend)"),
    el("p",{class:"mm-settings__hint"},
      "Recommended. With a backend connected, transcription and AI scoring run on the server and your API key never touches the browser. Leave the URL blank when this page is served by the backend itself (same origin)."),
    backendConnected
      ? el("div",{class:"mm-settings__status mm-settings__status--ok"},[
          el("span",{html:ICONS.check}),
          `Connected — transcription: ${backendInfo.transcription.model}, scoring: ${backendInfo.scoring.model}${backendInfo.mock?" (mock mode — add a Groq key on the server)":""}.`
        ])
      : el("div",{class:"mm-settings__hint",style:"color:var(--mm-warning);"},"Not connected. The app will use the browser/direct options below instead."),
    storageIndicator,
    el("div",{class:"mm-settings__field"},[
      el("label",{class:"mm-label"},"Backend URL"),
      el("input",{class:"mm-input",type:"text",placeholder:"blank = same origin, e.g. http://localhost:8787",
        value:d.backendUrl||"",autocomplete:"off",spellcheck:"false",
        oninput:(e)=>{ d.backendUrl=e.target.value; }})
    ]),
    el("div",{class:"mm-settings__actions"},[
      el("button",{class:"mm-btn mm-btn--primary",onclick:(e)=>reconnect(e.currentTarget)},"Connect / reconnect")
    ])
  ]);

  return el("section",{class:"mm-page"},[
    el("div",{class:"mm-page__header"},[
      el("div",{class:"mm-page__eyebrow"},"Configuration"),
      el("h2",{class:"mm-page__title"},"Settings"),
      el("div",{class:"mm-page__rule"})
    ]),
    el("div",{class:"mm-settings"},[
      el("div",{class:"mm-settings__card"},[
        backendSection,
        el("div",{class:"mm-settings__section"},[
          el("h3",{class:"mm-settings__legend"},"Transcription"),
          el("p",{class:"mm-settings__hint"},
            "Choose how candidate speech is turned into text for assessment. A hosted Whisper-style API is recommended: it transcribes the saved recording after each part, works in any browser, and is far more accurate than the browser engine."),
          el("div",{class:"mm-seg"},[
            providerBtn("whisper","Hosted Whisper API","Accurate · any browser · recommended"),
            providerBtn("browser","Browser engine","Live · Chrome/Edge only · free")
          ]),
          whisperFields,
          statusEl,
          el("div",{class:"mm-settings__actions"},[
            el("button",{class:"mm-btn mm-btn--primary",onclick:save},[el("span",{html:ICONS.check}),"Save settings"]),
            d.provider==="whisper" ? el("button",{class:"mm-btn mm-btn--secondary",onclick:(e)=>testConnection(e.currentTarget)},"Test connection") : null
          ])
        ]),
        el("div",{class:"mm-settings__section"},[
          el("h3",{class:"mm-settings__legend"},"Privacy & hosting"),
          el("p",{class:"mm-settings__hint"},[
            "Your API key is stored only in this browser (localStorage) and is sent directly from your device to the transcription endpoint — it never passes through any Mourad Mekki Teacher Toolkit server. ",
            "Recordings are kept on this device (IndexedDB) for playback. ",
            el("strong",{},"For a shared or public deployment"),", route requests through your own backend proxy instead of entering a key here, and enable CORS for this page's origin on self-hosted servers."
          ])
        ])
      ])
    ])
  ]);
}

/* ------------------------------------------------------------
   SESSIONS / HISTORY VIEW
   ------------------------------------------------------------ */
function renderSessions(){
  const all = Sessions.all().filter(s=>s.scored)
    .sort((a,b)=>new Date(b.completedAt||b.startedAt)-new Date(a.completedAt||a.startedAt));

  const header = el("div",{class:"mm-page__header"},[
    el("div",{class:"mm-page__eyebrow"},"History"),
    el("h2",{class:"mm-page__title"},"Assessment sessions"),
    el("div",{class:"mm-page__rule"})
  ]);

  if(!all.length){
    return el("section",{class:"mm-page"},[
      header,
      el("div",{class:"mm-empty"},[
        el("div",{class:"mm-empty__icon",html:ICONS.waveform}),
        el("div",{class:"mm-empty__title"},"No sessions yet"),
        el("div",{class:"mm-empty__text"},"Completed assessments will appear here with their band scores and recordings."),
        el("button",{class:"mm-btn mm-btn--primary mm-mt-5",onclick:()=>state.go("library")},
          [el("span",{html:ICONS.book}),"  Browse the test library"])
      ])
    ]);
  }

  // Group by student
  const groups = {};
  for(const s of all){
    const name = (s.studentName||"Unnamed candidate").trim() || "Unnamed candidate";
    (groups[name] = groups[name] || []).push(s);
  }
  const groupNames = Object.keys(groups).sort((a,b)=>a.localeCompare(b));

  const row = (s)=>{
    const test = Library.get(s.testId) || s.test;
    const hasAudio = s.parts && ["part1","part2","part3"].some(k=>s.parts[k] && s.parts[k].audioKey);
    return el("div",{class:"mm-session-row"},[
      el("div",{class:"mm-session-row__main",onclick:()=>state.go("report",{sessionId:s.id})},[
        el("div",{class:"mm-session-row__title"}, test?.title || "Archived test"),
        el("div",{class:"mm-session-row__sub"},[
          fmt.dateTimeMed(s.completedAt||s.startedAt),
          " · ",
          (s.mode==="exam"?"Exam mode":"Practice mode"),
          hasAudio ? el("span",{class:"mm-session-row__audio-dot",style:"margin-left:8px;",html:ICONS.play+" audio"}) : null
        ])
      ]),
      el("div",{class:`mm-session-row__band ${hasAudio?"mm-session-row__band--audio":""}`},
        `Band ${s.scored.overall.toFixed(1)}`),
      el("button",{class:"mm-session-row__del",title:"Delete session",html:ICONS.trash,
        onclick:async(e)=>{
          e.stopPropagation();
          const ok = await modal({
            title:"Delete this session?",
            body:`This permanently removes the assessment report${hasAudio?" and its recordings":""} for ${s.studentName||"this candidate"}. This cannot be undone.`,
            actions:[{label:"Cancel",value:false},{label:"Delete",kind:"danger",value:true}]
          });
          if(ok){ Sessions.delete(s.id); if(Backend.available()) Backend.deleteSession(s.id); toast("Session deleted"); state._emit(); }
        }})
    ]);
  };

  const groupEls = groupNames.map(name=>{
    const items = groups[name];
    const avg = items.reduce((a,s)=>a+s.scored.overall,0)/items.length;
    return el("div",{class:"mm-sessions-group"},[
      el("div",{class:"mm-sessions-group__head"},[
        el("span",{class:"mm-sessions-group__name"},name),
        el("span",{class:"mm-sessions-group__count"},
          `${items.length} session${items.length!==1?"s":""} · avg band ${avg.toFixed(1)}`)
      ]),
      el("div",{}, items.map(row))
    ]);
  });

  return el("section",{class:"mm-page"},[
    header,
    el("div",{class:"mm-sessions-list"}, groupEls)
  ]);
}

/* ------------------------------------------------------------
   LIBRARY VIEW
   ------------------------------------------------------------ */
const LibraryState = {search:"", theme:"all", difficulty:"all", sort:"recommended"};

function renderLibrary(){
  const tests = Library.all().filter(t=>!t.isArchived);

  let filtered = tests;
  if(LibraryState.search){
    const q = LibraryState.search.toLowerCase();
    filtered = filtered.filter(t=>
      t.title.toLowerCase().includes(q) ||
      (t.description||"").toLowerCase().includes(q) ||
      (t.theme||"").toLowerCase().includes(q)
    );
  }
  if(LibraryState.theme!=="all") filtered = filtered.filter(t=>t.theme===LibraryState.theme);
  if(LibraryState.difficulty!=="all") filtered = filtered.filter(t=>t.difficulty===LibraryState.difficulty);

  if(LibraryState.sort==="alphabetical") filtered.sort((a,b)=>a.title.localeCompare(b.title));
  else if(LibraryState.sort==="difficulty") filtered.sort((a,b)=>{
    const order={foundation:0,standard:1,challenging:2};
    return (order[a.difficulty]||1)-(order[b.difficulty]||1);
  });
  else if(LibraryState.sort==="recent") filtered.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  else { // recommended
    filtered.sort((a,b)=>{
      const aNew = BadgeService.shouldShowNew(a)?1:0;
      const bNew = BadgeService.shouldShowNew(b)?1:0;
      if(aNew!==bNew) return bNew-aNew;
      const order={foundation:0,standard:1,challenging:2};
      return (order[a.difficulty]||1)-(order[b.difficulty]||1);
    });
  }

  const header = el("div",{class:"mm-page__header"},[
    el("div",{class:"mm-page__eyebrow"},"Test Library"),
    el("h2",{class:"mm-page__title"},"A curated library of IELTS Speaking tests"),
    el("p",{class:"mm-page__sub"},"Six seed tests covering the full IELTS theme range and difficulty spectrum, plus any custom tests you've created. Each test is fully specified with Part 1, Part 2 cue card, and Part 3 discussion."),
    el("div",{class:"mm-page__rule"})
  ]);

  const toolbar = el("div",{class:"mm-toolbar"},[
    el("div",{class:"mm-search"},[
      el("span",{html:ICONS.search}),
      el("input",{type:"text",placeholder:"Search tests…",value:LibraryState.search,oninput:(e)=>{
        LibraryState.search = e.target.value;
        state._emit();
      }})
    ]),
    el("div",{class:"mm-filter"},[
      el("label",{},"Theme"),
      el("select",{onchange:(e)=>{LibraryState.theme=e.target.value;state._emit();}},
        ["all","technology","environment","education","media","work","travel","custom"].map(t=>
          el("option",{value:t,selected:LibraryState.theme===t?true:false},t==="all"?"All themes":t[0].toUpperCase()+t.slice(1))))
    ]),
    el("div",{class:"mm-filter"},[
      el("label",{},"Difficulty"),
      el("select",{onchange:(e)=>{LibraryState.difficulty=e.target.value;state._emit();}},
        ["all","foundation","standard","challenging"].map(d=>
          el("option",{value:d,selected:LibraryState.difficulty===d?true:false},d==="all"?"All levels":d[0].toUpperCase()+d.slice(1))))
    ]),
    el("div",{class:"mm-filter"},[
      el("label",{},"Sort"),
      el("select",{onchange:(e)=>{LibraryState.sort=e.target.value;state._emit();}},
        [["recommended","Recommended"],["alphabetical","A → Z"],["difficulty","By difficulty"],["recent","Most recent"]].map(([v,l])=>
          el("option",{value:v,selected:LibraryState.sort===v?true:false},l)))
    ]),
    el("div",{class:"mm-toolbar__right"},[
      el("button",{class:"mm-btn mm-btn--primary",onclick:()=>state.go("builder")},
        [el("span",{html:ICONS.plus}),"Create a test"])
    ])
  ]);

  const grid = filtered.length
    ? el("div",{class:"mm-test-grid"}, filtered.map(renderTestCard))
    : el("div",{class:"mm-empty"},[
        el("div",{class:"mm-empty__icon",html:ICONS.book}),
        el("h3",{class:"mm-empty__title"},"No tests match your filters"),
        el("p",{class:"mm-empty__text"},"Try widening your search or clearing the filters.")
      ]);

  return el("section",{class:"mm-page"},[header,toolbar,grid]);
}

function renderTestCard(test){
  const isNew = BadgeService.shouldShowNew(test);
  const opens = test.openCount||0;
  const sessions = test.sessionCount||0;
  const usageLabel = sessions>=10 ? "Trusted" : sessions>0 ? `${sessions} session${sessions!==1?"s":""}` : opens>0 ? "Opened" : "Fresh";
  const usageClass = sessions>=10 ? "mm-usage-chip--trusted" : sessions===0 && opens===0 ? "mm-usage-chip--fresh" : "";
  const diff = test.difficulty || "standard";
  const band = test.expectedBandRange || {min:5.0,max:7.5};
  const themeColor = THEME_COLORS[test.theme]||THEME_COLORS.custom;

  return el("article",{class:"mm-test-card",onclick:()=>state.go("setup",{testId:test.id})},[
    isNew ? el("div",{class:"mm-test-card__badge-new"},"New") : null,
    el("h3",{class:"mm-test-card__title"},test.title),
    el("div",{class:"mm-test-card__meta"},[
      el("span",{},[
        el("span",{class:"mm-theme-dot",style:`background:${themeColor};`}),
        (test.theme||"custom")[0].toUpperCase()+(test.theme||"custom").slice(1)
      ]),
      el("span",{class:`mm-diff-chip mm-diff-chip--${diff}`},diff[0].toUpperCase()+diff.slice(1))
    ]),
    el("p",{class:"mm-test-card__desc"},test.description||test.topicsCoveredLabel||""),
    el("div",{class:"mm-test-card__band"},[
      el("strong",{},`Band ${band.min.toFixed(1)} – ${band.max.toFixed(1)}`),
      " · ~",String(Math.round((test.estimatedDurationSec||720)/60))," min"
    ]),
    el("div",{class:"mm-test-card__footer"},[
      el("span",{class:`mm-usage-chip ${usageClass}`},usageLabel),
      el("span",{style:"display:inline-flex;align-items:center;gap:6px;color:var(--mm-navy-700);font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;"},[
        "Start",el("span",{html:ICONS.arrow})
      ])
    ]),
    test.source==="custom" ? el("button",{
      style:"position:absolute;bottom:12px;right:12px;font-size:11px;color:var(--mm-danger);padding:4px 8px;",
      onclick:async(e)=>{
        e.stopPropagation();
        const ok = await modal({
          title:"Delete this test?",
          body:"This will permanently remove this custom test. Existing session reports will be preserved.",
          actions:[{label:"Cancel",value:false},{label:"Delete",kind:"danger",value:true}]
        });
        if(ok){Library.delete(test.id);state._emit();toast("Test deleted");}
      }
    },"Delete") : null
  ]);
}


/* ------------------------------------------------------------
   BUILDER VIEW — Test creation with paste-parser
   ------------------------------------------------------------ */
const BuilderState = {
  mode:"paste",
  title:"",
  theme:"custom",
  difficulty:"standard",
  timePressure:"medium",
  expectedMin:6.0,
  expectedMax:7.5,
  rawPart1:"",
  rawPart2:"",
  rawPart3:"",
  parsed:null,
  validation:null
};

function parsePart1(raw){
  if(!raw.trim()) return null;
  const lines = raw.split(/\n+/).map(l=>l.trim()).filter(Boolean);
  const topics = [];
  let current = null;
  for(const line of lines){
    if(/^(topic\s*[:\-]|##\s*|[A-Z][a-zA-Z\s]{2,30}:)/i.test(line) && !/\?/.test(line)){
      if(current) topics.push(current);
      const topic = line.replace(/^(topic\s*[:\-]?|##\s*)/i,"").replace(/:$/,"").trim();
      current = {topic, questions:[]};
    } else if(/\?/.test(line)){
      if(!current) current = {topic:"General", questions:[]};
      const qt = line.replace(/^[\d\.\)\-•]+\s*/,"").replace(/^[qQ]\d*[:\.]?\s*/,"").trim();
      if(qt) current.questions.push({q:qt, skills:[]});
    }
  }
  if(current) topics.push(current);
  return topics.length ? {instructions:"Let's start with some introductory questions.", topics} : null;
}
function parsePart2(raw){
  if(!raw.trim()) return null;
  const text = raw.trim();
  // Split into lines & try to identify topic line and bullets
  const lines = text.split(/\n+/).map(l=>l.trim()).filter(Boolean);
  let topic = "";
  const bullets = [];
  let followUp = [];
  let inFollowUp = false;
  for(let i=0;i<lines.length;i++){
    const line = lines[i];
    if(/^follow[- ]?up/i.test(line)){inFollowUp=true;continue;}
    if(inFollowUp){
      if(/\?/.test(line)){followUp.push({q:line.replace(/^[\d\.\)\-•]+\s*/,""),skills:[]});}
      continue;
    }
    if(i===0){topic = line.replace(/^(describe\s*[:\-]?\s*)?/i,"Describe ").replace(/^Describe\s+Describe\s+/i,"Describe ");continue;}
    if(/^(you\s+should\s+say|say)\s*:?$/i.test(line)) continue;
    // Bullets
    const bm = line.match(/^[•\-\*\d\.\)]+\s*(.+)/);
    if(bm && bm[1]){bullets.push(bm[1]);}
    else if(!topic) topic = line;
    else if(bullets.length<5 && !/\?/.test(line)) bullets.push(line);
  }
  if(!topic) return null;
  return {
    cueCard:{topic, bullets: bullets.length? bullets : ["what it is","when it happened","who was involved","and explain why it matters to you."], followUp},
    prepSeconds:60, speakSeconds:120, speakSecondsMin:60,
    skills:["description","narrative","justification","extended discourse"]
  };
}
function parsePart3(raw){
  if(!raw.trim()) return null;
  const lines = raw.split(/\n+/).map(l=>l.trim()).filter(Boolean);
  let topicLabel = "Discussion";
  const questions = [];
  for(const line of lines){
    if(!/\?/.test(line)){
      // possible topic heading
      if(!questions.length && line.length < 60) topicLabel = line.replace(/[:\-]$/,"");
      continue;
    }
    const qt = line.replace(/^[\d\.\)\-•]+\s*/,"").replace(/^[qQ]\d*[:\.]?\s*/,"").trim();
    if(qt) questions.push({q:qt, skills:[]});
  }
  return questions.length ? {topic:topicLabel, questions} : null;
}

function runParser(){
  const p1 = parsePart1(BuilderState.rawPart1);
  const p2 = parsePart2(BuilderState.rawPart2);
  const p3 = parsePart3(BuilderState.rawPart3);
  BuilderState.parsed = {part1:p1, part2:p2, part3:p3};
  return validateBuilder();
}
function validateBuilder(){
  const errors = [];
  const warnings = [];
  if(!BuilderState.title || BuilderState.title.trim().length<3) errors.push("Title is required (at least 3 characters).");
  const p = BuilderState.parsed || {};
  if(!p.part1 || !p.part1.topics?.length) errors.push("Part 1 must include at least one topic block with questions.");
  else {
    const qCount = p.part1.topics.reduce((a,t)=>a+t.questions.length,0);
    if(qCount < 6) warnings.push(`Part 1 has only ${qCount} questions — typical Part 1 has 8–12.`);
  }
  if(!p.part2) errors.push("Part 2 must include a cue-card topic.");
  else if(!p.part2.cueCard.bullets?.length) warnings.push("Part 2 has no bullets — default bullets will be used.");
  if(!p.part3) errors.push("Part 3 must include at least one discussion question.");
  else if(p.part3.questions.length < 4) warnings.push(`Part 3 has only ${p.part3.questions.length} questions — typical Part 3 has 5–7.`);
  if(BuilderState.expectedMin >= BuilderState.expectedMax) errors.push("Expected band minimum must be less than maximum.");
  BuilderState.validation = {errors,warnings,valid:errors.length===0};
  return BuilderState.validation;
}

function saveCustomTest(){
  runParser();
  const v = BuilderState.validation;
  if(!v.valid){
    state._emit();
    toast("Please resolve errors before saving");
    return;
  }
  const now = new Date().toISOString();
  const id = `custom_${shortHash(BuilderState.title+now)}_${Date.now().toString(36).slice(-4)}`;
  const p = BuilderState.parsed;
  const test = {
    id, schema:"v1.1",
    title:BuilderState.title.trim(),
    theme:BuilderState.theme,
    difficulty:BuilderState.difficulty,
    expectedBandRange:{min:BuilderState.expectedMin,max:BuilderState.expectedMax},
    partDifficulty:{part1:BuilderState.difficulty,part2:BuilderState.difficulty,part3:BuilderState.difficulty},
    timePressure:BuilderState.timePressure,
    estimatedDurationSec:720,
    description:(p.part3?.topic ? `Custom test · ${p.part3.topic}` : "Custom teacher-authored test"),
    source:"custom", version:1,
    createdAt:now, updatedAt:now, firstSeenAt:now,
    lastOpenedAt:null, openCount:0, sessionCount:0, isArchived:false,
    part1:p.part1, part2:p.part2, part3:p.part3,
    modelResponses:null
  };
  Library.save(test);
  // Reset builder
  Object.assign(BuilderState,{
    mode:"paste",title:"",theme:"custom",difficulty:"standard",timePressure:"medium",
    expectedMin:6.0,expectedMax:7.5,rawPart1:"",rawPart2:"",rawPart3:"",parsed:null,validation:null
  });
  toast("Test saved to library");
  state.go("library");
}

    return el("div",{class:"mm-capnotice mm-capnotice--ok"},[

  examinerName:"",
  stage:"loading",     // loading|setup|ready|part1|part2_prep|part2|part3|done
  partKey:null,        // part1|part2|part3
  qIndex:0,
  paused:false,
  transMode:null,      // "whisper" | "browser" | "none"
  pauseUsed:false,
  timer:null,
  waveRenderer:null,
  vad:null,
  liveCaption:"",
  timeUpShown:false,
  _rafMeta:null,
  partMeta:{part1:null,part2:null,part3:null},
