.mm-evidence__k{
  font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--mm-gold-700);padding-top:2px;
}
.mm-evidence__quote{font-size:13.5px;line-height:1.55;color:var(--mm-ink-700);font-style:italic;}
.mm-evidence__improved{font-size:13.5px;line-height:1.55;color:var(--mm-navy-800);font-weight:600;}
.mm-evidence__why{font-size:12.5px;line-height:1.55;color:var(--mm-fg-secondary);}
.mm-evidence__target{
  font-size:12.5px;line-height:1.55;color:var(--mm-navy-700);
  background:var(--mm-navy-50);border-radius:var(--mm-r-sm);padding:6px 10px;
}

/* ============================================================
   GENERATED REPORTS (student / diagnostic / parent / quick)
   ============================================================ */
.mm-report--gen{
  background:var(--mm-ivory);color:var(--mm-fg-primary);
  font-family:var(--mm-f-body);
}
.rg-page{ padding:4px 2px 8px; }
.rg-page + .rg-page{ margin-top:34px; padding-top:30px; border-top:1px dashed var(--mm-border-subtle); }

/* head */
.rg-head{ text-align:center; margin-bottom:18px; }
.rg-head__crest{
  width:46px;height:46px;margin:0 auto 8px;background:var(--mm-navy-800);
  border-radius:var(--mm-r-md);display:grid;place-items:center;
  color:var(--mm-gold-500);font-family:var(--mm-f-display);font-size:24px;
}
.rg-head__brand{font-family:var(--mm-f-display);font-size:18px;color:var(--mm-navy-900);letter-spacing:.01em;}
.rg-head__eyebrow{
  font-size:10.5px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:var(--mm-gold-700);margin-top:6px;
}
.rg-head__sub{font-size:13px;color:var(--mm-fg-secondary);margin-top:4px;}
.rg-head__rule{height:2px;width:60px;margin:12px auto 0;background:var(--mm-gold-500);border-radius:2px;}

/* meta */
.rg-meta{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
  background:var(--mm-cream);border-radius:var(--mm-r-md);
  padding:14px 18px;margin-bottom:16px;
}
.rg-meta__l{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mm-fg-tertiary);}
.rg-meta__v{font-size:14px;color:var(--mm-navy-900);font-weight:600;margin-top:2px;}

/* score strip */
.rg-strip{
  display:flex;gap:1px;background:var(--mm-border-subtle);
  border-radius:var(--mm-r-md);overflow:hidden;margin-bottom:16px;
}
.rg-strip__cell{flex:1;background:var(--mm-navy-900);color:var(--mm-fg-on-navy);padding:12px 8px;text-align:center;}
.rg-strip__v{font-family:var(--mm-f-display);font-size:22px;font-weight:600;color:var(--mm-gold-300);line-height:1;}
.rg-strip__l{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mm-navy-200);margin-top:5px;}

/* criterion cards */
.rg-crit{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.rg-crit__card{
  border:1px solid var(--mm-border-subtle);border-radius:var(--mm-r-md);
  background:var(--mm-bg-surface);padding:12px 10px;text-align:center;
}
.rg-crit__band{font-family:var(--mm-f-display);font-size:24px;font-weight:600;color:var(--mm-navy-800);line-height:1;}
.rg-crit__name{font-size:11px;color:var(--mm-fg-secondary);margin-top:6px;line-height:1.3;}

/* generic block + lists */
.rg-block{margin-bottom:14px;}
.rg-block__title{
  font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--mm-gold-700);margin-bottom:7px;
}
.rg-block--good{background:var(--mm-success-bg);border-radius:var(--mm-r-md);padding:12px 14px;}
.rg-block--focus{background:var(--mm-warning-bg);border-radius:var(--mm-r-md);padding:12px 14px;}
.rg-block--good .rg-block__title{color:var(--mm-success);}
.rg-block--focus .rg-block__title{color:var(--mm-warning);}
.rg-ul,.rg-ol{margin:0;padding-left:20px;}
.rg-ul li,.rg-ol li{font-size:12.5px;line-height:1.6;color:var(--mm-fg-secondary);margin-bottom:4px;}
.rg-cols2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.rg-cols2--tight{gap:10px;}
.rg-prose__p,.rg-prose p{font-size:13px;line-height:1.65;color:var(--mm-fg-secondary);margin:0 0 8px;}
.rg-sech{
  font-family:var(--mm-f-display);font-size:16px;color:var(--mm-navy-900);
  margin:22px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--mm-gold-500);
}
.rg-muted{font-size:12px;color:var(--mm-fg-tertiary);font-style:italic;}

/* evidence card */
.rg-ev{
  border:1px solid var(--mm-border-subtle);border-radius:var(--mm-r-md);
  background:var(--mm-bg-surface);padding:12px 16px;margin-bottom:14px;
}
.rg-ev__label{
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--mm-gold-700);margin:8px 0 3px;
}
.rg-ev__label:first-child{margin-top:0;}
.rg-ev__quote{font-size:13px;line-height:1.55;color:var(--mm-ink-700);font-style:italic;}
.rg-ev__improved{font-size:13px;line-height:1.55;color:var(--mm-navy-800);font-weight:600;}
.rg-ev__why{font-size:12.5px;line-height:1.55;color:var(--mm-fg-secondary);}

/* caution / target / final */
.rg-caution{
  font-size:11.5px;line-height:1.55;color:var(--mm-navy-800);
  background:var(--mm-navy-50);border-radius:var(--mm-r-md);
  padding:10px 14px;margin-bottom:14px;
}
.rg-target{
  font-size:12.5px;line-height:1.55;color:var(--mm-navy-900);font-weight:600;
  background:var(--mm-gold-50);border-left:3px solid var(--mm-gold-500);
  border-radius:var(--mm-r-sm);padding:10px 14px;margin-bottom:12px;
}
.rg-final{background:var(--mm-gold-50);border-radius:var(--mm-r-md);padding:12px 16px;}

/* diagnostic */
.rg-diagblock{
  border:1px solid var(--mm-border-subtle);border-radius:var(--mm-r-md);
  padding:14px 16px;margin-bottom:12px;background:var(--mm-bg-surface);
}
.rg-diagblock__head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:6px;}
.rg-diagblock__name{font-family:var(--mm-f-display);font-size:16px;color:var(--mm-navy-900);}
.rg-diagblock__band{font-size:12px;font-weight:700;color:var(--mm-gold-700);white-space:nowrap;}
.rg-diagblock__exp{font-size:12.5px;line-height:1.6;color:var(--mm-fg-secondary);margin:0 0 10px;}
.rg-diagblock__src{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--mm-fg-tertiary);margin-top:8px;text-transform:uppercase;}
.rg-diagblock__target{font-size:12px;line-height:1.5;color:var(--mm-navy-700);background:var(--mm-navy-50);border-radius:var(--mm-r-sm);padding:7px 10px;margin-top:6px;}
.rg-ptable{border:1px solid var(--mm-border-subtle);border-radius:var(--mm-r-md);overflow:hidden;margin-bottom:14px;}
.rg-ptable__row{display:grid;grid-template-columns:1fr 90px;gap:10px;padding:8px 14px;border-top:1px solid var(--mm-border-subtle);font-size:12.5px;}
.rg-ptable__row:first-child{border-top:0;}
.rg-ptable__row--head{background:var(--mm-navy-900);color:var(--mm-fg-on-navy);font-weight:700;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;}
.rg-chips{display:flex;flex-wrap:wrap;gap:6px;}
.rg-chip{font-size:11.5px;padding:3px 9px;border-radius:var(--mm-r-full);background:var(--mm-tag-transcript-bg);color:var(--mm-tag-transcript-fg);}
.rg-teaching{border:1px solid var(--mm-border-subtle);border-radius:var(--mm-r-md);padding:14px 16px;background:var(--mm-cream);}
.rg-teaching__grid{display:grid;gap:8px;}
.rg-teaching__grid > div{font-size:12.5px;line-height:1.55;color:var(--mm-fg-secondary);}
.rg-prov{font-size:11.5px;line-height:1.6;color:var(--mm-fg-secondary);background:var(--mm-bg-surface-sunken);border-radius:var(--mm-r-md);padding:12px 16px;margin-bottom:14px;}

/* footer */
.rg-foot{margin-top:18px;}
.rg-foot__rule{height:1px;background:var(--mm-gold-500);margin-bottom:6px;}
.rg-foot__text{font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--mm-navy-800);text-align:center;}

/* QUICK summary — compact, single A4 */
.mm-report--quick .rg-page--tight{padding:0;}
.rg-qbanner{display:flex;align-items:center;gap:12px;padding-bottom:12px;margin-bottom:14px;border-bottom:2px solid var(--mm-gold-500);}
.rg-qbanner__crest{width:38px;height:38px;background:var(--mm-navy-800);border-radius:var(--mm-r-sm);display:grid;place-items:center;color:var(--mm-gold-500);font-family:var(--mm-f-display);font-size:20px;}
.rg-qbanner__brand{font-family:var(--mm-f-display);font-size:17px;color:var(--mm-navy-900);}
.rg-qbanner__sub{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--mm-gold-700);margin-top:2px;}
.rg-qmeta{display:flex;flex-wrap:wrap;gap:6px 18px;font-size:11.5px;color:var(--mm-fg-secondary);margin-bottom:12px;}
.rg-qstrong{display:flex;gap:22px;font-size:12px;color:var(--mm-navy-800);margin:10px 0;}
.rg-block--tight{margin-bottom:8px;}
.rg-ol--tight li{font-size:11.5px;line-height:1.45;margin-bottom:2px;}
.mm-report--quick .rg-crit{margin-bottom:12px;}
.mm-report--quick .rg-strip{margin-bottom:12px;}
.mm-report--quick .rg-ev{padding:9px 13px;margin-bottom:10px;}

/* ============================================================
   ARABIC PARENT REPORT — RTL
   ============================================================ */
.report-ar{
  direction:rtl;text-align:right;
  font-family:Tahoma,Arial,"Noto Naskh Arabic","Noto Sans Arabic",sans-serif;
}
.report-ar .rg-meta__l,.report-ar .rg-block__title,.report-ar .rg-ev__label,
.report-ar .rg-head__eyebrow{ letter-spacing:0; }
/* RTL bullet lists: marker tight to the text on the right edge */
.report-ar .rg-ul{padding-left:0;padding-right:6px;direction:rtl;list-style-position:inside;}
.report-ar .rg-ul li{direction:rtl;text-align:right;}
/* RTL numbered lists: native marker placement strands the number on the
   far left in RTL, so we draw the number with a counter pinned to the
   right edge — the number now sits directly beside its line of text. */
.report-ar .rg-ol{padding:0;margin:0;direction:rtl;text-align:right;list-style:none;counter-reset:rg-ar-ol;}
.report-ar .rg-ol li{position:relative;direction:rtl;text-align:right;padding-right:1.9em;counter-increment:rg-ar-ol;}
.report-ar .rg-ol li::before{
  content:counter(rg-ar-ol) ".";
  position:absolute;right:0;top:0;
  font-weight:600;color:var(--mm-fg-secondary);
  font-variant-numeric:tabular-nums;
}
.report-ar .rg-strip__cell,.report-ar .rg-crit__card,.report-ar .rg-meta__item{text-align:center;}
.report-ar .rg-qstrong,.report-ar .rg-qmeta{direction:rtl;}
.report-ar .rg-ev,.report-ar .rg-block,.report-ar .rg-caution,
.report-ar .rg-final,.report-ar .rg-target{direction:rtl;text-align:right;}
.report-ar .rg-foot__text{direction:rtl;letter-spacing:0;}
/* English evidence quotes inside Arabic stay LTR + left aligned */
.report-ar .english-evidence{text-align:left;}

/* ============================================================
   EXPORT PANEL (modal)
   ============================================================ */
.rg-modal{max-width:760px;width:calc(100vw - 40px);}
.rg-panel__intro{font-size:13px;color:var(--mm-fg-secondary);line-height:1.55;margin:0 0 16px;}
.rg-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media (max-width:620px){.rg-grid{grid-template-columns:1fr;}}
.rg-card{
  position:relative;text-align:left;cursor:pointer;
  border:1.5px solid var(--mm-border-subtle);border-radius:var(--mm-r-lg);
  background:var(--mm-bg-surface);padding:14px 16px;
  transition:border-color var(--mm-dur-std) var(--mm-ease),box-shadow var(--mm-dur-std) var(--mm-ease),background var(--mm-dur-std) var(--mm-ease);
  font-family:var(--mm-f-body);
}
.rg-card:hover{border-color:var(--mm-gold-400);box-shadow:var(--mm-e-2);}
.rg-card.is-active{border-color:var(--mm-gold-500);background:var(--mm-gold-50);box-shadow:var(--mm-e-ring);}
.rg-card__check{
  position:absolute;top:12px;right:12px;width:22px;height:22px;border-radius:var(--mm-r-full);
  background:var(--mm-gold-500);color:#fff;display:grid;place-items:center;opacity:0;transform:scale(.6);
  transition:opacity var(--mm-dur-std) var(--mm-ease),transform var(--mm-dur-std) var(--mm-ease);
}
.rg-card.is-active .rg-card__check{opacity:1;transform:scale(1);}
.rg-card__name{font-family:var(--mm-f-display);font-size:17px;color:var(--mm-navy-900);margin-bottom:6px;padding-right:26px;}
.rg-card__row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.rg-card__aud{font-size:10.5px;font-weight:600;letter-spacing:.04em;color:var(--mm-navy-700);background:var(--mm-navy-50);border-radius:var(--mm-r-full);padding:2px 9px;}
.rg-card__len{font-size:10.5px;font-weight:600;letter-spacing:.04em;color:var(--mm-gold-800);background:var(--mm-gold-50);border-radius:var(--mm-r-full);padding:2px 9px;}
.rg-card__desc{font-size:12px;line-height:1.5;color:var(--mm-fg-secondary);}
.rg-card__lang{font-size:11px;color:var(--mm-fg-tertiary);margin-top:8px;font-weight:600;}
.rg-langrow{margin-top:18px;padding-top:16px;border-top:1px dashed var(--mm-border-subtle);display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.rg-langrow__label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mm-gold-700);}
.rg-langseg{display:inline-flex;border:1px solid var(--mm-border-strong);border-radius:var(--mm-r-full);overflow:hidden;}
.rg-langseg__btn{border:0;background:transparent;padding:8px 18px;font-size:13px;font-weight:600;color:var(--mm-fg-secondary);cursor:pointer;font-family:var(--mm-f-body);}
.rg-langseg__btn.is-active{background:var(--mm-navy-800);color:var(--mm-gold-300);}
.mm-btn--mini{padding:7px 12px;font-size:12.5px;}

/* ============================================================
   PREVIEW OVERLAY + OFF-SCREEN STAGE
   ============================================================ */
.rg-stage{position:fixed;left:-10000px;top:0;width:var(--mm-container-report);z-index:-1;background:#fff;}
.rg-stage .mm-report{width:var(--mm-container-report);max-width:none;box-shadow:none;padding:44px 56px;}

.rg-overlay{
  position:fixed;inset:0;z-index:1000;background:rgba(10,22,40,.62);
  backdrop-filter:blur(3px);display:flex;flex-direction:column;
}
.rg-overlay__bar{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:12px 18px;background:var(--mm-navy-900);color:var(--mm-fg-on-navy);
}
.rg-overlay__title{font-family:var(--mm-f-display);font-size:16px;color:var(--mm-gold-300);}
.rg-overlay__actions{display:flex;gap:8px;}
.rg-overlay__scroll{flex:1;overflow:auto;padding:24px;display:flex;justify-content:center;}
.rg-overlay__paper{
  width:var(--mm-container-report);max-width:100%;background:var(--mm-ivory);
  box-shadow:var(--mm-e-4);border-radius:6px;padding:44px 56px;height:max-content;
}
.rg-overlay__paper .mm-report{width:100%;box-shadow:none;padding:0;background:transparent;}
@media (max-width:880px){
  .rg-overlay__scroll{padding:10px;}
  .rg-overlay__paper{padding:24px 20px;}
}

/* ============================================================
   PRINT — generated reports + preview + Arabic
   ============================================================ */
@media print{
  /* When a preview overlay is open, print ONLY it. */
  body.rg-preview-open .mm-report-wrap,
  body.rg-preview-open .mm-topbar,
  body.rg-preview-open .mm-print-footer,
  body.rg-preview-open .mm-print-watermark{display:none!important;}
  body.rg-preview-open .rg-overlay{
    position:static;background:#fff;backdrop-filter:none;display:block;
  }
  body.rg-preview-open .rg-overlay__bar{display:none!important;}
  body.rg-preview-open .rg-overlay__scroll{overflow:visible;padding:0;display:block;}
  body.rg-preview-open .rg-overlay__paper{box-shadow:none;border-radius:0;padding:0;width:100%;max-width:none;}

  /* Generated-report page integrity */
  .rg-page{break-inside:auto;}
  .rg-page + .rg-page{break-before:page;border-top:0;margin-top:0;padding-top:0;}
  .rg-head,.rg-meta,.rg-strip,.rg-crit__card,.rg-block,.rg-ev,.rg-diagblock,
  .rg-ptable__row,.rg-teaching,.rg-prov,.rg-caution,.rg-final,.rg-target,
  .rg-qbanner,.rg-foot{break-inside:avoid;}
  .rg-sech{break-after:avoid;}
  .rg-block__title{break-after:avoid;}
  .mm-evidence,.mm-evidence__row,.mm-pron-credit{break-inside:avoid;}
  .rg-strip__cell,.rg-crit__band,.rg-card.is-active{
    -webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;
  }
  .report-ar{direction:rtl;text-align:right;}
}

/* ============================================================
   USER GUIDE — student-facing IELTS Speaking guide
   Fully namespaced (mm-guide-*). Reuses existing design tokens.
   ============================================================ */
.mm-guide{max-width:var(--mm-container);margin:0 auto;padding:var(--mm-s-7) var(--mm-s-6) var(--mm-s-9);}

/* Hero */
.mm-guide-hero{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--mm-navy-900),var(--mm-navy-800));
  border-radius:var(--mm-r-2xl);
  padding:var(--mm-s-8) var(--mm-s-7);
  text-align:center;color:var(--mm-navy-50);
  box-shadow:var(--mm-e-2);
}
.mm-guide-hero::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 20% 0%,rgba(212,175,55,.14),transparent 55%);
  pointer-events:none;
}
.mm-guide-hero__eyebrow{
  position:relative;font-size:11px;font-weight:600;letter-spacing:.22em;
  text-transform:uppercase;color:var(--mm-gold-400);margin-bottom:var(--mm-s-4);
}
.mm-guide-hero__title{
  position:relative;font-family:var(--mm-f-display);font-weight:500;
  font-size:clamp(32px,4vw + 1rem,52px);line-height:1.1;letter-spacing:-.02em;
  margin:0 0 var(--mm-s-3);color:var(--mm-navy-50);
}
.mm-guide-hero__title em{font-style:italic;color:var(--mm-gold-400);}
.mm-guide-hero__sub{
  position:relative;font-size:17px;color:var(--mm-navy-200);
  max-width:560px;margin:0 auto var(--mm-s-4);line-height:1.5;font-style:italic;
  font-family:var(--mm-f-display);
}
.mm-guide-hero__intro{
  position:relative;font-size:15px;color:var(--mm-navy-100);
  max-width:680px;margin:0 auto var(--mm-s-6);line-height:1.65;
}
.mm-guide-hero__actions{position:relative;display:flex;gap:var(--mm-s-3);justify-content:center;flex-wrap:wrap;}

/* Sticky internal jump menu */
.mm-guide-jump{
  position:sticky;top:72px;z-index:40;
  margin:var(--mm-s-5) 0 var(--mm-s-6);
  background:rgba(253,251,246,.94);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid var(--mm-border-subtle);border-radius:var(--mm-r-full);
  box-shadow:var(--mm-e-1);
}
.mm-guide-jump__scroll{
  display:flex;gap:var(--mm-s-1);align-items:center;
  padding:var(--mm-s-2) var(--mm-s-3);
  overflow-x:auto;scrollbar-width:thin;
  -webkit-overflow-scrolling:touch;
}
.mm-guide-jump__scroll::-webkit-scrollbar{height:4px;}
.mm-guide-jump__scroll::-webkit-scrollbar-thumb{background:var(--mm-navy-200);border-radius:4px;}
.mm-guide-jump__link{
  flex:0 0 auto;padding:7px 14px;font-size:12.5px;font-weight:500;
  color:var(--mm-fg-secondary);border-radius:var(--mm-r-full);white-space:nowrap;
  letter-spacing:.03em;transition:background var(--mm-dur-quick) var(--mm-ease),color var(--mm-dur-quick) var(--mm-ease);
}
.mm-guide-jump__link:hover{background:var(--mm-navy-50);color:var(--mm-navy-900);}
.mm-guide-jump__link.is-active{background:var(--mm-gold-50);color:var(--mm-navy-900);}

/* Section scaffold */
.mm-guide-section{scroll-margin-top:148px;margin-top:var(--mm-s-8);}
.mm-guide-section:first-of-type{margin-top:var(--mm-s-6);}
.mm-guide-shead{margin-bottom:var(--mm-s-5);}
.mm-guide-shead__eyebrow{
  font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
  color:var(--mm-fg-accent);margin-bottom:var(--mm-s-2);
}
.mm-guide-shead__title{
  font-family:var(--mm-f-display);font-size:30px;font-weight:500;
  color:var(--mm-navy-900);margin:0;letter-spacing:-.01em;line-height:1.15;
}
.mm-guide-shead__intro{color:var(--mm-fg-secondary);font-size:15px;line-height:1.6;margin:var(--mm-s-3) 0 0;max-width:720px;}
.mm-guide-shead__rule{height:1.5px;width:72px;background:var(--mm-gold-500);margin-top:var(--mm-s-4);}

/* Overview cards */
.mm-guide-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--mm-s-4);}
@media (max-width:880px){.mm-guide-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:540px){.mm-guide-grid{grid-template-columns:1fr;}}
.mm-guide-ocard{
  background:var(--mm-bg-surface);border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-lg);padding:var(--mm-s-5);
  border-top:2px solid var(--mm-gold-500);box-shadow:var(--mm-e-1);
}
.mm-guide-ocard__label{
  font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
  color:var(--mm-fg-tertiary);margin-bottom:var(--mm-s-2);
}
.mm-guide-ocard__value{
  font-family:var(--mm-f-display);font-size:26px;font-weight:500;
  color:var(--mm-navy-900);line-height:1.1;
}
.mm-guide-ocard__note{font-size:12.5px;color:var(--mm-fg-secondary);margin-top:var(--mm-s-2);line-height:1.5;}

/* Part panels */
.mm-guide-part{
  background:var(--mm-bg-surface);border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-lg);padding:var(--mm-s-6);box-shadow:var(--mm-e-1);
  margin-bottom:var(--mm-s-4);border-left:3px solid var(--mm-navy-700);
}
.mm-guide-part__head{display:flex;align-items:baseline;gap:var(--mm-s-3);flex-wrap:wrap;margin-bottom:var(--mm-s-4);}
.mm-guide-part__badge{
  font-family:var(--mm-f-mono);font-size:11px;font-weight:600;letter-spacing:.08em;
  background:var(--mm-navy-800);color:var(--mm-gold-400);
  padding:4px 10px;border-radius:var(--mm-r-sm);text-transform:uppercase;
  -webkit-print-color-adjust:exact;print-color-adjust:exact;
}
.mm-guide-part__title{font-family:var(--mm-f-display);font-size:21px;font-weight:500;color:var(--mm-navy-900);margin:0;}
.mm-guide-part__dur{font-size:12.5px;color:var(--mm-fg-tertiary);font-family:var(--mm-f-mono);}
.mm-guide-part__row{display:grid;grid-template-columns:140px 1fr;gap:var(--mm-s-3) var(--mm-s-4);align-items:start;margin-bottom:var(--mm-s-3);}
@media (max-width:600px){.mm-guide-part__row{grid-template-columns:1fr;gap:4px;}}
.mm-guide-part__key{font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--mm-fg-tertiary);text-transform:uppercase;padding-top:2px;}
.mm-guide-part__val{font-size:14.5px;color:var(--mm-fg-secondary);line-height:1.6;}
.mm-guide-formula{
  display:inline-block;font-family:var(--mm-f-mono);font-size:13px;
  background:var(--mm-gold-50);color:var(--mm-gold-900);
  padding:6px 12px;border-radius:var(--mm-r-sm);
  border:1px solid var(--mm-gold-200);line-height:1.5;
  -webkit-print-color-adjust:exact;print-color-adjust:exact;
}

/* Example weak/better */
.mm-guide-ex{margin-top:var(--mm-s-4);border-top:1px dashed var(--mm-border-subtle);padding-top:var(--mm-s-4);}
.mm-guide-ex__q{font-size:14px;color:var(--mm-navy-900);font-weight:600;margin-bottom:var(--mm-s-3);}
.mm-guide-ex__row{display:grid;grid-template-columns:1fr 1fr;gap:var(--mm-s-3);}
@media (max-width:640px){.mm-guide-ex__row{grid-template-columns:1fr;}}
.mm-guide-ex__cell{border-radius:var(--mm-r-md);padding:var(--mm-s-4);font-size:13.5px;line-height:1.6;}
.mm-guide-ex__cell--weak{background:var(--mm-danger-bg);color:var(--mm-ink-900);border:1px solid #ecc9c9;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.mm-guide-ex__cell--better{background:var(--mm-success-bg);color:var(--mm-ink-900);border:1px solid #c7e0d2;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.mm-guide-ex__tag{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:6px;}
.mm-guide-ex__cell--weak .mm-guide-ex__tag{color:var(--mm-danger);}
.mm-guide-ex__cell--better .mm-guide-ex__tag{color:var(--mm-success);}

/* Cue-card block */
.mm-guide-cue{
  background:var(--mm-cream);border:1px solid var(--mm-gold-200);
  border-radius:var(--mm-r-md);padding:var(--mm-s-5);margin-top:var(--mm-s-3);
  -webkit-print-color-adjust:exact;print-color-adjust:exact;
}
.mm-guide-cue__title{font-family:var(--mm-f-display);font-size:16px;font-weight:600;color:var(--mm-navy-900);margin:0 0 var(--mm-s-2);}
.mm-guide-cue__lead{font-size:13px;color:var(--mm-fg-secondary);margin:0 0 var(--mm-s-2);}
.mm-guide-cue__list{margin:0;padding-left:20px;}
.mm-guide-cue__list li{font-size:14px;color:var(--mm-ink-900);line-height:1.7;}

/* Accordion (scoring criteria) */
.mm-guide-acc{display:flex;flex-direction:column;gap:var(--mm-s-3);}
.mm-guide-acc__item{
  background:var(--mm-bg-surface);border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-lg);overflow:hidden;box-shadow:var(--mm-e-1);
}
.mm-guide-acc__btn{
  width:100%;display:flex;align-items:center;gap:var(--mm-s-3);
  padding:var(--mm-s-5);text-align:left;cursor:pointer;background:transparent;
}
.mm-guide-acc__btn:hover{background:var(--mm-navy-50);}
.mm-guide-acc__num{
  flex:0 0 auto;width:34px;height:34px;border-radius:var(--mm-r-full);
  display:grid;place-items:center;font-family:var(--mm-f-mono);font-size:14px;font-weight:600;
  background:var(--mm-navy-800);color:var(--mm-gold-400);
  -webkit-print-color-adjust:exact;print-color-adjust:exact;
}
.mm-guide-acc__title{flex:1;font-family:var(--mm-f-display);font-size:17px;font-weight:500;color:var(--mm-navy-900);}
.mm-guide-acc__chev{flex:0 0 auto;color:var(--mm-fg-tertiary);transition:transform var(--mm-dur-std) var(--mm-ease);}
.mm-guide-acc__item.is-open .mm-guide-acc__chev{transform:rotate(180deg);}
.mm-guide-acc__body{display:none;padding:0 var(--mm-s-5) var(--mm-s-5);}
.mm-guide-acc__item.is-open .mm-guide-acc__body{display:block;}
.mm-guide-acc__cols{display:grid;grid-template-columns:1fr 1fr;gap:var(--mm-s-5);}
@media (max-width:640px){.mm-guide-acc__cols{grid-template-columns:1fr;}}
.mm-guide-acc__h{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--mm-fg-tertiary);margin:0 0 var(--mm-s-2);}
.mm-guide-acc__list{margin:0;padding-left:18px;}
.mm-guide-acc__list li{font-size:13.5px;color:var(--mm-fg-secondary);line-height:1.7;margin-bottom:4px;}

/* Do / Don't columns */
.mm-guide-dd{display:grid;grid-template-columns:1fr 1fr;gap:var(--mm-s-4);}
@media (max-width:700px){.mm-guide-dd{grid-template-columns:1fr;}}
.mm-guide-dd__col{border-radius:var(--mm-r-lg);padding:var(--mm-s-5);border:1px solid var(--mm-border-subtle);box-shadow:var(--mm-e-1);}
.mm-guide-dd__col--do{background:var(--mm-success-bg);border-color:#c7e0d2;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.mm-guide-dd__col--dont{background:var(--mm-danger-bg);border-color:#ecc9c9;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.mm-guide-dd__title{font-family:var(--mm-f-display);font-size:20px;font-weight:600;margin:0 0 var(--mm-s-4);display:flex;align-items:center;gap:8px;}
.mm-guide-dd__col--do .mm-guide-dd__title{color:var(--mm-band-expert);}
.mm-guide-dd__col--dont .mm-guide-dd__title{color:var(--mm-danger);}
.mm-guide-dd__list{margin:0;padding:0;list-style:none;}
.mm-guide-dd__list li{font-size:14px;color:var(--mm-ink-900);line-height:1.55;padding:7px 0 7px 26px;position:relative;border-bottom:1px solid rgba(0,0,0,.05);}
.mm-guide-dd__list li:last-child{border-bottom:0;}
.mm-guide-dd__list li::before{position:absolute;left:0;top:7px;font-weight:700;font-size:15px;}
.mm-guide-dd__col--do .mm-guide-dd__list li::before{content:"✓";color:var(--mm-band-expert);}
.mm-guide-dd__col--dont .mm-guide-dd__list li::before{content:"✕";color:var(--mm-danger);}

/* Band improvement tiers */
.mm-guide-tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--mm-s-4);}
@media (max-width:820px){.mm-guide-tiers{grid-template-columns:1fr;}}
.mm-guide-tier{background:var(--mm-bg-surface);border:1px solid var(--mm-border-subtle);border-radius:var(--mm-r-lg);padding:var(--mm-s-5);box-shadow:var(--mm-e-1);border-top:3px solid var(--mm-navy-700);}
.mm-guide-tier--b6{border-top-color:var(--mm-band-competent);}
.mm-guide-tier--b7{border-top-color:var(--mm-band-good);}
.mm-guide-tier--b8{border-top-color:var(--mm-band-expert);}
.mm-guide-tier__band{font-family:var(--mm-f-mono);font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--mm-fg-tertiary);text-transform:uppercase;}
.mm-guide-tier__title{font-family:var(--mm-f-display);font-size:19px;font-weight:500;color:var(--mm-navy-900);margin:4px 0 var(--mm-s-3);}
.mm-guide-tier__list{margin:0;padding-left:18px;}
.mm-guide-tier__list li{font-size:13.5px;color:var(--mm-fg-secondary);line-height:1.65;margin-bottom:6px;}

/* Formula callouts */
.mm-guide-formulas{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--mm-s-4);}
@media (max-width:700px){.mm-guide-formulas{grid-template-columns:1fr;}}
.mm-guide-fcard{background:var(--mm-bg-surface);border:1px solid var(--mm-border-subtle);border-left:3px solid var(--mm-gold-500);border-radius:var(--mm-r-md);padding:var(--mm-s-5);box-shadow:var(--mm-e-1);}
.mm-guide-fcard__label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mm-fg-accent);margin-bottom:var(--mm-s-2);}
.mm-guide-fcard__body{font-size:15px;color:var(--mm-navy-900);line-height:1.6;font-family:var(--mm-f-display);font-style:italic;}

/* Common mistakes list */
.mm-guide-mistakes{display:flex;flex-direction:column;gap:var(--mm-s-3);}

/* Checklist */
.mm-guide-checklist{background:var(--mm-bg-surface);border:1px solid var(--mm-border-subtle);border-radius:var(--mm-r-lg);padding:var(--mm-s-5);box-shadow:var(--mm-e-1);}
.mm-guide-check{
  display:flex;align-items:flex-start;gap:var(--mm-s-3);
  padding:var(--mm-s-3) var(--mm-s-2);cursor:pointer;
  border-bottom:1px solid var(--mm-border-subtle);
  transition:background var(--mm-dur-quick) var(--mm-ease);
}
.mm-guide-check:last-child{border-bottom:0;}
.mm-guide-check:hover{background:var(--mm-navy-50);}
.mm-guide-check__box{
  flex:0 0 auto;width:22px;height:22px;border-radius:var(--mm-r-sm);
  border:2px solid var(--mm-navy-300);display:grid;place-items:center;
  margin-top:1px;transition:all var(--mm-dur-quick) var(--mm-ease);color:transparent;
}
.mm-guide-check__box svg{width:14px;height:14px;}
.mm-guide-check.is-checked .mm-guide-check__box{
  background:var(--mm-band-expert);border-color:var(--mm-band-expert);color:#fff;
  -webkit-print-color-adjust:exact;print-color-adjust:exact;
}
.mm-guide-check__text{font-size:14.5px;color:var(--mm-ink-900);line-height:1.5;}
.mm-guide-check.is-checked .mm-guide-check__text{color:var(--mm-fg-tertiary);text-decoration:line-through;}
.mm-guide-check__progress{font-size:12.5px;color:var(--mm-fg-tertiary);margin-top:var(--mm-s-4);text-align:right;font-family:var(--mm-f-mono);}

/* Warm-up prompts */
.mm-guide-warm{display:flex;flex-direction:column;gap:var(--mm-s-3);}
.mm-guide-warm__item{background:var(--mm-bg-surface);border:1px solid var(--mm-border-subtle);border-radius:var(--mm-r-md);padding:var(--mm-s-4) var(--mm-s-5);box-shadow:var(--mm-e-1);}
.mm-guide-warm__top{display:flex;align-items:center;gap:var(--mm-s-3);flex-wrap:wrap;}
.mm-guide-warm__num{flex:0 0 auto;width:28px;height:28px;border-radius:var(--mm-r-full);display:grid;place-items:center;font-family:var(--mm-f-mono);font-size:13px;font-weight:600;background:var(--mm-gold-50);color:var(--mm-gold-900);-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.mm-guide-warm__prompt{flex:1;font-size:14.5px;color:var(--mm-navy-900);min-width:180px;}
.mm-guide-warm__toggle{flex:0 0 auto;font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--mm-navy-700);background:transparent;box-shadow:inset 0 0 0 1.5px var(--mm-navy-300);border-radius:var(--mm-r-sm);padding:6px 12px;cursor:pointer;white-space:nowrap;}
.mm-guide-warm__toggle:hover{background:var(--mm-navy-50);}
.mm-guide-warm__sample{display:none;margin-top:var(--mm-s-4);padding-top:var(--mm-s-3);border-top:1px dashed var(--mm-border-subtle);}
.mm-guide-warm__item.is-open .mm-guide-warm__sample{display:block;}
.mm-guide-warm__sh{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mm-fg-accent);margin-bottom:var(--mm-s-2);}
.mm-guide-warm__list{margin:0;padding-left:18px;}
.mm-guide-warm__list li{font-size:13.5px;color:var(--mm-fg-secondary);line-height:1.65;margin-bottom:4px;}

/* Closing confidence message */
.mm-guide-closing{
  background:linear-gradient(135deg,var(--mm-navy-900),var(--mm-navy-800));
  color:var(--mm-navy-50);border-radius:var(--mm-r-2xl);
  padding:var(--mm-s-8) var(--mm-s-7);text-align:center;box-shadow:var(--mm-e-2);
  -webkit-print-color-adjust:exact;print-color-adjust:exact;
}
.mm-guide-closing__quote{font-family:var(--mm-f-display);font-size:clamp(20px,2.5vw,28px);line-height:1.5;font-weight:500;margin:0 auto var(--mm-s-5);max-width:680px;}
.mm-guide-closing__quote em{color:var(--mm-gold-400);font-style:italic;}

        lastOpenedAt:null,openCount:0,sessionCount:0,isArchived:false
      }));
      store.set(KEYS.TESTS,tests);
      store.set(KEYS.SEEDED,SEED_VERSION);
    } else if(seeded !== SEED_VERSION){
      // Additive migration — add any new seed tests only.
      // Existing tests, custom tests and session history are preserved untouched.
      const existingIds = new Set(existing.map(t=>t.id));
      const now = new Date().toISOString();
      const additions = SEED_TESTS.filter(s=>!existingIds.has(s.id)).map(t=>({
        ...t,createdAt:now,updatedAt:now,firstSeenAt:now,lastOpenedAt:null,openCount:0,sessionCount:0,isArchived:false
      }));

/* ------------------------------------------------------------
   AUDIO STORE — IndexedDB (blobs are far too large for localStorage)
   Each part's recording is keyed `${sessionId}:${partKey}`.
   ------------------------------------------------------------ */
const AudioStore = (function(){
  const DB_NAME = "mm.ielts.audio";
  const STORE = "recordings";
  let dbPromise = null;
  function open(){
    if(dbPromise) return dbPromise;
    dbPromise = new Promise((resolve,reject)=>{
      if(!("indexedDB" in window)){ reject(new Error("no-indexeddb")); return; }
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = ()=>{
        const db = req.result;
        if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
      };
      req.onsuccess = ()=>resolve(req.result);
      req.onerror = ()=>reject(req.error||new Error("idb-open-failed"));
    });
    return dbPromise;
  }
  function tx(mode){
    return open().then(db=>{
      const t = db.transaction(STORE, mode);
      return { store: t.objectStore(STORE), done: new Promise((res,rej)=>{ t.oncomplete=res; t.onerror=()=>rej(t.error); t.onabort=()=>rej(t.error); }) };
    });
  }
  async function put(key, blob){
    if(!blob) return false;
    try{
      const {store:s, done} = await tx("readwrite");
      s.put(blob, key);
      await done;
      return true;
    }catch(e){ console.warn("AudioStore.put failed", e); return false; }
  }
  async function get(key){
    try{
      const {store:s} = await tx("readonly");
      return await new Promise((res,rej)=>{
        const r = s.get(key);
        r.onsuccess = ()=>res(r.result||null);
        r.onerror = ()=>rej(r.error);
      });
    }catch(e){ return null; }
  }
  async function del(key){
    try{ const {store:s, done} = await tx("readwrite"); s.delete(key); await done; }catch(e){}
  }
  async function deleteSession(sessionId){
    for(const p of ["part1","part2","part3"]) await del(`${sessionId}:${p}`);
  }
  function available(){ return "indexedDB" in window; }
  return { put, get, delete:del, deleteSession, available };
})();

/* ============================================================
   ACCESS LAYER — Auth · Roles · Tokens · Notifications
   ------------------------------------------------------------
   ⚠ PROTOTYPE-SAFE / FRONTEND-ONLY ACCESS CONTROL.
   Client-only access control is NOT secure for a public or
   monetized deployment. Anyone with browser devtools can read
   localStorage, forge a role, or read the ADMIN_BOOTSTRAP_KEY
   below. Before any real public/paid launch you MUST move
   AuthAccess + TokenStore validation, password hashing, token
   generation and the admin allow-list to a server (e.g.
   Firebase / Supabase / Postgres + server-side auth). Every
   requireAdmin / token / daily-limit check must be re-enforced
   server-side; the checks here are convenience + UX only.
   ============================================================ */

// CONFIG — move server-side before production. Bootstraps the FIRST
// administrator account only; it is not a runtime password.
const ADMIN_BOOTSTRAP_KEY = "MM-ADMIN-2026";
const TOKEN_PREFIX = "MM-TK-2026";
const AGE_RANGES = ["Under 13","13–15","16–18","19–24","25–34","35–44","45+"];
const TOKEN_EXPIRY_PRESETS = [
  {value:"today", label:"Today only"},
  {value:"3",     label:"3 days"},
  {value:"7",     label:"7 days (default)"},
  {value:"30",    label:"30 days"}
];

/* ---- crypto helpers (prototype-grade) ---- */
function randomHex(bytes){
  const a = new Uint8Array(bytes);
  if(window.crypto && crypto.getRandomValues) crypto.getRandomValues(a);
  else for(let i=0;i<a.length;i++) a[i]=Math.floor(Math.random()*256);
  return Array.from(a).map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function sha256Hex(str){
  if(window.crypto && crypto.subtle){
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  let h=0; for(let i=0;i<str.length;i++) h=((h<<5)-h+str.charCodeAt(i))|0;   // weak fallback
  return Math.abs(h).toString(16);
}
async function hashPassword(password, saltHex){
  // PBKDF2 when SubtleCrypto exists. Real password hashing must run server-side.
  if(window.crypto && crypto.subtle){
    try{
      const keyMat = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), {name:"PBKDF2"}, false, ["deriveBits"]);
      const salt = Uint8Array.from(saltHex.match(/.{2}/g).map(h=>parseInt(h,16)));
      const bits = await crypto.subtle.deriveBits({name:"PBKDF2", salt, iterations:120000, hash:"SHA-256"}, keyMat, 256);
      return Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,"0")).join("");
    }catch(e){ /* fall through */ }
  }
  return await sha256Hex(saltHex + ":" + password);
}

/* ---- text + date helpers ---- */
function normName(s){ return (s||"").trim().replace(/\s+/g," "); }
function normKey(s){ return normName(s).toLowerCase(); }
function localDateKey(d){
  const dt = d ? new Date(d) : new Date();
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
}

/* ---- token helpers ---- */
function generateRawToken(){
  // MM-TK-2026-XXXX-XXXX-XXXX · crypto-strong · unambiguous alphabet (no I,O,0,1)
  const ALPHA = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // length 32 → no modulo bias on a byte
  const bytes = new Uint8Array(12);
  if(window.crypto && crypto.getRandomValues) crypto.getRandomValues(bytes);
  else for(let i=0;i<bytes.length;i++) bytes[i]=Math.floor(Math.random()*256);
  const chars = Array.from(bytes).map(b=>ALPHA[b % ALPHA.length]);
  const grp = i => chars.slice(i,i+4).join("");
  return `${TOKEN_PREFIX}-${grp(0)}-${grp(4)}-${grp(8)}`;
}
const TOKEN_RE = /^MM-TK-2026-[A-Z2-9]{4}-[A-Z2-9]{4}-[A-Z2-9]{4}$/;
function normToken(raw){ return (raw||"").toUpperCase().replace(/\s+/g,"").trim(); }
function expiryFromPreset(preset){
  if(preset==="today"){ const d=new Date(); d.setHours(23,59,59,999); return d.toISOString(); }
  const days = parseInt(preset,10)||7;
  return new Date(Date.now() + days*86400000).toISOString();
}
function isExpired(tok){ return !!(tok.expiresAt && new Date(tok.expiresAt).getTime() < Date.now()); }

/* ============================================================
   AuthAccess — the single façade for the whole access layer.
   ============================================================ */
const AuthAccess = {
  /* ---- session / roles ---- */
  currentUser(){
    const s = AuthStore.current();
    if(!s) return null;
    const u = UserStore.byId(s.userId);
    if(!u || u.disabled) return null;
    return u;
  },
  isAdmin(){ const u=this.currentUser(); return !!u && u.role==="admin"; },
  requireLogin(){ return !!this.currentUser(); },
  requireAdmin(){ return this.isAdmin(); },

  /* ---- signup / login / logout ---- */
  async signup({fullName, ageRange, nationality, password, asAdmin=false, adminKey=""}){
    const name = normName(fullName);
    if(name.split(" ").filter(Boolean).length < 2) return {ok:false, error:"Please enter your real full name (at least two words)."};
    if(!ageRange) return {ok:false, error:"Please select your age range."};
    if(!normName(nationality)) return {ok:false, error:"Please enter your nationality."};
    if(!password || password.length < 6) return {ok:false, error:"Password must be at least 6 characters long."};
    if(UserStore.byName(name)) return {ok:false, error:"An account with this full name already exists. Try signing in instead."};
    if(asAdmin && adminKey !== ADMIN_BOOTSTRAP_KEY) return {ok:false, error:"Invalid administrator key."};
    const saltHex = randomHex(16);
    const passwordHash = await hashPassword(password, saltHex);
    const user = {
      id:"usr_"+randomHex(8),
      fullName:name, fullNameNormalized:normKey(name),
      ageRange, nationality:normName(nationality), nationalityNormalized:normKey(nationality),
      passwordSalt:saltHex, passwordHash,           // password itself is never stored
      role: asAdmin ? "admin" : "user",
      deviceId: DeviceId.get(), disabled:false,
      createdAt:new Date().toISOString()
    };
    UserStore.save(user);
    AuthStore.set({userId:user.id, since:new Date().toISOString()});
    return {ok:true, user};
  },
  async login({fullName, password, adminKey=null}){
    const u = UserStore.byName(fullName);
    if(!u) return {ok:false, error:"No account found with that full name."};
    if(u.disabled) return {ok:false, error:"This account has been disabled by the administrator."};
    const h = await hashPassword(password, u.passwordSalt);
    if(h !== u.passwordHash) return {ok:false, error:"Incorrect password."};
    // Elevation path: a normal account can be promoted to admin with the key.
    if(adminKey !== null && u.role !== "admin"){
      if(adminKey !== ADMIN_BOOTSTRAP_KEY) return {ok:false, error:"Invalid administrator key."};
      u.role="admin"; UserStore.save(u);
    }
    AuthStore.set({userId:u.id, since:new Date().toISOString()});
    return {ok:true, user:u};
  },
  logout(){ AuthStore.clear(); },

  /* ---- daily limit: one token per user AND per device per local day ---- */
  canUserUseTokenToday(userId, deviceId){
    const today = localDateKey();
    const consumed = TokenStore.all().filter(t=>t.status==="consumed" && t.consumedAt && localDateKey(t.consumedAt)===today);
    if(consumed.some(t=>t.userId===userId)) return {allowed:false, reason:"user",   message:"You have already used today’s token. You may request another token tomorrow."};
    if(consumed.some(t=>t.deviceId===deviceId)) return {allowed:false, reason:"device", message:"This device has already used one token today."};
    return {allowed:true};
  },

  /* ---- token requests ---- */
  createTokenRequest(testId){
    const u = this.currentUser(); if(!u) return {ok:false, error:"You are not signed in."};
    const device = DeviceId.get();
    const limit = this.canUserUseTokenToday(u.id, device);
    if(!limit.allowed) return {ok:false, error:"You have already used today’s token. You may request another token tomorrow."};
    if(RequestStore.forUser(u.id).some(r=>r.status==="pending")) return {ok:false, error:"You already have a pending token request."};
    const test = testId ? Library.get(testId) : null;
    const req = {
      requestId:"req_"+randomHex(6),
      userId:u.id, fullName:u.fullName, ageRange:u.ageRange, nationality:u.nationality,
      deviceId:device, requestedAt:new Date().toISOString(),
      status:"pending", requestedFor: testId||null, requestedForTitle: test?test.title:null,
      adminNote:null, grantedTokenId:null
    };
    RequestStore.save(req);
    return {ok:true, request:req};
  },
  listTokenRequests(filter){
    let rows = RequestStore.all().slice().sort((a,b)=>new Date(b.requestedAt)-new Date(a.requestedAt));
    if(filter && filter!=="all") rows = rows.filter(r=>r.status===filter);
    return rows;
  },

  /* ---- admin actions ---- */
  async grantToken(requestId, {expiryPreset="7"}={}){
    if(!this.requireAdmin()) return {ok:false, error:"Access restricted."};
    const req = RequestStore.byId(requestId); if(!req) return {ok:false, error:"Request not found."};
    const raw = generateRawToken();
    const tokenHash = await sha256Hex(raw);
    const now = new Date().toISOString();
    const admin = this.currentUser();
    const token = {
      tokenId:"tok_"+randomHex(8), tokenHash, displayTokenLast4:raw.slice(-4),
      userId:req.userId, fullName:req.fullName, deviceId:req.deviceId,
      status:"unused",
      createdAt:now, grantedAt:now, grantedBy: admin?admin.fullName:"admin",
      expiresAt: expiryFromPreset(expiryPreset),
      consumedAt:null, consumedForTestId:null, consumedForTestTitle:null,
      revokedAt:null, revokedBy:null, revokeReason:null,
      requestId:req.requestId,
      rawTokenForDisplay:raw   // PROTOTYPE ONLY — never persist raw tokens server-side
    };
    TokenStore.save(token);
    req.status="granted"; req.grantedTokenId=token.tokenId; RequestStore.save(req);
    NotificationStore.push({
      notificationId:"ntf_"+randomHex(6), userId:req.userId, type:"token_granted",
      title:"Your access token is ready.",
      message:"Copy this token and paste it when you start a test. One token unlocks one test, and you can use one token per day.",
      tokenId:token.tokenId, rawTokenForDisplay:raw,
      createdAt:now, readAt:null, expiresAt:token.expiresAt
    });
    return {ok:true, token};
  },
  rejectTokenRequest(requestId, reason){
    if(!this.requireAdmin()) return {ok:false, error:"Access restricted."};
    const req = RequestStore.byId(requestId); if(!req) return {ok:false, error:"Request not found."};
    req.status="rejected"; req.adminNote=reason||null; RequestStore.save(req);
    NotificationStore.push({
      notificationId:"ntf_"+randomHex(6), userId:req.userId, type:"token_rejected",
      title:"Your token request was not approved.",
      message: reason ? ("Note from the administrator: "+reason) : "You may submit a new request when you are ready.",
      tokenId:null, rawTokenForDisplay:null,
      createdAt:new Date().toISOString(), readAt:null, expiresAt:null
    });
    return {ok:true};
  },
  revokeToken(tokenId, reason){
    if(!this.requireAdmin()) return {ok:false, error:"Access restricted."};
    const tok = TokenStore.byId(tokenId); if(!tok) return {ok:false, error:"Token not found."};
    if(tok.status==="consumed") return {ok:false, error:"A token that has already been used cannot be revoked."};
    tok.status="revoked"; tok.revokedAt=new Date().toISOString();
    const admin=this.currentUser(); tok.revokedBy=admin?admin.fullName:"admin"; tok.revokeReason=reason||null;
    TokenStore.save(tok);
    // mark a linked pending/granted request as revoked too
    if(tok.requestId){ const r=RequestStore.byId(tok.requestId); if(r && (r.status==="granted"||r.status==="pending")){ r.status="revoked"; RequestStore.save(r); } }
    NotificationStore.push({
      notificationId:"ntf_"+randomHex(6), userId:tok.userId, type:"token_revoked",
      title:"This token was revoked by the administrator.",
      message: reason ? ("Reason: "+reason) : "Please request a new token if you still need access.",
      tokenId:tok.tokenId, rawTokenForDisplay:null,
      createdAt:new Date().toISOString(), readAt:null, expiresAt:null
    });
    return {ok:true};
  },
  revokeUserAccess(userId, disabled=true){
    if(!this.requireAdmin()) return {ok:false, error:"Access restricted."};
    const u = UserStore.byId(userId); if(!u) return {ok:false, error:"User not found."};
    if(u.role==="admin") return {ok:false, error:"You cannot disable an administrator account."};
    u.disabled = !!disabled; UserStore.save(u);
    return {ok:true};
  },

  /* ---- validate (phase 1) & consume (phase 2, only once test starts) ---- */
  async validateToken(rawInput){
    const u = this.currentUser(); if(!u) return {ok:false, error:"You are not signed in."};
    const device = DeviceId.get();
    const raw = normToken(rawInput);
    if(!TOKEN_RE.test(raw)) return {ok:false, error:"That token doesn’t look right. Tokens look like MM-TK-2026-XXXX-XXXX-XXXX."};
    const hash = await sha256Hex(raw);
    const tok = TokenStore.byHash(hash);
    if(!tok) return {ok:false, error:"Invalid token. Please check it and try again."};
    if(tok.userId !== u.id) return {ok:false, error:"This token belongs to another user."};
    if(tok.status==="consumed") return {ok:false, error:"This token has already been used."};
    if(tok.status==="revoked") return {ok:false, error:"This token was revoked by the administrator."};
    if(tok.status==="expired" || isExpired(tok)){
      if(tok.status!=="expired"){ tok.status="expired"; TokenStore.save(tok); }
      return {ok:false, error:"This token has expired."};
    }
    const limit = this.canUserUseTokenToday(u.id, device);
    if(!limit.allowed){
      // distinguish the "valid but daily limit reached" messages
      if(limit.reason==="device") return {ok:false, error:"This device has already used one token today."};
      return {ok:false, error:"This token is valid, but you have already used one token today."};
    }
    return {ok:true, token:tok};
  },
  consumeValidatedToken(tokenId, testId, testTitle){
    const tok = TokenStore.byId(tokenId);
    if(!tok || tok.status!=="unused") return {ok:false, error:"Token is no longer available."};
    const u = this.currentUser();
    const limit = this.canUserUseTokenToday(u.id, DeviceId.get());  // final double-spend guard
    if(!limit.allowed) return {ok:false, error: limit.message};
    tok.status="consumed"; tok.consumedAt=new Date().toISOString();
    tok.consumedForTestId=testId; tok.consumedForTestTitle=testTitle;
    TokenStore.save(tok);
    const ntf = NotificationStore.all().find(n=>n.tokenId===tok.tokenId && n.type==="token_granted");
    if(ntf){
      ntf.type="token_used"; ntf.title=`Token used for ${testTitle}.`;
      ntf.message=`Used on ${fmt.dateMed(tok.consumedAt)}.`; ntf.rawTokenForDisplay=null;
      NotificationStore.save(ntf);
    }
    return {ok:true, token:tok};
  },

  /* ---- notifications ---- */
  listUserNotifications(userId){ return NotificationStore.forUser(userId || (this.currentUser()||{}).id); },
  unreadCount(userId){ const id=userId||(this.currentUser()||{}).id; if(!id) return 0; return NotificationStore.forUser(id).filter(n=>!n.readAt).length; },
  markNotificationRead(id){ const n=NotificationStore.byId(id); if(n && !n.readAt){ n.readAt=new Date().toISOString(); NotificationStore.save(n); } },
  markAllRead(){ const u=this.currentUser(); if(!u) return; NotificationStore.forUser(u.id).forEach(n=>{ if(!n.readAt){ n.readAt=new Date().toISOString(); NotificationStore.save(n);} }); },

  /* ---- token status summary (profile) ---- */
  userTokenStatus(userId){
    const id = userId || (this.currentUser()||{}).id;
    const limit = this.canUserUseTokenToday(id, DeviceId.get());
    if(!limit.allowed && limit.reason==="user") return {state:"used_today", label:"Token used today"};
    if(RequestStore.forUser(id).some(r=>r.status==="pending")) return {state:"pending", label:"Token request pending"};
    const active = TokenStore.forUser(id).find(t=>t.status==="unused" && !isExpired(t));
    if(active) return {state:"active", label:"Active unused token", token:active};
    return {state:"none", label:"No active token"};
  },

  /* ---- session scoping ---- */
  getUserScopedSessions(){ const u=this.currentUser(); return u ? Sessions.forUser(u.id) : []; },
  getAdminSessions(){ return this.requireAdmin() ? Sessions.all() : []; },

  /* ---- legacy-session migration ---- */
  assignLegacySessionsToCurrentUser(){
    const u=this.currentUser(); if(!u) return 0;
    const all=Sessions.all(); let n=0;
    all.forEach(s=>{ if(!s.userId){ s.userId=u.id; n++; } });
    store.set(KEYS.SESSIONS, all); return n;
  },
  adminAssignSessionToUser(sessionId, userId){
    if(!this.requireAdmin()) return {ok:false, error:"Access restricted."};
    const s=Sessions.get(sessionId); if(!s) return {ok:false, error:"Session not found."};
    s.userId=userId; Sessions.save(s); return {ok:true};
  }
};


/* ------------------------------------------------------------
   RECORDING — MediaRecorder, Timer, Waveform, VAD
   ------------------------------------------------------------ */
const Recorder = (function(){
  let mediaRecorder=null, chunks=[], stream=null, mime="", startTs=0, pausedMs=0, pauseStart=0;
  let audioCtx=null, analyser=null, buffer=null;
  const priority = [
    "audio/webm;codecs=opus","audio/ogg;codecs=opus",
    "audio/mp4;codecs=mp4a.40.2","audio/mp4","audio/webm"
  ];
  function negotiate(){
    if(typeof MediaRecorder==="undefined") return "";
    for(const m of priority) if(MediaRecorder.isTypeSupported(m)) return m;
    return "";
  }
  async function requestStream(){
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia) throw new Error("ERR_MIC_UNSUPPORTED");
    return await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true,channelCount:{ideal:1}},
      video:false
    });
  }
  async function init(){
    stream = await requestStream();
    mime = negotiate();
    mediaRecorder = mime ? new MediaRecorder(stream,{mimeType:mime}) : new MediaRecorder(stream);
    chunks = [];
    mediaRecorder.ondataavailable = e => { if(e.data && e.data.size>0) chunks.push(e.data); };
    // Setup audio analyser
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.7;
    src.connect(analyser);
    buffer = new Uint8Array(analyser.fftSize);
    return {mime,stream};
  }
  function start(){
    startTs = performance.now();
    pausedMs = 0;
    mediaRecorder.start(1000);
  }
  function pause(){
    if(mediaRecorder.state==="recording"){
      mediaRecorder.pause();
      pauseStart = performance.now();
    }
  }
  function resume(){
    if(mediaRecorder.state==="paused"){
      pausedMs += performance.now() - pauseStart;
      mediaRecorder.resume();
    }
  }
  async function stop(){
    return new Promise(resolve=>{
      mediaRecorder.onstop = ()=>{
        const blob = new Blob(chunks,{type:mime||"audio/webm"});
        const duration = performance.now() - startTs - pausedMs;
        resolve({blob,mime,durationMs:Math.round(duration),chunksCount:chunks.length});
      };
      mediaRecorder.stop();
    });
  }
  function readFrame(){
    if(!analyser) return null;
    analyser.getByteTimeDomainData(buffer);
    return buffer;
  }
  function destroy(){
    try{if(stream) stream.getTracks().forEach(t=>t.stop());}catch(e){}
    try{if(audioCtx) audioCtx.close();}catch(e){}
    mediaRecorder=null;stream=null;audioCtx=null;analyser=null;chunks=[];
  }
  return {init,start,pause,resume,stop,readFrame,destroy,
    getMime:()=>mime,
    getAnalyser:()=>analyser
  };
})();

/* MicTest — zero-cost browser microphone check before recording.
   Samples ~3s of input and reuses the VAD frame math + micQualityScore
   to judge level, clipping, silence and approximate background noise.
   No network, no cost. Returns a status the setup screen can act on. */
const MicTest = (function(){
  async function run(durationMs, onLevel){
    durationMs = durationMs || 3000;
    let stream;
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true,channelCount:{ideal:1}}, video:false
      });
    }catch(e){
      return { status:"denied", score:0, warnings:["Microphone permission was not granted. Please allow access and try again."] };
    }
    let ctx, analyser, stop=false;
    try{
      ctx = new (window.AudioContext||window.webkitAudioContext)();
      const src = ctx.createMediaStreamSource(stream);
      analyser = ctx.createAnalyser(); analyser.fftSize = 2048; analyser.smoothingTimeConstant = 0.7;
      src.connect(analyser);
    }catch(e){
      try{stream.getTracks().forEach(t=>t.stop());}catch(_){}
      return { status:"unusable", score:0, warnings:["Audio could not be initialised in this browser."] };
    }
    const buf = new Uint8Array(analyser.fftSize);
    const vad = new VAD();
    const start = performance.now();
    await new Promise(resolve=>{
      const loop=()=>{
        if(stop) return resolve();
        const t = performance.now()-start;
        analyser.getByteTimeDomainData(buf);
        vad.processFrame(buf, t);
        if(onLevel){
          let sumSq=0; for(let i=0;i<buf.length;i++){const s=buf[i]-128;sumSq+=s*s;}
          onLevel(Math.min(1, Math.sqrt(sumSq/buf.length)/55));
        }
        if(t>=durationMs){ stop=true; return resolve(); }
        requestAnimationFrame(loop);
      };
      loop();
    });
    const m = vad.finalize(performance.now()-start);
    try{stream.getTracks().forEach(t=>t.stop());}catch(e){}
    try{ctx.close();}catch(e){}
    const q = micQualityScore(m);
    const warnings = [];
    if(m.peakRms < 8) warnings.push("Your microphone signal is weak. Move closer, reduce background noise, or choose another microphone.");
    if(m.clippingFrameRatio > 0.05) warnings.push("The input may be too loud (distortion detected). Lower the input level or move back a little.");
    if(m.speechRatio < 0.10) warnings.push("Very little speech was detected — please speak continuously for the full check.");
    if(m.noiseVariance > 8) warnings.push("Background noise seems high. A quieter room will improve the estimate.");
    let status;
    if(m.peakRms < 3) status = "unusable";
    else if(q.score >= 60 && warnings.length === 0) status = "pass";
    else status = "weak";
    return { status, score:q.score, peakRms:Math.round(m.peakRms), speechRatio:+m.speechRatio.toFixed(2), warnings };
  }
  return { run };
})();

/* Transcriber — provider-agnostic with Web Speech adapter */
const Transcriber = (function(){
  let recognition=null, segments=[], interimText="", startedAt=0, active=false, lang="en-US";
  let interimHistory=[]; let currentInterim=""; let revisionsTotal=0;
  let onPartialCb=null, onFinalCb=null;
  const available = ()=>!!(window.SpeechRecognition||window.webkitSpeechRecognition);
  function start(options={}){
    if(!available()){
      active=false;
      // Fallback: produce a synthetic "transcription-unavailable" result at stop time
      return false;
    }
    const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = options.lang||lang;
    segments = []; interimText=""; interimHistory=[]; currentInterim=""; revisionsTotal=0;
    startedAt = performance.now();
    active = true;
    let lastEndMs = 0;
    recognition.onresult = (e)=>{
      for(let i=e.resultIndex;i<e.results.length;i++){
        const r = e.results[i];
        const text = r[0].transcript;
        if(r.isFinal){
          const nowMs = performance.now() - startedAt;
          const conf = typeof r[0].confidence === "number" ? r[0].confidence : 0.82;
          segments.push({
            startMs:lastEndMs,
            endMs:nowMs,
            text:text.trim(),
            confidence:conf
          });
          lastEndMs = nowMs;
          interimText = "";
          currentInterim = "";
          if(onFinalCb) onFinalCb(text.trim());
        } else {
          interimText = text;
          // Count revisions: if new interim is not a strict prefix-extension of prior, count it
          if(currentInterim && !text.startsWith(currentInterim)) revisionsTotal++;
          currentInterim = text;
          if(onPartialCb) onPartialCb(text);
        }
      }
    };
    recognition.onend = ()=>{
      if(active){
        // Chrome 60s auto-end workaround — restart if still active
        try{recognition.start();}catch(e){}
      }
    };
    recognition.onerror = (e)=>{
      // swallow; stop will produce whatever we have
      if(e.error==="not-allowed"||e.error==="service-not-allowed") active=false;
    };
    try{recognition.start();}catch(e){active=false;return false;}
    return true;
  }
  async function stop(){
    active = false;
    if(recognition){
      try{recognition.stop();}catch(e){}
      recognition = null;
    }
    // Give the engine a tick to flush any last final result
    await new Promise(r=>setTimeout(r,120));
    const text = segments.map(s=>s.text).join(" ").trim();
    const confSum = segments.reduce((a,s)=>a+s.confidence,0);
    const confidence = segments.length ? confSum/segments.length : 0;
    const durationMs = performance.now() - startedAt;
    // Transcript stability score
    const stability = segments.length ? clamp01(1 - (revisionsTotal/segments.length)/5) : 0.5;
    return {
      text,segments,words:[],
      confidence:confidence||0,
      languageDetected:lang,
      durationMs:Math.round(durationMs),
      provider:"web-speech",
      providerMeta:{interimResults:true,revisions:revisionsTotal},
      warnings:[],
      sourceTags:["transcript"],
      stability
    };
  }
  function onPartial(cb){onPartialCb=cb;}
  function onFinal(cb){onFinalCb=cb;}
  return {available,start,stop,onPartial,onFinal,
    get segments(){return segments;},
    get interim(){return interimText;}
  };
})();

/* ------------------------------------------------------------
   HOSTED WHISPER-STYLE TRANSCRIPTION
   OpenAI-compatible /audio/transcriptions endpoint. Works with
   OpenAI, Groq, and self-hosted servers (faster-whisper-server,
   LocalAI, etc.). Transcription is post-hoc: the recorded clip is
   uploaded after each part and processed on the report screen.
   ------------------------------------------------------------ */
const TRANSCRIPTION_PRESETS = {
  openai: { label:"OpenAI", baseUrl:"https://api.openai.com/v1", model:"whisper-1" },
  groq:   { label:"Groq",   baseUrl:"https://api.groq.com/openai/v1", model:"whisper-large-v3" },
  custom: { label:"Custom / self-hosted", baseUrl:"", model:"whisper-1" }
};
const DEFAULT_TRANSCRIPTION = {
  provider:"whisper",   // "whisper" | "browser"
  preset:"openai",
  baseUrl:"https://api.openai.com/v1",
  apiKey:"",
  model:"whisper-1",
  language:"en"
};
function getTranscriptionSettings(){
  const s = store.get(KEYS.SETTINGS,{}) || {};
  return {...DEFAULT_TRANSCRIPTION, ...(s.transcription||{})};
}
function saveTranscriptionSettings(patch){
  const s = store.get(KEYS.SETTINGS,{}) || {};
  s.transcription = {...DEFAULT_TRANSCRIPTION, ...(s.transcription||{}), ...patch};
  store.set(KEYS.SETTINGS, s);
  return s.transcription;
}
function whisperConfigured(){
  const t = getTranscriptionSettings();
  return !!(t.baseUrl && t.baseUrl.trim() && t.apiKey && t.apiKey.trim());
}
/* Effective transcription mode for a session:
   "whisper"          → hosted API configured and selected
   "browser"          → browser engine selected, or used as fallback
   "none"             → neither available (audio still recorded) */
function activeTranscriptionMode(){
  if(Backend.available()) return "backend";
  const t = getTranscriptionSettings();
  if(t.provider === "browser") return Transcriber.available() ? "browser" : "none";
  // provider === "whisper"
  if(whisperConfigured()) return "whisper";
  return Transcriber.available() ? "browser" : "none";
}

const WhisperClient = (function(){
  function blobExtension(blob){
    const t = (blob && blob.type) || "";
    if(t.includes("mp4") || t.includes("m4a") || t.includes("mpeg")) return "m4a";
    if(t.includes("ogg")) return "ogg";
    if(t.includes("wav")) return "wav";
    return "webm";
  }
  async function transcribe(blob, opts){
    const cfg = {...getTranscriptionSettings(), ...(opts||{})};
    if(!cfg.baseUrl || !cfg.apiKey) throw new Error("Transcription API not configured");
    const url = cfg.baseUrl.replace(/\/+$/,"") + "/audio/transcriptions";
    const fd = new FormData();
    fd.append("file", blob, `recording.${blobExtension(blob)}`);
    fd.append("model", cfg.model || "whisper-1");
    if(cfg.language && cfg.language !== "auto") fd.append("language", cfg.language);
    fd.append("response_format", "verbose_json");
    fd.append("temperature", "0");
    let res;
    try{
      res = await fetch(url, { method:"POST", headers:{ Authorization:`Bearer ${cfg.apiKey}` }, body:fd });
    }catch(netErr){
      throw new Error("Network/CORS error reaching the transcription endpoint. If self-hosting, enable CORS for this origin.");
    }
    if(!res.ok){
      let msg = `HTTP ${res.status}`;
      try{ const j = await res.json(); msg = (j.error && j.error.message) || j.message || JSON.stringify(j); }
      catch(e){ try{ const tx = await res.text(); if(tx) msg = tx.slice(0,200); }catch(_){} }
      if(res.status === 401 || res.status === 403) msg = "Authentication failed — check the API key. (" + msg + ")";
      const err = new Error(msg); err.status = res.status; throw err;
    }
    // Some servers return text/plain for non-json formats; we requested verbose_json.
    const ct = res.headers.get("content-type") || "";
    if(ct.includes("application/json")) return await res.json();
    const txt = await res.text();
    return { text: txt };
  }
  return { transcribe };
})();

/* Map a (verbose_)json Whisper response into the internal transcriptionResult
   shape consumed by the scoring engine and turn reconstruction. */
function whisperToResult(json, fallbackDurationMs){
  const sigmoidConf = (avgLogprob, noSpeechProb)=>{
    // avg_logprob is typically in [-1, 0]; exp() maps it to a 0..1 confidence.
    let c = (typeof avgLogprob === "number") ? Math.exp(avgLogprob) : 0.85;
    if(typeof noSpeechProb === "number") c *= (1 - clamp01(noSpeechProb));
    return clamp01(c);
  };
  const rawSegs = Array.isArray(json.segments) ? json.segments : [];
  let segments = rawSegs.map(s=>({
    startMs: Math.round((s.start||0)*1000),
    endMs: Math.round((s.end||0)*1000),
    text: (s.text||"").trim(),
    confidence: sigmoidConf(s.avg_logprob, s.no_speech_prob)
  })).filter(s=>s.text);
  const text = (json.text || segments.map(s=>s.text).join(" ")).trim();
  if(!segments.length && text){
    // No segment timing returned — synthesise one spanning the clip.
    segments = [{ startMs:0, endMs: Math.round(json.duration ? json.duration*1000 : (fallbackDurationMs||0)), text, confidence:0.85 }];
  }
  const confidence = segments.length ? mean(segments.map(s=>s.confidence)) : 0;
  return {
    text, segments, words:[],
    confidence: confidence || 0,
    languageDetected: json.language || "en",
    durationMs: Math.round(json.duration ? json.duration*1000 : (fallbackDurationMs||0)),
    provider: "whisper",
    providerMeta: { model: getTranscriptionSettings().model, segmentCount: segments.length },
    warnings: [],
    sourceTags: ["transcript"],
    stability: 0.95   // deterministic at temperature 0
  };
}
function emptyTranscriptionResult(warnings){
  return {
    text:"", segments:[], words:[], confidence:0, languageDetected:"en",
    durationMs:0, provider:"none", providerMeta:{}, warnings:warnings||[],
    sourceTags:["rule"], stability:0.5
  };
}

/* Build a silent WAV blob (for the Settings "Test connection" check). */
function makeSilentWav(seconds=1, sampleRate=16000){
  const numSamples = Math.floor(seconds*sampleRate);
  const buffer = new ArrayBuffer(44 + numSamples*2);
  const view = new DataView(buffer);
  const writeStr = (off,str)=>{ for(let i=0;i<str.length;i++) view.setUint8(off+i, str.charCodeAt(i)); };
  writeStr(0,"RIFF"); view.setUint32(4, 36+numSamples*2, true); writeStr(8,"WAVE");
  writeStr(12,"fmt "); view.setUint32(16,16,true); view.setUint16(20,1,true); view.setUint16(22,1,true);
  view.setUint32(24,sampleRate,true); view.setUint32(28,sampleRate*2,true); view.setUint16(32,2,true); view.setUint16(34,16,true);
  writeStr(36,"data"); view.setUint32(40,numSamples*2,true);
  // samples already zero (silence)
  return new Blob([buffer], {type:"audio/wav"});
}

/* ------------------------------------------------------------
   BACKEND CLIENT — optional server for transcription + AI scoring.
   When a backend is reachable, transcription and scoring run server-side
   (API key stays on the server). Otherwise the app falls back to the
   direct Whisper/browser path and the in-browser rule-based engine.
   ------------------------------------------------------------ */
function getBackendUrl(){
  const s = store.get(KEYS.SETTINGS,{}) || {};
  return ((s.backend && s.backend.url) || "").trim();
}
function saveBackendUrl(url){
  const s = store.get(KEYS.SETTINGS,{}) || {};
  s.backend = {...(s.backend||{}), url:(url||"").trim()};
  store.set(KEYS.SETTINGS, s);
}
const Backend = (function(){
  let cfg = null;
  const base = ()=> getBackendUrl().replace(/\/+$/,"");
  async function probe(){
    cfg = null;
    try{
      const r = await fetch(base()+"/api/config", {method:"GET"});
      if(r.ok) cfg = await r.json();
    }catch(e){ cfg = null; }
    return cfg;
  }
  const available = ()=> !!(cfg && cfg.transcription && cfg.transcription.enabled);
  const scoringAvailable = ()=> !!(cfg && cfg.scoring && cfg.scoring.enabled);
  const info = ()=> cfg;
  async function transcribe(blob, language){
    const ext = (blob.type||"").includes("mp4") ? "m4a" : (blob.type||"").includes("ogg") ? "ogg" : "webm";
    const fd = new FormData();
    fd.append("audio", blob, "recording."+ext);
    if(language && language!=="auto") fd.append("language", language);
    const r = await fetch(base()+"/api/transcribe", {method:"POST", body:fd});
    if(!r.ok){ let m=`HTTP ${r.status}`; try{ m=(await r.json()).error||m; }catch(e){} throw new Error(m); }
    return await r.json();
  }
  async function score(session, baseline){
    const r = await fetch(base()+"/api/score", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({session, baseline})});
    if(!r.ok) throw new Error("score HTTP "+r.status);
    return (await r.json()).scored;
  }
  async function listSessions(){ try{ const r=await fetch(base()+"/api/sessions"); if(r.ok) return await r.json(); }catch(e){} return null; }
  async function saveSession(s){ try{ await fetch(base()+"/api/sessions",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(s)}); }catch(e){} }
  async function deleteSession(id){ try{ await fetch(base()+"/api/sessions/"+encodeURIComponent(id),{method:"DELETE"}); }catch(e){} }
  return { probe, available, scoringAvailable, info, base, transcribe, score, listSessions, saveSession, deleteSession };
})();

async function syncSessionsFromBackend(){
  if(!Backend.available()) return false;
  const remote = await Backend.listSessions();
  if(!Array.isArray(remote)) return false;
  const byId = {};
  for(const s of Sessions.all()) byId[s.id] = s;
  for(const s of remote) if(s && s.id) byId[s.id] = s; // backend authoritative
  store.set(KEYS.SESSIONS, Object.values(byId));
  return true;
}

/* Timer — drift-free, RAF-driven */
class Timer {
  constructor(durationMs,callbacks={}){
    this.duration = durationMs;
    this.elapsedBefore = 0;
    this.startTs = null;
    this.running = false;
    this.cb = callbacks;
    this.warned = false;
    this.approached = false;
    this.flashes = new Set();
    this._raf = null;
  }
  start(){
    this.startTs = performance.now();
    this.running = true;
    this._tick();
  }
  pause(){
    if(!this.running) return;
    this.elapsedBefore += performance.now() - this.startTs;
    this.running = false;
    if(this._raf) cancelAnimationFrame(this._raf);
  }
  resume(){
    if(this.running) return;
    this.startTs = performance.now();
    this.running = true;
    this._tick();
  }
  stop(){this.running=false;if(this._raf) cancelAnimationFrame(this._raf);}
  elapsed(){return this.running ? this.elapsedBefore + (performance.now()-this.startTs) : this.elapsedBefore;}
  remaining(){return Math.max(0, this.duration - this.elapsed());}
  _tick(){
    if(!this.running) return;
    const remaining = this.remaining();
    if(this.cb.onTick) this.cb.onTick(remaining, this.elapsed());
    if(!this.approached && remaining<=10000){
      this.approached = true;
      if(this.cb.onApproach) this.cb.onApproach();
    }
    if(!this.warned && remaining<=3000){
      this.warned = true;
      if(this.cb.onWarning) this.cb.onWarning();
    }
    // Three flashes at T-3, T-2, T-1
    for(const n of [3,2,1]){
      const target = n*1000;
      if(remaining <= target && !this.flashes.has(n)){
        this.flashes.add(n);
        if(this.cb.onFlash) this.cb.onFlash(n);
      }
    }
    if(remaining<=0){
      this.running=false;
      if(this.cb.onExpired) this.cb.onExpired();
      return;
    }
    this._raf = requestAnimationFrame(()=>this._tick());
  }
}

/* VAD — energy + ZCR hybrid */
class VAD {
  constructor(){
    this.samples=[];
    this.state="silence";
    this.segments=[];
    this.frames=0;
    this.speechFrameStreak=0;
    this.silenceFrameStreak=0;
    this.currentSegStart=0;
    this.ambient=4.0;
    this.calibrating=true;
    this.calibSamples=[];
    this.peakRms=0;
    this.clippedFrames=0;
    this.sumRms=0;
    this.rmsValues=[];
  }
  processFrame(buffer,tMs){
    this.frames++;
    let sumSq=0, zcr=0, prev=128, clipped=0;
    for(let i=0;i<buffer.length;i++){
      const s = buffer[i]-128;
      sumSq += s*s;
      if((s>=0)!==(prev>=0)) zcr++;
      prev = s;
      if(buffer[i]===0||buffer[i]===255) clipped++;
    }
    const rms = Math.sqrt(sumSq/buffer.length);
    const zcRate = zcr/buffer.length;
    if(clipped>0) this.clippedFrames++;
    this.peakRms = Math.max(this.peakRms, rms);
    this.sumRms += rms;
    this.rmsValues.push(rms);
    // Calibrate ambient across ~2 seconds (120 frames) using the quietest
    // quartile — robust against the user speaking during the calibration window.
    if(this.calibrating){
      this.calibSamples.push(rms);
      if(this.calibSamples.length>=120){
        this.calibrating = false;
        const sorted = [...this.calibSamples].sort((a,b)=>a-b);
        const q1End = Math.floor(sorted.length*0.25);
        const quietestMean = mean(sorted.slice(0, Math.max(1, q1End)));
        this.ambient = Math.max(quietestMean*2.5, 3.0);
      }
    }
    const isSpeechRaw = rms > this.ambient && zcRate > 0.02 && zcRate < 0.25;
    if(isSpeechRaw){
      this.speechFrameStreak++;
      this.silenceFrameStreak = 0;
    } else {
      this.silenceFrameStreak++;
      this.speechFrameStreak = 0;
    }
    if(this.state==="silence" && this.speechFrameStreak>=3){
      this.state="speech";
      if(this.segments.length===0 || this.segments[this.segments.length-1].type==="silence"){
        this.segments.push({type:"speech",startMs:tMs,endMs:tMs,durationMs:0});
      }
    } else if(this.state==="speech" && this.silenceFrameStreak>=8){
      this.state="silence";
      if(this.segments.length && this.segments[this.segments.length-1].type==="speech"){
        this.segments[this.segments.length-1].endMs = tMs;
        this.segments[this.segments.length-1].durationMs = tMs - this.segments[this.segments.length-1].startMs;
      }
      this.segments.push({type:"silence",startMs:tMs,endMs:tMs,durationMs:0});
    }
    // Update current segment endMs
    if(this.segments.length){
      const cur = this.segments[this.segments.length-1];
      cur.endMs = tMs;
      cur.durationMs = cur.endMs - cur.startMs;
    }
  }
  finalize(totalMs){
    // Close last seg
    if(this.segments.length){
      this.segments[this.segments.length-1].endMs = totalMs;
      this.segments[this.segments.length-1].durationMs = totalMs - this.segments[this.segments.length-1].startMs;
    }
    const speaking = this.segments.filter(s=>s.type==="speech").reduce((a,b)=>a+b.durationMs,0);
    const silence = this.segments.filter(s=>s.type==="silence").reduce((a,b)=>a+b.durationMs,0);
    const silenceBlocks = this.segments.filter(s=>s.type==="silence");
    const silenceDurations = silenceBlocks.map(b=>b.durationMs);
    // Compute noise variance during silence
    const silenceRms = [];
    // coarse: use first and last 10% as proxy; more accurate would require mapping frames to times
    // For simplicity, we'll use full rmsValues variance as background proxy
    const rmsMean = mean(this.rmsValues);
    const noiseVar = this.rmsValues.length ? mean(this.rmsValues.map(r=>(r-rmsMean)**2)) : 0;
    const clipRatio = this.frames ? this.clippedFrames/this.frames : 0;
    return {
      speakingTimeMs:speaking,
      silenceTimeMs:silence,
      speechRatio: totalMs>0 ? speaking/totalMs : 0,
      silenceBlocks:silenceBlocks.map(b=>({startMs:b.startMs,endMs:b.endMs,durationMs:b.durationMs})),
      silenceBlockCount:silenceBlocks.length,
      avgSilenceBlockMs: silenceDurations.length ? mean(silenceDurations) : 0,
      longestSilenceMs: silenceDurations.length ? Math.max(...silenceDurations) : 0,
      peakRms:this.peakRms,
      noiseFloorRms:this.ambient,
      noiseVariance:noiseVar,
      clippingFrameRatio:clipRatio,
      frames:this.frames
    };
  }
}

/* Mic Quality Score */
function micQualityScore(vadMetrics){
  const TARGET_PEAK_RMS = 40;
  const TARGET_DR = 30;
  const inputLevel = clamp01(vadMetrics.peakRms/TARGET_PEAK_RMS) * 100;
  const clippingPenalty = Math.max(0, 100 - vadMetrics.clippingFrameRatio*400);
  const noiseQuality = (1 - Math.min(vadMetrics.noiseVariance/10, 1)) * 100;
  const dr = clamp01((vadMetrics.peakRms - vadMetrics.noiseFloorRms)/TARGET_DR) * 100;
  const score = inputLevel*0.30 + clippingPenalty*0.25 + noiseQuality*0.25 + dr*0.20;
  return {
    score:Math.round(clamp(score,0,100)),
    components:{inputLevel:Math.round(inputLevel),clippingPenalty:Math.round(clippingPenalty),noiseQuality:Math.round(noiseQuality),dynamicRange:Math.round(dr)}
  };
}

/* Waveform Renderer */
class WaveRenderer{
  constructor(canvas){
    this.canvas = canvas;
    this.ctx = canvas.getContext("2d");
    this.peaks = [];
    this.maxPeaks = 100;
    this.running = false;
    this._raf = null;
  }
  resize(){
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    const rect = this.canvas.getBoundingClientRect();
    this.canvas.width = rect.width * dpr;
    this.canvas.height = rect.height * dpr;
    this.ctx.scale(dpr,dpr);
    this.w = rect.width; this.h = rect.height;
  }
  start(getBuffer){
    this.resize();
    this.running = true;
    const loop = ()=>{
      if(!this.running) return;
      const buf = getBuffer();
      if(buf){
        let sumSq=0;
        for(let i=0;i<buf.length;i++){const s=buf[i]-128;sumSq+=s*s;}
        const rms = Math.sqrt(sumSq/buf.length);
        this.peaks.push(rms);
        if(this.peaks.length>this.maxPeaks) this.peaks.shift();
      }
      this._draw();
      this._raf = requestAnimationFrame(loop);
    };
    loop();
  }
  stop(){this.running=false;if(this._raf) cancelAnimationFrame(this._raf);}
  _draw(){
    const {ctx,w,h,peaks} = this;
    ctx.clearRect(0,0,w,h);
    const barW = Math.max(1.5, w/this.maxPeaks - 1);
    const gap = 1;
    const maxPeak = 60;
    for(let i=0;i<peaks.length;i++){
      const v = Math.min(peaks[i]/maxPeak, 1);
      const barH = Math.max(2, v*h*0.85);
      const x = i*(barW+gap);
      const y = (h-barH)/2;
      // frontier last 2%
      const isFrontier = i >= peaks.length - 2;
      ctx.fillStyle = isFrontier ? "#D4AF37" : "rgba(139, 163, 194, 0.7)";
      ctx.fillRect(x,y,barW,barH);
    }
  }
}
