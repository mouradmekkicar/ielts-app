<style>
/* ============================================================
   DESIGN TOKENS — Phase 2 & 2.5 Locked System
   ============================================================ */
:root {
  /* Navy spine */
  --mm-navy-950:#0A1628; --mm-navy-900:#0E1D36; --mm-navy-800:#162945;
  --mm-navy-700:#1E3A5F; --mm-navy-600:#2B4A75; --mm-navy-500:#3C5F8A;
  --mm-navy-400:#5A7BA5; --mm-navy-300:#8BA3C2; --mm-navy-200:#BDCBDE;
  --mm-navy-100:#DDE5EE; --mm-navy-50:#EFF2F7;

  /* Gold accent */
  --mm-gold-900:#8B6914; --mm-gold-800:#A3801C; --mm-gold-700:#B8912A;
  --mm-gold-600:#C9A241; --mm-gold-500:#D4AF37; --mm-gold-400:#DFBE5C;
  --mm-gold-300:#EACD82; --mm-gold-200:#F2DDA8; --mm-gold-100:#F8EBCB;
  --mm-gold-50:#FDF7E8;

  /* Paper */
  --mm-ivory:#FDFBF6; --mm-cream:#F7F3EA; --mm-parchment:#F2ECDC;

  /* Ink */
  --mm-ink-900:#1A1F2E; --mm-ink-700:#3D4556; --mm-ink-500:#6B7384;
  --mm-ink-300:#A8AEBC; --mm-ink-100:#D9DCE3;

  /* Semantic */
  --mm-bg-page:var(--mm-ivory);
  --mm-bg-surface:#FFFFFF;
  --mm-bg-surface-sunken:var(--mm-navy-50);
  --mm-bg-runner:var(--mm-navy-900);
  --mm-fg-primary:var(--mm-ink-900);
  --mm-fg-secondary:var(--mm-ink-700);
  --mm-fg-tertiary:var(--mm-ink-500);
  --mm-fg-on-navy:var(--mm-navy-50);
  --mm-fg-on-gold:var(--mm-navy-900);
  --mm-fg-brand:var(--mm-navy-700);
  --mm-fg-accent:var(--mm-gold-700);
  --mm-border-subtle:var(--mm-ink-100);
  --mm-border-strong:var(--mm-navy-200);
  --mm-border-focus:var(--mm-gold-500);
  --mm-accent-line:var(--mm-gold-500);

  /* Status */
  --mm-success:#2F7D5A; --mm-success-bg:#E3EFE8;
  --mm-warning:#C7782E; --mm-warning-bg:#FAEDDD;
  --mm-danger:#9B2C2C;  --mm-danger-bg:#F7E1E1;
  --mm-info:#2B5F8A;    --mm-info-bg:#E2EAF2;

  /* Band tiers */
  --mm-band-expert:#1E6B47;
  --mm-band-very-good:#2F7D5A;
  --mm-band-good:#4A8B5C;
  --mm-band-competent:#B8912A;
  --mm-band-modest:#C7782E;
  --mm-band-limited:#A55431;
  --mm-band-below:#9B2C2C;

  /* Confidence tiers */
  --mm-confidence-high:#2F7D5A;    --mm-confidence-high-bg:#E3EFE8;
  --mm-confidence-medium:#B8912A;  --mm-confidence-medium-bg:#F8EBCB;
  --mm-confidence-low:#C7782E;     --mm-confidence-low-bg:#FAEDDD;

  /* Source-tag tokens */
  --mm-tag-audio-bg:#E8EEF7;       --mm-tag-audio-fg:#2B5F8A;
  --mm-tag-transcript-bg:#F0EAF5;  --mm-tag-transcript-fg:#5B3D7A;
  --mm-tag-rule-bg:#EDE9DD;        --mm-tag-rule-fg:#6B5420;

  /* Typography */
  --mm-f-display:'EB Garamond',Georgia,serif;
  --mm-f-body:'Inter','Segoe UI',system-ui,sans-serif;
  --mm-f-mono:'JetBrains Mono',ui-monospace,monospace;

  /* Spacing (4px base) */
  --mm-s-1:4px;   --mm-s-2:8px;   --mm-s-3:12px;  --mm-s-4:16px;
  --mm-s-5:24px;  --mm-s-6:32px;  --mm-s-7:48px;  --mm-s-8:64px;
  --mm-s-9:96px;

  /* Radius */
  --mm-r-sm:4px; --mm-r-md:8px; --mm-r-lg:12px; --mm-r-xl:16px;
  --mm-r-2xl:24px; --mm-r-full:999px;

  /* Elevation */
  --mm-e-1:0 1px 2px rgba(14,29,54,.06),0 1px 3px rgba(14,29,54,.04);
  --mm-e-2:0 2px 4px rgba(14,29,54,.06),0 4px 12px rgba(14,29,54,.08);
  --mm-e-3:0 4px 8px rgba(14,29,54,.08),0 12px 32px rgba(14,29,54,.10);
  --mm-e-4:0 8px 16px rgba(14,29,54,.10),0 24px 64px rgba(14,29,54,.14);
  --mm-e-ring:0 0 0 3px rgba(212,175,55,.35);

  /* Containers */
  --mm-container:1080px;
  --mm-container-wide:1320px;
  --mm-container-narrow:720px;
  --mm-container-report:794px;

  /* Motion */
  --mm-dur-quick:120ms;
  --mm-dur-std:200ms;
  --mm-dur-slow:320ms;
  --mm-ease:cubic-bezier(.2,0,0,1);
}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}
}

*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--mm-f-body);
  font-size:16px;
  line-height:1.55;
  color:var(--mm-fg-primary);
  background:var(--mm-bg-page);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
button{font-family:inherit;cursor:pointer;border:0;background:none;padding:0;color:inherit;}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit;}
a{color:var(--mm-fg-brand);text-decoration:none;}

/* ============================================================
   APP SHELL
   ============================================================ */
.mm-app{min-height:100vh;display:flex;flex-direction:column;}

.mm-topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(253,251,246,.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--mm-border-subtle);
}
.mm-topbar__inner{
  max-width:var(--mm-container-wide);margin:0 auto;
  padding:var(--mm-s-4) var(--mm-s-6);
  display:flex;align-items:center;gap:var(--mm-s-5);
  height:72px;
}
.mm-brand{display:flex;align-items:center;gap:var(--mm-s-3);cursor:pointer;}
.mm-brand__mark{
  width:40px;height:40px;
  background:var(--mm-navy-800);
  border-radius:var(--mm-r-md);
  display:grid;place-items:center;
  color:var(--mm-gold-500);
  font-family:var(--mm-f-display);
  font-weight:500;font-size:22px;
  position:relative;
}
.mm-brand__mark::after{
  content:"";position:absolute;left:50%;bottom:5px;
  width:18px;height:1.5px;background:var(--mm-gold-500);
  transform:translateX(-50%);
}
.mm-brand__text{display:flex;flex-direction:column;line-height:1.1;}
.mm-brand__name{font-family:var(--mm-f-display);font-size:18px;font-weight:500;color:var(--mm-navy-900);}
.mm-brand__tag{font-size:11px;color:var(--mm-fg-tertiary);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}

.mm-nav{display:flex;gap:var(--mm-s-1);margin-left:auto;}
.mm-nav__link{
  padding:var(--mm-s-2) var(--mm-s-4);
  font-size:13px;font-weight:500;
  color:var(--mm-fg-secondary);
  border-radius:var(--mm-r-md);
  letter-spacing:.04em;
  transition:background var(--mm-dur-quick) var(--mm-ease),color var(--mm-dur-quick) var(--mm-ease);
}
.mm-nav__link:hover{background:var(--mm-navy-50);color:var(--mm-fg-primary);}
.mm-nav__link.is-active{color:var(--mm-navy-900);background:var(--mm-gold-50);}

.mm-main{flex:1;}

/* ============================================================
   BUTTONS
   ============================================================ */
.mm-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:var(--mm-s-2);
  padding:10px 20px;
  font-size:13px;font-weight:600;letter-spacing:.06em;
  border-radius:var(--mm-r-md);
  min-height:40px;
  transition:all var(--mm-dur-quick) var(--mm-ease);
  white-space:nowrap;
}
.mm-btn:focus-visible{outline:0;box-shadow:var(--mm-e-ring);}
.mm-btn--primary{background:var(--mm-gold-500);color:var(--mm-navy-900);}
.mm-btn--primary:hover{background:var(--mm-gold-600);}
.mm-btn--secondary{background:transparent;color:var(--mm-navy-700);box-shadow:inset 0 0 0 1.5px var(--mm-navy-700);}
.mm-btn--secondary:hover{background:var(--mm-navy-50);}
.mm-btn--ghost{background:transparent;color:var(--mm-fg-secondary);}
.mm-btn--ghost:hover{background:var(--mm-navy-50);color:var(--mm-fg-primary);}
.mm-btn--danger{background:transparent;color:var(--mm-danger);box-shadow:inset 0 0 0 1.5px var(--mm-danger);}
.mm-btn--danger:hover{background:var(--mm-danger-bg);}
.mm-btn--large{padding:14px 28px;font-size:14px;min-height:48px;}
.mm-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ============================================================
   CARDS
   ============================================================ */
.mm-card{
  background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-lg);
  padding:var(--mm-s-5);
}
.mm-card--raised{box-shadow:var(--mm-e-1);}
.mm-card--interactive{cursor:pointer;transition:all var(--mm-dur-std) var(--mm-ease);}
.mm-card--interactive:hover{box-shadow:var(--mm-e-2);transform:translateY(-2px);border-color:var(--mm-navy-200);}
.mm-card--accent{border-top:2px solid var(--mm-gold-500);}

/* ============================================================
   HOME / HERO
   ============================================================ */
.mm-hero{
  max-width:var(--mm-container);margin:0 auto;
  padding:var(--mm-s-9) var(--mm-s-6) var(--mm-s-8);
  text-align:center;
  position:relative;
}
.mm-hero__eyebrow{
  font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  color:var(--mm-fg-accent);margin-bottom:var(--mm-s-4);
}
.mm-hero__title{
  font-family:var(--mm-f-display);
  font-size:clamp(40px,5vw + 1rem,68px);
  font-weight:500;line-height:1.1;
  color:var(--mm-navy-900);
  margin:0 0 var(--mm-s-4);
  letter-spacing:-.02em;
}
.mm-hero__title em{
  font-style:italic;
  color:var(--mm-gold-700);
  font-weight:500;
}
.mm-hero__sub{
  font-size:18px;color:var(--mm-fg-secondary);
  max-width:640px;margin:0 auto var(--mm-s-6);
  line-height:1.55;
}
.mm-hero__actions{display:flex;gap:var(--mm-s-3);justify-content:center;flex-wrap:wrap;}

.mm-hero__ornament{
  display:flex;align-items:center;gap:var(--mm-s-3);
  justify-content:center;margin-top:var(--mm-s-7);
  color:var(--mm-ink-300);font-size:11px;letter-spacing:.2em;text-transform:uppercase;
}
.mm-hero__ornament::before,.mm-hero__ornament::after{
  content:"";width:60px;height:1px;background:var(--mm-ink-100);
}

/* Home metric strip */
.mm-strip{
  max-width:var(--mm-container);margin:0 auto;
  padding:0 var(--mm-s-6) var(--mm-s-8);
  display:grid;grid-template-columns:repeat(4,1fr);gap:var(--mm-s-4);
}
@media (max-width:768px){.mm-strip{grid-template-columns:repeat(2,1fr);}}
.mm-strip__tile{
  background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-lg);
  padding:var(--mm-s-5);
  position:relative;overflow:hidden;
}
.mm-strip__tile::before{
  content:"";position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--mm-gold-500);opacity:.6;
}
.mm-strip__label{
  font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
  color:var(--mm-fg-tertiary);
}
.mm-strip__value{
  font-family:var(--mm-f-display);font-weight:500;
  font-size:36px;color:var(--mm-navy-900);
  line-height:1;margin-top:var(--mm-s-3);
}
.mm-strip__unit{font-size:14px;color:var(--mm-fg-tertiary);margin-left:4px;}
.mm-strip__note{font-size:12px;color:var(--mm-fg-tertiary);margin-top:var(--mm-s-2);}

/* ============================================================
   PAGE HEADINGS
   ============================================================ */
.mm-page{max-width:var(--mm-container-wide);margin:0 auto;padding:var(--mm-s-7) var(--mm-s-6);}
.mm-page__header{margin-bottom:var(--mm-s-6);}
.mm-page__eyebrow{
  font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  color:var(--mm-fg-accent);margin-bottom:var(--mm-s-2);
}
.mm-page__title{
  font-family:var(--mm-f-display);font-size:40px;font-weight:500;
  color:var(--mm-navy-900);margin:0 0 var(--mm-s-2);letter-spacing:-.01em;
}
.mm-page__sub{color:var(--mm-fg-secondary);font-size:15px;max-width:640px;}
.mm-page__rule{
  height:1.5px;background:var(--mm-gold-500);width:80px;margin-top:var(--mm-s-4);
}

/* ============================================================
   TEST LIBRARY
   ============================================================ */
.mm-toolbar{
  display:flex;gap:var(--mm-s-3);flex-wrap:wrap;align-items:center;
  padding:var(--mm-s-4) 0;
  border-bottom:1px solid var(--mm-border-subtle);
  margin-bottom:var(--mm-s-6);
}
.mm-search{
  flex:1;min-width:240px;max-width:380px;
  display:flex;align-items:center;gap:var(--mm-s-2);
  padding:8px 14px;
  background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-md);
}
.mm-search input{flex:1;border:0;outline:0;background:transparent;font-size:14px;}
.mm-search svg{color:var(--mm-ink-300);flex-shrink:0;}

.mm-filter{
  display:flex;align-items:center;gap:var(--mm-s-2);
  padding:8px 14px;
  background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-md);
  font-size:13px;font-weight:500;color:var(--mm-fg-secondary);
}
.mm-filter select{border:0;outline:0;background:transparent;cursor:pointer;}
.mm-filter label{color:var(--mm-fg-tertiary);font-size:12px;letter-spacing:.05em;text-transform:uppercase;}

.mm-toolbar__right{margin-left:auto;display:flex;gap:var(--mm-s-2);}

.mm-test-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:var(--mm-s-5);
}

.mm-test-card{
  position:relative;
  background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-lg);
  padding:var(--mm-s-5);
  display:flex;flex-direction:column;gap:var(--mm-s-3);
  transition:all var(--mm-dur-std) var(--mm-ease);
  overflow:hidden;
}
.mm-test-card:hover{
  box-shadow:var(--mm-e-2);transform:translateY(-2px);
  border-color:var(--mm-navy-200);
}
.mm-test-card::after{
  content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--mm-accent-line);opacity:0;
  transition:opacity var(--mm-dur-std) var(--mm-ease);
}
.mm-test-card:hover::after{opacity:1;}

.mm-test-card__badge-new{
  position:absolute;top:var(--mm-s-3);right:var(--mm-s-3);
  background:var(--mm-gold-500);color:var(--mm-navy-900);
  font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  padding:3px 10px;border-radius:var(--mm-r-full);
  z-index:2;
}
.mm-test-card__title{
  font-family:var(--mm-f-display);font-size:22px;font-weight:500;
  color:var(--mm-navy-900);line-height:1.25;
  margin:0;padding-right:48px;
}
.mm-test-card__meta{
  display:flex;gap:var(--mm-s-3);align-items:center;
  font-size:12px;color:var(--mm-fg-tertiary);
}
.mm-theme-dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  margin-right:6px;vertical-align:middle;
}
.mm-diff-chip{
  display:inline-flex;align-items:center;
  padding:2px 10px;border-radius:var(--mm-r-full);
  font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
}
.mm-diff-chip--foundation{background:var(--mm-success-bg);color:var(--mm-success);}
.mm-diff-chip--standard{background:var(--mm-info-bg);color:var(--mm-info);}
.mm-diff-chip--challenging{background:var(--mm-warning-bg);color:var(--mm-warning);}

.mm-test-card__desc{
  font-size:13px;color:var(--mm-fg-secondary);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;
}
.mm-test-card__band{
  font-family:var(--mm-f-mono);font-size:12px;color:var(--mm-fg-tertiary);
  padding:var(--mm-s-2) 0;border-top:1px dashed var(--mm-border-subtle);
}
.mm-test-card__band strong{color:var(--mm-navy-700);font-weight:600;}
.mm-test-card__footer{
  margin-top:auto;display:flex;justify-content:space-between;align-items:center;gap:var(--mm-s-3);
}
.mm-usage-chip{
  font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--mm-fg-tertiary);
  padding:4px 8px;background:var(--mm-bg-surface-sunken);
  border-radius:var(--mm-r-sm);
}
.mm-usage-chip--trusted{color:var(--mm-gold-700);}
.mm-usage-chip--fresh{border-left:2px solid var(--mm-gold-500);}

/* ============================================================
   BUILDER
   ============================================================ */
.mm-builder{display:grid;grid-template-columns:1fr 320px;gap:var(--mm-s-6);}
@media (max-width:960px){.mm-builder{grid-template-columns:1fr;}}

.mm-form-group{margin-bottom:var(--mm-s-5);}
.mm-label{
  display:block;
  font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--mm-fg-tertiary);margin-bottom:var(--mm-s-2);
}
.mm-input,.mm-textarea,.mm-select{
  width:100%;
  padding:10px 14px;
  background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-md);
  font-size:14px;
  transition:border-color var(--mm-dur-quick) var(--mm-ease),box-shadow var(--mm-dur-quick) var(--mm-ease);
}
.mm-input:focus,.mm-textarea:focus,.mm-select:focus{
  outline:0;border-color:var(--mm-gold-500);box-shadow:var(--mm-e-ring);
}
.mm-textarea{font-family:var(--mm-f-body);resize:vertical;min-height:120px;line-height:1.6;}
.mm-textarea--large{min-height:260px;}
.mm-hint{font-size:12px;color:var(--mm-fg-tertiary);margin-top:var(--mm-s-2);line-height:1.5;}
.mm-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--mm-s-4);}
@media (max-width:640px){.mm-row{grid-template-columns:1fr;}}

.mm-segment{
  display:inline-flex;
  background:var(--mm-bg-surface-sunken);
  padding:3px;border-radius:var(--mm-r-md);
}
.mm-segment button{
  padding:8px 16px;font-size:12px;font-weight:600;letter-spacing:.06em;
  color:var(--mm-fg-secondary);border-radius:calc(var(--mm-r-md) - 2px);
  transition:all var(--mm-dur-quick) var(--mm-ease);
}
.mm-segment button.is-active{background:var(--mm-bg-surface);color:var(--mm-navy-900);box-shadow:var(--mm-e-1);}

.mm-validation{
  padding:var(--mm-s-3) var(--mm-s-4);
  border-radius:var(--mm-r-md);
  font-size:13px;
  margin-top:var(--mm-s-4);
}
.mm-validation--error{background:var(--mm-danger-bg);color:var(--mm-danger);border-left:3px solid var(--mm-danger);}
.mm-validation--warning{background:var(--mm-warning-bg);color:var(--mm-warning);border-left:3px solid var(--mm-warning);}
.mm-validation--success{background:var(--mm-success-bg);color:var(--mm-success);border-left:3px solid var(--mm-success);}
.mm-validation ul{margin:var(--mm-s-2) 0 0;padding-left:var(--mm-s-4);}

.mm-sidebar{
  background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-lg);
  padding:var(--mm-s-5);
  height:fit-content;
  position:sticky;top:96px;
}
.mm-sidebar__title{
  font-family:var(--mm-f-display);font-size:18px;font-weight:500;
  color:var(--mm-navy-900);margin:0 0 var(--mm-s-3);
}

/* ============================================================
   RUNNER / EXAM
   ============================================================ */
.mm-runner{
  min-height:100vh;
  background:var(--mm-navy-900);
  background-image:
    radial-gradient(circle at 20% 0%,rgba(212,175,55,.06) 0%,transparent 50%),
    radial-gradient(circle at 80% 100%,rgba(43,95,138,.15) 0%,transparent 50%);
  color:var(--mm-navy-50);
  display:flex;flex-direction:column;
}
.mm-runner__topbar{
  padding:var(--mm-s-4) var(--mm-s-6);
  display:flex;align-items:center;gap:var(--mm-s-5);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.mm-runner__brand{
  color:var(--mm-gold-500);font-family:var(--mm-f-display);
  font-size:18px;font-weight:500;letter-spacing:-.01em;
}
.mm-runner__meta{
  display:flex;gap:var(--mm-s-5);
  font-size:12px;color:var(--mm-navy-300);
  margin-left:var(--mm-s-4);
}
.mm-runner__meta strong{color:var(--mm-navy-50);font-weight:500;margin-left:6px;}

.mm-runner__mode{
  padding:4px 12px;border-radius:var(--mm-r-full);
  font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
}
.mm-runner__mode--exam{background:var(--mm-gold-500);color:var(--mm-navy-900);}
.mm-runner__mode--practice{background:rgba(255,255,255,.1);color:var(--mm-navy-200);}

.mm-runner__exit{
  margin-left:auto;
  color:var(--mm-navy-300);font-size:12px;letter-spacing:.08em;
  padding:6px 12px;border-radius:var(--mm-r-md);
  transition:background var(--mm-dur-quick) var(--mm-ease);
}
.mm-runner__exit:hover{background:rgba(255,255,255,.06);color:var(--mm-navy-50);}

.mm-runner__stage{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:var(--mm-s-7) var(--mm-s-5);
  max-width:var(--mm-container-narrow);width:100%;margin:0 auto;text-align:center;
}

.mm-part-tag{
  font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  color:var(--mm-gold-400);margin-bottom:var(--mm-s-5);
}
.mm-part-tag__dot{
  display:inline-block;width:6px;height:6px;background:var(--mm-gold-500);
  border-radius:50%;margin-right:10px;vertical-align:middle;
  animation:pulse-gold 1400ms ease-in-out infinite;
}
.mm-part-tag--idle .mm-part-tag__dot{animation:none;opacity:.4;}
@keyframes pulse-gold{
  0%,100%{opacity:.6;transform:scale(1);}
  50%{opacity:1;transform:scale(1.3);}
}

/* Timer Ring */
.mm-timer{
  position:relative;width:220px;height:220px;margin-bottom:var(--mm-s-6);
}
.mm-timer svg{width:100%;height:100%;transform:rotate(-90deg);}
.mm-timer__track{fill:none;stroke:rgba(255,255,255,.08);stroke-width:6;}
.mm-timer__prog{
  fill:none;stroke:var(--mm-gold-500);stroke-width:6;
  stroke-linecap:round;
  transition:stroke-dashoffset 200ms linear,stroke var(--mm-dur-std);
}
.mm-timer__prog--warn{stroke:var(--mm-warning);}
.mm-timer__prog--danger{stroke:var(--mm-danger);}
.mm-timer__inner{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.mm-timer__digits{
  font-family:var(--mm-f-mono);font-size:48px;font-weight:500;
  color:var(--mm-navy-50);letter-spacing:-.02em;
  font-variant-numeric:tabular-nums;
}
.mm-timer__label{
  font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
  color:var(--mm-navy-300);margin-top:4px;
}
.mm-timer.is-warn svg{animation:timer-pulse 1200ms ease-in-out infinite;}
.mm-timer.is-danger svg{animation:timer-pulse 800ms ease-in-out infinite;}
@keyframes timer-pulse{0%,100%{transform:rotate(-90deg) scale(1);}50%{transform:rotate(-90deg) scale(1.02);}}

.mm-prompt{
  font-family:var(--mm-f-display);font-size:28px;font-weight:500;
  line-height:1.35;color:var(--mm-navy-50);
  max-width:640px;margin:0 0 var(--mm-s-6);
}
.mm-prompt--small{font-size:22px;}
.mm-prompt em{font-style:italic;color:var(--mm-gold-300);font-weight:500;}

.mm-cue-card{
  background:rgba(253,251,246,.04);
  border:1px solid rgba(212,175,55,.25);
  border-radius:var(--mm-r-lg);
  padding:var(--mm-s-6);
  max-width:520px;margin:0 auto var(--mm-s-6);
  text-align:left;
}
.mm-cue-card__label{
  font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  color:var(--mm-gold-400);margin-bottom:var(--mm-s-3);
}
.mm-cue-card__topic{
  font-family:var(--mm-f-display);font-size:22px;font-weight:500;
  color:var(--mm-navy-50);margin:0 0 var(--mm-s-4);line-height:1.35;
}
.mm-cue-card__say{
  font-size:12px;color:var(--mm-navy-300);margin-bottom:var(--mm-s-2);
  letter-spacing:.06em;text-transform:uppercase;font-weight:600;
}
.mm-cue-card ul{list-style:none;padding:0;margin:0;}
.mm-cue-card li{
  padding:6px 0 6px 20px;position:relative;
  color:var(--mm-navy-100);font-size:15px;line-height:1.5;
}
.mm-cue-card li::before{
  content:"";position:absolute;left:0;top:14px;
  width:10px;height:1px;background:var(--mm-gold-500);
}

/* Waveform */
.mm-wave{
  width:100%;max-width:520px;height:80px;
  background:rgba(0,0,0,.2);
  border:1px solid rgba(255,255,255,.06);
  border-radius:var(--mm-r-md);
  margin:var(--mm-s-4) auto;padding:var(--mm-s-3);
  position:relative;overflow:hidden;
}
.mm-wave canvas{width:100%;height:100%;}
.mm-wave__rec{
  position:absolute;top:8px;right:12px;
  display:flex;align-items:center;gap:6px;
  font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--mm-gold-400);font-weight:600;
}
.mm-wave__rec-dot{
  width:8px;height:8px;border-radius:50%;background:var(--mm-danger);
  animation:rec-pulse 1400ms ease-in-out infinite;
}
@keyframes rec-pulse{0%,100%{opacity:.6;}50%{opacity:1;box-shadow:0 0 8px var(--mm-danger);}}
.mm-wave--idle .mm-wave__rec{display:none;}

.mm-live-caption{
  color:var(--mm-navy-200);font-size:14px;font-style:italic;
  margin-top:var(--mm-s-4);min-height:24px;
  max-width:520px;line-height:1.5;
}
.mm-live-caption::before{content:"";}

.mm-runner__actions{display:flex;gap:var(--mm-s-3);justify-content:center;margin-top:var(--mm-s-5);}
.mm-btn--ghost-dark{color:var(--mm-navy-200);}
.mm-btn--ghost-dark:hover{background:rgba(255,255,255,.05);color:var(--mm-navy-50);}

.mm-hint-keys{
  margin-top:var(--mm-s-7);
  color:var(--mm-navy-400);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
}
.mm-kbd{
  display:inline-block;padding:2px 6px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:3px;font-family:var(--mm-f-mono);font-size:10px;
  color:var(--mm-navy-100);margin:0 3px;
}

/* Time's up overlay */
.mm-overlay{
  position:fixed;inset:0;
  background:rgba(10,22,40,.82);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:grid;place-items:center;z-index:100;
  animation:fade-in 320ms var(--mm-ease);
}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
.mm-overlay__sheet{
  background:var(--mm-navy-800);
  border:1px solid rgba(212,175,55,.2);
  border-radius:var(--mm-r-2xl);
  padding:var(--mm-s-7) var(--mm-s-9);
  text-align:center;max-width:440px;
  box-shadow:var(--mm-e-4);
}
.mm-overlay__rule{
  width:48px;height:1.5px;background:var(--mm-gold-500);margin:0 auto var(--mm-s-5);
}
.mm-overlay__title{
  font-family:var(--mm-f-display);font-size:32px;font-weight:500;
  color:var(--mm-navy-50);margin:0 0 var(--mm-s-3);
}
.mm-overlay__sub{color:var(--mm-navy-300);font-size:14px;}

/* Setup / Permission screens */
.mm-setup{
  max-width:560px;margin:0 auto;padding:var(--mm-s-7) var(--mm-s-5);
}
.mm-setup__card{
  background:rgba(253,251,246,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:var(--mm-r-xl);
  padding:var(--mm-s-7);
  text-align:center;
}
.mm-setup__icon{
  width:64px;height:64px;margin:0 auto var(--mm-s-5);
  background:rgba(212,175,55,.1);
  border:1.5px solid rgba(212,175,55,.3);
  border-radius:var(--mm-r-lg);
  display:grid;place-items:center;color:var(--mm-gold-400);
}
.mm-setup__title{font-family:var(--mm-f-display);font-size:26px;color:var(--mm-navy-50);margin:0 0 var(--mm-s-3);font-weight:500;}
.mm-setup__text{color:var(--mm-navy-300);font-size:14px;line-height:1.6;margin:0 0 var(--mm-s-5);}

/* Processing */
.mm-processing{
  min-height:100vh;background:var(--mm-navy-900);
  display:flex;align-items:center;justify-content:center;
  padding:var(--mm-s-6);
}
.mm-processing__inner{max-width:480px;width:100%;text-align:center;color:var(--mm-navy-50);}
.mm-processing__title{font-family:var(--mm-f-display);font-size:26px;font-weight:500;color:var(--mm-navy-50);margin:0 0 var(--mm-s-3);}
.mm-processing__bar{
  height:4px;background:rgba(255,255,255,.08);
  border-radius:var(--mm-r-full);overflow:hidden;margin:var(--mm-s-5) 0;
}
.mm-processing__bar-fill{
  height:100%;background:var(--mm-gold-500);
  transition:width 400ms var(--mm-ease);
  border-radius:var(--mm-r-full);
}
.mm-processing__steps{
  display:flex;flex-direction:column;gap:var(--mm-s-2);
  font-size:13px;color:var(--mm-navy-300);
}
.mm-processing__step.is-done{color:var(--mm-navy-100);}
.mm-processing__step.is-active{color:var(--mm-gold-300);}
.mm-processing__step::before{
  content:"○ ";margin-right:8px;color:var(--mm-navy-500);
}
.mm-processing__step.is-done::before{content:"✓ ";color:var(--mm-success);}
.mm-processing__step.is-active::before{content:"⟳ ";color:var(--mm-gold-400);}


/* ============================================================
   REPORT — A4 DELIVERABLE
   ============================================================ */
.mm-report-wrap{
  max-width:calc(var(--mm-container-report) + 200px);
  margin:0 auto;padding:var(--mm-s-6) var(--mm-s-5);
  display:grid;grid-template-columns:1fr 180px;gap:var(--mm-s-5);
}
@media (max-width:1024px){.mm-report-wrap{grid-template-columns:1fr;}}

.mm-report{
  width:var(--mm-container-report);max-width:100%;
  background:var(--mm-ivory);
  box-shadow:var(--mm-e-3);
  border-radius:6px;
  padding:44px 56px;
  position:relative;
}
.mm-report__mode-badge{
  position:absolute;top:24px;right:24px;
  padding:4px 14px;border-radius:var(--mm-r-full);
  font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
}
.mm-report__mode-badge--exam{background:var(--mm-navy-900);color:var(--mm-gold-500);box-shadow:inset 0 0 0 1px var(--mm-gold-500);}
.mm-report__mode-badge--practice{background:transparent;color:var(--mm-ink-300);box-shadow:inset 0 0 0 1px var(--mm-ink-300);}

.mm-report__cover{text-align:center;padding-bottom:var(--mm-s-6);}
.mm-report__crest{
  width:56px;height:56px;margin:0 auto var(--mm-s-4);
  background:var(--mm-navy-800);border-radius:var(--mm-r-md);
  display:grid;place-items:center;
  color:var(--mm-gold-500);font-family:var(--mm-f-display);
  font-weight:500;font-size:28px;position:relative;
}
.mm-report__crest::after{
  content:"";position:absolute;left:50%;bottom:6px;
  width:22px;height:1.5px;background:var(--mm-gold-500);
  transform:translateX(-50%);
}
.mm-report__eyebrow{
  font-size:11px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;
  color:var(--mm-gold-700);margin-bottom:var(--mm-s-2);
}
.mm-report__title{
  font-family:var(--mm-f-display);font-size:32px;font-weight:500;
  color:var(--mm-navy-900);margin:0 0 var(--mm-s-5);letter-spacing:-.01em;
}
.mm-report__meta{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:var(--mm-s-4);text-align:left;
  padding:var(--mm-s-4) var(--mm-s-5);
  background:var(--mm-cream);
  border-radius:var(--mm-r-md);
  margin-bottom:var(--mm-s-5);
}
@media (max-width:560px){.mm-report__meta{grid-template-columns:repeat(2,1fr);}}
.mm-report__meta-item{}
.mm-report__meta-label{
  font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--mm-fg-tertiary);font-weight:600;margin-bottom:3px;
}
.mm-report__meta-value{
  font-family:var(--mm-f-display);font-size:15px;color:var(--mm-navy-900);
  font-weight:500;line-height:1.3;
}

.mm-section-head{margin:var(--mm-s-7) 0 var(--mm-s-5);}
.mm-section-head__eyebrow{
  font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  color:var(--mm-gold-700);margin-bottom:var(--mm-s-1);
}
.mm-section-head__title{
  font-family:var(--mm-f-display);font-size:24px;font-weight:500;
  color:var(--mm-navy-900);margin:0 0 var(--mm-s-3);
}
.mm-section-head__rule{
  height:1.5px;background:var(--mm-gold-500);width:100%;
}

/* Band scores block */
.mm-scores{
  display:grid;
  grid-template-columns:180px 1fr;
  gap:var(--mm-s-5);
  align-items:start;
  padding:var(--mm-s-5) 0;
}
@media (max-width:560px){.mm-scores{grid-template-columns:1fr;}}

.mm-overall{
  display:flex;flex-direction:column;align-items:center;gap:var(--mm-s-3);
  padding:var(--mm-s-4);
  background:var(--mm-cream);
  border-radius:var(--mm-r-lg);
}
.mm-band-pill{
  width:112px;height:112px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#FFFFFF;font-family:var(--mm-f-display);
  box-shadow:inset 0 0 0 6px rgba(255,255,255,.1);
}
.mm-band-pill__num{font-size:42px;font-weight:500;line-height:1;letter-spacing:-.02em;}
.mm-band-pill__decimal{font-size:28px;opacity:.85;}
.mm-band-pill__label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;margin-top:3px;font-family:var(--mm-f-body);font-weight:600;opacity:.85;}
.mm-cefr{
  padding:4px 10px;background:var(--mm-navy-800);color:var(--mm-gold-400);
  font-family:var(--mm-f-body);font-size:11px;font-weight:700;letter-spacing:.12em;
  border-radius:var(--mm-r-sm);
  border-bottom:2px solid var(--mm-gold-500);
}
.mm-overall__expected{font-size:10px;color:var(--mm-fg-tertiary);letter-spacing:.08em;text-transform:uppercase;text-align:center;}

.mm-criteria{
  display:grid;grid-template-columns:repeat(2,1fr);gap:var(--mm-s-3);
}
@media (max-width:480px){.mm-criteria{grid-template-columns:1fr;}}
.mm-criterion{
  background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-md);
  padding:var(--mm-s-3) var(--mm-s-4);
  display:flex;align-items:center;gap:var(--mm-s-3);
}
.mm-criterion__band{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#FFFFFF;font-family:var(--mm-f-display);font-size:20px;font-weight:500;
  flex-shrink:0;
}
.mm-criterion__meta{flex:1;min-width:0;}
.mm-criterion__label{
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--mm-fg-tertiary);font-weight:600;
}
.mm-criterion__name{
  font-family:var(--mm-f-display);font-size:15px;color:var(--mm-navy-900);
  font-weight:500;line-height:1.2;margin-top:2px;
}
.mm-criterion__tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}

.mm-src-tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 7px;border-radius:var(--mm-r-sm);
  font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  font-family:var(--mm-f-body);
}
.mm-src-tag::before{
  content:"";width:5px;height:5px;border-radius:50%;background:currentColor;
}
.mm-src-tag--audio{background:var(--mm-tag-audio-bg);color:var(--mm-tag-audio-fg);}
.mm-src-tag--transcript{background:var(--mm-tag-transcript-bg);color:var(--mm-tag-transcript-fg);}
.mm-src-tag--rule{background:var(--mm-tag-rule-bg);color:var(--mm-tag-rule-fg);}

/* Confidence */
.mm-confidence{
  margin-top:var(--mm-s-4);padding:var(--mm-s-3) var(--mm-s-4);
  border-radius:var(--mm-r-md);
  display:flex;align-items:center;gap:var(--mm-s-3);
}
.mm-confidence--high{background:var(--mm-confidence-high-bg);border-left:3px solid var(--mm-confidence-high);}
.mm-confidence--medium{background:var(--mm-confidence-medium-bg);border-left:3px solid var(--mm-confidence-medium);}
.mm-confidence--low{background:var(--mm-confidence-low-bg);border-left:3px solid var(--mm-confidence-low);}
.mm-confidence__tier{
  font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  flex-shrink:0;
}
.mm-confidence--high .mm-confidence__tier{color:var(--mm-confidence-high);}
.mm-confidence--medium .mm-confidence__tier{color:var(--mm-confidence-medium);}
.mm-confidence--low .mm-confidence__tier{color:var(--mm-confidence-low);}
.mm-confidence__text{font-size:13px;line-height:1.45;color:var(--mm-fg-secondary);font-style:italic;font-family:var(--mm-f-display);}

.mm-low-conf-banner{
  background:var(--mm-warning-bg);border-left:3px solid var(--mm-warning);
  padding:var(--mm-s-3) var(--mm-s-4);margin:var(--mm-s-4) 0;
  border-radius:var(--mm-r-md);font-size:13px;color:var(--mm-fg-secondary);
}

/* Summary */
.mm-summary{
  font-family:var(--mm-f-display);font-size:17px;line-height:1.65;
  color:var(--mm-ink-900);margin:var(--mm-s-3) 0;
}

/* Criterion analysis */
.mm-analysis{}
.mm-analysis__item{
  padding:var(--mm-s-4) 0;
  border-bottom:1px solid var(--mm-border-subtle);
}
.mm-analysis__item:last-child{border-bottom:0;}
.mm-analysis__head{
  display:flex;align-items:center;gap:var(--mm-s-3);
  margin-bottom:var(--mm-s-3);
}
.mm-analysis__name{
  font-family:var(--mm-f-display);font-size:18px;font-weight:500;
  color:var(--mm-navy-900);flex:1;
}
.mm-analysis__band{
  font-family:var(--mm-f-mono);font-size:13px;font-weight:600;
  padding:2px 10px;border-radius:var(--mm-r-full);
  background:var(--mm-bg-surface-sunken);color:var(--mm-navy-700);
}
.mm-analysis__text{
  font-family:var(--mm-f-display);font-size:15px;line-height:1.65;
  color:var(--mm-ink-700);
}
.mm-analysis__evidence{
  margin-top:var(--mm-s-3);
  padding:var(--mm-s-3);background:var(--mm-cream);
  border-left:2px solid var(--mm-gold-500);
  font-family:var(--mm-f-body);font-size:12px;color:var(--mm-fg-secondary);font-style:italic;
  border-radius:0 var(--mm-r-sm) var(--mm-r-sm) 0;
}

/* Transcript */
.mm-transcript-part{margin-bottom:var(--mm-s-6);}
.mm-transcript-part__label{
  font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  color:var(--mm-gold-700);margin-bottom:var(--mm-s-3);
  padding-bottom:var(--mm-s-2);border-bottom:1px dashed var(--mm-border-subtle);
}
.mm-turn{
  margin-bottom:var(--mm-s-3);
  padding:var(--mm-s-3) var(--mm-s-4);
  border-radius:var(--mm-r-md);
  max-width:88%;
}
.mm-turn--examiner{background:var(--mm-bg-surface-sunken);}
.mm-turn--candidate{background:var(--mm-cream);border-left:2px solid var(--mm-gold-500);}
.mm-turn__speaker{
  font-size:9px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;
  color:var(--mm-fg-tertiary);margin-bottom:4px;
}
.mm-turn__text{

/* ------------------------------------------------------------
   LIBRARY / BADGE / SEED
   ------------------------------------------------------------ */
const Library = {
  init(){
    const seeded = store.get(KEYS.SEEDED,null);
    const existing = store.get(KEYS.TESTS,null);
    if(!seeded || !existing){
      const now = new Date().toISOString();
      const tests = SEED_TESTS.map(t=>({
        ...t,
        createdAt:now,updatedAt:now,firstSeenAt:now,
        lastOpenedAt:null,openCount:0,sessionCount:0,isArchived:false
      }));
      store.set(KEYS.TESTS,tests);
      store.set(KEYS.SEEDED,"v1.1");
    } else if(seeded !== "v1.1"){
      // Additive migration — add missing seed tests only
      const existingIds = new Set(existing.map(t=>t.id));
      const now = new Date().toISOString();
      const additions = SEED_TESTS.filter(s=>!existingIds.has(s.id)).map(t=>({
        ...t,createdAt:now,updatedAt:now,firstSeenAt:now,lastOpenedAt:null,openCount:0,sessionCount:0,isArchived:false
      }));
      if(additions.length){
        store.set(KEYS.TESTS,[...existing,...additions]);
      }
      store.set(KEYS.SEEDED,"v1.1");
    }
  },
  all(){return store.get(KEYS.TESTS,[]);},
  get(id){return this.all().find(t=>t.id===id)||null;},
  save(test){
    const all = this.all();
    const idx = all.findIndex(t=>t.id===test.id);
    if(idx>=0) all[idx] = test; else all.push(test);
    store.set(KEYS.TESTS,all);
  },
  delete(id){
    const all = this.all().filter(t=>t.id!==id);
    store.set(KEYS.TESTS,all);
  },
  recordOpen(id){
    const t = this.get(id);if(!t) return;
    t.openCount = (t.openCount||0)+1;
    t.lastOpenedAt = new Date().toISOString();
    this.save(t);
  }
};
const BadgeService = {
  shouldShowNew(test,now=Date.now()){
    if(!test||!test.firstSeenAt||test.isArchived) return false;
    const ageMs = now - new Date(test.firstSeenAt).getTime();
    return ageMs < 7*24*60*60*1000 && (test.openCount||0) < 5;
  }
};
const Sessions = {
  all(){return store.get(KEYS.SESSIONS,[]);},
  get(id){return this.all().find(s=>s.id===id)||null;},
  save(session){
    const all = this.all();
    const idx = all.findIndex(s=>s.id===session.id);
    if(idx>=0) all[idx]=session; else all.push(session);
    store.set(KEYS.SESSIONS,all);
  },
  forStudent(name,testId){
    return this.all().filter(s=>s.studentName===name && s.testId===testId)
      .sort((a,b)=>new Date(a.completedAt||a.startedAt)-new Date(b.completedAt||b.startedAt));
  },
  delete(id){
    const all = this.all().filter(s=>s.id!==id);
    store.set(KEYS.SESSIONS,all);
    try{ AudioStore.deleteSession(id); }catch(e){}
  }
};

/* ------------------------------------------------------------
   AUDIO STORE — IndexedDB (blobs are far too large for localStorage)
   Each part's recording is keyed `${sessionId}:${partKey}`.
   ------------------------------------------------------------ */
const AudioStore = (function(){
  const DB_NAME = "mm.ielts.audio";
  const STORE = "recordings";
  let dbPromise = null;
  function open(){
    if(dbPromise) return dbPromise;
    dbPromise = new Promise((resolve,reject)=>{
      if(!("indexedDB" in window)){ reject(new Error("no-indexeddb")); return; }
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = ()=>{
        const db = req.result;
        if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
      };
      req.onsuccess = ()=>resolve(req.result);
      req.onerror = ()=>reject(req.error||new Error("idb-open-failed"));
    });
    return dbPromise;
  }
  function tx(mode){
    return open().then(db=>{
      const t = db.transaction(STORE, mode);
      return { store: t.objectStore(STORE), done: new Promise((res,rej)=>{ t.oncomplete=res; t.onerror=()=>rej(t.error); t.onabort=()=>rej(t.error); }) };
    });
  }
  async function put(key, blob){
    if(!blob) return false;
    try{
      const {store:s, done} = await tx("readwrite");
      s.put(blob, key);
      await done;
      return true;
    }catch(e){ console.warn("AudioStore.put failed", e); return false; }
  }
  async function get(key){
    try{
      const {store:s} = await tx("readonly");
      return await new Promise((res,rej)=>{
        const r = s.get(key);
        r.onsuccess = ()=>res(r.result||null);
        r.onerror = ()=>rej(r.error);
      });
    }catch(e){ return null; }
  }
  async function del(key){
    try{ const {store:s, done} = await tx("readwrite"); s.delete(key); await done; }catch(e){}
  }
  async function deleteSession(sessionId){
    for(const p of ["part1","part2","part3"]) await del(`${sessionId}:${p}`);
  }
  function available(){ return "indexedDB" in window; }
  return { put, get, delete:del, deleteSession, available };
})();

/* ------------------------------------------------------------
   APP STATE (tiny pub-sub store)
   ------------------------------------------------------------ */
const state = {
  view:"home",             // home|library|builder|runner|processing|report
  viewParams:{},
  session:null,            // active recording session
  _listeners:new Set(),
  set(patch){Object.assign(this,patch);this._emit();},
  go(view,params={}){this.view=view;this.viewParams=params;this._emit();},
  on(cb){this._listeners.add(cb);return()=>this._listeners.delete(cb);},
  _emit(){for(const cb of this._listeners) cb(this);}
};

/* ------------------------------------------------------------
   RECORDING — MediaRecorder, Timer, Waveform, VAD
   ------------------------------------------------------------ */
const Recorder = (function(){
  let mediaRecorder=null, chunks=[], stream=null, mime="", startTs=0, pausedMs=0, pauseStart=0;
  let audioCtx=null, analyser=null, buffer=null;
  const priority = [
    "audio/webm;codecs=opus","audio/ogg;codecs=opus",
    "audio/mp4;codecs=mp4a.40.2","audio/mp4","audio/webm"
  ];
  function negotiate(){
    if(typeof MediaRecorder==="undefined") return "";
    for(const m of priority) if(MediaRecorder.isTypeSupported(m)) return m;
    return "";
  }
  async function requestStream(){
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia) throw new Error("ERR_MIC_UNSUPPORTED");
    return await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true,channelCount:{ideal:1}},
      video:false
    });
  }
  async function init(){
    stream = await requestStream();
    mime = negotiate();
    mediaRecorder = mime ? new MediaRecorder(stream,{mimeType:mime}) : new MediaRecorder(stream);
    chunks = [];
    mediaRecorder.ondataavailable = e => { if(e.data && e.data.size>0) chunks.push(e.data); };
    // Setup audio analyser
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.7;
    src.connect(analyser);
    buffer = new Uint8Array(analyser.fftSize);
    return {mime,stream};
  }
  function start(){
    startTs = performance.now();
    pausedMs = 0;
    mediaRecorder.start(1000);
  }
  function pause(){
    if(mediaRecorder.state==="recording"){
      mediaRecorder.pause();
      pauseStart = performance.now();
    }
  }
  function resume(){
    if(mediaRecorder.state==="paused"){
      pausedMs += performance.now() - pauseStart;
      mediaRecorder.resume();
    }
  }
  async function stop(){
    return new Promise(resolve=>{
      mediaRecorder.onstop = ()=>{
        const blob = new Blob(chunks,{type:mime||"audio/webm"});
        const duration = performance.now() - startTs - pausedMs;
        resolve({blob,mime,durationMs:Math.round(duration),chunksCount:chunks.length});
      };
      mediaRecorder.stop();
    });
  }
  function readFrame(){
    if(!analyser) return null;
    analyser.getByteTimeDomainData(buffer);
    return buffer;
  }
  function destroy(){
    try{if(stream) stream.getTracks().forEach(t=>t.stop());}catch(e){}
    try{if(audioCtx) audioCtx.close();}catch(e){}
    mediaRecorder=null;stream=null;audioCtx=null;analyser=null;chunks=[];
  }
  return {init,start,pause,resume,stop,readFrame,destroy,
    getMime:()=>mime,
    getAnalyser:()=>analyser
  };
})();

/* Transcriber — provider-agnostic with Web Speech adapter */
const Transcriber = (function(){
  let recognition=null, segments=[], interimText="", startedAt=0, active=false, lang="en-US";
  let interimHistory=[]; let currentInterim=""; let revisionsTotal=0;
  let onPartialCb=null, onFinalCb=null;
  const available = ()=>!!(window.SpeechRecognition||window.webkitSpeechRecognition);
  function start(options={}){
    if(!available()){
      active=false;
      // Fallback: produce a synthetic "transcription-unavailable" result at stop time
      return false;
    }
    const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = options.lang||lang;
    segments = []; interimText=""; interimHistory=[]; currentInterim=""; revisionsTotal=0;
    startedAt = performance.now();
    active = true;
    let lastEndMs = 0;
    recognition.onresult = (e)=>{
      for(let i=e.resultIndex;i<e.results.length;i++){
        const r = e.results[i];
        const text = r[0].transcript;
        if(r.isFinal){
          const nowMs = performance.now() - startedAt;
          const conf = typeof r[0].confidence === "number" ? r[0].confidence : 0.82;
          segments.push({
            startMs:lastEndMs,
            endMs:nowMs,
            text:text.trim(),
            confidence:conf
          });
          lastEndMs = nowMs;
          interimText = "";
          currentInterim = "";
          if(onFinalCb) onFinalCb(text.trim());
        } else {
          interimText = text;
          // Count revisions: if new interim is not a strict prefix-extension of prior, count it
          if(currentInterim && !text.startsWith(currentInterim)) revisionsTotal++;
          currentInterim = text;
          if(onPartialCb) onPartialCb(text);
        }
      }
    };
    recognition.onend = ()=>{
      if(active){
        // Chrome 60s auto-end workaround — restart if still active
        try{recognition.start();}catch(e){}
      }
    };
    recognition.onerror = (e)=>{
      // swallow; stop will produce whatever we have
      if(e.error==="not-allowed"||e.error==="service-not-allowed") active=false;
    };
    try{recognition.start();}catch(e){active=false;return false;}
    return true;
  }
  async function stop(){
    active = false;
    if(recognition){
      try{recognition.stop();}catch(e){}
      recognition = null;
    }
    // Give the engine a tick to flush any last final result
    await new Promise(r=>setTimeout(r,120));
    const text = segments.map(s=>s.text).join(" ").trim();
    const confSum = segments.reduce((a,s)=>a+s.confidence,0);
    const confidence = segments.length ? confSum/segments.length : 0;
    const durationMs = performance.now() - startedAt;
    // Transcript stability score
    const stability = segments.length ? clamp01(1 - (revisionsTotal/segments.length)/5) : 0.5;
    return {
      text,segments,words:[],
      confidence:confidence||0,
      languageDetected:lang,
      durationMs:Math.round(durationMs),
      provider:"web-speech",
      providerMeta:{interimResults:true,revisions:revisionsTotal},
      warnings:[],
      sourceTags:["transcript"],
      stability
    };
  }
  function onPartial(cb){onPartialCb=cb;}
  function onFinal(cb){onFinalCb=cb;}
  return {available,start,stop,onPartial,onFinal,
    get segments(){return segments;},
    get interim(){return interimText;}
  };
})();

function whisperConfigured(){

/* Effective transcription mode for a session:
   "whisper"          → hosted API configured and selected
   "browser"          → browser engine selected, or used as fallback
   "none"             → neither available (audio still recorded) */
function activeTranscriptionMode(){
  if(Backend.available()) return "backend";
  const t = getTranscriptionSettings();
  if(t.provider === "browser") return Transcriber.available() ? "browser" : "none";
  // provider === "whisper"
  if(whisperConfigured()) return "whisper";
  return Transcriber.available() ? "browser" : "none";
}

const WhisperClient = (function(){
  function blobExtension(blob){
    const t = (blob && blob.type) || "";
    if(t.includes("mp4") || t.includes("m4a") || t.includes("mpeg")) return "m4a";
    if(t.includes("ogg")) return "ogg";
    if(t.includes("wav")) return "wav";
    return "webm";
  }
  async function transcribe(blob, opts){
    const cfg = {...getTranscriptionSettings(), ...(opts||{})};
    if(!cfg.baseUrl || !cfg.apiKey) throw new Error("Transcription API not configured");
    const url = cfg.baseUrl.replace(/\/+$/,"") + "/audio/transcriptions";
    const fd = new FormData();
    fd.append("file", blob, `recording.${blobExtension(blob)}`);
    fd.append("model", cfg.model || "whisper-1");
    if(cfg.language && cfg.language !== "auto") fd.append("language", cfg.language);
    fd.append("response_format", "verbose_json");
    fd.append("temperature", "0");
    let res;
    try{
      res = await fetch(url, { method:"POST", headers:{ Authorization:`Bearer ${cfg.apiKey}` }, body:fd });
    }catch(netErr){
      throw new Error("Network/CORS error reaching the transcription endpoint. If self-hosting, enable CORS for this origin.");
    }
    if(!res.ok){
      let msg = `HTTP ${res.status}`;
      try{ const j = await res.json(); msg = (j.error && j.error.message) || j.message || JSON.stringify(j); }
      catch(e){ try{ const tx = await res.text(); if(tx) msg = tx.slice(0,200); }catch(_){} }
      if(res.status === 401 || res.status === 403) msg = "Authentication failed — check the API key. (" + msg + ")";
      const err = new Error(msg); err.status = res.status; throw err;
    }
    // Some servers return text/plain for non-json formats; we requested verbose_json.
    const ct = res.headers.get("content-type") || "";
    if(ct.includes("application/json")) return await res.json();
    const txt = await res.text();
    return { text: txt };
  }
  return { transcribe };
})();

/* Map a (verbose_)json Whisper response into the internal transcriptionResult
   shape consumed by the scoring engine and turn reconstruction. */
function whisperToResult(json, fallbackDurationMs){
  const sigmoidConf = (avgLogprob, noSpeechProb)=>{
    // avg_logprob is typically in [-1, 0]; exp() maps it to a 0..1 confidence.
    let c = (typeof avgLogprob === "number") ? Math.exp(avgLogprob) : 0.85;
    if(typeof noSpeechProb === "number") c *= (1 - clamp01(noSpeechProb));
    return clamp01(c);
  };
  const rawSegs = Array.isArray(json.segments) ? json.segments : [];
  let segments = rawSegs.map(s=>({
    startMs: Math.round((s.start||0)*1000),
    endMs: Math.round((s.end||0)*1000),
    text: (s.text||"").trim(),
    confidence: sigmoidConf(s.avg_logprob, s.no_speech_prob)
  })).filter(s=>s.text);
  const text = (json.text || segments.map(s=>s.text).join(" ")).trim();
  if(!segments.length && text){
    // No segment timing returned — synthesise one spanning the clip.
    segments = [{ startMs:0, endMs: Math.round(json.duration ? json.duration*1000 : (fallbackDurationMs||0)), text, confidence:0.85 }];
  }
  const confidence = segments.length ? mean(segments.map(s=>s.confidence)) : 0;
  return {
    text, segments, words:[],
    confidence: confidence || 0,
    languageDetected: json.language || "en",
    durationMs: Math.round(json.duration ? json.duration*1000 : (fallbackDurationMs||0)),
    provider: "whisper",
    providerMeta: { model: getTranscriptionSettings().model, segmentCount: segments.length },
    warnings: [],
    sourceTags: ["transcript"],
    stability: 0.95   // deterministic at temperature 0
  };
}
function emptyTranscriptionResult(warnings){
  return {
    text:"", segments:[], words:[], confidence:0, languageDetected:"en",
    durationMs:0, provider:"none", providerMeta:{}, warnings:warnings||[],
    sourceTags:["rule"], stability:0.5
  };
}

/* Build a silent WAV blob (for the Settings "Test connection" check). */
function makeSilentWav(seconds=1, sampleRate=16000){
  const numSamples = Math.floor(seconds*sampleRate);
  const buffer = new ArrayBuffer(44 + numSamples*2);
  const view = new DataView(buffer);
  const writeStr = (off,str)=>{ for(let i=0;i<str.length;i++) view.setUint8(off+i, str.charCodeAt(i)); };
  writeStr(0,"RIFF"); view.setUint32(4, 36+numSamples*2, true); writeStr(8,"WAVE");
  writeStr(12,"fmt "); view.setUint32(16,16,true); view.setUint16(20,1,true); view.setUint16(22,1,true);
  view.setUint32(24,sampleRate,true); view.setUint32(28,sampleRate*2,true); view.setUint16(32,2,true); view.setUint16(34,16,true);
  writeStr(36,"data"); view.setUint32(40,numSamples*2,true);
  // samples already zero (silence)
  return new Blob([buffer], {type:"audio/wav"});
}

async function syncSessionsFromBackend(){

}

/* Timer — drift-free, RAF-driven */
class Timer {
  constructor(durationMs,callbacks={}){
    this.duration = durationMs;
    this.elapsedBefore = 0;
    this.startTs = null;
    this.running = false;
    this.cb = callbacks;
    this.warned = false;
    this.approached = false;
    this.flashes = new Set();
    this._raf = null;
  }
  start(){
    this.startTs = performance.now();
    this.running = true;
    this._tick();
  }
  pause(){
    if(!this.running) return;
    this.elapsedBefore += performance.now() - this.startTs;
    this.running = false;
    if(this._raf) cancelAnimationFrame(this._raf);
  }
  resume(){
    if(this.running) return;
    this.startTs = performance.now();
    this.running = true;
    this._tick();
  }
  stop(){this.running=false;if(this._raf) cancelAnimationFrame(this._raf);}
  elapsed(){return this.running ? this.elapsedBefore + (performance.now()-this.startTs) : this.elapsedBefore;}
  remaining(){return Math.max(0, this.duration - this.elapsed());}
  _tick(){
    if(!this.running) return;
    const remaining = this.remaining();
    if(this.cb.onTick) this.cb.onTick(remaining, this.elapsed());
    if(!this.approached && remaining<=10000){
      this.approached = true;
      if(this.cb.onApproach) this.cb.onApproach();
    }
    if(!this.warned && remaining<=3000){
      this.warned = true;
      if(this.cb.onWarning) this.cb.onWarning();
    }
    // Three flashes at T-3, T-2, T-1
    for(const n of [3,2,1]){
      const target = n*1000;
      if(remaining <= target && !this.flashes.has(n)){
        this.flashes.add(n);
        if(this.cb.onFlash) this.cb.onFlash(n);
      }
    }
    if(remaining<=0){
      this.running=false;
      if(this.cb.onExpired) this.cb.onExpired();
      return;
    }
    this._raf = requestAnimationFrame(()=>this._tick());
  }
}

/* VAD — energy + ZCR hybrid */
class VAD {
  constructor(){
    this.samples=[];
    this.state="silence";
    this.segments=[];
    this.frames=0;
    this.speechFrameStreak=0;
    this.silenceFrameStreak=0;
    this.currentSegStart=0;
    this.ambient=4.0;
    this.calibrating=true;
    this.calibSamples=[];
    this.peakRms=0;
    this.clippedFrames=0;
    this.sumRms=0;
    this.rmsValues=[];
  }
  processFrame(buffer,tMs){
    this.frames++;
    let sumSq=0, zcr=0, prev=128, clipped=0;
    for(let i=0;i<buffer.length;i++){
      const s = buffer[i]-128;
      sumSq += s*s;
      if((s>=0)!==(prev>=0)) zcr++;
      prev = s;
      if(buffer[i]===0||buffer[i]===255) clipped++;
    }
    const rms = Math.sqrt(sumSq/buffer.length);
    const zcRate = zcr/buffer.length;
    if(clipped>0) this.clippedFrames++;
    this.peakRms = Math.max(this.peakRms, rms);
    this.sumRms += rms;
    this.rmsValues.push(rms);
    // Calibrate ambient across ~2 seconds (120 frames) using the quietest
    // quartile — robust against the user speaking during the calibration window.
    if(this.calibrating){
      this.calibSamples.push(rms);
      if(this.calibSamples.length>=120){
        this.calibrating = false;
        const sorted = [...this.calibSamples].sort((a,b)=>a-b);
        const q1End = Math.floor(sorted.length*0.25);
        const quietestMean = mean(sorted.slice(0, Math.max(1, q1End)));
        this.ambient = Math.max(quietestMean*2.5, 3.0);
      }
    }
    const isSpeechRaw = rms > this.ambient && zcRate > 0.02 && zcRate < 0.25;
    if(isSpeechRaw){
      this.speechFrameStreak++;
      this.silenceFrameStreak = 0;
    } else {
      this.silenceFrameStreak++;
      this.speechFrameStreak = 0;
    }
    if(this.state==="silence" && this.speechFrameStreak>=3){
      this.state="speech";
      if(this.segments.length===0 || this.segments[this.segments.length-1].type==="silence"){
        this.segments.push({type:"speech",startMs:tMs,endMs:tMs,durationMs:0});
      }
    } else if(this.state==="speech" && this.silenceFrameStreak>=8){
      this.state="silence";
      if(this.segments.length && this.segments[this.segments.length-1].type==="speech"){
        this.segments[this.segments.length-1].endMs = tMs;
        this.segments[this.segments.length-1].durationMs = tMs - this.segments[this.segments.length-1].startMs;
      }
      this.segments.push({type:"silence",startMs:tMs,endMs:tMs,durationMs:0});
    }
    // Update current segment endMs
    if(this.segments.length){
      const cur = this.segments[this.segments.length-1];
      cur.endMs = tMs;
      cur.durationMs = cur.endMs - cur.startMs;
    }
  }
  finalize(totalMs){
    // Close last seg
    if(this.segments.length){
      this.segments[this.segments.length-1].endMs = totalMs;
      this.segments[this.segments.length-1].durationMs = totalMs - this.segments[this.segments.length-1].startMs;
    }
    const speaking = this.segments.filter(s=>s.type==="speech").reduce((a,b)=>a+b.durationMs,0);
    const silence = this.segments.filter(s=>s.type==="silence").reduce((a,b)=>a+b.durationMs,0);
    const silenceBlocks = this.segments.filter(s=>s.type==="silence");
    const silenceDurations = silenceBlocks.map(b=>b.durationMs);
    // Compute noise variance during silence
    const silenceRms = [];
    // coarse: use first and last 10% as proxy; more accurate would require mapping frames to times
    // For simplicity, we'll use full rmsValues variance as background proxy
    const rmsMean = mean(this.rmsValues);
    const noiseVar = this.rmsValues.length ? mean(this.rmsValues.map(r=>(r-rmsMean)**2)) : 0;
    const clipRatio = this.frames ? this.clippedFrames/this.frames : 0;
    return {
      speakingTimeMs:speaking,
      silenceTimeMs:silence,
      speechRatio: totalMs>0 ? speaking/totalMs : 0,
      silenceBlocks:silenceBlocks.map(b=>({startMs:b.startMs,endMs:b.endMs,durationMs:b.durationMs})),
      silenceBlockCount:silenceBlocks.length,
      avgSilenceBlockMs: silenceDurations.length ? mean(silenceDurations) : 0,
      longestSilenceMs: silenceDurations.length ? Math.max(...silenceDurations) : 0,
      peakRms:this.peakRms,
      noiseFloorRms:this.ambient,
      noiseVariance:noiseVar,
      clippingFrameRatio:clipRatio,
      frames:this.frames
    };
  }
}

/* Mic Quality Score */
function micQualityScore(vadMetrics){
  const TARGET_PEAK_RMS = 40;
  const TARGET_DR = 30;
  const inputLevel = clamp01(vadMetrics.peakRms/TARGET_PEAK_RMS) * 100;
  const clippingPenalty = Math.max(0, 100 - vadMetrics.clippingFrameRatio*400);
  const noiseQuality = (1 - Math.min(vadMetrics.noiseVariance/10, 1)) * 100;
  const dr = clamp01((vadMetrics.peakRms - vadMetrics.noiseFloorRms)/TARGET_DR) * 100;
  const score = inputLevel*0.30 + clippingPenalty*0.25 + noiseQuality*0.25 + dr*0.20;
  return {
    score:Math.round(clamp(score,0,100)),
    components:{inputLevel:Math.round(inputLevel),clippingPenalty:Math.round(clippingPenalty),noiseQuality:Math.round(noiseQuality),dynamicRange:Math.round(dr)}
  };
}

/* Waveform Renderer */
class WaveRenderer{
  constructor(canvas){
    this.canvas = canvas;
    this.ctx = canvas.getContext("2d");
    this.peaks = [];
    this.maxPeaks = 100;
    this.running = false;
    this._raf = null;
  }
  resize(){
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    const rect = this.canvas.getBoundingClientRect();
    this.canvas.width = rect.width * dpr;
    this.canvas.height = rect.height * dpr;
    this.ctx.scale(dpr,dpr);
    this.w = rect.width; this.h = rect.height;
  }
  start(getBuffer){
    this.resize();
    this.running = true;
    const loop = ()=>{
      if(!this.running) return;
      const buf = getBuffer();
      if(buf){
        let sumSq=0;
        for(let i=0;i<buf.length;i++){const s=buf[i]-128;sumSq+=s*s;}
        const rms = Math.sqrt(sumSq/buf.length);
        this.peaks.push(rms);
        if(this.peaks.length>this.maxPeaks) this.peaks.shift();
      }
      this._draw();
      this._raf = requestAnimationFrame(loop);
    };
    loop();
  }
  stop(){this.running=false;if(this._raf) cancelAnimationFrame(this._raf);}
  _draw(){
    const {ctx,w,h,peaks} = this;
    ctx.clearRect(0,0,w,h);
    const barW = Math.max(1.5, w/this.maxPeaks - 1);
    const gap = 1;
    const maxPeak = 60;
    for(let i=0;i<peaks.length;i++){
      const v = Math.min(peaks[i]/maxPeak, 1);
      const barH = Math.max(2, v*h*0.85);
      const x = i*(barW+gap);
      const y = (h-barH)/2;
      // frontier last 2%
      const isFrontier = i >= peaks.length - 2;
      ctx.fillStyle = isFrontier ? "#D4AF37" : "rgba(139, 163, 194, 0.7)";
      ctx.fillRect(x,y,barW,barH);
    }
  }
}
