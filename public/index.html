};

async function launchRunner(test){
  RunnerState.test = test;
  RunnerState.mode = SetupState.mode;
  RunnerState.studentName = SetupState.studentName.trim();
  RunnerState.examinerName = SetupState.examinerName.trim() || "Mourad Mekki";
  RunnerState.stage = "loading";
  RunnerState.partKey = null;
  RunnerState.qIndex = 0;
  RunnerState.paused = false;
  RunnerState.pauseUsed = false;
  RunnerState.liveCaption = "";
  RunnerState.timeUpShown = false;
  RunnerState.partMeta = {part1:null,part2:null,part3:null};
  RunnerState.startedAt = Date.now();
  RunnerState.sessionId = uid();
  RunnerState.examinerTurns = [];
  RunnerState.candidateTurns = {part1:[],part2:[],part3:[]};
  RunnerState.transMode = activeTranscriptionMode();

  state.go("runner",{testId:test.id});
  // Initialize recorder
  try{
    await Recorder.init();
    RunnerState.stage = "ready";
    state._emit();
  }catch(err){
    RunnerState.stage = "permission-denied";
    state._emit();
  }
}

async function startPart(partKey){
  const test = RunnerState.test;
  RunnerState.partKey = partKey;
  RunnerState.stage = partKey;
  RunnerState.qIndex = 0;
  RunnerState.liveCaption = "";
  RunnerState.timeUpShown = false;
  state._emit();

  // Compute duration for this part
  let durationMs;
  if(partKey==="part1") durationMs = 4.5 * 60000;        // ~4.5 min
  else if(partKey==="part2") durationMs = test.part2.speakSeconds * 1000;
  else durationMs = 4.5 * 60000;                          // Part 3 ~4.5 min

  // Setup VAD
  RunnerState.vad = new VAD();

  // Wait a tick for the canvas to be in DOM
  await new Promise(r=>requestAnimationFrame(r));
  const waveCanvas = $("#mm-wave-canvas");
  if(waveCanvas){
    RunnerState.waveRenderer = new WaveRenderer(waveCanvas);
    RunnerState.waveRenderer.start(()=>Recorder.readFrame());
  }

  // Setup analysis loop (VAD)
  const vadLoop = ()=>{
    if(RunnerState.stage !== partKey) return;
    const buf = Recorder.readFrame();
    if(buf && !RunnerState.paused){
      RunnerState.vad.processFrame(buf, RunnerState.timer ? RunnerState.timer.elapsed() : 0);
    }
    RunnerState._rafMeta = requestAnimationFrame(vadLoop);
  };
  RunnerState._rafMeta = requestAnimationFrame(vadLoop);

  // Start recorder + transcriber
  Recorder.start();
  if(RunnerState.transMode === "browser"){
    Transcriber.onPartial((text)=>{
      RunnerState.liveCaption = text;
      const live = $("#mm-live-caption");
      if(live) live.textContent = text;
    });
    Transcriber.onFinal((text)=>{
      RunnerState.candidateTurns[partKey].push({text, at:RunnerState.timer?.elapsed()||0});
    });
    Transcriber.start();
  }
  // (Whisper mode transcribes the saved recording after the part ends.)

  // Timer
  const timerDigits = ()=>$("#mm-timer-digits");
  const timerProg = ()=>$("#mm-timer-prog");
  const timerWrap = ()=>$("#mm-timer-wrap");
  RunnerState.timer = new Timer(durationMs, {
    onTick:(remaining)=>{
      const d = timerDigits();
      if(d) d.textContent = fmt.mmss(remaining);
      const prog = timerProg();
      if(prog){
        const ratio = remaining/durationMs;
        const CIRC = 2 * Math.PI * 96;  // r=96
        prog.setAttribute("stroke-dashoffset", String(CIRC * (1-ratio)));
      }
    },
    onApproach:()=>{
      const p = timerProg();if(p) p.classList.add("mm-timer__prog--warn");
      const w = timerWrap();if(w) w.classList.add("is-warn");
    },
    onWarning:()=>{
      const p = timerProg();if(p){p.classList.remove("mm-timer__prog--warn");p.classList.add("mm-timer__prog--danger");}
      const w = timerWrap();if(w){w.classList.remove("is-warn");w.classList.add("is-danger");}
    },
    onFlash:(n)=>{
      // Silent flashes — visual pulse
      const w = timerWrap();if(w){w.style.transform="scale(1.04)";setTimeout(()=>{w.style.transform="";},180);}
    },
    onExpired:()=>{
      finishPart(partKey);
    }
  });
  RunnerState.timer.start();

  // Record that the part started
  const partStartMs = performance.now();
  RunnerState._partStartMs = partStartMs;

  // Examiner cue: first question / cue card presented
  recordExaminerCue(partKey, 0);
}

function recordExaminerCue(partKey, index){
  const test = RunnerState.test;
  let cue = "";
  if(partKey==="part1"){
    const topics = test.part1.topics;
    let count = 0;
    for(const topic of topics){
      for(const q of topic.questions){
        if(count === index){cue = q.q; break;}
        count++;
      }
      if(cue) break;
    }
  } else if(partKey==="part2"){
    cue = test.part2.cueCard.topic;
  } else if(partKey==="part3"){
    cue = test.part3.questions[index]?.q || "";
  }
  if(cue){
    RunnerState.examinerTurns.push({partKey, text:cue, at:RunnerState.timer?.elapsed()||0});
  }
}

/* Fills transcript-derived fields on a part's metadata: turn reconstruction
   (bucketing segments by examiner cue) and speaking-time reconciliation.
   Shared by the live browser path (finishPart) and the Whisper path
   (processAndReport). Operates on RunnerState. */
function applyTranscriptionToPartMeta(partKey, transResult){
  const pm = RunnerState.partMeta[partKey];
  if(!pm) return;
  pm.transcriptionResult = transResult;
  pm.pendingTranscription = false;
  pm.sourceTagsAvailable = (transResult.segments && transResult.segments.length) ? ["audio","transcript"] : ["audio","rule"];

  // --- Reconstruct candidate turns from segments using examiner-cue boundaries ---
  const exCues = RunnerState.examinerTurns.filter(t=>t.partKey===partKey).sort((a,b)=>a.at-b.at);
  const segs = transResult.segments || [];
  const reconstructed = [];
  if(segs.length && exCues.length){
    const offset = segs[0].startMs - exCues[0].at; // transcript clock − timer clock
    for(let i=0;i<exCues.length;i++){
      const thisCueAt = exCues[i].at + offset;
      const nextCueAt = i+1 < exCues.length ? exCues[i+1].at + offset : Infinity;
      const segsForThis = segs.filter(s => s.startMs >= thisCueAt - 500 && s.startMs < nextCueAt);
      if(segsForThis.length){
        const text = segsForThis.map(s=>s.text).join(" ").trim();
        if(text) reconstructed.push({text, at: exCues[i].at + 1});
      }
    }
    const capturedText = reconstructed.map(r=>r.text).join(" ");
    const fullText = transResult.text || "";
    if(capturedText.length < fullText.length * 0.5 && fullText.length > 20){
      reconstructed.length = 0;
      reconstructed.push({text: fullText, at: exCues[0].at + 1});
    }
  } else if(transResult.text && exCues.length){
    reconstructed.push({text: transResult.text, at: exCues[0].at + 1});
  }
  if(reconstructed.length) RunnerState.candidateTurns[partKey] = reconstructed;

  // --- Speaking-time reconciliation against transcript word count ---
  const wordCount = (transResult.text||"").trim().split(/\s+/).filter(Boolean).length;
  const wpmFloor = 135;
  const impliedSpeakingMs = (wordCount / wpmFloor) * 60000;
  let finalSpeakingMs = pm.speakingTimeMsVAD || 0;
  let finalSpeechRatio = pm.durationMs ? (finalSpeakingMs / pm.durationMs) : 0;
  if(impliedSpeakingMs > finalSpeakingMs * 1.5 && wordCount >= 20){
    finalSpeakingMs = Math.min(pm.durationMs, Math.round((finalSpeakingMs + impliedSpeakingMs)/2));
    finalSpeechRatio = pm.durationMs ? finalSpeakingMs / pm.durationMs : 0;
  }
  pm.speakingTimeMs = finalSpeakingMs;
  pm.speechRatio = finalSpeechRatio;
  pm.speakingTimeMsTranscriptImplied = Math.round(impliedSpeakingMs);
  pm.silenceTimeMs = Math.max(0, pm.durationMs - finalSpeakingMs);
}

async function finishPart(partKey){
  if(RunnerState.timer) RunnerState.timer.stop();
  if(RunnerState._rafMeta) cancelAnimationFrame(RunnerState._rafMeta);
  if(RunnerState.waveRenderer) RunnerState.waveRenderer.stop();

  // Show "Time's up" ceremony if this was timer-driven
  if(!RunnerState.timeUpShown){
    RunnerState.timeUpShown = true;
    state._emit();
    await new Promise(r=>setTimeout(r,1500));
  }

  // Stop recorder and capture acoustic metrics
  const recResult = await Recorder.stop();
  const vadMetrics = RunnerState.vad.finalize(recResult.durationMs);
  const micQ = micQualityScore(vadMetrics);

  // Persist the recording (for playback and, in Whisper mode, post-hoc transcription).
  const audioKey = `${RunnerState.sessionId}:${partKey}`;
  let audioStored = false;
  if(recResult.blob && recResult.blob.size > 0){
    audioStored = await AudioStore.put(audioKey, recResult.blob);
  }

  // Acquire the transcript now ONLY for the live browser engine.
  // Whisper transcribes the saved clip later, on the processing screen.
  let transResult = null;
  let pending = false;
  if(RunnerState.transMode === "browser"){
    transResult = await Transcriber.stop();
  } else if(RunnerState.transMode === "whisper" || RunnerState.transMode === "backend"){
    if(audioStored){ pending = true; }
    else { transResult = emptyTranscriptionResult(["recording-not-saved"]); }
  } else {
    transResult = emptyTranscriptionResult(["no-transcription-provider"]);
  }

  // Base (acoustic) part metadata. Transcript-derived fields are filled by
  // applyTranscriptionToPartMeta() — now for browser, later for Whisper.
  RunnerState.partMeta[partKey] = {
    durationMs: recResult.durationMs,
    speakingTimeMs: vadMetrics.speakingTimeMs,
    speakingTimeMsVAD: vadMetrics.speakingTimeMs,
    speakingTimeMsTranscriptImplied: 0,
    silenceTimeMs: Math.max(0, recResult.durationMs - vadMetrics.speakingTimeMs),
    speechRatio: vadMetrics.speechRatio,
    silenceBlockCount: vadMetrics.silenceBlockCount,
    avgSilenceBlockMs: vadMetrics.avgSilenceBlockMs,
    longestSilenceMs: vadMetrics.longestSilenceMs,
    peakRms: vadMetrics.peakRms,
    noiseFloorRms: vadMetrics.noiseFloorRms,
    noiseVariance: vadMetrics.noiseVariance,
    clippingFrameRatio: vadMetrics.clippingFrameRatio,
    micQualityScore: micQ.score,
    micQualityComponents: micQ.components,
    transcriptionResult: null,
    pendingTranscription: pending,
    audioKey: audioStored ? audioKey : null,
    audioMime: recResult.mime || "audio/webm",
    audioDurationMs: recResult.durationMs,
    sourceTagsAvailable: ["audio","rule"]
  };

  if(transResult) applyTranscriptionToPartMeta(partKey, transResult);

  // Proceed to next stage
  if(partKey === "part1"){
    // Prep for Part 2
    RunnerState.stage = "part2_prep";
    RunnerState.timeUpShown = false;
    state._emit();
    // Reinit recorder for next part
    Recorder.destroy();
    try{await Recorder.init();}catch(e){toast("Microphone reconnection needed");}
  } else if(partKey === "part2"){
    RunnerState.stage = "part3_intro";
    RunnerState.timeUpShown = false;
    state._emit();
    Recorder.destroy();
    try{await Recorder.init();}catch(e){toast("Microphone reconnection needed");}
  } else if(partKey === "part3"){
    RunnerState.stage = "done";
    state._emit();
    Recorder.destroy();
    // Immediately transition to processing
    setTimeout(()=>processAndReport(),400);
  }
}

async function processAndReport(){
  state.go("processing");

  const progressFill = ()=>$("#mm-progress-fill");
  const stepEls = ()=>$$(".mm-processing__step");
  const setStepText = (i,txt)=>{ const e=stepEls()[i]; if(e) e.textContent=txt; };

  // === Phase 1: Real transcription (Whisper) for any deferred parts ===
  const pendingKeys = ["part1","part2","part3"].filter(k=>{
    const pm = RunnerState.partMeta[k];
    return pm && pm.pendingTranscription && pm.audioKey;
  });
  const partLabel = {part1:"Part 1",part2:"Part 2",part3:"Part 3"};
  if(pendingKeys.length){
    const cfg = getTranscriptionSettings();
    const els0 = stepEls(); if(els0[0]) els0[0].classList.add("is-active");
    for(let i=0;i<pendingKeys.length;i++){
      const k = pendingKeys[i];
      setStepText(0, `Transcribing ${partLabel[k]}…`);
      if(progressFill()) progressFill().style.width = `${Math.round(((i)/pendingKeys.length)*40)}%`;
      let result;
      try{
        const blob = await AudioStore.get(RunnerState.partMeta[k].audioKey);
        if(!blob || !blob.size) throw new Error("Recording not found on this device");
        if(RunnerState.transMode === "backend"){
          result = await Backend.transcribe(blob, cfg.language);
        } else {
          const json = await WhisperClient.transcribe(blob, cfg);
          result = whisperToResult(json, RunnerState.partMeta[k].durationMs);
        }
      }catch(err){
        console.warn("Transcription failed for", k, err);
        toast(`${partLabel[k]} transcription failed: ${err.message || err}`);
        result = emptyTranscriptionResult(["transcription-error: " + (err.message || String(err))]);
      }
      applyTranscriptionToPartMeta(k, result);
    }
    setStepText(0, "Transcribed audio");
    const els1 = stepEls(); if(els1[0]){els1[0].classList.remove("is-active");els1[0].classList.add("is-done");}
    if(progressFill()) progressFill().style.width = "40%";
  }

  // === Phase 2: Synthetic staged progress for the analysis steps ===
  const analysisStages = pendingKeys.length
    ? [ {i:1,d:450},{i:2,d:450},{i:3,d:450},{i:4,d:450},{i:5,d:400},{i:6,d:550} ]
    : [ {i:0,d:500},{i:1,d:500},{i:2,d:450},{i:3,d:450},{i:4,d:500},{i:5,d:400},{i:6,d:600} ];
  const startPct = pendingKeys.length ? 40 : 0;
  for(let n=0;n<analysisStages.length;n++){
    const idx = analysisStages[n].i;
    const els = stepEls();
    if(els[idx]) els[idx].classList.add("is-active");
    if(progressFill()) progressFill().style.width = `${Math.round(startPct + ((n+1)/analysisStages.length)*(100-startPct))}%`;
    await new Promise(r=>setTimeout(r,analysisStages[n].d));
    if(els[idx]){els[idx].classList.remove("is-active");els[idx].classList.add("is-done");}
  }

  // Build full session object
  const session = {
    id: RunnerState.sessionId,
    testId: RunnerState.test.id,
    test: RunnerState.test,
    studentName: RunnerState.studentName,
    examinerName: RunnerState.examinerName,
    mode: RunnerState.mode,
    transcriptionMode: RunnerState.transMode,
    startedAt: new Date(RunnerState.startedAt).toISOString(),
    completedAt: new Date().toISOString(),
    parts: RunnerState.partMeta,
    examinerTurns: RunnerState.examinerTurns,
    candidateTurns: RunnerState.candidateTurns
  };
  // Score it — rule-based baseline first (instant, always valid)
  let scored = ScoringEngine_analyze(session);
  // Then refine with server-side AI scoring if a backend is connected.
  if(Backend.scoringAvailable()){
    const els = stepEls(); const li = els.length - 1;
    if(els[li]){ els[li].classList.remove("is-done"); els[li].classList.add("is-active"); els[li].textContent = "Scoring with AI examiner…"; }
    try{
      const ai = await Backend.score(session, scored);
      if(ai && ai.criteria) scored = ai;
    }catch(e){
      console.warn("AI scoring failed", e);
      toast("AI scoring unavailable — using rule-based score.");
    }
    if(els[li]){ els[li].classList.remove("is-active"); els[li].classList.add("is-done"); els[li].textContent = "Composing report"; }
  }
  session.scored = scored;
  Sessions.save(session);
  if(Backend.available()) Backend.saveSession(session);
  // Increment test session count
  const t = Library.get(RunnerState.test.id);
  if(t){t.sessionCount = (t.sessionCount||0)+1;Library.save(t);}
  // Navigate to report
  state.go("report",{sessionId:session.id});
}

function renderPrepTimer(){
  // 60s prep timer
  const prepDuration = (RunnerState.test.part2.prepSeconds||60) * 1000;
  setTimeout(()=>{
    if(RunnerState.stage !== "part2_prep") return;
    const startedAt = performance.now();
    const tick = ()=>{
      if(RunnerState.stage !== "part2_prep") return;
      const elapsed = performance.now() - startedAt;
      const remaining = Math.max(0, prepDuration - elapsed);
      const d = $("#mm-prep-digits");
      if(d) d.textContent = fmt.mmss(remaining);
      const prog = $("#mm-prep-prog");
      if(prog){
        const ratio = remaining/prepDuration;
        const CIRC = 2 * Math.PI * 96;
        prog.setAttribute("stroke-dashoffset", String(CIRC * (1-ratio)));
      }
      if(remaining <= 0){
        skipPrep();
        return;
      }
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, 50);
  return el("div",{class:"mm-timer"},[
    el("svg",{viewBox:"0 0 200 200"},[
      (()=>{const c=document.createElementNS("http://www.w3.org/2000/svg","circle");c.setAttribute("class","mm-timer__track");c.setAttribute("cx","100");c.setAttribute("cy","100");c.setAttribute("r","96");return c;})(),
      (()=>{
        const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
        c.setAttribute("class","mm-timer__prog");c.setAttribute("id","mm-prep-prog");
        c.setAttribute("cx","100");c.setAttribute("cy","100");c.setAttribute("r","96");
        const CIRC = 2 * Math.PI * 96;
        c.setAttribute("stroke-dasharray",String(CIRC));
        c.setAttribute("stroke-dashoffset","0");
        return c;
      })()
    ]),
    el("div",{class:"mm-timer__inner"},[
      el("div",{class:"mm-timer__digits",id:"mm-prep-digits"},"01:00"),
      el("div",{class:"mm-timer__label"},"Preparation")
    ])
  ]);
}

function skipPrep(){
  startPart("part2");
}

function advanceQuestion(){
  RunnerState.qIndex++;
  RunnerState.liveCaption = "";
  // Record new examiner cue
  recordExaminerCue(RunnerState.partKey, RunnerState.qIndex);
  state._emit();
}

function togglePause(){
  if(RunnerState.paused){
    RunnerState.paused = false;
    RunnerState.timer.resume();
    Recorder.resume();
  } else {
    if(RunnerState.mode==="exam" && RunnerState.pauseUsed){
      toast("Pause already used — Exam Mode permits one pause");
      return;
    }
    RunnerState.paused = true;
    RunnerState.pauseUsed = true;
    RunnerState.timer.pause();
    Recorder.pause();
    if(RunnerState.mode === "exam"){
      // Auto-resume after 30s in exam mode
      setTimeout(()=>{
        if(RunnerState.paused){
          RunnerState.paused=false;
          RunnerState.timer.resume();
          Recorder.resume();
          state._emit();
          toast("Pause limit reached — resuming");
        }
      }, 30000);
    }
  }
  state._emit();
}

function renderCriterionAnalysis(sc, session){
  const items = [
    {key:"fluencyCoherence", label:"Fluency and Coherence", band:sc.criteria.fluencyCoherence},
    {key:"lexical", label:"Lexical Resource", band:sc.criteria.lexical},
    {key:"grammar", label:"Grammatical Range and Accuracy", band:sc.criteria.grammar},
    {key:"pronunciation", label:"Pronunciation", band:sc.criteria.pronunciation}
  ];
  return el("div",{class:"mm-analysis"}, items.map(item=>{
    // Build evidence snippet
    let evidence = null;
    if(item.key==="fluencyCoherence"){
      const wpms = ["part1","part2","part3"].map(k=>sc.analyzed[k]?.metrics.trueWPM).filter(Boolean);
      const avgWPM = wpms.length ? Math.round(mean(wpms)) : 0;
      const avgSpeech = mean(["part1","part2","part3"].map(k=>session.parts[k]?.speechRatio||0).filter(Boolean));
      evidence = `AUDIO · Average speech rate ${avgWPM} wpm · Speech-to-silence ratio ${(avgSpeech*100).toFixed(0)}%`;
    } else if(item.key==="lexical"){
      const avgTTR = mean(["part1","part2","part3"].map(k=>sc.analyzed[k]?.metrics.typeTokenRatioMA||0).filter(Boolean));
      const advItems = [...new Set(["part1","part2","part3"].flatMap(k=>sc.analyzed[k]?.metrics.advancedItems||[]))].slice(0,5);
      evidence = `TRANSCRIPT · Moving-window TTR ${avgTTR.toFixed(2)}${advItems.length?` · Advanced items used: ${advItems.map(w=>`'${w}'`).join(", ")}`:""}`;
    } else if(item.key==="grammar"){
      const allErrs = ["part1","part2","part3"].flatMap(k=>sc.analyzed[k]?.metrics.errors||[]);
      evidence = allErrs.length
        ? `TRANSCRIPT + RULE · ${allErrs.length} detected error${allErrs.length!==1?"s":""} across session${allErrs.length?` (e.g., '${allErrs[0].text}')`:""}`
        : `TRANSCRIPT + RULE · No systematic errors detected`;
    } else if(item.key==="pronunciation"){
      const avgConf = mean(["part1","part2","part3"].map(k=>sc.analyzed[k]?.metrics.avgTranscriptConfidence||0).filter(Boolean));
      evidence = `AUDIO · Average transcription confidence ${(avgConf*100).toFixed(0)}%${sc.pronunciationVerdict==="provisional"?" · Microphone quality limits full assessment":""}`;
    }
    return el("div",{class:"mm-analysis__item"},[
      el("div",{class:"mm-analysis__head"},[
        el("div",{class:"mm-analysis__name"},item.label),
        el("div",{class:"mm-analysis__band"}, item.band==null ? "provisional" : `Band ${item.band.toFixed(1)}`)
      ]),
      el("div",{class:"mm-analysis__text"}, sc.feedback.detailedAnalysis[item.key] || "—"),
      evidence ? el("div",{class:"mm-analysis__evidence"}, evidence) : null
    ]);
  }));
}

function partAudioPlayer(session, partKey){
  const meta = session.parts && session.parts[partKey];
  if(!meta || !meta.audioKey) return null;
  const wrap = el("div",{class:"mm-audio"},[
    el("span",{class:"mm-audio__label",html:ICONS.play+" Recording"}),
    el("span",{class:"mm-audio__pending"},"Loading audio…")
  ]);
  // Load blob from IndexedDB asynchronously, then swap in a real <audio> element.
  AudioStore.get(meta.audioKey).then(blob=>{
    if(!blob){
      const pend = wrap.querySelector(".mm-audio__pending");
      if(pend) pend.textContent = "Audio not found on this device.";
      return;
    }
    const url = URL.createObjectURL(blob);
    const audio = el("audio",{controls:true,preload:"metadata",src:url});
    const pend = wrap.querySelector(".mm-audio__pending");
    if(pend) pend.replaceWith(audio); else wrap.appendChild(audio);
  }).catch(()=>{
    const pend = wrap.querySelector(".mm-audio__pending");
    if(pend) pend.textContent = "Audio unavailable.";
  });
  return wrap;
}

function renderTranscript(session, test){
  const parts = [
    {key:"part1", label:"Part 1 · Introduction and familiar topics"},
    {key:"part2", label:"Part 2 · Individual long turn"},
    {key:"part3", label:"Part 3 · Two-way discussion"}
  ];
  return el("div",{},parts.map(p=>{
    const exTurns = (session.examinerTurns||[]).filter(t=>t.partKey===p.key);
    const candTurns = (session.candidateTurns||{})[p.key]||[];
    const fullText = session.parts[p.key]?.transcriptionResult?.text || "";

    // Decide whether to use per-question interleaving or a consolidated block.
    // Normalise both sides to ignore punctuation/whitespace differences.
    const normalize = s => s.toLowerCase().replace(/[^\w\s]/g,"").replace(/\s+/g," ").trim();
    const capturedNorm = normalize(candTurns.map(c=>c.text).join(" "));
    const fullNorm = normalize(fullText);
    const coverage = fullNorm.length ? capturedNorm.length/fullNorm.length : 1;

    const turns = [];
    // Always include examiner cues
    for(const e of exTurns) turns.push({role:"examiner",text:e.text,at:e.at});

    if(!fullText){
      // Nothing transcribed at all
      if(!turns.length){
        return el("div",{class:"mm-transcript-part"},[
          el("div",{class:"mm-transcript-part__label"},p.label),
          partAudioPlayer(session, p.key),
          el("div",{style:"font-size:13px;color:var(--mm-fg-tertiary);font-style:italic;padding:12px 0;"},
            "No transcript captured for this part. The audio was recorded (and is playable above), but transcription returned no text — check the transcription provider in Settings, confirm the API key and network connection, or ensure the recording contained audible speech.")
        ]);
      }
    } else if(coverage >= 0.75){
      // Good coverage: use per-question interleaving
      for(const c of candTurns) turns.push({role:"candidate",text:c.text,at:c.at});
    } else {
      // Poor coverage: drop partial captures, show full response as one block
      turns.push({
        role:"candidate",
        text: fullText,
        at: exTurns.length ? exTurns[0].at + 1 : 1,
        isConsolidated: true
      });
    }
    turns.sort((a,b)=>a.at-b.at);

    return el("div",{class:"mm-transcript-part"},[
      el("div",{class:"mm-transcript-part__label"},p.label),
      partAudioPlayer(session, p.key),
      el("div",{}, turns.map(t=>
        el("div",{class:`mm-turn mm-turn--${t.role}`,style:t.role==="candidate"?"margin-left:12%;":""},[
          el("div",{class:"mm-turn__speaker"},
            t.role==="examiner" ? "Examiner"
            : t.isConsolidated ? "Candidate (combined response)"
            : "Candidate"),
          el("div",{class:"mm-turn__text"}, t.text || "…")
        ])
      ))
    ]);
  }));
}

function downloadJSON(session){
  const filename = `ielts-speaking-${(session.studentName||"candidate").replace(/\s+/g,"-").toLowerCase()}-${session.id.slice(-6)}.json`;
  const payload = {
    schema:"mm.ielts.scored.v1",
    session:{
      id:session.id,testId:session.testId,studentName:session.studentName,
      examinerName:session.examinerName,mode:session.mode,
      startedAt:session.startedAt,completedAt:session.completedAt
    },
    test:{id:session.test?.id,title:session.test?.title,theme:session.test?.theme,difficulty:session.test?.difficulty},
    scored:session.scored
  };
  const blob = new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},200);
}

async function downloadPDF(session, btn){
  const reportEl = document.querySelector(".mm-report");
  if(!reportEl){ toast("Report not ready"); return; }
  const jspdfNS = window.jspdf || window.jsPDF;
  if(typeof window.html2canvas !== "function" || !jspdfNS){
    // Libraries didn't load (e.g. offline) — fall back to the print pipeline.
    toast("PDF engine offline — opening Print → Save as PDF instead");
    setTimeout(()=>window.print(), 400);
    return;
  }
  const JsPDF = jspdfNS.jsPDF || jspdfNS;
  const restore = btn ? btn.innerHTML : null;
  if(btn){ btn.disabled = true; btn.textContent = "Generating PDF…"; }
  try{
    const canvas = await window.html2canvas(reportEl, {
      scale: 2,
      backgroundColor: "#ffffff",
      useCORS: true,
      logging: false,
      windowWidth: reportEl.scrollWidth
    });
    const pdf = new JsPDF({ orientation:"p", unit:"mm", format:"a4" });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const imgW = pageW;
    const imgH = canvas.height * imgW / canvas.width;
    const imgData = canvas.toDataURL("image/jpeg", 0.92);
    let heightLeft = imgH;
    let position = 0;
    pdf.addImage(imgData, "JPEG", 0, position, imgW, imgH, undefined, "FAST");
    heightLeft -= pageH;
    while(heightLeft > 0){
      position -= pageH;
      pdf.addPage();
      pdf.addImage(imgData, "JPEG", 0, position, imgW, imgH, undefined, "FAST");
      heightLeft -= pageH;
    }
    const name = (session.studentName||"candidate").replace(/\s+/g,"-").toLowerCase();
    pdf.save(`ielts-speaking-${name}-${session.id.slice(-6)}.pdf`);
    toast("PDF saved");
  }catch(err){
    console.warn("PDF generation failed", err);
    toast("Couldn't generate PDF — opening Print instead");
    setTimeout(()=>window.print(), 400);
  }finally{
    if(btn){ btn.disabled = false; btn.innerHTML = restore; }
  }
}

/* ------------------------------------------------------------
   ROUTER / MOUNT
   ------------------------------------------------------------ */
function mount(){
  const root = $("#app");
  if(!root) return;
  root.innerHTML = "";
  root.className = state.view === "runner" || state.view === "processing" || state.view === "setup" ? "mm-app mm-app--runner" : "mm-app";
  const topbar = renderTopbar();
  if(topbar) root.appendChild(topbar);
  const main = el("main",{class:"mm-main"});
  let view;
  switch(state.view){
    case "home": view = renderHome(); break;
    case "library": view = renderLibrary(); break;
    case "sessions": view = renderSessions(); break;
    case "settings": view = renderSettings(); break;
    case "builder": view = renderBuilder(); break;
    case "setup": view = renderSetup(); break;
    case "runner": view = renderRunner(); break;
    case "processing": view = renderProcessing(); break;
    case "report": view = renderReport(); break;
    default: view = renderHome();
  }
  main.appendChild(view);
  root.appendChild(main);
}

state.on(()=>mount());

/* ------------------------------------------------------------
   KEYBOARD SHORTCUTS
   ------------------------------------------------------------ */
document.addEventListener("keydown",(e)=>{
  if(e.target.matches("input,textarea,select")) return;
  if(state.view === "runner"){
    const s = RunnerState.stage;
    if(s === "ready" && (e.code==="Space"||e.code==="Enter")){e.preventDefault();startPart("part1");}
    else if((s==="part1"||s==="part3") && e.code==="ArrowRight"){e.preventDefault();advanceQuestion();}
    else if((s==="part1"||s==="part3"||s==="part2") && e.code==="Space"){e.preventDefault();togglePause();}
  }
  if(e.code==="Escape" && (state.view==="home"||state.view==="library"||state.view==="builder")){
    // no-op
  }
});

/* ------------------------------------------------------------
   INIT
   ------------------------------------------------------------ */
Library.init();
mount();
Backend.probe().then(()=>{
  if(Backend.available()){
    syncSessionsFromBackend().then(()=>state._emit()).catch(()=>state._emit());
  }
  state._emit();
});

})();
</script>
