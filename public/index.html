<style>
/* ============================================================
   DESIGN TOKENS — Phase 2 & 2.5 Locked System
   ============================================================ */
:root {
  /* Navy spine */
  --mm-navy-950:#0A1628; --mm-navy-900:#0E1D36; --mm-navy-800:#162945;
  --mm-navy-700:#1E3A5F; --mm-navy-600:#2B4A75; --mm-navy-500:#3C5F8A;
  --mm-navy-400:#5A7BA5; --mm-navy-300:#8BA3C2; --mm-navy-200:#BDCBDE;
  --mm-navy-100:#DDE5EE; --mm-navy-50:#EFF2F7;

  /* Gold accent */
  --mm-gold-900:#8B6914; --mm-gold-800:#A3801C; --mm-gold-700:#B8912A;
  --mm-gold-600:#C9A241; --mm-gold-500:#D4AF37; --mm-gold-400:#DFBE5C;
  --mm-gold-300:#EACD82; --mm-gold-200:#F2DDA8; --mm-gold-100:#F8EBCB;
  --mm-gold-50:#FDF7E8;

  /* Paper */
  --mm-ivory:#FDFBF6; --mm-cream:#F7F3EA; --mm-parchment:#F2ECDC;

  /* Ink */
  --mm-ink-900:#1A1F2E; --mm-ink-700:#3D4556; --mm-ink-500:#6B7384;
  --mm-ink-300:#A8AEBC; --mm-ink-100:#D9DCE3;

  /* Semantic */
  --mm-bg-page:var(--mm-ivory);
  --mm-bg-surface:#FFFFFF;
  --mm-bg-surface-sunken:var(--mm-navy-50);
  --mm-bg-runner:var(--mm-navy-900);
  --mm-fg-primary:var(--mm-ink-900);
  --mm-fg-secondary:var(--mm-ink-700);
  --mm-fg-tertiary:var(--mm-ink-500);
  --mm-fg-on-navy:var(--mm-navy-50);
  --mm-fg-on-gold:var(--mm-navy-900);
  --mm-fg-brand:var(--mm-navy-700);
  --mm-fg-accent:var(--mm-gold-700);
  --mm-border-subtle:var(--mm-ink-100);
  --mm-border-strong:var(--mm-navy-200);
  --mm-border-focus:var(--mm-gold-500);
  --mm-accent-line:var(--mm-gold-500);

  /* Status */
  --mm-success:#2F7D5A; --mm-success-bg:#E3EFE8;
  --mm-warning:#C7782E; --mm-warning-bg:#FAEDDD;
  --mm-danger:#9B2C2C;  --mm-danger-bg:#F7E1E1;
  --mm-info:#2B5F8A;    --mm-info-bg:#E2EAF2;

  /* Band tiers */
  --mm-band-expert:#1E6B47;
  --mm-band-very-good:#2F7D5A;
  --mm-band-good:#4A8B5C;
  --mm-band-competent:#B8912A;
  --mm-band-modest:#C7782E;
  --mm-band-limited:#A55431;
  --mm-band-below:#9B2C2C;

  /* Confidence tiers */
  --mm-confidence-high:#2F7D5A;    --mm-confidence-high-bg:#E3EFE8;
  --mm-confidence-medium:#B8912A;  --mm-confidence-medium-bg:#F8EBCB;
  --mm-confidence-low:#C7782E;     --mm-confidence-low-bg:#FAEDDD;

  /* Source-tag tokens */
  --mm-tag-audio-bg:#E8EEF7;       --mm-tag-audio-fg:#2B5F8A;
  --mm-tag-transcript-bg:#F0EAF5;  --mm-tag-transcript-fg:#5B3D7A;
  --mm-tag-rule-bg:#EDE9DD;        --mm-tag-rule-fg:#6B5420;

  /* Typography */
  --mm-f-display:'EB Garamond',Georgia,serif;
  --mm-f-body:'Inter','Segoe UI',system-ui,sans-serif;
  --mm-f-mono:'JetBrains Mono',ui-monospace,monospace;

  /* Spacing (4px base) */
  --mm-s-1:4px;   --mm-s-2:8px;   --mm-s-3:12px;  --mm-s-4:16px;
  --mm-s-5:24px;  --mm-s-6:32px;  --mm-s-7:48px;  --mm-s-8:64px;
  --mm-s-9:96px;

  /* Radius */
  --mm-r-sm:4px; --mm-r-md:8px; --mm-r-lg:12px; --mm-r-xl:16px;
  --mm-r-2xl:24px; --mm-r-full:999px;

  /* Elevation */
  --mm-e-1:0 1px 2px rgba(14,29,54,.06),0 1px 3px rgba(14,29,54,.04);
  --mm-e-2:0 2px 4px rgba(14,29,54,.06),0 4px 12px rgba(14,29,54,.08);
  --mm-e-3:0 4px 8px rgba(14,29,54,.08),0 12px 32px rgba(14,29,54,.10);
  --mm-e-4:0 8px 16px rgba(14,29,54,.10),0 24px 64px rgba(14,29,54,.14);
  --mm-e-ring:0 0 0 3px rgba(212,175,55,.35);

  /* Containers */
  --mm-container:1080px;
  --mm-container-wide:1320px;
  --mm-container-narrow:720px;
  --mm-container-report:794px;

  /* Motion */
  --mm-dur-quick:120ms;
  --mm-dur-std:200ms;
  --mm-dur-slow:320ms;
  --mm-ease:cubic-bezier(.2,0,0,1);
}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}
}

*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--mm-f-body);
  font-size:16px;
  line-height:1.55;
  color:var(--mm-fg-primary);
  background:var(--mm-bg-page);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
button{font-family:inherit;cursor:pointer;border:0;background:none;padding:0;color:inherit;}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit;}
a{color:var(--mm-fg-brand);text-decoration:none;}

/* ============================================================
   APP SHELL
   ============================================================ */
.mm-app{min-height:100vh;display:flex;flex-direction:column;}

.mm-topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(253,251,246,.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--mm-border-subtle);
}
.mm-topbar__inner{
  max-width:var(--mm-container-wide);margin:0 auto;
  padding:var(--mm-s-4) var(--mm-s-6);
  display:flex;align-items:center;gap:var(--mm-s-5);
  height:72px;
}
.mm-brand{display:flex;align-items:center;gap:var(--mm-s-3);cursor:pointer;}
.mm-brand__mark{
  width:40px;height:40px;
  background:var(--mm-navy-800);
  border-radius:var(--mm-r-md);
  display:grid;place-items:center;
  color:var(--mm-gold-500);
  font-family:var(--mm-f-display);
  font-weight:500;font-size:22px;
  position:relative;
}
.mm-brand__mark::after{
  content:"";position:absolute;left:50%;bottom:5px;
  width:18px;height:1.5px;background:var(--mm-gold-500);
  transform:translateX(-50%);
}
.mm-brand__text{display:flex;flex-direction:column;line-height:1.1;}
.mm-brand__name{font-family:var(--mm-f-display);font-size:18px;font-weight:500;color:var(--mm-navy-900);}
.mm-brand__tag{font-size:11px;color:var(--mm-fg-tertiary);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}

.mm-nav{display:flex;gap:var(--mm-s-1);margin-left:auto;}
.mm-nav__link{
  padding:var(--mm-s-2) var(--mm-s-4);
  font-size:13px;font-weight:500;
  color:var(--mm-fg-secondary);
  border-radius:var(--mm-r-md);
  letter-spacing:.04em;
  transition:background var(--mm-dur-quick) var(--mm-ease),color var(--mm-dur-quick) var(--mm-ease);
}
.mm-nav__link:hover{background:var(--mm-navy-50);color:var(--mm-fg-primary);}
.mm-nav__link.is-active{color:var(--mm-navy-900);background:var(--mm-gold-50);}

.mm-main{flex:1;}

/* ============================================================
   BUTTONS
   ============================================================ */
.mm-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:var(--mm-s-2);
  padding:10px 20px;
  font-size:13px;font-weight:600;letter-spacing:.06em;
  border-radius:var(--mm-r-md);
  min-height:40px;
  transition:all var(--mm-dur-quick) var(--mm-ease);
  white-space:nowrap;
}
.mm-btn:focus-visible{outline:0;box-shadow:var(--mm-e-ring);}
.mm-btn--primary{background:var(--mm-gold-500);color:var(--mm-navy-900);}
.mm-btn--primary:hover{background:var(--mm-gold-600);}
.mm-btn--secondary{background:transparent;color:var(--mm-navy-700);box-shadow:inset 0 0 0 1.5px var(--mm-navy-700);}
.mm-btn--secondary:hover{background:var(--mm-navy-50);}
.mm-btn--ghost{background:transparent;color:var(--mm-fg-secondary);}
.mm-btn--ghost:hover{background:var(--mm-navy-50);color:var(--mm-fg-primary);}
.mm-btn--danger{background:transparent;color:var(--mm-danger);box-shadow:inset 0 0 0 1.5px var(--mm-danger);}
.mm-btn--danger:hover{background:var(--mm-danger-bg);}
.mm-btn--large{padding:14px 28px;font-size:14px;min-height:48px;}
.mm-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ============================================================
   CARDS
   ============================================================ */
.mm-card{
  background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-lg);
  padding:var(--mm-s-5);
}
.mm-card--raised{box-shadow:var(--mm-e-1);}
.mm-card--interactive{cursor:pointer;transition:all var(--mm-dur-std) var(--mm-ease);}
.mm-card--interactive:hover{box-shadow:var(--mm-e-2);transform:translateY(-2px);border-color:var(--mm-navy-200);}
.mm-card--accent{border-top:2px solid var(--mm-gold-500);}

/* ============================================================
   HOME / HERO
   ============================================================ */
.mm-hero{
  max-width:var(--mm-container);margin:0 auto;
  padding:var(--mm-s-9) var(--mm-s-6) var(--mm-s-8);
  text-align:center;
  position:relative;
}
.mm-hero__eyebrow{
  font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  color:var(--mm-fg-accent);margin-bottom:var(--mm-s-4);
}
.mm-hero__title{
  font-family:var(--mm-f-display);
  font-size:clamp(40px,5vw + 1rem,68px);
  font-weight:500;line-height:1.1;
  color:var(--mm-navy-900);
  margin:0 0 var(--mm-s-4);
  letter-spacing:-.02em;
}
.mm-hero__title em{
  font-style:italic;
  color:var(--mm-gold-700);
  font-weight:500;
}
.mm-hero__sub{
  font-size:18px;color:var(--mm-fg-secondary);
  max-width:640px;margin:0 auto var(--mm-s-6);
  line-height:1.55;
}
.mm-hero__actions{display:flex;gap:var(--mm-s-3);justify-content:center;flex-wrap:wrap;}

.mm-hero__ornament{
  display:flex;align-items:center;gap:var(--mm-s-3);
  justify-content:center;margin-top:var(--mm-s-7);
  color:var(--mm-ink-300);font-size:11px;letter-spacing:.2em;text-transform:uppercase;
}
.mm-hero__ornament::before,.mm-hero__ornament::after{
  content:"";width:60px;height:1px;background:var(--mm-ink-100);
}

/* Home metric strip */
.mm-strip{
  max-width:var(--mm-container);margin:0 auto;
  padding:0 var(--mm-s-6) var(--mm-s-8);
  display:grid;grid-template-columns:repeat(4,1fr);gap:var(--mm-s-4);
}
@media (max-width:768px){.mm-strip{grid-template-columns:repeat(2,1fr);}}
.mm-strip__tile{
  background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-lg);
  padding:var(--mm-s-5);
  position:relative;overflow:hidden;
}
.mm-strip__tile::before{
  content:"";position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--mm-gold-500);opacity:.6;
}
.mm-strip__label{
  font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
  color:var(--mm-fg-tertiary);
}
.mm-strip__value{
  font-family:var(--mm-f-display);font-weight:500;
  font-size:36px;color:var(--mm-navy-900);
  line-height:1;margin-top:var(--mm-s-3);
}
.mm-strip__unit{font-size:14px;color:var(--mm-fg-tertiary);margin-left:4px;}
.mm-strip__note{font-size:12px;color:var(--mm-fg-tertiary);margin-top:var(--mm-s-2);}

/* ============================================================
   PAGE HEADINGS
   ============================================================ */
.mm-page{max-width:var(--mm-container-wide);margin:0 auto;padding:var(--mm-s-7) var(--mm-s-6);}
.mm-page__header{margin-bottom:var(--mm-s-6);}
.mm-page__eyebrow{
  font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  color:var(--mm-fg-accent);margin-bottom:var(--mm-s-2);
}
.mm-page__title{
  font-family:var(--mm-f-display);font-size:40px;font-weight:500;
  color:var(--mm-navy-900);margin:0 0 var(--mm-s-2);letter-spacing:-.01em;
}
.mm-page__sub{color:var(--mm-fg-secondary);font-size:15px;max-width:640px;}
.mm-page__rule{
  height:1.5px;background:var(--mm-gold-500);width:80px;margin-top:var(--mm-s-4);
}

/* ============================================================
   TEST LIBRARY
   ============================================================ */
.mm-toolbar{
  display:flex;gap:var(--mm-s-3);flex-wrap:wrap;align-items:center;
  padding:var(--mm-s-4) 0;
  border-bottom:1px solid var(--mm-border-subtle);
  margin-bottom:var(--mm-s-6);
}
.mm-search{
  flex:1;min-width:240px;max-width:380px;
  display:flex;align-items:center;gap:var(--mm-s-2);
  padding:8px 14px;
  background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-md);
}
.mm-search input{flex:1;border:0;outline:0;background:transparent;font-size:14px;}
.mm-search svg{color:var(--mm-ink-300);flex-shrink:0;}

.mm-filter{
  display:flex;align-items:center;gap:var(--mm-s-2);
  padding:8px 14px;
  background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-md);
  font-size:13px;font-weight:500;color:var(--mm-fg-secondary);
}
.mm-filter select{border:0;outline:0;background:transparent;cursor:pointer;}
.mm-filter label{color:var(--mm-fg-tertiary);font-size:12px;letter-spacing:.05em;text-transform:uppercase;}

.mm-toolbar__right{margin-left:auto;display:flex;gap:var(--mm-s-2);}

.mm-test-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:var(--mm-s-5);
}

.mm-test-card{
  position:relative;
  background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-lg);
  padding:var(--mm-s-5);
  display:flex;flex-direction:column;gap:var(--mm-s-3);
  transition:all var(--mm-dur-std) var(--mm-ease);
  overflow:hidden;
}
.mm-test-card:hover{
  box-shadow:var(--mm-e-2);transform:translateY(-2px);
  border-color:var(--mm-navy-200);
}
.mm-test-card::after{
  content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--mm-accent-line);opacity:0;
  transition:opacity var(--mm-dur-std) var(--mm-ease);
}
.mm-test-card:hover::after{opacity:1;}

.mm-test-card__badge-new{
  position:absolute;top:var(--mm-s-3);right:var(--mm-s-3);
  background:var(--mm-gold-500);color:var(--mm-navy-900);
  font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  padding:3px 10px;border-radius:var(--mm-r-full);
  z-index:2;
}
.mm-test-card__title{
  font-family:var(--mm-f-display);font-size:22px;font-weight:500;
  color:var(--mm-navy-900);line-height:1.25;
  margin:0;padding-right:48px;
}
.mm-test-card__meta{
  display:flex;gap:var(--mm-s-3);align-items:center;
  font-size:12px;color:var(--mm-fg-tertiary);
}
.mm-theme-dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  margin-right:6px;vertical-align:middle;
}
.mm-diff-chip{
  display:inline-flex;align-items:center;
  padding:2px 10px;border-radius:var(--mm-r-full);
  font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
}
.mm-diff-chip--foundation{background:var(--mm-success-bg);color:var(--mm-success);}
.mm-diff-chip--standard{background:var(--mm-info-bg);color:var(--mm-info);}
.mm-diff-chip--challenging{background:var(--mm-warning-bg);color:var(--mm-warning);}

.mm-test-card__desc{
  font-size:13px;color:var(--mm-fg-secondary);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;
}
.mm-test-card__band{
  font-family:var(--mm-f-mono);font-size:12px;color:var(--mm-fg-tertiary);
  padding:var(--mm-s-2) 0;border-top:1px dashed var(--mm-border-subtle);
}
.mm-test-card__band strong{color:var(--mm-navy-700);font-weight:600;}
.mm-test-card__footer{
  margin-top:auto;display:flex;justify-content:space-between;align-items:center;gap:var(--mm-s-3);
}
.mm-usage-chip{
  font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--mm-fg-tertiary);
  padding:4px 8px;background:var(--mm-bg-surface-sunken);
  border-radius:var(--mm-r-sm);
}
.mm-usage-chip--trusted{color:var(--mm-gold-700);}
.mm-usage-chip--fresh{border-left:2px solid var(--mm-gold-500);}

/* ============================================================
   BUILDER
   ============================================================ */
.mm-builder{display:grid;grid-template-columns:1fr 320px;gap:var(--mm-s-6);}
@media (max-width:960px){.mm-builder{grid-template-columns:1fr;}}

.mm-form-group{margin-bottom:var(--mm-s-5);}
.mm-label{
  display:block;
  font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--mm-fg-tertiary);margin-bottom:var(--mm-s-2);
}
.mm-input,.mm-textarea,.mm-select{
  width:100%;
  padding:10px 14px;
  background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-md);
  font-size:14px;
  transition:border-color var(--mm-dur-quick) var(--mm-ease),box-shadow var(--mm-dur-quick) var(--mm-ease);
}
.mm-input:focus,.mm-textarea:focus,.mm-select:focus{
  outline:0;border-color:var(--mm-gold-500);box-shadow:var(--mm-e-ring);
}
.mm-textarea{font-family:var(--mm-f-body);resize:vertical;min-height:120px;line-height:1.6;}
.mm-textarea--large{min-height:260px;}
.mm-hint{font-size:12px;color:var(--mm-fg-tertiary);margin-top:var(--mm-s-2);line-height:1.5;}
.mm-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--mm-s-4);}
@media (max-width:640px){.mm-row{grid-template-columns:1fr;}}

.mm-segment{
  display:inline-flex;
  background:var(--mm-bg-surface-sunken);
  padding:3px;border-radius:var(--mm-r-md);
}
.mm-segment button{
  padding:8px 16px;font-size:12px;font-weight:600;letter-spacing:.06em;
  color:var(--mm-fg-secondary);border-radius:calc(var(--mm-r-md) - 2px);
  transition:all var(--mm-dur-quick) var(--mm-ease);
}
.mm-segment button.is-active{background:var(--mm-bg-surface);color:var(--mm-navy-900);box-shadow:var(--mm-e-1);}

.mm-validation{
  padding:var(--mm-s-3) var(--mm-s-4);
  border-radius:var(--mm-r-md);
  font-size:13px;
  margin-top:var(--mm-s-4);
}
.mm-validation--error{background:var(--mm-danger-bg);color:var(--mm-danger);border-left:3px solid var(--mm-danger);}
.mm-validation--warning{background:var(--mm-warning-bg);color:var(--mm-warning);border-left:3px solid var(--mm-warning);}
.mm-validation--success{background:var(--mm-success-bg);color:var(--mm-success);border-left:3px solid var(--mm-success);}
.mm-validation ul{margin:var(--mm-s-2) 0 0;padding-left:var(--mm-s-4);}

.mm-sidebar{
  background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-lg);
  padding:var(--mm-s-5);
  height:fit-content;
  position:sticky;top:96px;
}
.mm-sidebar__title{
  font-family:var(--mm-f-display);font-size:18px;font-weight:500;
  color:var(--mm-navy-900);margin:0 0 var(--mm-s-3);
}

/* ============================================================
   RUNNER / EXAM
   ============================================================ */
.mm-runner{
  min-height:100vh;
  background:var(--mm-navy-900);
  background-image:
    radial-gradient(circle at 20% 0%,rgba(212,175,55,.06) 0%,transparent 50%),
    radial-gradient(circle at 80% 100%,rgba(43,95,138,.15) 0%,transparent 50%);
  color:var(--mm-navy-50);
  display:flex;flex-direction:column;
}
.mm-runner__topbar{
  padding:var(--mm-s-4) var(--mm-s-6);
  display:flex;align-items:center;gap:var(--mm-s-5);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.mm-runner__brand{
  color:var(--mm-gold-500);font-family:var(--mm-f-display);
  font-size:18px;font-weight:500;letter-spacing:-.01em;
}
.mm-runner__meta{
  display:flex;gap:var(--mm-s-5);
  font-size:12px;color:var(--mm-navy-300);
  margin-left:var(--mm-s-4);
}
.mm-runner__meta strong{color:var(--mm-navy-50);font-weight:500;margin-left:6px;}

.mm-runner__mode{
  padding:4px 12px;border-radius:var(--mm-r-full);
  font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
}
.mm-runner__mode--exam{background:var(--mm-gold-500);color:var(--mm-navy-900);}
.mm-runner__mode--practice{background:rgba(255,255,255,.1);color:var(--mm-navy-200);}

.mm-runner__exit{
  margin-left:auto;
  color:var(--mm-navy-300);font-size:12px;letter-spacing:.08em;
  padding:6px 12px;border-radius:var(--mm-r-md);
  transition:background var(--mm-dur-quick) var(--mm-ease);
}
.mm-runner__exit:hover{background:rgba(255,255,255,.06);color:var(--mm-navy-50);}

.mm-runner__stage{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:var(--mm-s-7) var(--mm-s-5);
  max-width:var(--mm-container-narrow);width:100%;margin:0 auto;text-align:center;
}

.mm-part-tag{
  font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  color:var(--mm-gold-400);margin-bottom:var(--mm-s-5);
}
.mm-part-tag__dot{
  display:inline-block;width:6px;height:6px;background:var(--mm-gold-500);
  border-radius:50%;margin-right:10px;vertical-align:middle;
  animation:pulse-gold 1400ms ease-in-out infinite;
}
.mm-part-tag--idle .mm-part-tag__dot{animation:none;opacity:.4;}
@keyframes pulse-gold{
  0%,100%{opacity:.6;transform:scale(1);}
  50%{opacity:1;transform:scale(1.3);}
}

/* Timer Ring */
.mm-timer{
  position:relative;width:220px;height:220px;margin-bottom:var(--mm-s-6);
}
.mm-timer svg{width:100%;height:100%;transform:rotate(-90deg);}
.mm-timer__track{fill:none;stroke:rgba(255,255,255,.08);stroke-width:6;}
.mm-timer__prog{
  fill:none;stroke:var(--mm-gold-500);stroke-width:6;
  stroke-linecap:round;
  transition:stroke-dashoffset 200ms linear,stroke var(--mm-dur-std);
}
.mm-timer__prog--warn{stroke:var(--mm-warning);}
.mm-timer__prog--danger{stroke:var(--mm-danger);}
.mm-timer__inner{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.mm-timer__digits{
  font-family:var(--mm-f-mono);font-size:48px;font-weight:500;
  color:var(--mm-navy-50);letter-spacing:-.02em;
  font-variant-numeric:tabular-nums;
}
.mm-timer__label{
  font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
  color:var(--mm-navy-300);margin-top:4px;
}
.mm-timer.is-warn svg{animation:timer-pulse 1200ms ease-in-out infinite;}
.mm-timer.is-danger svg{animation:timer-pulse 800ms ease-in-out infinite;}
@keyframes timer-pulse{0%,100%{transform:rotate(-90deg) scale(1);}50%{transform:rotate(-90deg) scale(1.02);}}

.mm-prompt{
  font-family:var(--mm-f-display);font-size:28px;font-weight:500;
  line-height:1.35;color:var(--mm-navy-50);
  max-width:640px;margin:0 0 var(--mm-s-6);
}
.mm-prompt--small{font-size:22px;}
.mm-prompt em{font-style:italic;color:var(--mm-gold-300);font-weight:500;}

.mm-cue-card{
  background:rgba(253,251,246,.04);
  border:1px solid rgba(212,175,55,.25);
  border-radius:var(--mm-r-lg);
  padding:var(--mm-s-6);
  max-width:520px;margin:0 auto var(--mm-s-6);
  text-align:left;
}
.mm-cue-card__label{
  font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  color:var(--mm-gold-400);margin-bottom:var(--mm-s-3);
}
.mm-cue-card__topic{
  font-family:var(--mm-f-display);font-size:22px;font-weight:500;
  color:var(--mm-navy-50);margin:0 0 var(--mm-s-4);line-height:1.35;
}
.mm-cue-card__say{
  font-size:12px;color:var(--mm-navy-300);margin-bottom:var(--mm-s-2);
  letter-spacing:.06em;text-transform:uppercase;font-weight:600;
}
.mm-cue-card ul{list-style:none;padding:0;margin:0;}
.mm-cue-card li{
  padding:6px 0 6px 20px;position:relative;
  color:var(--mm-navy-100);font-size:15px;line-height:1.5;
}
.mm-cue-card li::before{
  content:"";position:absolute;left:0;top:14px;
  width:10px;height:1px;background:var(--mm-gold-500);
}

/* Waveform */
.mm-wave{
  width:100%;max-width:520px;height:80px;
  background:rgba(0,0,0,.2);
  border:1px solid rgba(255,255,255,.06);
  border-radius:var(--mm-r-md);
  margin:var(--mm-s-4) auto;padding:var(--mm-s-3);
  position:relative;overflow:hidden;
}
.mm-wave canvas{width:100%;height:100%;}
.mm-wave__rec{
  position:absolute;top:8px;right:12px;
  display:flex;align-items:center;gap:6px;
  font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--mm-gold-400);font-weight:600;
}
.mm-wave__rec-dot{
  width:8px;height:8px;border-radius:50%;background:var(--mm-danger);
  animation:rec-pulse 1400ms ease-in-out infinite;
}
@keyframes rec-pulse{0%,100%{opacity:.6;}50%{opacity:1;box-shadow:0 0 8px var(--mm-danger);}}
.mm-wave--idle .mm-wave__rec{display:none;}

.mm-live-caption{
  color:var(--mm-navy-200);font-size:14px;font-style:italic;
  margin-top:var(--mm-s-4);min-height:24px;
  max-width:520px;line-height:1.5;
}
.mm-live-caption::before{content:"";}

.mm-runner__actions{display:flex;gap:var(--mm-s-3);justify-content:center;margin-top:var(--mm-s-5);}
.mm-btn--ghost-dark{color:var(--mm-navy-200);}
.mm-btn--ghost-dark:hover{background:rgba(255,255,255,.05);color:var(--mm-navy-50);}

.mm-hint-keys{
  margin-top:var(--mm-s-7);
  color:var(--mm-navy-400);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
}
.mm-kbd{
  display:inline-block;padding:2px 6px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:3px;font-family:var(--mm-f-mono);font-size:10px;
  color:var(--mm-navy-100);margin:0 3px;
}

/* Time's up overlay */
.mm-overlay{
  position:fixed;inset:0;
  background:rgba(10,22,40,.82);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:grid;place-items:center;z-index:100;
  animation:fade-in 320ms var(--mm-ease);
}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
.mm-overlay__sheet{
  background:var(--mm-navy-800);
  border:1px solid rgba(212,175,55,.2);
  border-radius:var(--mm-r-2xl);
  padding:var(--mm-s-7) var(--mm-s-9);
  text-align:center;max-width:440px;
  box-shadow:var(--mm-e-4);
}
.mm-overlay__rule{
  width:48px;height:1.5px;background:var(--mm-gold-500);margin:0 auto var(--mm-s-5);
}
.mm-overlay__title{
  font-family:var(--mm-f-display);font-size:32px;font-weight:500;
  color:var(--mm-navy-50);margin:0 0 var(--mm-s-3);
}
.mm-overlay__sub{color:var(--mm-navy-300);font-size:14px;}

/* Setup / Permission screens */
.mm-setup{
  max-width:560px;margin:0 auto;padding:var(--mm-s-7) var(--mm-s-5);
}
.mm-setup__card{
  background:rgba(253,251,246,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:var(--mm-r-xl);
  padding:var(--mm-s-7);
  text-align:center;
}
.mm-setup__icon{
  width:64px;height:64px;margin:0 auto var(--mm-s-5);
  background:rgba(212,175,55,.1);
  border:1.5px solid rgba(212,175,55,.3);
  border-radius:var(--mm-r-lg);
  display:grid;place-items:center;color:var(--mm-gold-400);
}
.mm-setup__title{font-family:var(--mm-f-display);font-size:26px;color:var(--mm-navy-50);margin:0 0 var(--mm-s-3);font-weight:500;}
.mm-setup__text{color:var(--mm-navy-300);font-size:14px;line-height:1.6;margin:0 0 var(--mm-s-5);}

/* Processing */
.mm-processing{
  min-height:100vh;background:var(--mm-navy-900);
  display:flex;align-items:center;justify-content:center;
  padding:var(--mm-s-6);
}
.mm-processing__inner{max-width:480px;width:100%;text-align:center;color:var(--mm-navy-50);}
.mm-processing__title{font-family:var(--mm-f-display);font-size:26px;font-weight:500;color:var(--mm-navy-50);margin:0 0 var(--mm-s-3);}
.mm-processing__bar{
  height:4px;background:rgba(255,255,255,.08);
  border-radius:var(--mm-r-full);overflow:hidden;margin:var(--mm-s-5) 0;
}
.mm-processing__bar-fill{
  height:100%;background:var(--mm-gold-500);
  transition:width 400ms var(--mm-ease);
  border-radius:var(--mm-r-full);
}
.mm-processing__steps{
  display:flex;flex-direction:column;gap:var(--mm-s-2);
  font-size:13px;color:var(--mm-navy-300);
}
.mm-processing__step.is-done{color:var(--mm-navy-100);}
.mm-processing__step.is-active{color:var(--mm-gold-300);}
.mm-processing__step::before{
  content:"○ ";margin-right:8px;color:var(--mm-navy-500);
}
.mm-processing__step.is-done::before{content:"✓ ";color:var(--mm-success);}
.mm-processing__step.is-active::before{content:"⟳ ";color:var(--mm-gold-400);}


/* ============================================================
   REPORT — A4 DELIVERABLE
   ============================================================ */
.mm-report-wrap{
  max-width:calc(var(--mm-container-report) + 224px);
  margin:0 auto;padding:var(--mm-s-6) var(--mm-s-5);
  display:grid;grid-template-columns:1fr 204px;gap:var(--mm-s-5);
}
@media (max-width:1024px){.mm-report-wrap{grid-template-columns:1fr;}}

.mm-report{
  width:var(--mm-container-report);max-width:100%;
  background:var(--mm-ivory);
  box-shadow:var(--mm-e-3);
  border-radius:6px;
  padding:44px 56px;
  position:relative;
}
.mm-report__mode-badge{
  position:absolute;top:24px;right:24px;
  padding:4px 14px;border-radius:var(--mm-r-full);
  font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
}
.mm-report__mode-badge--exam{background:var(--mm-navy-900);color:var(--mm-gold-500);box-shadow:inset 0 0 0 1px var(--mm-gold-500);}
.mm-report__mode-badge--practice{background:transparent;color:var(--mm-ink-300);box-shadow:inset 0 0 0 1px var(--mm-ink-300);}

.mm-report__cover{text-align:center;padding-bottom:var(--mm-s-6);}
.mm-report__crest{
  width:56px;height:56px;margin:0 auto var(--mm-s-4);
  background:var(--mm-navy-800);border-radius:var(--mm-r-md);
  display:grid;place-items:center;
  color:var(--mm-gold-500);font-family:var(--mm-f-display);
  font-weight:500;font-size:28px;position:relative;
}
.mm-report__crest::after{
  content:"";position:absolute;left:50%;bottom:6px;
  width:22px;height:1.5px;background:var(--mm-gold-500);
  transform:translateX(-50%);
}
.mm-report__eyebrow{
  font-size:11px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;
  color:var(--mm-gold-700);margin-bottom:var(--mm-s-2);
}
.mm-report__title{
  font-family:var(--mm-f-display);font-size:32px;font-weight:500;
  color:var(--mm-navy-900);margin:0 0 var(--mm-s-5);letter-spacing:-.01em;
}
.mm-report__meta{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:var(--mm-s-4);text-align:left;
  padding:var(--mm-s-4) var(--mm-s-5);
  background:var(--mm-cream);
  border-radius:var(--mm-r-md);
  margin-bottom:var(--mm-s-5);
}
@media (max-width:560px){.mm-report__meta{grid-template-columns:repeat(2,1fr);}}
.mm-report__meta-item{}
.mm-report__meta-label{
  font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--mm-fg-tertiary);font-weight:600;margin-bottom:3px;
}
.mm-report__meta-value{
  font-family:var(--mm-f-display);font-size:15px;color:var(--mm-navy-900);
  font-weight:500;line-height:1.3;
}

.mm-section-head{margin:var(--mm-s-7) 0 var(--mm-s-5);}
.mm-section-head__eyebrow{
  font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  color:var(--mm-gold-700);margin-bottom:var(--mm-s-1);
}
.mm-section-head__title{
  font-family:var(--mm-f-display);font-size:24px;font-weight:500;
  color:var(--mm-navy-900);margin:0 0 var(--mm-s-3);
}
.mm-section-head__rule{
  height:1.5px;background:var(--mm-gold-500);width:100%;
}

/* Band scores block */
.mm-scores{
  display:grid;
  grid-template-columns:180px 1fr;
  gap:var(--mm-s-5);
  align-items:start;
  padding:var(--mm-s-5) 0;
}
@media (max-width:560px){.mm-scores{grid-template-columns:1fr;}}

.mm-overall{
  display:flex;flex-direction:column;align-items:center;gap:var(--mm-s-3);
  padding:var(--mm-s-4);
  background:var(--mm-cream);
  border-radius:var(--mm-r-lg);
}
.mm-band-pill{
  width:112px;height:112px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#FFFFFF;font-family:var(--mm-f-display);
  box-shadow:inset 0 0 0 6px rgba(255,255,255,.1);
}
.mm-band-pill__num{font-size:42px;font-weight:500;line-height:1;letter-spacing:-.02em;}
.mm-band-pill__decimal{font-size:28px;opacity:.85;}
.mm-band-pill__label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;margin-top:3px;font-family:var(--mm-f-body);font-weight:600;opacity:.85;}
.mm-cefr{
  padding:4px 10px;background:var(--mm-navy-800);color:var(--mm-gold-400);
  font-family:var(--mm-f-body);font-size:11px;font-weight:700;letter-spacing:.12em;
  border-radius:var(--mm-r-sm);
  border-bottom:2px solid var(--mm-gold-500);
}
.mm-overall__expected{font-size:10px;color:var(--mm-fg-tertiary);letter-spacing:.08em;text-transform:uppercase;text-align:center;}

.mm-criteria{
  display:grid;grid-template-columns:repeat(2,1fr);gap:var(--mm-s-3);
}
@media (max-width:480px){.mm-criteria{grid-template-columns:1fr;}}
.mm-criterion{
  background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-md);
  padding:var(--mm-s-3) var(--mm-s-4);
  display:flex;align-items:center;gap:var(--mm-s-3);
}
.mm-criterion__band{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#FFFFFF;font-family:var(--mm-f-display);font-size:20px;font-weight:500;
  flex-shrink:0;
}
.mm-criterion__meta{flex:1;min-width:0;}
.mm-criterion__label{
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--mm-fg-tertiary);font-weight:600;
}
.mm-criterion__name{
  font-family:var(--mm-f-display);font-size:15px;color:var(--mm-navy-900);
  font-weight:500;line-height:1.2;margin-top:2px;
}
.mm-criterion__tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}

.mm-src-tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 7px;border-radius:var(--mm-r-sm);
  font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  font-family:var(--mm-f-body);
}
.mm-src-tag::before{
  content:"";width:5px;height:5px;border-radius:50%;background:currentColor;
}
.mm-src-tag--audio{background:var(--mm-tag-audio-bg);color:var(--mm-tag-audio-fg);}
.mm-src-tag--transcript{background:var(--mm-tag-transcript-bg);color:var(--mm-tag-transcript-fg);}
.mm-src-tag--rule{background:var(--mm-tag-rule-bg);color:var(--mm-tag-rule-fg);}

/* Confidence */
.mm-confidence{
  margin-top:var(--mm-s-4);padding:var(--mm-s-3) var(--mm-s-4);
  border-radius:var(--mm-r-md);
  display:flex;align-items:center;gap:var(--mm-s-3);
}
.mm-confidence--high{background:var(--mm-confidence-high-bg);border-left:3px solid var(--mm-confidence-high);}
.mm-confidence--medium{background:var(--mm-confidence-medium-bg);border-left:3px solid var(--mm-confidence-medium);}
.mm-confidence--low{background:var(--mm-confidence-low-bg);border-left:3px solid var(--mm-confidence-low);}
.mm-confidence__tier{
  font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  flex-shrink:0;
}
.mm-confidence--high .mm-confidence__tier{color:var(--mm-confidence-high);}
.mm-confidence--medium .mm-confidence__tier{color:var(--mm-confidence-medium);}
.mm-confidence--low .mm-confidence__tier{color:var(--mm-confidence-low);}
.mm-confidence__text{font-size:13px;line-height:1.45;color:var(--mm-fg-secondary);font-style:italic;font-family:var(--mm-f-display);}

.mm-low-conf-banner{
  background:var(--mm-warning-bg);border-left:3px solid var(--mm-warning);
  padding:var(--mm-s-3) var(--mm-s-4);margin:var(--mm-s-4) 0;
  border-radius:var(--mm-r-md);font-size:13px;color:var(--mm-fg-secondary);
}

/* Summary */
.mm-summary{
  font-family:var(--mm-f-display);font-size:17px;line-height:1.65;
  color:var(--mm-ink-900);margin:var(--mm-s-3) 0;
}

/* Criterion analysis */
.mm-analysis{}
.mm-analysis__item{
  padding:var(--mm-s-4) 0;
  border-bottom:1px solid var(--mm-border-subtle);
}
.mm-analysis__item:last-child{border-bottom:0;}
.mm-analysis__head{
  display:flex;align-items:center;gap:var(--mm-s-3);
  margin-bottom:var(--mm-s-3);
}
.mm-analysis__name{
  font-family:var(--mm-f-display);font-size:18px;font-weight:500;
  color:var(--mm-navy-900);flex:1;
}
.mm-analysis__band{
  font-family:var(--mm-f-mono);font-size:13px;font-weight:600;
  padding:2px 10px;border-radius:var(--mm-r-full);
  background:var(--mm-bg-surface-sunken);color:var(--mm-navy-700);
}
.mm-analysis__text{
  font-family:var(--mm-f-display);font-size:15px;line-height:1.65;
  color:var(--mm-ink-700);
}
.mm-analysis__evidence{
  margin-top:var(--mm-s-3);
  padding:var(--mm-s-3);background:var(--mm-cream);
  border-left:2px solid var(--mm-gold-500);
  font-family:var(--mm-f-body);font-size:12px;color:var(--mm-fg-secondary);font-style:italic;
  border-radius:0 var(--mm-r-sm) var(--mm-r-sm) 0;
}

/* Transcript */
.mm-transcript-part{margin-bottom:var(--mm-s-6);}
.mm-transcript-part__label{
  font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  color:var(--mm-gold-700);margin-bottom:var(--mm-s-3);
  padding-bottom:var(--mm-s-2);border-bottom:1px dashed var(--mm-border-subtle);
}
.mm-turn{
  margin-bottom:var(--mm-s-3);
  padding:var(--mm-s-3) var(--mm-s-4);
  border-radius:var(--mm-r-md);
  max-width:88%;
}
.mm-turn--examiner{background:var(--mm-bg-surface-sunken);}
.mm-turn--candidate{background:var(--mm-cream);border-left:2px solid var(--mm-gold-500);}
.mm-turn__speaker{
  font-size:9px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;
  color:var(--mm-fg-tertiary);margin-bottom:4px;
}
.mm-turn__text{
  font-family:var(--mm-f-display);font-size:14.5px;line-height:1.6;
  color:var(--mm-ink-900);
}

/* Recommendations */
.mm-recs{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--mm-s-4);}
@media (max-width:768px){.mm-recs{grid-template-columns:1fr;}}
.mm-recs__col{
  background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);
  border-top:2px solid;
  border-radius:0 0 var(--mm-r-md) var(--mm-r-md);
  padding:var(--mm-s-4);
}
.mm-recs__col--immediate{border-top-color:var(--mm-danger);}
.mm-recs__col--short{border-top-color:var(--mm-warning);}
.mm-recs__col--target{border-top-color:var(--mm-success);}
.mm-recs__col-title{
  font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:var(--mm-fg-tertiary);margin-bottom:var(--mm-s-3);
}
.mm-rec{padding:var(--mm-s-3) 0;border-bottom:1px solid var(--mm-border-subtle);}
.mm-rec:last-child{border-bottom:0;}
.mm-rec__title{
  font-family:var(--mm-f-display);font-size:14px;font-weight:500;
  color:var(--mm-navy-900);margin:0 0 var(--mm-s-1);line-height:1.3;
}
.mm-rec__body{font-size:12px;color:var(--mm-fg-secondary);line-height:1.55;}
.mm-rec__descriptor{
  margin-top:var(--mm-s-2);
  font-size:10px;color:var(--mm-gold-700);font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;
}

/* Signature */
.mm-signature{
  margin-top:var(--mm-s-8);padding-top:var(--mm-s-6);
  text-align:center;display:flex;flex-direction:column;align-items:center;gap:var(--mm-s-1);
}
.mm-signature__rule{
  height:1.5px;background:var(--mm-gold-500);width:100px;margin-bottom:var(--mm-s-4);
}
.mm-signature__label{
  font-size:9px;letter-spacing:.24em;text-transform:uppercase;
  color:var(--mm-fg-tertiary);font-weight:600;
}
.mm-signature__name{
  font-family:var(--mm-f-display);font-size:22px;font-weight:500;
  color:var(--mm-navy-900);margin:var(--mm-s-2) 0 var(--mm-s-1);
}
.mm-signature__credentials{font-size:12px;color:var(--mm-fg-secondary);}
.mm-signature__credentials span{color:var(--mm-gold-600);margin:0 8px;}
.mm-signature__meta{
  font-family:var(--mm-f-mono);font-size:10px;color:var(--mm-fg-tertiary);
  margin-top:var(--mm-s-3);
}

/* Provenance footer */
.mm-provenance{
  margin-top:var(--mm-s-5);padding:var(--mm-s-4);
  background:var(--mm-bg-surface-sunken);
  border-radius:var(--mm-r-md);
  font-size:11px;color:var(--mm-fg-tertiary);line-height:1.55;
}
.mm-provenance strong{color:var(--mm-fg-secondary);font-weight:600;}

/* Floating action bar */
.mm-report-actions{
  position:sticky;top:96px;height:fit-content;
  display:flex;flex-direction:column;gap:var(--mm-s-2);
  padding:var(--mm-s-4);
  background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-lg);
}
.mm-report-actions__title{
  font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--mm-fg-tertiary);margin-bottom:var(--mm-s-2);
}
/* Action labels must stay inside the button. The global .mm-btn uses
   white-space:nowrap, which overflows the narrow sidebar; here we let the
   label wrap and the button grow instead of spilling past its border. */
.mm-report-actions .mm-btn{
  white-space:normal;
  height:auto;min-height:40px;
  line-height:1.3;
  text-align:left;
  align-items:center;
}
.mm-report-actions .mm-btn svg{flex:0 0 auto;}

/* ============================================================
   PREMIUM REPORT IDENTITY (Phase 7)
   Cover brand line · seal · numbered sections · snapshot ·
   examiner verdict · transcript modes · running footer & watermark
   ============================================================ */

/* --- Cover: brand identity block --- */
.mm-report__brand{ text-align:center; margin-bottom:var(--mm-s-4); }
.mm-report__brand-name{
  font-family:var(--mm-f-display); font-size:20px; font-weight:600;
  color:var(--mm-navy-900); letter-spacing:.02em;
}
.mm-report__brand-sys{
  font-size:10px; font-weight:600; letter-spacing:.26em; text-transform:uppercase;
  color:var(--mm-gold-700); margin-top:4px;
}
.mm-report__brand-divider{
  width:38px; height:1.5px; background:var(--mm-gold-500);
  margin:var(--mm-s-3) auto 0;
}

/* --- Cover: assessor seal / stamp --- */
.mm-stamp{
  margin:var(--mm-s-5) auto 0; width:150px; height:150px;
  display:grid; place-items:center; text-align:center;
  border:1.5px solid var(--mm-gold-600);
  border-radius:50%;
  box-shadow:inset 0 0 0 4px rgba(212,175,55,.18);
  color:var(--mm-navy-800); position:relative;
  transform:rotate(-7deg);
}
.mm-stamp__inner{ display:flex; flex-direction:column; align-items:center; gap:3px; padding:10px; }
.mm-stamp__top{ font-size:8px; letter-spacing:.22em; text-transform:uppercase; color:var(--mm-gold-700); font-weight:700; }
.mm-stamp__name{ font-family:var(--mm-f-display); font-size:17px; font-weight:600; color:var(--mm-navy-900); line-height:1.1; }
.mm-stamp__role{ font-size:7.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--mm-ink-500); font-weight:600; }
.mm-stamp__star{ color:var(--mm-gold-600); font-size:11px; line-height:1; }

/* --- Numbered section divider --- */
.mm-section-head{ display:flex; align-items:flex-start; gap:var(--mm-s-4); margin:var(--mm-s-7) 0 var(--mm-s-5); }
.mm-section-head__num{
  font-family:var(--mm-f-display); font-size:30px; font-weight:500; line-height:1;
  color:var(--mm-gold-600); flex-shrink:0;
  padding-right:var(--mm-s-4); border-right:1.5px solid var(--mm-gold-500);
  -webkit-print-color-adjust:exact; print-color-adjust:exact;
}
.mm-section-head__body{ flex:1; min-width:0; }

/* --- Assessment snapshot (page 1 executive summary) --- */
.mm-snapshot{
  display:grid; grid-template-columns:repeat(5,1fr); gap:var(--mm-s-3);
  margin:var(--mm-s-4) 0 var(--mm-s-2);
}
@media (max-width:680px){ .mm-snapshot{ grid-template-columns:repeat(2,1fr); } }
.mm-snapshot__tile{
  background:var(--mm-cream); border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-md); padding:var(--mm-s-3) var(--mm-s-3);
  text-align:center; border-top:2px solid var(--mm-gold-500);
  -webkit-print-color-adjust:exact; print-color-adjust:exact;
}
.mm-snapshot__label{
  font-size:8.5px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--mm-fg-tertiary); font-weight:600; margin-bottom:5px; line-height:1.3;
}
.mm-snapshot__value{
  font-family:var(--mm-f-display); font-size:18px; font-weight:600;
  color:var(--mm-navy-900); line-height:1.15;
}
.mm-snapshot__value--sm{ font-size:14px; }

/* --- Overall examiner verdict --- */
.mm-verdict{
  background:var(--mm-cream); border-left:3px solid var(--mm-gold-500);
  border-radius:0 var(--mm-r-md) var(--mm-r-md) 0;
  padding:var(--mm-s-4) var(--mm-s-5); margin:var(--mm-s-3) 0;
  -webkit-print-color-adjust:exact; print-color-adjust:exact;
}
.mm-verdict__text{
  font-family:var(--mm-f-display); font-size:16px; line-height:1.6;
  color:var(--mm-ink-900); margin:0;
}
.mm-verdict__text + .mm-verdict__text{ margin-top:var(--mm-s-3); }
.mm-verdict strong{ color:var(--mm-navy-900); font-weight:600; }

/* --- Transcript print-mode controls --- */
.mm-transcript-controls{
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  margin-bottom:var(--mm-s-4);
  padding:8px 10px; background:var(--mm-bg-surface-sunken);
  border:1px solid var(--mm-border-subtle); border-radius:var(--mm-r-md);
}
.mm-transcript-controls__label{
  font-size:9px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
  color:var(--mm-fg-tertiary); margin-right:4px;
}
.mm-tmode-btn{
  font-family:var(--mm-f-body); font-size:11px; font-weight:600; letter-spacing:.04em;
  padding:5px 12px; border-radius:var(--mm-r-full);
  border:1px solid var(--mm-border-subtle); background:var(--mm-bg-surface);
  color:var(--mm-fg-secondary); cursor:pointer;
  transition:all var(--mm-dur-fast,150ms) var(--mm-ease,ease);
}
.mm-tmode-btn:hover{ border-color:var(--mm-gold-500); color:var(--mm-navy-800); }
.mm-tmode-btn--active{
  background:var(--mm-navy-800); color:var(--mm-gold-400);
  border-color:var(--mm-navy-800);
}
.mm-transcript__hl-note{
  font-size:11px; color:var(--mm-fg-tertiary); font-style:italic;
  margin-bottom:var(--mm-s-3);
}
.mm-transcript:not([data-mode="highlights"]) .mm-transcript__hl-note{ display:none; }
/* Condensed: tighter rhythm, less vertical waste */
.mm-transcript[data-mode="condensed"] .mm-transcript-part{ margin-bottom:var(--mm-s-4); }
.mm-transcript[data-mode="condensed"] .mm-turn{ margin-bottom:6px; padding:8px 12px; }
.mm-transcript[data-mode="condensed"] .mm-turn__speaker{ margin-bottom:2px; }
/* Highlights: show only flagged evidence turns */
.mm-transcript[data-mode="highlights"] .mm-turn{ display:none; }
.mm-transcript[data-mode="highlights"] .mm-turn.is-highlight{ display:block; }
.mm-transcript[data-mode="highlights"] .mm-transcript-part{ margin-bottom:var(--mm-s-4); }

/* --- Running footer + watermark (print only; hidden on screen) --- */
.mm-print-footer{ display:none; }
.mm-print-watermark{ display:none; }

/* ============================================================
   PRINT
   ============================================================ */
/* A4 with a reserved bottom safe-area so the running footer never
   overlaps content. Top/side margins frame the page; ~20mm bottom
   leaves room for the fixed footer (~14mm) plus breathing space. */
@page{ size:A4; margin:14mm 12mm 20mm 12mm; }
@media print{
  body{background:#FFFFFF;margin:0;padding:0;}
  .mm-topbar,.mm-report-actions,[data-print="hide"]{display:none!important;}
  .mm-report-wrap{display:block;padding:0;margin:0;max-width:none;}
  .mm-report{
    box-shadow:none;
    /* @page supplies the page margins now; keep report padding minimal */
    padding:0 0 2mm;
    width:100%;max-width:none;
    border-radius:0;background:transparent;
    box-sizing:border-box;
    position:relative;z-index:1;
  }
  /* ---- Running footer: repeats on every printed page ----
     Browsers render position:fixed elements once per printed page,
     which is the reliable cross-browser way to get a footer on
     every page. (Live "Page X of Y" cannot be injected into a
     fixed element by the browser print engine — see Download PDF,
     which stamps true page numbers via jsPDF.) */
  .mm-print-footer{
    display:block;position:fixed;left:0;right:0;bottom:0;
    height:14mm;padding:2.5mm 12mm 0;box-sizing:border-box;
    background:#FFFFFF;font-family:var(--mm-f-body);z-index:50;
  }
  .mm-print-footer__rule{height:1px;background:var(--mm-gold-500);margin-bottom:2mm;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}
  .mm-print-footer__row{display:flex;justify-content:space-between;gap:10mm;
    font-size:8pt;color:var(--mm-ink-500);letter-spacing:.03em;}
  .mm-print-footer__brand{font-weight:600;color:var(--mm-navy-800);}
  .mm-print-footer__page{white-space:nowrap;}
  /* ---- Watermark: very light, repeats per page, never blocks text ---- */
  .mm-print-watermark{
    display:block;position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%) rotate(-32deg);
    font-family:var(--mm-f-display);font-size:40pt;font-weight:600;
    letter-spacing:.12em;color:var(--mm-navy-900);opacity:.05;
    white-space:nowrap;z-index:0;pointer-events:none;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;
  }
  /* New identity blocks must never split */
  .mm-report__brand,.mm-stamp,.mm-snapshot__tile,.mm-verdict,
  .mm-section-head{break-inside:avoid;}
  .mm-snapshot{break-inside:avoid;}
  .mm-section-head__num{-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}
  .mm-verdict,.mm-snapshot__tile{-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}
  /* Strong break-inside avoidance */
  .mm-report__cover,.mm-report__meta,.mm-scores,
  .mm-analysis__item,.mm-signature,.mm-confidence,.mm-overall,
  .mm-turn,.mm-provenance{break-inside:avoid;}
  /* The three recommendation columns are a single conceptual unit — keep together */
  .mm-recs{break-inside:avoid;page-break-inside:avoid;}
  .mm-recs__col{break-inside:avoid;}
  /* Section heading + its first paragraph/block should travel together */
  .mm-section-head{break-after:avoid;break-inside:avoid;page-break-after:avoid;}
  .mm-section-head + *{break-before:avoid;page-break-before:avoid;}
  /* Global orphan / widow protection — no single stranded lines */
  p,li,.mm-analysis__text,.mm-turn__text,.mm-verdict__text{orphans:3;widows:3;}
  /* Summary — keep all paragraphs together if possible */
  .mm-summary{break-inside:avoid-page;orphans:3;widows:3;}
  .mm-summary p{orphans:3;widows:3;break-inside:avoid;}
  .mm-analysis__text{orphans:3;widows:3;}
  .mm-turn__text{orphans:2;widows:2;}
  .mm-transcript-part{break-before:auto;}
  .mm-transcript-part__label{break-after:avoid;page-break-after:avoid;}
  /* Signature block must not sit flush against the bottom */
  .mm-signature{break-before:avoid-page;margin-top:14mm;}
  .mm-provenance{margin-top:6mm;break-inside:avoid;}
  .mm-report__cover{padding-top:0;padding-bottom:6mm;}
  .mm-section-head{margin-top:12mm;margin-bottom:6mm;}
  *{box-shadow:none!important;}
  body{font-size:10.5pt;line-height:1.5;}
  .mm-section-head__title{font-size:16pt;}
  .mm-report__title{font-size:22pt;}
  .mm-summary,.mm-analysis__text,.mm-turn__text{font-size:10.5pt;}
  .mm-report__meta{padding:4mm 6mm;gap:4mm;}
  .mm-report__meta-value{font-size:13px;line-height:1.3;word-break:normal;overflow-wrap:break-word;hyphens:auto;}
  /* Band summary cards — give the label more horizontal room */
  .mm-criterion{padding:10px 12px;gap:10px;}
  .mm-criterion__band{width:42px;height:42px;font-size:17px;flex-shrink:0;}
  .mm-criterion__name{font-size:13.5px;line-height:1.2;}
  .mm-criterion__tags{gap:3px;margin-top:3px;}
  .mm-src-tag{font-size:8.5px;padding:1.5px 6px;}
  /* Recommendations — slightly tighter text in print so all 3 fit comfortably */
  .mm-rec__title{font-size:12.5px;}
  .mm-rec__body{font-size:11px;line-height:1.5;}
  .mm-rec__descriptor{font-size:9px;}
  .mm-recs__col-title{font-size:9.5px;}
  .mm-recs{gap:4mm;}
  .mm-recs__col{padding:4mm;}
  /* Mode badge positioned at the top-right of the content area */
  .mm-report__mode-badge{box-shadow:inset 0 0 0 1px currentColor!important;top:0;right:0;}
  .mm-band-pill,.mm-criterion__band,.mm-cefr{
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
    color-adjust:exact;
  }
  .mm-turn--examiner,.mm-turn--candidate,.mm-confidence,
  .mm-analysis__evidence,.mm-recs__col{
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
  /* Pronunciation evidence section — A4 friendly, panel forced open */
  .mm-pron-section{break-inside:auto;}
  .mm-pron-headline,.mm-pron-note,.mm-pron-caveats,
  .mm-pron-spans,.mm-pron-advice__col,.mm-pron-diag__comment{break-inside:avoid;}
  .mm-pron-table{break-inside:auto;}
  .mm-pron-table__head{break-after:avoid;}
  .mm-pron-table__row{break-inside:avoid;}
  .mm-pron-subhead{break-after:avoid;break-inside:avoid;}
  .mm-pron-advice{break-inside:avoid;}
  .mm-pron-diag{break-inside:avoid;}
  /* Diagnostic panel is always printed fully expanded for the teacher's copy */
  .mm-pron-diag__toggle{display:none!important;}
  .mm-pron-diag__body{display:block!important;}
  .mm-pron-diag__grid{break-inside:avoid;}
  .mm-pron-diag__block{break-inside:avoid;}
  .mm-pron-headline,.mm-pron-note,.mm-pron-table__head,.mm-pron-table__row,
  .mm-pron-advice__col,.mm-pron-caveats,.mm-pron-spans,.mm-pron-chip,
  .mm-pron-diag__bar,.mm-pron-diag__comment,.mm-src-tag{
    -webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;
  }
  .mm-pron-headline__score{font-size:20pt;}
  .mm-pron-table__note{font-size:9.5pt;}
  .mm-pron-table__head,.mm-pron-table__row{padding:7px 10px;gap:8px;}
  .mm-pron-advice__list li,.mm-pron-diag__list li{font-size:9.5pt;}
  a{color:inherit;text-decoration:none;}
}

/* ============================================================
   MODAL
   ============================================================ */
.mm-modal-backdrop{
  position:fixed;inset:0;background:rgba(10,22,40,.5);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:grid;place-items:center;z-index:200;padding:var(--mm-s-5);
  animation:fade-in var(--mm-dur-std) var(--mm-ease);
}
.mm-modal{
  background:var(--mm-bg-surface);
  border-radius:var(--mm-r-2xl);
  max-width:480px;width:100%;
  padding:var(--mm-s-6);
  box-shadow:var(--mm-e-4);
}
.mm-modal__title{
  font-family:var(--mm-f-display);font-size:22px;font-weight:500;
  color:var(--mm-navy-900);margin:0 0 var(--mm-s-3);
}
.mm-modal__text{color:var(--mm-fg-secondary);font-size:14px;line-height:1.55;margin-bottom:var(--mm-s-4);}
.mm-modal__actions{display:flex;gap:var(--mm-s-3);justify-content:flex-end;margin-top:var(--mm-s-5);}

/* Empty state */
.mm-empty{
  text-align:center;padding:var(--mm-s-8) var(--mm-s-5);
  color:var(--mm-fg-tertiary);
}
.mm-empty__icon{
  width:56px;height:56px;margin:0 auto var(--mm-s-4);
  background:var(--mm-bg-surface-sunken);
  border-radius:50%;display:grid;place-items:center;
  color:var(--mm-ink-300);
}
.mm-empty__title{font-family:var(--mm-f-display);font-size:20px;color:var(--mm-navy-700);margin:0 0 var(--mm-s-2);font-weight:500;}
.mm-empty__text{font-size:14px;}

/* Utility */
.mm-mt-5{margin-top:var(--mm-s-5);}
.mm-mt-6{margin-top:var(--mm-s-6);}
.mm-flex{display:flex;gap:var(--mm-s-3);align-items:center;}

/* Toasts */
.mm-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--mm-navy-800);color:var(--mm-navy-50);
  padding:var(--mm-s-3) var(--mm-s-5);
  border-radius:var(--mm-r-md);
  box-shadow:var(--mm-e-3);
  font-size:13px;z-index:500;
  animation:toast-in 220ms var(--mm-ease);
  border-left:3px solid var(--mm-gold-500);
}
@keyframes toast-in{from{opacity:0;transform:translate(-50%,10px);}to{opacity:1;transform:translate(-50%,0);}}

/* ============================================================
   SESSIONS / HISTORY VIEW
   ============================================================ */
.mm-sessions-list{display:flex;flex-direction:column;gap:var(--mm-s-5);}
.mm-sessions-group__head{
  display:flex;align-items:baseline;gap:var(--mm-s-3);
  margin-bottom:var(--mm-s-3);
}
.mm-sessions-group__name{
  font-family:var(--mm-f-display);font-size:18px;font-weight:500;
  color:var(--mm-navy-900);
}
.mm-sessions-group__count{font-size:12px;color:var(--mm-fg-tertiary);}
.mm-session-row{
  display:flex;align-items:center;gap:var(--mm-s-4);
  padding:14px 18px;background:var(--mm-bg-surface);
  border:1px solid var(--mm-border-subtle);border-radius:var(--mm-r-lg);
  transition:all var(--mm-dur-std) var(--mm-ease);
}
.mm-session-row + .mm-session-row{margin-top:8px;}
.mm-session-row:hover{box-shadow:var(--mm-e-2);border-color:var(--mm-navy-200);}
.mm-session-row__main{flex:1;min-width:0;cursor:pointer;}
.mm-session-row__title{
  font-family:var(--mm-f-display);font-size:16px;font-weight:500;
  color:var(--mm-navy-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.mm-session-row__sub{font-size:12px;color:var(--mm-fg-tertiary);margin-top:2px;}
.mm-session-row__band{
  font-family:var(--mm-f-mono);font-size:14px;font-weight:600;
  color:var(--mm-navy-50);background:var(--mm-navy-700);
  padding:4px 12px;border-radius:var(--mm-r-full);white-space:nowrap;
}
.mm-session-row__band--audio{box-shadow:inset 0 0 0 2px var(--mm-gold-500);}
.mm-session-row__del{
  background:none;border:none;cursor:pointer;color:var(--mm-ink-300);
  padding:6px;border-radius:var(--mm-r-sm);display:grid;place-items:center;
  transition:all var(--mm-dur-fast) var(--mm-ease);
}
.mm-session-row__del:hover{color:var(--mm-danger);background:var(--mm-danger-bg);}
.mm-session-row__audio-dot{
  display:inline-flex;align-items:center;gap:4px;font-size:10px;
  color:var(--mm-gold-700);font-weight:600;letter-spacing:.04em;
  text-transform:uppercase;
}

/* ============================================================
   AUDIO PLAYBACK (report transcript)
   ============================================================ */
.mm-audio{
  display:flex;align-items:center;gap:var(--mm-s-3);
  margin:var(--mm-s-3) 0 var(--mm-s-4);
  padding:10px 14px;background:var(--mm-bg-surface-sunken);
  border:1px solid var(--mm-border-subtle);border-radius:var(--mm-r-md);
}
.mm-audio__label{
  font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--mm-tag-audio-fg);white-space:nowrap;
}
.mm-audio audio{flex:1;height:34px;max-width:100%;}
.mm-audio__pending{font-size:12px;color:var(--mm-fg-tertiary);font-style:italic;}
@media print{.mm-audio{display:none!important;}}

/* ============================================================
   CAPABILITY NOTICE (setup)
   ============================================================ */
.mm-capnotice{
  text-align:left;margin-top:24px;padding:14px 16px;
  border-radius:var(--mm-r-md);font-size:12.5px;line-height:1.5;
  background:rgba(199,120,46,.12);
  box-shadow:inset 0 0 0 1px rgba(223,190,92,.4);
  color:var(--mm-gold-200);
}
.mm-capnotice strong{color:var(--mm-gold-100);}
.mm-capnotice--ok{
  background:rgba(47,125,90,.14);
  box-shadow:inset 0 0 0 1px rgba(47,125,90,.35);
  color:#Bfe3cF;
}
.mm-capnotice--ok strong{color:#E3EFE8;}

/* ============================================================
   SETTINGS VIEW
   ============================================================ */
.mm-settings{max-width:680px;}
.mm-settings__card{
  background:var(--mm-bg-surface);border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-xl);padding:var(--mm-s-6);box-shadow:var(--mm-e-1);
}
.mm-settings__section + .mm-settings__section{
  margin-top:var(--mm-s-6);padding-top:var(--mm-s-6);
  border-top:1px solid var(--mm-border-subtle);
}
.mm-settings__legend{
  font-family:var(--mm-f-display);font-size:18px;font-weight:500;
  color:var(--mm-navy-900);margin:0 0 var(--mm-s-2);
}
.mm-settings__hint{font-size:12.5px;color:var(--mm-fg-tertiary);line-height:1.55;margin-bottom:var(--mm-s-4);}
.mm-settings__field{margin-top:var(--mm-s-4);}
.mm-seg{display:flex;gap:8px;flex-wrap:wrap;}
.mm-seg__btn{
  flex:1;min-width:120px;padding:12px 14px;text-align:left;cursor:pointer;
  border-radius:var(--mm-r-md);background:var(--mm-bg-surface-sunken);
  box-shadow:inset 0 0 0 1px var(--mm-border-subtle);transition:all var(--mm-dur-fast) var(--mm-ease);
}
.mm-seg__btn.is-active{background:var(--mm-gold-50);box-shadow:inset 0 0 0 1.5px var(--mm-gold-500);}
.mm-seg__btn-title{font-weight:600;font-size:13.5px;color:var(--mm-navy-900);}
.mm-seg__btn-sub{font-size:11px;color:var(--mm-fg-tertiary);margin-top:2px;line-height:1.4;}
.mm-settings__status{
  margin-top:var(--mm-s-4);padding:10px 14px;border-radius:var(--mm-r-md);
  font-size:13px;display:flex;align-items:center;gap:8px;
}
.mm-settings__status--ok{background:var(--mm-success-bg);color:var(--mm-success);}
.mm-settings__status--err{background:var(--mm-danger-bg);color:var(--mm-danger);}
.mm-settings__status--busy{background:var(--mm-info-bg);color:var(--mm-info);}
.mm-settings__actions{display:flex;gap:12px;margin-top:var(--mm-s-6);flex-wrap:wrap;}

/* ============================================================
   MICROPHONE CHECK (setup screen — dark navy context)
   ============================================================ */
.mm-miccheck{
  margin-top:var(--mm-s-4);padding:var(--mm-s-4);
  background:rgba(255,255,255,.04);
  border-radius:var(--mm-r-md);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.1);
  display:flex;flex-direction:column;gap:10px;
}
.mm-miccheck__head{display:flex;align-items:center;justify-content:space-between;gap:var(--mm-s-3);}
.mm-miccheck__title{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--mm-f-display);font-size:15px;font-weight:500;color:var(--mm-navy-50);
}
.mm-miccheck__title svg{width:18px;height:18px;color:var(--mm-gold-400);flex-shrink:0;}
.mm-miccheck__optional{
  font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--mm-navy-300);font-weight:600;flex-shrink:0;
}
.mm-miccheck__hint{font-size:12px;line-height:1.5;color:var(--mm-navy-300);}
.mm-miccheck__meter{
  height:8px;border-radius:var(--mm-r-full);overflow:hidden;
  background:rgba(255,255,255,.08);
}
.mm-miccheck__meter-fill{
  height:100%;width:0%;border-radius:var(--mm-r-full);
  background:linear-gradient(90deg,var(--mm-gold-500),var(--mm-gold-300));
  transition:width 90ms linear;
}
.mm-miccheck__result{
  padding:10px 12px;border-radius:var(--mm-r-sm);
  background:rgba(255,255,255,.04);
}
.mm-miccheck__result-label{font-size:13px;font-weight:600;margin-bottom:3px;}
.mm-miccheck__result-text{font-size:12px;line-height:1.5;color:var(--mm-navy-200);}
.mm-miccheck__warnings{margin:8px 0 0;padding-left:18px;}
.mm-miccheck__warnings li{font-size:11.5px;line-height:1.5;color:var(--mm-navy-300);margin-bottom:2px;}
.mm-miccheck__score{
  margin-top:8px;font-size:11px;letter-spacing:.06em;
  color:var(--mm-gold-300);font-family:var(--mm-f-mono);
}

/* ============================================================
   PRONUNCIATION EVIDENCE SECTION (report — ivory/print context)
   ============================================================ */
.mm-pron-section{margin-top:var(--mm-s-3);}
.mm-pron-headline{
  display:flex;align-items:center;justify-content:space-between;gap:var(--mm-s-4);
  padding:var(--mm-s-4) var(--mm-s-5);border-radius:var(--mm-r-md);
  background:var(--mm-cream);border-left:4px solid var(--mm-gold-500);
}
.mm-pron-headline--reliable{border-left-color:var(--mm-success);}
.mm-pron-headline--provisional{border-left-color:var(--mm-confidence-medium);}
.mm-pron-headline--audiolimited{border-left-color:var(--mm-warning);}
.mm-pron-headline--tooshort{border-left-color:var(--mm-warning);}
.mm-pron-headline--unscorable{border-left-color:var(--mm-ink-300);}
.mm-pron-headline__left{display:flex;flex-direction:column;gap:4px;}
.mm-pron-headline__score{
  font-family:var(--mm-f-display);font-size:26px;font-weight:600;
  color:var(--mm-navy-900);line-height:1.1;
}
.mm-pron-headline__verdict{
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
}
.mm-pron-headline__verdict--reliable{color:var(--mm-success);}
.mm-pron-headline__verdict--provisional{color:var(--mm-confidence-medium);}
.mm-pron-headline__verdict--audiolimited{color:var(--mm-warning);}
.mm-pron-headline__verdict--tooshort{color:var(--mm-warning);}
.mm-pron-headline__verdict--unscorable{color:var(--mm-ink-500);}
.mm-pron-headline__conf{text-align:right;flex-shrink:0;}
.mm-pron-headline__conf-label{
  font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--mm-fg-tertiary);font-weight:600;
}
.mm-pron-headline__conf-val{font-size:14px;font-weight:600;color:var(--mm-navy-700);margin-top:2px;}
.mm-pron-blurb{
  font-family:var(--mm-f-display);font-size:14.5px;line-height:1.6;
  color:var(--mm-ink-700);margin:var(--mm-s-3) 0 var(--mm-s-4);
}
.mm-pron-notes{display:flex;flex-direction:column;gap:8px;margin-bottom:var(--mm-s-4);}
.mm-pron-note{
  display:flex;gap:10px;align-items:flex-start;
  font-size:12.5px;line-height:1.55;color:var(--mm-fg-secondary);
  padding:10px 12px;background:var(--mm-bg-surface-sunken);
  border-radius:var(--mm-r-sm);
}
.mm-pron-note__tag{
  flex-shrink:0;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--mm-navy-600);padding:2px 8px;border-radius:var(--mm-r-full);
  background:#FFFFFF;box-shadow:inset 0 0 0 1px var(--mm-border-strong);
  white-space:nowrap;margin-top:1px;
}
.mm-pron-caveats{
  margin-bottom:var(--mm-s-4);padding:10px 14px;
  background:var(--mm-warning-bg);border-left:3px solid var(--mm-warning);
  border-radius:var(--mm-r-sm);
}
.mm-pron-caveats__item{font-size:12.5px;line-height:1.55;color:var(--mm-fg-secondary);}
.mm-pron-caveats__item + .mm-pron-caveats__item{margin-top:6px;}
.mm-pron-subhead{
  font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:var(--mm-gold-700);margin:var(--mm-s-5) 0 var(--mm-s-3);
  padding-bottom:6px;border-bottom:1px dashed var(--mm-border-subtle);
}
/* Evidence table */
.mm-pron-table{
  border:1px solid var(--mm-border-subtle);border-radius:var(--mm-r-md);overflow:hidden;
}
.mm-pron-table__head,.mm-pron-table__row{
  display:grid;grid-template-columns:1.3fr .7fr 3.2fr .8fr;
  gap:var(--mm-s-3);align-items:center;
  padding:10px var(--mm-s-4);
}
.mm-pron-table__head{
  background:var(--mm-navy-800);color:var(--mm-navy-50);
  font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
}
.mm-pron-table__row{border-top:1px solid var(--mm-border-subtle);background:var(--mm-bg-surface);}
.mm-pron-table__row:nth-child(even){background:var(--mm-cream);}
.mm-pron-table__signal{font-size:13px;font-weight:600;color:var(--mm-navy-900);}
.mm-pron-table__score{
  font-family:var(--mm-f-mono);font-size:13px;font-weight:600;color:var(--mm-navy-700);
}
.mm-pron-table__note{font-size:11.5px;line-height:1.5;color:var(--mm-fg-secondary);}
.mm-pron-table__src{text-align:right;}
/* Unclear spans */
.mm-pron-spans{
  margin-top:var(--mm-s-4);padding:var(--mm-s-4);
  background:var(--mm-bg-surface-sunken);border-radius:var(--mm-r-md);
}
.mm-pron-spans__title{
  font-size:13px;font-weight:600;color:var(--mm-navy-900);margin-bottom:6px;
}
.mm-pron-spans__caption{font-size:12px;line-height:1.55;color:var(--mm-fg-secondary);margin:0 0 10px;}
.mm-pron-spans__chips{display:flex;flex-wrap:wrap;gap:8px;}
.mm-pron-chip{
  font-family:var(--mm-f-display);font-size:13px;font-style:italic;
  padding:4px 12px;border-radius:var(--mm-r-full);
  background:#FFFFFF;color:var(--mm-navy-700);
  box-shadow:inset 0 0 0 1px var(--mm-border-strong);
}
/* Improvement advice */
.mm-pron-advice{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--mm-s-3);}
.mm-pron-advice__col{
  padding:var(--mm-s-4);background:var(--mm-cream);
  border-radius:var(--mm-r-md);border-top:3px solid var(--mm-gold-500);
}
.mm-pron-advice__col-title{
  font-family:var(--mm-f-display);font-size:15px;font-weight:600;
  color:var(--mm-navy-900);margin-bottom:8px;
}
.mm-pron-advice__list{margin:0 0 10px;padding-left:18px;}
.mm-pron-advice__list li{font-size:12.5px;line-height:1.55;color:var(--mm-ink-700);margin-bottom:5px;}
.mm-pron-advice__descriptor{
  font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--mm-gold-700);
}
/* Teacher diagnostic panel */
.mm-pron-diag{
  margin-top:var(--mm-s-5);border:1px solid var(--mm-border-strong);
  border-radius:var(--mm-r-md);overflow:hidden;
}
.mm-pron-diag__bar{
  display:flex;align-items:center;justify-content:space-between;gap:var(--mm-s-3);
  padding:10px var(--mm-s-4);background:var(--mm-navy-800);color:var(--mm-navy-50);
}
.mm-pron-diag__bar-title{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;letter-spacing:.04em;}
.mm-pron-diag__bar-title svg{width:15px;height:15px;color:var(--mm-gold-400);}
.mm-pron-diag__toggle{
  font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--mm-navy-900);
  background:var(--mm-gold-400);padding:6px 12px;border-radius:var(--mm-r-full);
  cursor:pointer;border:0;
}
.mm-pron-diag__toggle:hover{background:var(--mm-gold-300);}
.mm-pron-diag__body{display:none;padding:var(--mm-s-4);background:var(--mm-bg-surface);}
.mm-pron-diag__body.is-open{display:block;}
.mm-pron-diag__grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:6px var(--mm-s-5);
  margin-bottom:var(--mm-s-4);
}
.mm-pron-diag__line{
  display:flex;justify-content:space-between;gap:var(--mm-s-3);
  font-size:12px;padding:4px 0;border-bottom:1px dotted var(--mm-border-subtle);
}
.mm-pron-diag__k{color:var(--mm-fg-secondary);}
.mm-pron-diag__v{font-weight:600;color:var(--mm-navy-900);font-family:var(--mm-f-mono);font-size:11.5px;}
.mm-pron-diag__block{margin-top:var(--mm-s-3);}
.mm-pron-diag__h{
  font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--mm-gold-700);margin-bottom:5px;
}
.mm-pron-diag__list{margin:0;padding-left:18px;}
.mm-pron-diag__list li{font-size:12px;line-height:1.5;color:var(--mm-ink-700);margin-bottom:3px;}
.mm-pron-diag__inline{font-size:12px;line-height:1.5;color:var(--mm-ink-700);}
.mm-pron-diag__empty{font-size:12px;color:var(--mm-fg-tertiary);font-style:italic;}
.mm-pron-diag__comment{
  font-family:var(--mm-f-display);font-size:13.5px;line-height:1.6;font-style:italic;
  color:var(--mm-ink-700);padding:10px 12px;background:var(--mm-cream);
  border-left:2px solid var(--mm-gold-500);border-radius:0 var(--mm-r-sm) var(--mm-r-sm) 0;
}
.mm-pron-diag__provider{
  margin-top:var(--mm-s-4);padding-top:10px;border-top:1px dashed var(--mm-border-subtle);
  font-size:11px;color:var(--mm-fg-tertiary);font-style:italic;
}


/* ============================================================
   ACCESS LAYER — Auth, Tokens, Notifications, Profile, Admin
   (Mourad Mekki Teacher Toolkit · multi-user access system)
   ============================================================ */

/* --- Auth screen --- */
.mm-auth{
  min-height:100vh;display:grid;place-items:center;
  padding:var(--mm-s-5);
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(212,175,55,.10), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(43,74,117,.18), transparent 55%),
    linear-gradient(160deg,var(--mm-navy-950),var(--mm-navy-900) 55%,var(--mm-navy-800));
}
.mm-auth__card{
  width:100%;max-width:440px;
  background:var(--mm-bg-surface);
  border-radius:var(--mm-r-2xl);
  box-shadow:0 30px 80px -20px rgba(0,0,0,.55), var(--mm-e-4);
  overflow:hidden;
  animation:fade-in var(--mm-dur-std) var(--mm-ease);
}
.mm-auth__head{
  padding:var(--mm-s-6) var(--mm-s-6) var(--mm-s-5);
  background:linear-gradient(160deg,var(--mm-navy-900),var(--mm-navy-800));
  color:var(--mm-navy-50);text-align:center;
  border-bottom:1px solid rgba(212,175,55,.25);
}
.mm-auth__mark{
  width:48px;height:48px;margin:0 auto var(--mm-s-3);
  display:grid;place-items:center;
  background:var(--mm-navy-800);border:1px solid rgba(212,175,55,.4);
  border-radius:var(--mm-r-lg);
  color:var(--mm-gold-500);font-family:var(--mm-f-display);font-size:24px;font-weight:600;
}
.mm-auth__brand{font-family:var(--mm-f-display);font-size:21px;font-weight:500;letter-spacing:.01em;}
.mm-auth__tag{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mm-gold-300);margin-top:4px;}
.mm-auth__sub{font-size:12.5px;color:var(--mm-navy-300);margin-top:10px;line-height:1.5;}
.mm-auth__body{padding:var(--mm-s-5) var(--mm-s-6) var(--mm-s-6);}
.mm-auth__tabs{
  display:flex;gap:4px;background:var(--mm-bg-surface-sunken);
  padding:4px;border-radius:var(--mm-r-md);margin-bottom:var(--mm-s-5);
}
.mm-auth__tab{
  flex:1;padding:9px 8px;font-size:12.5px;font-weight:600;letter-spacing:.04em;
  color:var(--mm-fg-secondary);border-radius:calc(var(--mm-r-md) - 2px);
  transition:all var(--mm-dur-quick) var(--mm-ease);text-align:center;cursor:pointer;
}
.mm-auth__tab.is-active{background:var(--mm-bg-surface);color:var(--mm-navy-900);box-shadow:var(--mm-e-1);}
.mm-auth__field{margin-bottom:var(--mm-s-4);}
.mm-auth__err{
  font-size:12.5px;color:#B23A2E;background:#FBEDEB;border:1px solid #F2C9C3;
  padding:9px 12px;border-radius:var(--mm-r-md);margin-bottom:var(--mm-s-4);line-height:1.5;
}
.mm-auth__note{
  font-size:11.5px;color:var(--mm-fg-tertiary);line-height:1.6;margin-top:var(--mm-s-4);
  padding-top:var(--mm-s-4);border-top:1px solid var(--mm-border-subtle);
}
.mm-auth__adminlink{
  display:block;text-align:center;margin-top:var(--mm-s-4);
  font-size:11.5px;letter-spacing:.06em;color:var(--mm-fg-tertiary);
  background:none;width:100%;cursor:pointer;transition:color var(--mm-dur-quick) var(--mm-ease);
}
.mm-auth__adminlink:hover{color:var(--mm-gold-700);}
.mm-pw-wrap{position:relative;}
.mm-pw-wrap .mm-input{padding-right:64px;}
.mm-pw-toggle{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--mm-fg-accent);padding:4px 8px;border-radius:var(--mm-r-sm);cursor:pointer;
}
.mm-pw-toggle:hover{background:var(--mm-gold-50);}

/* --- Topbar user cluster --- */
.mm-user-cluster{display:flex;align-items:center;gap:10px;}
.mm-user-chip{
  display:flex;align-items:center;gap:8px;padding:5px 6px 5px 12px;
  background:var(--mm-bg-surface-sunken);border-radius:var(--mm-r-full);
}
.mm-user-chip__name{font-size:12.5px;font-weight:600;color:var(--mm-navy-800);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mm-user-chip__avatar{
  width:26px;height:26px;border-radius:50%;display:grid;place-items:center;
  background:var(--mm-navy-800);color:var(--mm-gold-300);font-size:12px;font-weight:600;
  font-family:var(--mm-f-display);
}
.mm-role-pill{
  font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 7px;border-radius:var(--mm-r-full);
}
.mm-role-pill--admin{background:var(--mm-gold-100);color:var(--mm-gold-900);}
.mm-role-pill--user{background:var(--mm-navy-100);color:var(--mm-navy-700);}

/* --- Notification bell --- */
.mm-bell{position:relative;display:inline-grid;place-items:center;width:38px;height:38px;border-radius:var(--mm-r-md);color:var(--mm-fg-secondary);cursor:pointer;transition:background var(--mm-dur-quick) var(--mm-ease);}
.mm-bell:hover{background:var(--mm-navy-50);color:var(--mm-navy-900);}
.mm-bell__badge{
  position:absolute;top:3px;right:3px;min-width:17px;height:17px;padding:0 4px;
  background:#C0392B;color:#fff;font-size:10px;font-weight:700;
  border-radius:var(--mm-r-full);display:grid;place-items:center;border:2px solid var(--mm-bg-surface);
}

/* --- Status chips --- */
.mm-chip{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:4px 10px;border-radius:var(--mm-r-full);white-space:nowrap;
}
.mm-chip--pending{background:#FBF1D8;color:#8A6D1A;}
.mm-chip--granted,.mm-chip--unused{background:#E3F0E8;color:#2B6B47;}
.mm-chip--consumed{background:var(--mm-navy-100);color:var(--mm-navy-700);}
.mm-chip--revoked,.mm-chip--rejected{background:#FBE6E3;color:#A63A2C;}
.mm-chip--expired{background:#EDE7DC;color:#766953;}
.mm-chip--neutral{background:var(--mm-bg-surface-sunken);color:var(--mm-fg-tertiary);}

/* --- Token / generic info modal extras --- */
.mm-tokmodal{max-width:440px;}
.mm-tokmodal__test{
  font-family:var(--mm-f-display);font-size:18px;color:var(--mm-navy-900);
  font-weight:500;margin-bottom:4px;
}
.mm-tokmodal__user{font-size:12.5px;color:var(--mm-fg-tertiary);margin-bottom:var(--mm-s-4);}
.mm-token-value{
  font-family:var(--mm-f-mono);font-size:15px;font-weight:600;letter-spacing:.04em;
  color:var(--mm-navy-900);background:var(--mm-bg-surface-sunken);
  border:1px dashed var(--mm-border-strong);border-radius:var(--mm-r-md);
  padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  word-break:break-all;
}
.mm-token-value__copy{
  font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--mm-navy-900);background:var(--mm-gold-400);padding:6px 12px;
  border-radius:var(--mm-r-sm);cursor:pointer;white-space:nowrap;
  transition:background var(--mm-dur-quick) var(--mm-ease);
}
.mm-token-value__copy:hover{background:var(--mm-gold-300);}
.mm-note-box{
  font-size:12px;color:var(--mm-fg-secondary);line-height:1.55;
  background:var(--mm-gold-50);border-left:3px solid var(--mm-gold-500);
  padding:10px 14px;border-radius:var(--mm-r-sm);margin-top:var(--mm-s-4);
}

/* --- Notifications view --- */
.mm-notif-list{display:flex;flex-direction:column;gap:var(--mm-s-3);}
.mm-notif{
  background:var(--mm-bg-surface);border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-lg);padding:var(--mm-s-4) var(--mm-s-5);
  box-shadow:var(--mm-e-1);
}
.mm-notif--unread{border-left:3px solid var(--mm-gold-500);background:var(--mm-gold-50);}
.mm-notif__title{font-family:var(--mm-f-display);font-size:16px;color:var(--mm-navy-900);font-weight:500;margin-bottom:3px;}
.mm-notif__msg{font-size:13px;color:var(--mm-fg-secondary);line-height:1.5;}
.mm-notif__time{font-size:11px;color:var(--mm-fg-tertiary);margin-top:6px;}

/* --- Profile / admin cards --- */
.mm-stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:var(--mm-s-4);}
.mm-stat-card{
  background:var(--mm-bg-surface);border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-lg);padding:var(--mm-s-4) var(--mm-s-5);box-shadow:var(--mm-e-1);
}
.mm-stat-card__label{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mm-fg-tertiary);margin-bottom:8px;}
.mm-stat-card__value{font-family:var(--mm-f-display);font-size:30px;font-weight:500;color:var(--mm-navy-900);line-height:1;}
.mm-stat-card__note{font-size:12px;color:var(--mm-fg-tertiary);margin-top:6px;}

.mm-data-table{width:100%;border-collapse:collapse;font-size:13px;}
.mm-data-table th{
  text-align:left;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--mm-fg-tertiary);padding:10px 12px;border-bottom:1px solid var(--mm-border-strong);
}
.mm-data-table td{padding:12px;border-bottom:1px solid var(--mm-border-subtle);vertical-align:middle;color:var(--mm-fg-secondary);}
.mm-data-table tr:hover td{background:var(--mm-bg-surface-sunken);}
.mm-table-wrap{overflow-x:auto;background:var(--mm-bg-surface);border:1px solid var(--mm-border-subtle);border-radius:var(--mm-r-lg);box-shadow:var(--mm-e-1);}
.mm-table-actions{display:flex;gap:6px;flex-wrap:wrap;}
.mm-btn--mini{padding:6px 11px;font-size:11px;border-radius:var(--mm-r-sm);}
.mm-btn--danger{background:#C0392B;color:#fff;}
.mm-btn--danger:hover{background:#A93226;}

.mm-filter-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:var(--mm-s-5);}
.mm-filter-chip{
  font-size:12px;font-weight:600;letter-spacing:.03em;padding:7px 14px;border-radius:var(--mm-r-full);
  background:var(--mm-bg-surface);border:1px solid var(--mm-border-strong);color:var(--mm-fg-secondary);
  cursor:pointer;transition:all var(--mm-dur-quick) var(--mm-ease);
}
.mm-filter-chip.is-active{background:var(--mm-navy-800);color:var(--mm-navy-50);border-color:var(--mm-navy-800);}

.mm-req-count{
  display:inline-grid;place-items:center;min-width:18px;height:18px;padding:0 5px;margin-left:6px;
  background:#C0392B;color:#fff;font-size:10px;font-weight:700;border-radius:var(--mm-r-full);
}

@media (max-width:760px){
  .mm-nav{flex-wrap:wrap;}
  .mm-user-chip__name{max-width:90px;}
}
@media print{
  .mm-bell,.mm-user-cluster,.mm-filter-bar,.mm-table-actions{display:none!important;}
}


/* ============================================================
   PHASE 6 · REPORT EXPORT SYSTEM — styles
   Evidence blocks · generated report types · export panel ·
   preview overlay · Arabic RTL. Cream / gold / navy preserved.
   ============================================================ */

/* ---- English evidence isolation (safe inside Arabic text) -- */
.english-evidence{
  direction:ltr;unicode-bidi:isolate;display:inline-block;
  text-align:left;
}

/* ---- Pronunciation credibility note (full report) ---------- */
.mm-pron-credit{
  margin-top:var(--mm-s-3);padding:10px 14px;
  background:var(--mm-gold-50);border-left:3px solid var(--mm-gold-500);
  border-radius:var(--mm-r-sm);
  font-size:12.5px;line-height:1.55;color:var(--mm-navy-800);
}

/* ---- Worked transcript evidence (full report criterion) ---- */
.mm-evidence{
  margin-top:var(--mm-s-4);
  border:1px solid var(--mm-border-subtle);
  border-radius:var(--mm-r-md);
  background:var(--mm-bg-surface);
  overflow:hidden;
}
.mm-evidence__row{
  display:grid;grid-template-columns:148px 1fr;gap:14px;
  padding:10px 16px;border-top:1px solid var(--mm-border-subtle);
}
.mm-evidence__row:first-child{border-top:0;}
