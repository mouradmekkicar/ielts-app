function renderScoresBlock(sc){
  const pronBand = sc.criteria.pronunciation;
  const pd = sc.pronunciationDetail || null;
  // Precise pronunciation verdict label + range text (browser-only honesty).
  const VLABEL = { reliable:"", provisional:"· PROVISIONAL", "audio-limited":"· AUDIO-LIMITED",
                   "too-short":"· TOO SHORT", unscorable:"· UNSCORABLE" };
  const pronVerdictLabel = pd ? (VLABEL[pd.verdict] ?? "") : (sc.pronunciationVerdict==="provisional" ? "· PROVISIONAL" : "");
  let pronRangeText = null;
  if(pd && pronBand==null && pd.bandRange && pd.bandRange.low!=null){
    pronRangeText = `${pd.bandRange.low.toFixed(1).replace(".0","")}–${pd.bandRange.high.toFixed(1).replace(".0","")}`;
  }
  const criteria = [
    {key:"fluencyCoherence", label:"Fluency & Coherence", band:sc.criteria.fluencyCoherence, tags:["audio","transcript"]},
    {key:"lexical", label:"Lexical Resource", band:sc.criteria.lexical, tags:["transcript"]},
    {key:"grammar", label:"Grammatical Range", band:sc.criteria.grammar, tags:["transcript","rule"]},
    {key:"pronunciation", label:"Pronunciation", band:pronBand, tags:["audio","transcript"],
      verdictLabel: pronVerdictLabel, rangeText: pronRangeText}
  ];
  const overallBand = sc.overall;
  const cefr = sc.cefr;

  return el("div",{class:"mm-scores"},[
    el("div",{class:"mm-overall"},[
      el("div",{class:"mm-band-pill",style:`background:${bandTierColor(overallBand)};`},[
        el("div",{class:"mm-band-pill__num"}, overallBand != null ? [
          Math.floor(overallBand),
          overallBand % 1 !== 0 ? el("span",{class:"mm-band-pill__decimal"},".5") : null
        ] : "—"),
        el("div",{class:"mm-band-pill__label"},"Overall Band")
      ]),
      el("div",{class:"mm-cefr"}, `CEFR ${cefr.level} · ${cefr.label}`),
      el("div",{class:"mm-overall__expected"}, sc.reconciliation.label)
    ]),
    el("div",{class:"mm-criteria"}, criteria.map(c=>{
      const band = c.band;
      // Pronunciation may carry a band range (low confidence) or a verdict label.
      const cellText = band!=null ? band.toFixed(1).replace(".0","")
        : (c.rangeText ? c.rangeText : "—");
      const cellStyle = `background:${band==null?"var(--mm-ink-300)":bandTierColor(band)};` +
        (c.rangeText ? "font-size:15px;letter-spacing:-.02em;" : "");
      return el("div",{class:"mm-criterion"},[
        el("div",{class:"mm-criterion__band",style:cellStyle}, cellText),
        el("div",{class:"mm-criterion__meta"},[
          el("div",{class:"mm-criterion__label"},"IELTS Criterion"),
          el("div",{class:"mm-criterion__name"},[
            c.label,
            c.verdictLabel ? el("span",{style:"font-size:10px;color:var(--mm-warning);margin-left:6px;font-weight:500;letter-spacing:.1em;"},c.verdictLabel) : null
          ]),
          el("div",{class:"mm-criterion__tags"}, c.tags.map(t=>
            el("span",{class:`mm-src-tag mm-src-tag--${t}`}, t.toUpperCase())))
        ])
      ]);
    }))
  ]);
}

function renderConfidenceBlock(conf){
  const tierLabel = {high:"High Confidence",medium:"Moderate Confidence",low:"Low Confidence"}[conf.tier];
  return el("div",{class:`mm-confidence mm-confidence--${conf.tier}`},[
    el("div",{class:"mm-confidence__tier"},tierLabel),
    el("div",{class:"mm-confidence__text"},conf.evidence)
  ]);
}

function renderCriterionAnalysis(sc, session){
  const items = [
    {key:"fluencyCoherence", label:"Fluency and Coherence", band:sc.criteria.fluencyCoherence},
    {key:"lexical", label:"Lexical Resource", band:sc.criteria.lexical},
    {key:"grammar", label:"Grammatical Range and Accuracy", band:sc.criteria.grammar},
    {key:"pronunciation", label:"Pronunciation", band:sc.criteria.pronunciation}
  ];
  return el("div",{class:"mm-analysis"}, items.map(item=>{
    // Build evidence snippet
    let evidence = null;
    if(item.key==="fluencyCoherence"){
      const wpms = ["part1","part2","part3"].map(k=>sc.analyzed[k]?.metrics.trueWPM).filter(Boolean);
      const avgWPM = wpms.length ? Math.round(mean(wpms)) : 0;
      const avgSpeech = mean(["part1","part2","part3"].map(k=>session.parts[k]?.speechRatio||0).filter(Boolean));
      evidence = `AUDIO · Average speech rate ${avgWPM} wpm · Speech-to-silence ratio ${(avgSpeech*100).toFixed(0)}%`;
    } else if(item.key==="lexical"){
      const avgTTR = mean(["part1","part2","part3"].map(k=>sc.analyzed[k]?.metrics.typeTokenRatioMA||0).filter(Boolean));
      const advItems = [...new Set(["part1","part2","part3"].flatMap(k=>sc.analyzed[k]?.metrics.advancedItems||[]))].slice(0,5);
      evidence = `TRANSCRIPT · Moving-window TTR ${avgTTR.toFixed(2)}${advItems.length?` · Advanced items used: ${advItems.map(w=>`'${w}'`).join(", ")}`:""}`;
    } else if(item.key==="grammar"){
      const allErrs = ["part1","part2","part3"].flatMap(k=>sc.analyzed[k]?.metrics.errors||[]);
      evidence = allErrs.length
        ? `TRANSCRIPT + RULE · ${allErrs.length} detected error${allErrs.length!==1?"s":""} across session${allErrs.length?` (e.g., '${allErrs[0].text}')`:""}`
        : `TRANSCRIPT + RULE · No systematic errors detected`;
    } else if(item.key==="pronunciation"){
      const pd = sc.pronunciationDetail;
      if(pd){
        const vmap = { reliable:"Reliable browser-based estimate", provisional:"Provisional estimate",
          "audio-limited":"Audio-limited evidence", "too-short":"Too short to judge confidently",
          unscorable:"Not scorable from this recording" };
        const intel = pd.subscores?.intelligibility;
        const effort = pd.subscores?.listenerEffort;
        const bits = [];
        if(typeof intel==="number") bits.push(`Intelligibility ${intel}/100`);
        if(typeof effort==="number") bits.push(`Listener ease ${effort}/100`);
        evidence = `AUDIO + TRANSCRIPT · ${vmap[pd.verdict]||"Browser-based estimate"}${bits.length?" · "+bits.join(" · "):""} · See pronunciation evidence below`;
      } else {
        const avgConf = mean(["part1","part2","part3"].map(k=>sc.analyzed[k]?.metrics.avgTranscriptConfidence||0).filter(Boolean));
        evidence = `AUDIO · Average transcription confidence ${(avgConf*100).toFixed(0)}%${sc.pronunciationVerdict==="provisional"?" · Microphone quality limits full assessment":""}`;
      }
    }
    return el("div",{class:"mm-analysis__item"},[
      el("div",{class:"mm-analysis__head"},[
        el("div",{class:"mm-analysis__name"},item.label),
        el("div",{class:"mm-analysis__band"}, item.band==null ? "provisional" : `Band ${item.band.toFixed(1)}`)
      ]),
      el("div",{class:"mm-analysis__text"}, sc.feedback.detailedAnalysis[item.key] || "—"),
      // Pronunciation credibility note — replaces any "assessed separately" framing.
      item.key==="pronunciation" ? el("div",{class:"mm-pron-credit"},
        "Accent is not penalised. The pronunciation estimate focuses on intelligibility, listener effort, rhythm, pausing, chunking and speech clarity, and is a reliable classroom estimate rather than a certified examiner score.") : null,
      evidence ? el("div",{class:"mm-analysis__evidence"}, evidence) : null,
      // Transcript-based worked example for every criterion.
      mmAnalysisEvidenceBlock(item.key, item.band, session, sc)
    ]);
  }));
}

/* Worked transcript evidence appended to each criterion in the full report:
   real quote · improved version · why it matters · next-band target. */
function mmAnalysisEvidenceBlock(critKey, band, session, sc){
  let ev;
  try { ev = mmCriterionEvidence(critKey, band, session, sc); }
  catch(e){ ev = null; }
  if(!ev) return null;
  const isPron = critKey==="pronunciation";
  const rows = [];
  if(ev.quote){
    rows.push(el("div",{class:"mm-evidence__row"},[
      el("div",{class:"mm-evidence__k"},"From the transcript"),
      el("div",{class:"mm-evidence__quote english-evidence"}, "“"+ev.quote+"”")
    ]));
    if(ev.improved){
      rows.push(el("div",{class:"mm-evidence__row"},[
        el("div",{class:"mm-evidence__k"}, isPron?"Clearer delivery target":"Improved version"),
        el("div",{class:"mm-evidence__improved english-evidence"}, "“"+ev.improved+"”")
      ]));
    }
    if(ev.why || ev.note){
      rows.push(el("div",{class:"mm-evidence__row"},[
        el("div",{class:"mm-evidence__k"},"Why this matters"),
        el("div",{class:"mm-evidence__why"}, ev.why || ev.note)
      ]));
    }
  } else {
    rows.push(el("div",{class:"mm-evidence__row"},[
      el("div",{class:"mm-evidence__k"},"From the transcript"),
      el("div",{class:"mm-evidence__why"}, ev.note || "No clear transcript sample available for this criterion.")
    ]));
  }
  rows.push(el("div",{class:"mm-evidence__row"},[
    el("div",{class:"mm-evidence__k"},"Next band target"),
    el("div",{class:"mm-evidence__target"}, ev.nextTarget)
  ]));
  return el("div",{class:"mm-evidence"}, rows);
}

/* ------------------------------------------------------------
   PRONUNCIATION EVIDENCE SECTION (browser-only, honest)
   Printable A4 section + teacher diagnostic panel.
   Renders the PronunciationEngine v2 detail produced during scoring.
   ------------------------------------------------------------ */
function renderPronunciationSection(sc, session){
  const pd = sc.pronunciationDetail;
  if(!pd) return null;   // no engine detail (legacy session) → skip the section entirely

  // ---- Verdict presentation ---------------------------------------------
  const VERDICT = {
    reliable:    { label:"Reliable browser-based estimate", cls:"reliable",
                   blurb:"Audio and recognition were strong enough to support a confident browser-based judgement." },
    provisional: { label:"Provisional estimate", cls:"provisional",
                   blurb:"Some signals were weak or uncertain, so this estimate should be treated as indicative rather than final." },
    "audio-limited":{ label:"Audio-limited score", cls:"audiolimited",
                   blurb:"Recording quality was not strong enough for a confident judgement, so a band range is shown instead of an exact band." },
    "too-short": { label:"Too short to judge confidently", cls:"tooshort",
                   blurb:"The candidate spoke too little for pronunciation to be assessed reliably." },
    unscorable:  { label:"Unscorable", cls:"unscorable",
                   blurb:"There was not enough usable audio to score pronunciation." }
  };
  const v = VERDICT[pd.verdict] || VERDICT.provisional;

  // ---- Headline band text ------------------------------------------------
  const fmtBand = (n)=> (typeof n==="number") ? n.toFixed(1).replace(".0","") : null;
  let scoreText;
  if(pd.band != null){
    scoreText = `Band ${fmtBand(pd.band)}`;
  } else if(pd.bandRange && pd.bandRange.low != null){
    scoreText = `Band ${fmtBand(pd.bandRange.low)}–${fmtBand(pd.bandRange.high)}`;
  } else if(pd.verdict === "too-short"){
    scoreText = "Not assigned";
  } else {
    scoreText = "Exact band not assigned";
  }
  const confLabel = { high:"High confidence", medium:"Moderate confidence", low:"Low confidence", unscorable:"No confidence" }[pd.confidence] || "—";

  // ---- Evidence table rows ----------------------------------------------
  // Each row: label, score/status, plain-language explanation, source tag.
  const sub = pd.subscores || {};
  const scoreOrDash = (n)=> (typeof n==="number") ? `${n}/100` : "—";
  const qual = (n)=>{
    if(typeof n!=="number") return "not available";
    if(n>=85) return "strong"; if(n>=70) return "good"; if(n>=55) return "adequate";
    if(n>=40) return "inconsistent"; return "weak";
  };
  const rows = [
    { label:"Intelligibility", val:sub.intelligibility, tag:"transcript",
      note:`How easily the words could be made out — ${qual(sub.intelligibility)}. Built from recognition confidence, unclear spans and audio quality combined, not transcript confidence alone.` },
    { label:"Listener effort", val:sub.listenerEffort, tag:"rule",
      note:`How much effort a listener needs to follow the speech — ${qual(sub.listenerEffort)} ease. Higher is better; lowered by unclear spans, long pauses and unstable delivery.` },
    { label:"Speech clarity", val:sub.speechClarity, tag:"audio",
      note:`Steadiness of volume, clean signal and clearly recognised words — ${qual(sub.speechClarity)}.` },
    { label:"Rhythm", val:sub.rhythm, tag:"audio",
      note:`Stability of speaking rate across the answer — ${qual(sub.rhythm)}. Estimated from speech-rate variation between segments.` },
    { label:"Pausing / chunking", val:sub.pausingChunking, tag:"audio",
      note:`Naturalness of pausing and grouping of words — ${qual(sub.pausingChunking)}. Only counted here where pausing affected clarity, not as a fluency penalty.` },
    { label:"Intonation approximation", val:sub.intonationApproximation, tag:"audio",
      note:`Approximate pitch/energy movement — ${qual(sub.intonationApproximation)}. This is an estimate only; true intonation analysis needs a dedicated speech model.` },
    { label:"Audio quality", val:sub.audioQuality, tag:"audio",
      note:`Usability of the recording (volume, clipping, silence, noise) — ${qual(sub.audioQuality)}. Affects confidence in the score, not the candidate's band directly.` }
  ];

  const tableEl = el("div",{class:"mm-pron-table"},[
    el("div",{class:"mm-pron-table__head"},[
      el("div",{},"Signal"), el("div",{},"Score"), el("div",{},"What it means"), el("div",{},"Source")
    ]),
    ...rows.map(r=>el("div",{class:"mm-pron-table__row"},[
      el("div",{class:"mm-pron-table__signal"}, r.label),
      el("div",{class:"mm-pron-table__score"}, scoreOrDash(r.val)),
      el("div",{class:"mm-pron-table__note"}, r.note),
      el("div",{class:"mm-pron-table__src"},
        el("span",{class:`mm-src-tag mm-src-tag--${r.tag}`}, r.tag.toUpperCase()))
    ]))
  ]);

  // ---- Possible unclear spans (cautious wording, only if any) -----------
  const spanItems = [];
  if(pd.possibleUnclearSpans && pd.possibleUnclearSpans.length){
    pd.possibleUnclearSpans.slice(0,8).forEach(s=>{
      const txt = typeof s==="string" ? s : (s.text || s.span || JSON.stringify(s));
      if(txt) spanItems.push(txt);
    });
  }
  if(!spanItems.length && pd.unclearWords && pd.unclearWords.length){
    pd.unclearWords.slice(0,8).forEach(w=>{
      const txt = typeof w==="string" ? w : (w.word || w.text);
      if(txt) spanItems.push(txt);
    });
  }
  const spansBlock = spanItems.length ? el("div",{class:"mm-pron-spans"},[
    el("div",{class:"mm-pron-spans__title"},"Possible unclear spans"),
    el("p",{class:"mm-pron-spans__caption"},
      "Detected from transcript uncertainty — these may reflect pronunciation, microphone quality, accent or recognition limits, so treat them as prompts for review rather than confirmed errors:"),
    el("div",{class:"mm-pron-spans__chips"}, spanItems.map(t=>
      el("span",{class:"mm-pron-chip"}, `“${t}”`)))
  ]) : null;

  // ---- Improvement advice ------------------------------------------------
  const adv = pd.improvementAdvice || {immediate:[],shortTerm:[],targetBand:[]};
  const adviceCol = (title, items, descriptor)=> el("div",{class:"mm-pron-advice__col"},[
    el("div",{class:"mm-pron-advice__col-title"}, title),
    el("ul",{class:"mm-pron-advice__list"},
      (items && items.length ? items : ["—"]).map(t=>el("li",{}, t))),
    el("div",{class:"mm-pron-advice__descriptor"}, descriptor)
  ]);
  const adviceBlock = el("div",{class:"mm-pron-advice"},[
    adviceCol("Do now", adv.immediate, "Immediate exercise"),
    adviceCol("This week", adv.shortTerm, "Short-term practice"),
    adviceCol("Toward your target band", adv.targetBand, "Target-band habit")
  ]);

  // ---- Audio caveats (incl. mic-test warning carried from setup) --------
  const caveats = [...(pd.caveats||[])];
  const mt = session.micTest;
  if(mt && (mt.status==="weak" || mt.status==="unusable")){
    caveats.unshift(mt.status==="unusable"
      ? "The pre-test microphone check found almost no usable signal; pronunciation evidence is limited accordingly."
      : "The pre-test microphone check flagged a weak signal; pronunciation confidence has been reduced to stay fair.");
  }

  // ---- Teacher diagnostic panel (collapsible; forced open in print) -----
  const diagId = "mm-pron-diag-" + shortHash(session.id);
  const diagLine = (label, val)=> el("div",{class:"mm-pron-diag__line"},[
    el("span",{class:"mm-pron-diag__k"}, label),
    el("span",{class:"mm-pron-diag__v"}, val)
  ]);
  const listOr = (arr, empty)=> (arr && arr.length)
    ? el("ul",{class:"mm-pron-diag__list"}, arr.slice(0,6).map(x=>el("li",{}, typeof x==="string"?x:JSON.stringify(x))))
    : el("div",{class:"mm-pron-diag__empty"}, empty);

  const longPauseText = (pd.longPauses && pd.longPauses.length)
    ? pd.longPauses.map(p=>`${(p.durationMs/1000).toFixed(1)}s${p.part?` (${p.part.replace("part","Part ")})`:""}`).join(", ")
    : null;

  const diagBody = el("div",{class:"mm-pron-diag__body",id:diagId},[
    el("div",{class:"mm-pron-diag__grid"},[
      diagLine("Verdict", v.label),
      diagLine("Confidence", confLabel),
      diagLine("Headline", scoreText),
      diagLine("Audio quality", scoreOrDash(sub.audioQuality)),
      diagLine("Intelligibility", scoreOrDash(sub.intelligibility)),
      diagLine("Listener ease", scoreOrDash(sub.listenerEffort)),
      diagLine("Speech clarity", scoreOrDash(sub.speechClarity)),
      diagLine("Rhythm", scoreOrDash(sub.rhythm)),
      diagLine("Pausing / chunking", scoreOrDash(sub.pausingChunking)),
      diagLine("Intonation (approx.)", scoreOrDash(sub.intonationApproximation))
    ]),
    el("div",{class:"mm-pron-diag__block"},[
      el("div",{class:"mm-pron-diag__h"},"Audio warnings"),
      listOr(pd.audioQualityWarnings, "No audio-quality warnings recorded.")
    ]),
    el("div",{class:"mm-pron-diag__block"},[
      el("div",{class:"mm-pron-diag__h"},"Long pauses"),
      longPauseText ? el("div",{class:"mm-pron-diag__inline"}, longPauseText)
        : el("div",{class:"mm-pron-diag__empty"},"No unusually long pauses detected.")
    ]),
    el("div",{class:"mm-pron-diag__block"},[
      el("div",{class:"mm-pron-diag__h"},"Rhythm notes"),
      listOr(pd.rhythmNotes, "No rhythm irregularities flagged.")
    ]),
    el("div",{class:"mm-pron-diag__block"},[
      el("div",{class:"mm-pron-diag__h"},"Intonation caveat"),
      (pd.intonationNotes && pd.intonationNotes.length)
        ? listOr(pd.intonationNotes, "")
        : el("div",{class:"mm-pron-diag__inline"},"Intonation is an energy/pitch approximation only — phoneme-level confirmation would require a dedicated speech model.")
    ]),
    el("div",{class:"mm-pron-diag__block"},[
      el("div",{class:"mm-pron-diag__h"},"Fairness adjustments applied"),
      listOr(pd.fairnessAdjustments, "No fairness adjustments were required.")
    ]),
    el("div",{class:"mm-pron-diag__block"},[
      el("div",{class:"mm-pron-diag__h"},"Suggested teacher comment"),
      el("div",{class:"mm-pron-diag__comment"}, pd.examinerComment || "—")
    ]),
    el("div",{class:"mm-pron-diag__provider"}, pd.providerNote || "")
  ]);

  const toggleBtn = el("button",{
    class:"mm-pron-diag__toggle","data-print":"hide",
    onclick:(e)=>{
      const body = document.getElementById(diagId);
      if(!body) return;
      const open = body.classList.toggle("is-open");
      e.currentTarget.textContent = open ? "Hide pronunciation evidence" : "Show pronunciation evidence";
    }
  },"Show pronunciation evidence");

  // ---- Compose section ---------------------------------------------------
  return el("div",{class:"mm-pron-section"},[
    // Score headline
    el("div",{class:`mm-pron-headline mm-pron-headline--${v.cls}`},[
      el("div",{class:"mm-pron-headline__left"},[
        el("div",{class:"mm-pron-headline__score"}, scoreText),
        el("div",{class:`mm-pron-headline__verdict mm-pron-headline__verdict--${v.cls}`}, v.label)
      ]),
      el("div",{class:"mm-pron-headline__conf"},[
        el("div",{class:"mm-pron-headline__conf-label"},"Confidence"),
        el("div",{class:"mm-pron-headline__conf-val"}, confLabel)
      ])
    ]),
    el("p",{class:"mm-pron-blurb"}, v.blurb),

    // Fairness + browser-limitation notes
    el("div",{class:"mm-pron-notes"},[
      el("div",{class:"mm-pron-note"},[
        el("span",{class:"mm-pron-note__tag"},"Fairness"),
        el("span",{},"This score focuses on intelligibility, listener effort, rhythm, pausing and speech clarity. Accent is not penalised unless it affects understanding.")
      ]),
      el("div",{class:"mm-pron-note"},[
        el("span",{class:"mm-pron-note__tag"},"Browser limitation"),
        el("span",{},"This is a browser-based pronunciation estimate. It does not perform true phoneme-level forced alignment. Bands above 7.0 should be interpreted cautiously unless a dedicated phoneme-analysis engine is connected.")
      ])
    ]),

    // Caveats (audio-limited / mic-test)
    caveats.length ? el("div",{class:"mm-pron-caveats"},
      caveats.slice(0,4).map(c=>el("div",{class:"mm-pron-caveats__item"}, c))) : null,

    // Evidence table
    el("div",{class:"mm-pron-subhead"},"Evidence breakdown"),
    tableEl,

    // Unclear spans
    spansBlock,

    // Improvement advice
    el("div",{class:"mm-pron-subhead"},"Practice plan"),
    adviceBlock,

    // Teacher diagnostic panel
    el("div",{class:"mm-pron-diag"},[
      el("div",{class:"mm-pron-diag__bar"},[
        el("div",{class:"mm-pron-diag__bar-title"},[
          el("span",{html:ICONS.gear}),
          el("span",{},"Teacher diagnostic panel")
        ]),
        toggleBtn
      ]),
      diagBody
    ])
  ]);
}

function partAudioPlayer(session, partKey){
  const meta = session.parts && session.parts[partKey];
  if(!meta || !meta.audioKey) return null;
  const wrap = el("div",{class:"mm-audio"},[
    el("span",{class:"mm-audio__label",html:ICONS.play+" Recording"}),
    el("span",{class:"mm-audio__pending"},"Loading audio…")
  ]);
  // Load blob from IndexedDB asynchronously, then swap in a real <audio> element.
  AudioStore.get(meta.audioKey).then(blob=>{
    if(!blob){
      const pend = wrap.querySelector(".mm-audio__pending");
      if(pend) pend.textContent = "Audio not found on this device.";
      return;
    }
    const url = URL.createObjectURL(blob);
    const audio = el("audio",{controls:true,preload:"metadata",src:url});
    const pend = wrap.querySelector(".mm-audio__pending");
    if(pend) pend.replaceWith(audio); else wrap.appendChild(audio);
  }).catch(()=>{
    const pend = wrap.querySelector(".mm-audio__pending");
    if(pend) pend.textContent = "Audio unavailable.";
  });
  return wrap;
}

/* Transcript print modes — persisted across re-renders.
   condensed (default) · full · highlights                         */
let TranscriptMode = "condensed";

function renderTranscript(session, test){
  const parts = [
    {key:"part1", label:"Part 1 · Introduction and familiar topics"},
    {key:"part2", label:"Part 2 · Individual long turn"},
    {key:"part3", label:"Part 3 · Two-way discussion"}
  ];

  // --- Mode switcher (screen only; the chosen mode is what prints) ---
  const modes = [
    ["condensed","Condensed"],
    ["full","Full"],
    ["highlights","Highlights"]
  ];
  const controls = el("div",{class:"mm-transcript-controls","data-print":"hide"},[
    el("span",{class:"mm-transcript-controls__label"},"Transcript view"),
    ...modes.map(([val,lbl])=>el("button",{
      class:`mm-tmode-btn${TranscriptMode===val?" mm-tmode-btn--active":""}`,
      onclick:()=>{ TranscriptMode = val; state._emit(); }
    }, lbl))
  ]);

  const body = parts.map(p=>{
    const exTurns = (session.examinerTurns||[]).filter(t=>t.partKey===p.key);
    const candTurns = (session.candidateTurns||{})[p.key]||[];
    const fullText = session.parts[p.key]?.transcriptionResult?.text || "";

    // Decide whether to use per-question interleaving or a consolidated block.
    const normalize = s => s.toLowerCase().replace(/[^\w\s]/g,"").replace(/\s+/g," ").trim();
    const capturedNorm = normalize(candTurns.map(c=>c.text).join(" "));
    const fullNorm = normalize(fullText);
    const coverage = fullNorm.length ? capturedNorm.length/fullNorm.length : 1;

    const turns = [];
    for(const e of exTurns) turns.push({role:"examiner",text:e.text,at:e.at});

    if(!fullText){
      if(!turns.length){
        return el("div",{class:"mm-transcript-part"},[
          el("div",{class:"mm-transcript-part__label"},p.label),
          partAudioPlayer(session, p.key),
          el("div",{style:"font-size:13px;color:var(--mm-fg-tertiary);font-style:italic;padding:12px 0;"},
            "No transcript captured for this part. The audio was recorded (and is playable above), but transcription returned no text — check the transcription provider in Settings, confirm the API key and network connection, or ensure the recording contained audible speech.")
        ]);
      }
    } else if(coverage >= 0.75){
      for(const c of candTurns) turns.push({role:"candidate",text:c.text,at:c.at});
    } else {
      turns.push({role:"candidate", text:fullText,
        at: exTurns.length ? exTurns[0].at + 1 : 1, isConsolidated:true});
    }
    turns.sort((a,b)=>a.at-b.at);

    // --- Flag "highlight" turns: the candidate's most substantial answer in
    //     this part (the key scoring evidence) plus the examiner cue before it.
    let bestIdx = -1, bestLen = -1;
    turns.forEach((t,i)=>{
      if(t.role==="candidate"){
        const len = (t.text||"").length;
        if(len>bestLen){ bestLen=len; bestIdx=i; }
      }
    });
    if(bestIdx>=0){
      turns[bestIdx].highlight = true;
      for(let i=bestIdx-1;i>=0;i--){ if(turns[i].role==="examiner"){ turns[i].highlight=true; break; } }
    }

    return el("div",{class:"mm-transcript-part"},[
      el("div",{class:"mm-transcript-part__label"},p.label),
      partAudioPlayer(session, p.key),
      el("div",{}, turns.map(t=>
        el("div",{class:`mm-turn mm-turn--${t.role}${t.highlight?" is-highlight":""}`,
          style:t.role==="candidate"?"margin-left:12%;":""},[
          el("div",{class:"mm-turn__speaker"},
            t.role==="examiner" ? "Examiner"
            : t.isConsolidated ? "Candidate (combined response)"
            : "Candidate"),
          el("div",{class:"mm-turn__text"}, t.text || "…")
        ])
      ))
    ]);
  });

  return el("div",{},[
    controls,
    el("div",{class:"mm-transcript","data-mode":TranscriptMode},[
      el("div",{class:"mm-transcript__hl-note"},
        "Highlights view · showing the key candidate response from each part used as scoring evidence. Switch to Full for the complete transcript."),
      ...body
    ])
  ]);
}

function downloadJSON(session){
  const filename = `ielts-speaking-${(session.studentName||"candidate").replace(/\s+/g,"-").toLowerCase()}-${session.id.slice(-6)}.json`;
  const payload = {
    schema:"mm.ielts.scored.v1",
    session:{
      id:session.id,testId:session.testId,studentName:session.studentName,
      examinerName:session.examinerName,mode:session.mode,
      startedAt:session.startedAt,completedAt:session.completedAt
    },
    test:{id:session.test?.id,title:session.test?.title,theme:session.test?.theme,difficulty:session.test?.difficulty},
    scored:session.scored
  };
  const blob = new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},200);
}

/* ============================================================
   TRANSCRIPT EVIDENCE — sentence pool + deterministic improver
   ============================================================ */
function mmSplitSentences(text){
  if(!text) return [];
  return String(text)
    .replace(/\s+/g," ")
    .split(/(?<=[.!?])\s+|(?<=[.!?])$/)
    .map(s=>s.trim())
    .filter(s=>s && s.split(/\s+/).length>=4);
}
function mmCandidateText(session){
  const byPart = {};
  const all = [];
  for(const k of ["part1","part2","part3"]){
    const turns = (session.candidateTurns||{})[k] || [];
    let t = turns.map(c=>c.text).join(" ").trim();
    if(!t) t = session.parts?.[k]?.transcriptionResult?.text || "";
    byPart[k] = t;
    if(t) all.push(t);
  }
  const joined = all.join(" ");
  return { byPart, joined, sentences: mmSplitSentences(joined) };
}

/* Capitalise + tidy a rebuilt sentence. */
function mmTidy(s){
  s = s.replace(/\s+([,.!?])/g,"$1").replace(/\s{2,}/g," ").trim();
  if(s) s = s.charAt(0).toUpperCase()+s.slice(1);
  if(s && !/[.!?]$/.test(s)) s += ".";
  return s;
}

/* Deterministic, meaning-preserving fixes. Returns {improved, types[]}
   where types lists the kinds of change applied (empty ⇒ no change). */
function mmFixGrammar(sentence){
  let s = " "+sentence+" ";
  const types = [];
  const apply = (re, fn, type)=>{
    if(re.test(s)){ s = s.replace(re, fn); if(!types.includes(type)) types.push(type); }
  };
  // Subject–verb agreement
  apply(/\b(he|she|it)\s+don't\b/gi, (m,p)=>`${p} doesn't`, "agreement");
  apply(/\b(he|she|it)\s+have\b(?!\s+(?:to|been|had))/gi, (m,p)=>`${p} has`, "agreement");
  apply(/\b(he|she|it)\s+(go|do|say|make|take|come|see|want|need|like|live|work|play)\b/gi,
        (m,p,v)=>`${p} ${v}${/[sxz]$|ch$|sh$/.test(v)?"es":v.endsWith("y")?v.slice(0,-1)+"ies":"s"}`, "agreement");
  apply(/\b(I|we|they|you)\s+(was)\b/gi, (m,p)=>`${p} were`, "agreement");
  // Preposition / collocation
  apply(/\bdiscuss about\b/gi, ()=>"discuss", "preposition");
  apply(/\bdepend in\b/gi, ()=>"depend on", "preposition");
  apply(/\bdependent in\b/gi, ()=>"dependent on", "preposition");
  apply(/\bdifferent than\b/gi, ()=>"different from", "preposition");
  apply(/\bmarried with\b/gi, ()=>"married to", "preposition");
  apply(/\binterested about\b/gi, ()=>"interested in", "preposition");
  apply(/\bgood in\b/gi, ()=>"good at", "preposition");
  // Missing article
  apply(/\b(have|has|had|want|wanted|need|needed|bought|buy|got)\s+(car|book|phone|job|house|problem|question|idea|computer|laptop|degree)\b/gi,
        (m,v,n)=>`${v} ${/^[aeiou]/i.test(n)?"an":"a"} ${n}`, "article");
  // Progressive where simple present fits ("as I using" → "as I use")
  apply(/\b(I|we|they|you)\s+using\b/gi, (m,p)=>`${p} use`, "tense");
  apply(/\bas much as\s+(I|we|they|you)\s+(\w+)ing\b/gi,
        (m,p,v)=>`as much as ${p} ${v}`, "tense");
  // Double negative tidy
  apply(/\bdon't\s+(\w+)\s+no\b/gi, (m,v)=>`don't ${v} any`, "agreement");
  s = s.trim();
  return { improved: mmTidy(s), types };
}

/* Light lexical upgrade — one precise swap, meaning preserved. */
const MM_LEX_UP = {
  "good":"excellent","nice":"pleasant","very good":"outstanding","a lot of":"a great deal of",
  "lots of":"a wide range of","big":"significant","things":"aspects","stuff":"resources",
  "get":"obtain","a lot":"considerably","really":"genuinely","important":"essential",
  "happy":"delighted","sad":"disheartened","hard":"demanding","easy":"straightforward",
  "spares you":"saves you","much time":"a considerable amount of time"
};
function mmFixLexis(sentence){
  let s = sentence, type=null, hit=null;
  const keys = Object.keys(MM_LEX_UP).sort((a,b)=>b.length-a.length);
  for(const k of keys){
    const re = new RegExp("\\b"+k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","i");
    if(re.test(s)){ s = s.replace(re, (m)=>{
        const up = MM_LEX_UP[k];
        return /^[A-Z]/.test(m) ? up.charAt(0).toUpperCase()+up.slice(1) : up;
      }); type="lexis"; hit=k; break; }
  }
  return { improved: type?mmTidy(s):sentence, type, hit };
}

/* Fluency: trim fillers / obvious repetition. */
const MM_FILLERS = /\b(you know|i mean|kind of|sort of|like,|basically|i guess|i think,? )\b/gi;
function mmFixFluency(sentence){
  let s = sentence;
  let changed=false;
  if(MM_FILLERS.test(s)){ s = s.replace(MM_FILLERS, ""); changed=true; }
  // collapse immediate word repeats ("the the", "I I")
  const rep = s.replace(/\b(\w+)\s+\1\b/gi, "$1");
  if(rep!==s){ s=rep; changed=true; }
  return { improved: changed?mmTidy(s):sentence, changed };
}

/* Pick the candidate sentence most relevant to a criterion. */
function mmPickSentence(sentences, predicate){
  for(const s of sentences){ if(predicate(s)) return s; }
  return null;
}

/* Build evidence for one criterion. Returns the full evidence object. */
function mmCriterionEvidence(critKey, band, session, sc){
  const pool = mmCandidateText(session);
  const sentences = pool.sentences;
  const ev = {
    quote:null, improved:null, why:null, source:null,
    nextTarget: mmNextTarget(critKey, band)
  };
  const noSample = ()=>{ ev.quote=null; ev.improved=null; ev.why=null;
    ev.note="No clear transcript sample available for this criterion."; return ev; };

  if(!sentences.length) return noSample();

  if(critKey==="grammar"){
    // Prefer a sentence containing a detected error.
    const errs = ["part1","part2","part3"].flatMap(k=>sc.analyzed?.[k]?.metrics.errors||[]);
    let chosen=null, fix=null;
    for(const e of errs){
      const frag = (e.text||"").trim(); if(!frag) continue;
      const host = mmPickSentence(sentences, s=>s.toLowerCase().includes(frag.toLowerCase()));
      if(host){ const f = mmFixGrammar(host); if(f.types.length){ chosen=host; fix=f; break; } }
    }
    if(!chosen){ // scan any sentence the grammar fixer can improve
      for(const s of sentences){ const f=mmFixGrammar(s); if(f.types.length){ chosen=s; fix=f; break; } }
    }
    if(!chosen) return noSample();
    ev.quote=chosen; ev.improved=fix.improved; ev.source="TRANSCRIPT + RULE";
    ev.why = mmWhyGrammar(fix.types);
    return ev;
  }

  if(critKey==="lexical"){
    let chosen=null, fix=null;
    for(const s of sentences){ const f=mmFixLexis(s); if(f.type){ chosen=s; fix=f; break; } }
    if(!chosen){
      // No vague word to swap → take the longest sentence as a paraphrase target.
      chosen = sentences.slice().sort((a,b)=>b.length-a.length)[0];
      ev.quote=chosen; ev.improved=null; ev.source="TRANSCRIPT";
      ev.note="Vocabulary is already varied here. Aim to add one precise, topic-specific word in answers like this.";
      return ev;
    }
    ev.quote=chosen; ev.improved=fix.improved; ev.source="TRANSCRIPT";
    ev.why="This swaps a high-frequency word for a more precise, topic-appropriate choice, which lifts lexical resource without sounding unnatural.";
    return ev;
  }

  if(critKey==="fluencyCoherence"){
    let chosen=null, fix=null;
    for(const s of sentences){ const f=mmFixFluency(s); if(f.changed){ chosen=s; fix=f; break; } }
    if(!chosen){
      chosen = mmPickSentence(sentences, s=>/\b(and|but|so|because|then)\b/i.test(s)) || sentences[0];
      ev.quote=chosen; ev.improved=null; ev.source="TRANSCRIPT + AUDIO";
      ev.note="Delivery here is reasonably connected. Add linking phrases (for instance, on the other hand, as a result) to organise longer turns.";
      return ev;
    }
    ev.quote=chosen; ev.improved=fix.improved; ev.source="TRANSCRIPT + AUDIO";
    ev.why="Removing fillers and repetition tightens the message, so ideas flow more smoothly and the listener follows the answer with less effort.";
    return ev;
  }

  if(critKey==="pronunciation"){
    const pd = sc.pronunciationDetail;
    let span=null;
    if(pd){
      const list = (pd.possibleUnclearSpans||[]).concat(pd.unclearWords||[]);
      for(const s of list){ const t=typeof s==="string"?s:(s.text||s.span||s.word); if(t){ span=t; break; } }
    }
    let host = span ? mmPickSentence(sentences, s=>s.toLowerCase().includes(String(span).toLowerCase())) : null;
    if(!host) host = sentences.slice().sort((a,b)=>b.length-a.length)[0];
    if(!host) return noSample();
    ev.quote = host;
    // For pronunciation the words are correct — the "improved version" is a
    // clearer delivery target (chunking) of the same words, never a re-write.
    ev.improved = mmChunk(host);
    ev.source = "AUDIO + TRANSCRIPT";
    ev.why = span
      ? `The span “${span}” was flagged as less clear. Saying the same words in natural sense-groups (shown by the · marks) with light stress on key words improves intelligibility and reduces listener effort — accent itself is not the issue.`
      : "Grouping the same words into natural sense-groups (shown by the · marks) and pausing at the marks improves rhythm, intelligibility and listener ease — the wording does not need to change.";
    return ev;
  }
  return noSample();
}

/* Insert chunk markers at natural breakpoints (commas / linkers). */
function mmChunk(sentence){
  return sentence
    .replace(/,\s*/g, " · ")
    .replace(/\s+(and|but|so|because|when|if|which|that|who)\s+/gi, " · $1 ")
    .replace(/\s{2,}/g," ").trim();
}

function mmWhyGrammar(types){
  const bits = [];
  if(types.includes("agreement")) bits.push("subject–verb agreement");
  if(types.includes("tense")) bits.push("tense control");
  if(types.includes("article")) bits.push("article use");
  if(types.includes("preposition")) bits.push("preposition/collocation choice");
  const list = bits.length ? bits.join(", ") : "sentence accuracy";
  return `This improves ${list} while keeping the candidate's original meaning, which is exactly the kind of accuracy that supports a higher grammar band.`;
}

function mmNextTarget(critKey, band){
  const b = typeof band==="number" ? band : 5.5;
  const half = (Math.floor(b*2)/2 + 0.5).toFixed(1).replace(".0","");
  const map = {
    fluencyCoherence:`Toward Band ${half}: speak in longer, connected stretches and replace fillers with linking phrases (for instance, on the other hand, as a result). Record a two-minute answer and cut every "you know" / "I think".`,
    lexical:`Toward Band ${half}: build three topic word-families per test theme and use at least one precise alternative to a common word (e.g. "significant" for "big") in each long answer.`,
    grammar:`Toward Band ${half}: rehearse one complex pattern each day (relative clauses, second conditional, perfect tenses) and self-check agreement and articles when you replay your recording.`,
    pronunciation:`Toward Band ${half}: read short passages in sense-groups, stressing the key content word in each group, and re-record until any unclear spans are easy to follow.`
  };
  return map[critKey] || `Aim for Band ${half} with focused, regular practice.`;
}

/* ============================================================
   reportData MODEL
   ============================================================ */
function mmBuildReportData(session, sc, test){
  const totalMs = ["part1","part2","part3"].reduce((a,k)=>a+(session.parts?.[k]?.speakingTimeMs||0),0);
  const speakingTime = totalMs>0
    ? `${Math.floor(totalMs/60000)}m ${String(Math.round((totalMs%60000)/1000)).padStart(2,"0")}s` : "—";
  const ranked = MM_CRIT.map(c=>({...c, band:sc.criteria[c.key]})).filter(c=>typeof c.band==="number");
  let strongest=null, focus=null;
  if(ranked.length){
    strongest = ranked.reduce((a,b)=>b.band>a.band?b:a);
    focus = ranked.reduce((a,b)=>b.band<a.band?b:a);
  }
  const fmtB = (n)=> typeof n==="number" ? n.toFixed(1).replace(".0","") : "—";
  const criteria = {};
  for(const c of MM_CRIT){
    const band = sc.criteria[c.key];
    criteria[c.key] = {
      key:c.key, label:c.label, short:c.short,
      parentEN:c.parentEN, parentAR:c.parentAR,
      band, bandText: fmtB(band),
      explanation: sc.feedback?.detailedAnalysis?.[c.key] || "—",
      evidence: mmCriterionEvidence(c.key, band, session, sc)
    };
  }
  const confTier = sc.confidence?.tier || "medium";
  const confLabel = {high:"High",medium:"Moderate",low:"Low"}[confTier] || "—";
  return {
    candidate: session.studentName || "—",
    examiner: session.examinerName || "Mourad Mekki",
    test: test?.title || session.test?.title || "—",
    theme: test?.theme || session.test?.theme || "",
    date: fmt.dateMed(session.completedAt),
    speakingTime,
    reportId: shortHash(session.id).toUpperCase(),
    overallBand: sc.overall, overallBandText: fmtB(sc.overall),
    cefr: sc.cefr, confidenceTier: confTier, confidenceLabel: confLabel,
    confidenceEvidence: sc.confidence?.evidence || "",
    strongest, focus,
    criteria,
    recommendations: sc.recommendations || {immediate:[],shortTerm:[],targetBand:[]},
    performanceSummary: sc.feedback?.performanceSummary || [],
    pronunciationDetail: sc.pronunciationDetail || null,
    _session: session, _sc: sc, _test: test
  };
}

/* A weekly plan tuned to the weakest criterion. */
function mmWeeklyPlan(data, lang){
  const focusKey = data.focus ? data.focus.key : "fluencyCoherence";
  if(lang==="ar"){
    const intro = "خطة تدريب بسيطة لهذا الأسبوع:";
    const base = [
      "التحدث لمدة دقيقتين يومياً عن موضوع مألوف.",
      "تسجيل الإجابة والاستماع إليها مرة أخرى.",
      "اختيار ثلاث جمل وتحسين المفردات أو القواعد فيها.",
      "التدرب على التوقف في أماكن طبيعية أثناء الكلام.",
      "إعادة الإجابة في نهاية الأسبوع ومقارنة التحسن."
    ];
    const focusLine = {
      fluencyCoherence:"التركيز هذا الأسبوع: ربط الأفكار باستخدام كلمات الربط وتقليل التوقفات.",
      lexical:"التركيز هذا الأسبوع: تعلّم كلمات جديدة مرتبطة بالموضوع واستخدامها في الكلام.",
      grammar:"التركيز هذا الأسبوع: مراجعة زمن الأفعال وتراكيب الجمل البسيطة.",
      pronunciation:"التركيز هذا الأسبوع: نطق الكلمات بوضوح والتوقف في الأماكن الطبيعية."
    }[focusKey];
    return { intro, items: base, focusLine };
  }
  const base = [
    "Speak for two minutes a day about a familiar topic.",
    "Record the answer and listen back to it once.",
    "Pick three sentences and improve the vocabulary or grammar in them.",
    "Practise pausing at natural points while speaking.",
    "Re-record the same answer at the end of the week and compare the progress."
  ];
  const focusLine = {
    fluencyCoherence:"Focus this week: connect ideas with linking words and reduce pauses.",
    lexical:"Focus this week: learn topic words and use them in your answers.",
    grammar:"Focus this week: review verb tenses and simple sentence patterns.",
    pronunciation:"Focus this week: say words clearly and pause at natural points."
  }[focusKey];
  return { intro:"A simple practice plan for this week:", items:base, focusLine };
}

/* Seven-day action plan (compact, for Quick/Student). */
function mmSevenDay(data){
  const f = data.focus ? data.focus.short.toLowerCase() : "speaking";
  return [
    `Day 1–2 · Record a 2-minute answer on a familiar topic; note one ${f} habit to fix.`,
    `Day 3–4 · Rewrite three of your own sentences (better word or correct grammar) and say them aloud.`,
    `Day 5 · Practise a Part 2 long turn with linking phrases; pause at natural points.`,
    `Day 6 · Re-record the Day 1 answer and compare; tick what improved.`,
    `Day 7 · Do one full practice test and review the highlighted evidence sentence above.`
  ];
}

    strengths.push("يستطيع/تستطيع التعبير عن الأفكار بشكل مفهوم.");
    improve.push(`أهم خطوة تالية: تطوير ${f?labelFor(f):"تنظيم الإجابات"}.`);
    improve.push("استخدام مفردات أكثر دقة وتنظيم الإجابات الطويلة بشكل أوضح.");
    improve.push("التدرب على التحدث لفترات أطول دون توقف كثير.");
  } else {

      ...rows.map(([l,v])=>el("div",{class:"rg-ptable__row"},[
        el("div",{}, l), el("div",{}, typeof v==="number"?v+"/100":"—")]))
    ]);
    const spans=[];
    (pd.possibleUnclearSpans||[]).concat(pd.unclearWords||[]).slice(0,10).forEach(s=>{
      const t=typeof s==="string"?s:(s.text||s.span||s.word); if(t) spans.push(t);
    });
    if(spans.length) pronSpans = el("div",{class:"rg-block"},[
      el("div",{class:"rg-block__title"},"Detected unclear spans"),
      el("div",{class:"rg-chips"}, spans.map(t=>el("span",{class:"rg-chip"}, "“"+t+"”")))
    ]);
  }
  // Repetition / vocabulary / grammar signals
  const allErrs = ["part1","part2","part3"].flatMap(k=>sc.analyzed?.[k]?.metrics.errors||[]);
  const advItems = [...new Set(["part1","part2","part3"].flatMap(k=>sc.analyzed?.[k]?.metrics.advancedItems||[]))].slice(0,10);
  const signalGrid = el("div",{class:"rg-cols2"},[
    rgList("Grammar error examples", allErrs.length?allErrs.slice(0,6).map(e=>`${e.type}: “${e.text}”`):["No systematic errors detected."]),
    rgList("Advanced vocabulary used", advItems.length?advItems.map(w=>"“"+w+"”"):["Limited advanced items detected."])
  ]);
  // Teaching notes
  const fk = data.focus ? data.focus.key : "fluencyCoherence";
  const teaching = {
    fluencyCoherence:{ first:"Extended-turn organisation and reducing hesitation.",
      activity:"Timed 2-minute long-turn drills with a linking-phrase bank on the board.",
      homework:"Record a Part 2 answer nightly; transcribe and mark every filler.",
      retest:"Re-test Part 2 + Part 3 with focus on cohesion across the answer." },
    lexical:{ first:"Topic-specific vocabulary and precise paraphrase.",
      activity:"Word-family mapping for the test theme; collocation matching game.",
      homework:"Build three word-families per theme and use each in a spoken answer.",
      retest:"Re-test with new topics to check transfer of vocabulary." },
    grammar:{ first:"Accuracy of the dominant error type under extended discourse.",
      activity:"Guided error-correction of the candidate's own transcript sentences.",
      homework:"Daily complex-structure drill (relative clauses / conditionals).",
      retest:"Re-test Part 3 where complex grammar is most demanded." },
    pronunciation:{ first:"Chunking, stress placement and clarity of flagged spans.",
      activity:"Sense-group reading aloud; mark stress on content words.",
      homework:"Shadow a short clip and re-record until unclear spans are clear.",
      retest:"Re-record the flagged spans and compare intelligibility." }
  }[fk];
  const teachingBlock = el("div",{class:"rg-teaching"},[
    el("div",{class:"rg-block__title"},"Teaching notes"),
    el("div",{class:"rg-teaching__grid"},[
      el("div",{},[el("strong",{},"Focus first · "), teaching.first]),
      el("div",{},[el("strong",{},"Classroom activity · "), teaching.activity]),
      el("div",{},[el("strong",{},"Homework · "), teaching.homework]),
      el("div",{},[el("strong",{},"Retest focus · "), teaching.retest])
    ])
  ]);
  // Provenance + browser limitation
  const provenance = el("div",{class:"rg-prov"},[
    el("strong",{},"Provenance · "),
    `Engine v${sc.engineVersion}. Fluency, lexical resource and grammar are mapped to IELTS public band descriptors from the transcript; pronunciation is an acoustic + transcript estimate. `,
    `Pronunciation is estimated using browser-based audio and transcript signals — intelligibility, listener effort, rhythm, pausing, chunking and speech clarity. It is a reliable classroom estimate, not a certified examiner score. The browser cannot perform true phoneme-level forced alignment unless a dedicated speech model is connected; bands above 7.0 are treated cautiously. Accent is not penalised unless it affects intelligibility. `,
    `Confidence: ${(sc.confidence?.tier||"").toUpperCase()} — ${sc.confidence?.evidence||""}`
  ]);
  return el("div",{class:"mm-report mm-report--gen mm-report--diagnostic"},[
    head, scoreStrip,
    el("div",{class:"rg-sech"},"Criterion analysis with transcript evidence"),
    ...critBlocks,
    el("div",{class:"rg-sech"},"Pronunciation signal table"),
    pronTable||el("p",{class:"rg-muted"},"No pronunciation engine detail for this session."),
    pronSpans,
    el("div",{class:"rg-sech"},"Lexical, grammar & repetition signals"),
    signalGrid,
    el("div",{class:"rg-sech"},"Teaching plan"),
    teachingBlock,
    el("div",{class:"rg-sech"},"Assessment notes"),
    provenance,
    rgFooter("Mourad Mekki Teacher Toolkit · IELTS Coach")
  ]);
}

/* ---- dispatcher ------------------------------------------- */
function rgRender(type, data, lang){
  switch(type){
    case "student":    return rgRenderStudent(data);
    case "diagnostic": return rgRenderDiagnostic(data);
    case "parent":     return rgRenderParent(data, lang);
    case "quick":      return rgRenderQuick(data);
    case "full":
    default:           return rgRenderFull(data);
  }
}

/* ============================================================
   PREVIEW OVERLAY + EXPORT
   ============================================================ */
let RG_SELECTED = "full";
let RG_PARENT_LANG = "en";

function rgFilename(session, type, lang){
  const name = (session.studentName||"candidate").replace(/\s+/g,"-").toLowerCase();
  const suffix = type==="parent" ? `parent-${lang}` : type;
  return `ielts-speaking-${suffix}-${name}-${session.id.slice(-6)}.pdf`;
}

function rgExport(session, sc, test, type, lang, btn){
  // Full report → capture the live premium report directly (unchanged path).
  if(type==="full"){
    const live = document.querySelector(".mm-report");
    downloadPDF(session, btn, { targetEl: live, filename: rgFilename(session,"full",lang) });
    return;
  }
  const data = mmBuildReportData(session, sc, test);
  const node = rgRender(type, data, lang);
  rgWithStage(node, async (stageEl)=>{
    await downloadPDF(session, btn, {
      targetEl: stageEl,
      filename: rgFilename(session, type, lang),
      footerBrand:"Mourad Mekki Teacher Toolkit · IELTS Coach",
      rtl: (type==="parent" && lang==="ar"),
      suppressSubline: (type==="parent" && lang==="ar")
    });
  });
}

/* Render a generated report into an off-screen stage so html2canvas
   can measure & rasterise it at true A4 width, then clean up. */
function rgWithStage(node, fn){
  const stage = el("div",{class:"rg-stage"},[node]);
  document.body.appendChild(stage);
  // Force layout
  void stage.offsetHeight;
  const done = ()=>{ try{ stage.remove(); }catch(e){} };
  Promise.resolve(fn(node)).then(done).catch(err=>{ console.warn(err); done(); });
}

function rgOpenPreview(session, sc, test, type, lang){
  const data = mmBuildReportData(session, sc, test);
  const node = type==="full"
    ? (function(){ const l=document.querySelector(".mm-report"); return l?l.cloneNode(true):rgRender("full",data); })()
    : rgRender(type, data, lang);
  const overlay = el("div",{class:"rg-overlay"});
  const close = ()=>{ document.body.classList.remove("rg-preview-open"); overlay.remove(); };
  const bar = el("div",{class:"rg-overlay__bar","data-print":"hide"},[
    el("div",{class:"rg-overlay__title"},
      REPORT_TYPES[type].label + (type==="parent"?` · ${lang==="ar"?"العربية":"English"}`:"") ),
    el("div",{class:"rg-overlay__actions"},[
      el("button",{class:"mm-btn mm-btn--primary mm-btn--mini",onclick:(e)=>rgExport(session,sc,test,type,lang,e.currentTarget)},
        [el("span",{html:ICONS.download}),"Download PDF"]),
      el("button",{class:"mm-btn mm-btn--secondary mm-btn--mini",onclick:()=>{ document.body.classList.add("rg-printing"); window.print(); setTimeout(()=>document.body.classList.remove("rg-printing"),800); }},
        [el("span",{html:ICONS.print}),"Print"]),
      el("button",{class:"mm-btn mm-btn--ghost mm-btn--mini",onclick:close},"Close")
    ])
  ]);
  const scroll = el("div",{class:"rg-overlay__scroll"},[ el("div",{class:"rg-overlay__paper"},[node]) ]);
  overlay.appendChild(bar); overlay.appendChild(scroll);
  overlay.addEventListener("click",(e)=>{ if(e.target===overlay) close(); });
  document.body.appendChild(overlay);
  document.body.classList.add("rg-preview-open");
}

/* ------------------------------------------------------------
   PDF EXPORT — premium, page-safe, branded
   ------------------------------------------------------------
   The on-page report is rasterised with html2canvas, then sliced
   into A4 pages. Crucially, page cuts are chosen so they never
   fall *inside* an atomic block (a card, a transcript turn, a
   heading + its first content), which removes the "orphaned
   continuation line at the top of page 2" problem that a blind
   fixed-height slice produces. Every page is then stamped, via
   the jsPDF text API, with:
     · a thin gold rule + brand/candidate/test footer
     · a true "Page X of Y" number (reliable here, unlike browser
       HTML print where the engine cannot inject live page numbers)
     · a faint diagonal watermark
   Margins reserve a safe area so content never sits under the footer.
   If html2canvas / jsPDF are unavailable, we fall back to the
   native print pipeline (which has its own fixed footer + watermark).
   ------------------------------------------------------------ */
async function downloadPDF(session, btn, opts){
  opts = opts || {};
  const reportEl = opts.targetEl || document.querySelector(".mm-report");
  if(!reportEl){ toast("Report not ready"); return; }
  const jspdfNS = window.jspdf || window.jsPDF;
  if(typeof window.html2canvas !== "function" || !jspdfNS){
    toast("PDF engine offline — opening Print → Save as PDF instead");
    setTimeout(()=>window.print(), 400);
    return;
  }
  const JsPDF = jspdfNS.jsPDF || jspdfNS;
  const restore = btn ? btn.innerHTML : null;
  if(btn){ btn.disabled = true; btn.textContent = "Generating PDF…"; }

  // Page geometry (mm) with a reserved footer safe-area.
  const SCALE = 2;
  const MARGIN_X = 12, MARGIN_TOP = 13, MARGIN_BOTTOM = 18; // mm

  try{
    const canvas = await window.html2canvas(reportEl, {
      scale: SCALE, backgroundColor:"#ffffff", useCORS:true,
      logging:false, windowWidth: reportEl.scrollWidth
    });
    const pdf = new JsPDF({ orientation:"p", unit:"mm", format:"a4" });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const contentWmm = pageW - 2*MARGIN_X;
    const contentHmm = pageH - MARGIN_TOP - MARGIN_BOTTOM;

    // px <-> mm conversion based on the rendered canvas width.
    const pxPerMm = canvas.width / contentWmm;
    const pageContentPx = Math.floor(contentHmm * pxPerMm);

    // ---- Collect "do-not-cut" regions from the live DOM ----------------
    // Each atomic block's top/bottom (in canvas px) becomes a region the
    // page boundary must not fall inside.
    const reportTop = reportEl.getBoundingClientRect().top;
    const sel = [
      ".mm-report__cover",".mm-section-head",".mm-report__meta",
      ".mm-snapshot__tile",".mm-scores",".mm-verdict",".mm-confidence",
      ".mm-low-conf-banner",".mm-summary p",".mm-analysis__item",
      ".mm-pron-headline",".mm-pron-note",".mm-pron-caveats__item",
      ".mm-pron-subhead",".mm-pron-table__head",".mm-pron-table__row",
      ".mm-pron-spans",".mm-pron-advice__col",".mm-pron-diag__block",
      ".mm-transcript-controls",".mm-transcript-part__label",".mm-turn",
      ".mm-recs__col",".mm-stamp",".mm-signature",".mm-provenance",
      ".mm-evidence",
      /* generated report blocks (student / diagnostic / parent / quick) */
      ".rg-page",".rg-head",".rg-meta",".rg-strip",".rg-crit__card",
      ".rg-block",".rg-ev",".rg-diagblock",".rg-ptable__row",".rg-teaching",
      ".rg-prov",".rg-caution",".rg-final",".rg-target",".rg-qbanner",".rg-foot"
    ].join(",");
    const regions = [];
    reportEl.querySelectorAll(sel).forEach(node=>{
      if(node.offsetParent===null && getComputedStyle(node).display==="none") return;
      const r = node.getBoundingClientRect();
      if(r.height<=0) return;
      const top = (r.top - reportTop) * SCALE;
      const bottom = (r.bottom - reportTop) * SCALE;
      regions.push({top, bottom});
    });
    // Keep a section heading glued to the start of the block that follows it.
    reportEl.querySelectorAll(".mm-section-head").forEach(head=>{
      const next = head.nextElementSibling;
      if(!next) return;
      const hr = head.getBoundingClientRect();
      const nr = next.getBoundingClientRect();
      const top = (hr.top - reportTop) * SCALE;
      const glueBottom = (nr.top - reportTop + Math.min(nr.height, 64)) * SCALE;
      regions.push({top, bottom:glueBottom});
    });
    regions.sort((a,b)=>a.top-b.top);

    // ---- Choose page cut points that avoid slicing through a region ----
    const totalPx = canvas.height;
    const cuts = [0];
    let guard = 0;
    while(cuts[cuts.length-1] < totalPx - 1 && guard++ < 400){
      const start = cuts[cuts.length-1];
      let target = start + pageContentPx;
      if(target >= totalPx){ cuts.push(totalPx); break; }
      // If a region straddles the target, pull the cut up to its top —
      // unless that region is taller than a whole page (then we must cut).
      let moved = true, safety = 0;
      while(moved && safety++ < 200){
        moved = false;
        for(const reg of regions){
          if(reg.top < target && reg.bottom > target){
            if((reg.bottom - reg.top) <= pageContentPx && reg.top > start + 40){
              target = Math.floor(reg.top);
              moved = true;
            }
          }
        }
      }
      if(target <= start) target = Math.min(start + pageContentPx, totalPx); // pathological guard
      cuts.push(target);
    }

    // ---- Render each page slice + stamp footer / page number / watermark
    const totalPages = cuts.length - 1;
    const tmp = document.createElement("canvas");
    const tctx = tmp.getContext("2d");

    for(let i=0;i<totalPages;i++){
      const sliceStart = cuts[i];
      const sliceEnd = cuts[i+1];
      const sliceHpx = Math.max(1, sliceEnd - sliceStart);
      tmp.width = canvas.width;
      tmp.height = sliceHpx;
      tctx.fillStyle = "#ffffff";
      tctx.fillRect(0,0,tmp.width,tmp.height);
      tctx.drawImage(canvas, 0, sliceStart, canvas.width, sliceHpx, 0, 0, canvas.width, sliceHpx);
      const sliceData = tmp.toDataURL("image/jpeg", 0.92);
      const sliceHmm = sliceHpx / pxPerMm;

      if(i>0) pdf.addPage();
      pdf.addImage(sliceData, "JPEG", MARGIN_X, MARGIN_TOP, contentWmm, sliceHmm, undefined, "FAST");

      stampPdfFurniture(pdf, {
        pageW, pageH, marginX:MARGIN_X,
        pageNo:i+1, totalPages,
        candidate: session.studentName || "Candidate",
        test: (Library.get(session.testId)||session.test||{}).title || "IELTS Speaking",
        footerBrand: opts.footerBrand,
        suppressSubline: !!opts.suppressSubline
      });
    }

    const name = (session.studentName||"candidate").replace(/\s+/g,"-").toLowerCase();
    pdf.save(opts.filename || `ielts-speaking-${name}-${session.id.slice(-6)}.pdf`);
    toast("PDF saved");
  }catch(err){
    console.warn("PDF generation failed", err);
    toast("Couldn't generate PDF — opening Print instead");
    setTimeout(()=>window.print(), 400);
  }finally{
    if(btn){ btn.disabled = false; btn.innerHTML = restore; }
  }
}

/* Draw the per-page watermark + gold rule + branded footer + page number. */
function stampPdfFurniture(pdf, o){
  const { pageW, pageH, marginX, pageNo, totalPages, candidate, test } = o;
  const footerBrand = o.footerBrand || "Mourad Mekki Teacher Toolkit · IELTS Speaking Assessment";
  // --- Watermark (very light, behind nothing important) ---
  try{
    if(pdf.GState){ pdf.saveGraphicsState(); pdf.setGState(new pdf.GState({opacity:0.05})); }
    pdf.setFont("times","bold");
    pdf.setTextColor(14,29,54); // navy
    pdf.setFontSize(46);
    pdf.text("MOURAD MEKKI TEACHER TOOLKIT", pageW/2, pageH/2, {align:"center", angle:32});
    if(pdf.GState){ pdf.restoreGraphicsState(); }
  }catch(e){ /* watermark is decorative; ignore if unsupported */ }

  // --- Footer: thin gold rule + two-part line + page number ---
  const footY = pageH - 12;          // baseline for footer text
  const ruleY = pageH - 15;          // gold rule sits just above text
  pdf.setDrawColor(212,175,55);      // gold
  pdf.setLineWidth(0.4);
  pdf.line(marginX, ruleY, pageW - marginX, ruleY);

  pdf.setFont("helvetica","bold");
  pdf.setFontSize(8);
  pdf.setTextColor(22,41,69);        // navy-800
  pdf.text(footerBrand, marginX, footY);

  pdf.setFont("helvetica","normal");
  pdf.setTextColor(107,115,132);     // ink-500
  const right = `Page ${pageNo} of ${totalPages}`;
  pdf.text(right, pageW - marginX, footY, {align:"right"});

  // Candidate / test line beneath (kept short to avoid collisions).
  // Skipped for RTL/Arabic exports (the core PDF font cannot render Arabic
  // glyphs; the candidate name already appears in the rasterised content).
  const hasNonLatin = /[^\u0000-\u024F\u2000-\u206F]/.test(`${candidate} ${test}`);
  if(!o.suppressSubline && !hasNonLatin){
    const sub = `Candidate: ${candidate} · Test: ${test}`;
    const maxW = pageW - 2*marginX - 28;
    let subTrim = sub;
    // crude width guard so it never runs into the page number
    if(pdf.getTextWidth(subTrim) > maxW){
      while(subTrim.length>8 && pdf.getTextWidth(subTrim+"…") > maxW){ subTrim = subTrim.slice(0,-1); }
      subTrim += "…";
    }
    pdf.setFontSize(7.5);
    pdf.text(subTrim, marginX, footY + 3.4);
  }
}

/* ---- shared helpers ---- */
function copyToClipboard(text, okMsg){
  const done = ()=>toast(okMsg||"Token copied.");
  const fallback = ()=>{
    const ta=document.createElement("textarea"); ta.value=text;
    ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.focus(); ta.select();
    try{ document.execCommand("copy"); done(); }catch(e){ toast("Copy failed — please select and copy manually."); }
    ta.remove();
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(fallback);
  } else fallback();
}
function statusChip(status){
  const map = {pending:"Pending",granted:"Granted",unused:"Unused",consumed:"Used",revoked:"Revoked",rejected:"Rejected",expired:"Expired"};
  return el("span",{class:`mm-chip mm-chip--${status}`}, map[status]||status);
}
function promptReason(title, label, confirmLabel){
  return new Promise(resolve=>{
    const ta = el("textarea",{class:"mm-textarea",style:"min-height:88px;",placeholder:"Optional note…"});
    modal({title, body:el("div",{},[el("label",{class:"mm-label"},label), ta]),
      actions:[{label:"Cancel",value:"__cancel__"},{label:confirmLabel||"Confirm",kind:"primary",value:"__ok__"}]})
      .then(v=>resolve(v==="__ok__" ? (ta.value.trim()) : null));
  });
}
function pickExpiry(){
  return new Promise(resolve=>{
    let val="7";
    const sel = el("select",{class:"mm-input",onchange:e=>val=e.target.value},
      TOKEN_EXPIRY_PRESETS.map(p=>el("option",{value:p.value, selected:p.value==="7"?"selected":undefined},p.label)));
    modal({title:"Set token expiry",
      body:el("div",{},[el("p",{class:"mm-modal__text"},"This token will stop working after the selected period."), sel]),
      actions:[{label:"Cancel",value:false},{label:"Grant token",kind:"primary",value:true}]})
      .then(ok=>resolve(ok?val:null));
  });
}
function showGrantedToken(token){
  const row = el("div",{class:"mm-token-value"},[
    el("span",{}, token.rawTokenForDisplay),
    el("button",{class:"mm-token-value__copy",onclick:()=>copyToClipboard(token.rawTokenForDisplay)},"Copy")

  modal({title:"Token granted", body:el("div",{},[
    el("p",{class:"mm-modal__text"}, `Issued to ${token.fullName}. It has also been delivered to their in-app notifications. Expires ${fmt.dateMed(token.expiresAt)}.`),
    row,

  ]), actions:[{label:"Done",kind:"primary",value:true}]});
}

/* ============================================================
   TOKEN GATE — shown when a candidate starts a test/practice.
   Resolves with a validated (still-unused) token, or null.
   ============================================================ */
function openTokenGate(test){
  return new Promise(resolve=>{
    const user = AuthAccess.currentUser();
    const close = (val)=>{ try{document.removeEventListener("keydown",onKey);}catch(e){} backdrop.remove(); resolve(val); };
    const errBox = el("div",{class:"mm-auth__err",style:"display:none;"});
    const showErr = (m)=>{ errBox.textContent=m; errBox.style.display="block"; };
    const input = el("input",{class:"mm-input",
      style:"font-family:var(--mm-f-mono);letter-spacing:.04em;text-transform:uppercase;",
      placeholder:"MM-TK-2026-XXXX-XXXX-XXXX"});
    const unlock = async ()=>{
      const res = await AuthAccess.validateToken(input.value);
      if(!res.ok){ showErr(res.error); return; }
      close(res.token);
    };
    const onKey = (e)=>{ if(e.key==="Enter" && document.activeElement===input){ e.preventDefault(); unlock(); } };
    const pasteBtn = (navigator.clipboard && navigator.clipboard.readText) ? el("button",{class:"mm-btn mm-btn--secondary mm-btn--mini",
      onclick:async()=>{ try{ input.value = await navigator.clipboard.readText(); }catch(e){ toast("Clipboard not available — paste manually."); } }},"Paste") : null;

    const sheet = el("div",{class:"mm-modal mm-tokmodal"},[
      el("div",{style:"display:flex;align-items:center;gap:10px;margin-bottom:14px;color:var(--mm-gold-700);"},[
        el("span",{html:ICONS.lock}),
        el("h3",{class:"mm-modal__title",style:"margin:0;"},"Unlock this assessment")
      ]),
      el("div",{class:"mm-tokmodal__test"}, test.title),
      el("div",{class:"mm-tokmodal__user"}, `Candidate · ${user.fullName}`),
      errBox,
      el("label",{class:"mm-label"},"Access token"),
      el("div",{style:"display:flex;gap:8px;align-items:center;"},[ input, pasteBtn ].filter(Boolean)),
      el("div",{class:"mm-note-box"}, "One token unlocks one test only. You can use one token per day. You can still view previous reports without a token."),
      el("div",{class:"mm-modal__actions",style:"flex-wrap:wrap;"},[
        el("button",{class:"mm-btn mm-btn--ghost",onclick:()=>close(null)},"Cancel"),
        el("button",{class:"mm-btn mm-btn--secondary",onclick:async()=>{
          const r = await Promise.resolve(AuthAccess.createTokenRequest(test.id));
          if(r && r.ok){ toast("Your token request has been sent to the admin."); close(null); }
          else { showErr((r&&r.error)||"Could not send request."); }
        }},"Request token"),
        el("button",{class:"mm-btn mm-btn--primary",onclick:unlock},"Unlock")
      ])
    ]);
    const backdrop = el("div",{class:"mm-modal-backdrop"});
    backdrop.appendChild(sheet);
    backdrop.addEventListener("click",(e)=>{ if(e.target===backdrop) close(null); });
    document.body.appendChild(backdrop);
    document.addEventListener("keydown",onKey);
    setTimeout(()=>input.focus(),60);
  });
}

const NATIONALITIES = ["Algerian","American","Argentine","Australian","Brazilian","British","Canadian","Chinese","Colombian","Egyptian","Emirati","Filipino","French","German","Indian","Indonesian","Iranian","Iraqi","Italian","Japanese","Jordanian","Kazakh","Korean","Kuwaiti","Lebanese","Libyan","Malaysian","Mexican","Moroccan","Nigerian","Omani","Pakistani","Palestinian","Polish","Qatari","Russian","Saudi","Spanish","Sudanese","Syrian","Thai","Tunisian","Turkish","Ukrainian","Vietnamese","Yemeni"];
const AuthUI = {
  mode:"login",       // login | signup | admin
  showPw:false,
  error:"",
  busy:false,
  form:{ fullName:"", ageRange:"", nationality:"", password:"", adminKey:"", email:"" }
};
async function submitAuth(){
  if(AuthUI.busy) return;
  AuthUI.error=""; AuthUI.busy=true;
  const f = AuthUI.form;
  let res;
  try{
    if(Cloud.enabled){
      // Cloud mode: email + password via Supabase Auth. Admin is set in the DB,
      // so there is no client-side admin path — admins simply sign in.
      if(AuthUI.mode==="signup")
        res = await AuthAccess.signup({fullName:f.fullName, ageRange:f.ageRange, nationality:f.nationality, password:f.password, email:f.email});
      else
        res = await AuthAccess.login({email:f.email, password:f.password});
    } else if(AuthUI.mode==="signup"){
      res = await AuthAccess.signup({fullName:f.fullName, ageRange:f.ageRange, nationality:f.nationality, password:f.password});
    } else if(AuthUI.mode==="login"){
      res = await AuthAccess.login({fullName:f.fullName, password:f.password});
    } else { // admin (local prototype only)
      const existing = UserStore.byName(f.fullName);
      if(existing) res = await AuthAccess.login({fullName:f.fullName, password:f.password, adminKey:f.adminKey});
      else res = await AuthAccess.signup({fullName:f.fullName, ageRange:f.ageRange, nationality:f.nationality, password:f.password, asAdmin:true, adminKey:f.adminKey});
    }
  }catch(e){ res = {ok:false, error:"Something went wrong. Please try again."}; }
  AuthUI.busy=false;
  if(res.ok){
    AuthUI.form = { fullName:"", ageRange:"", nationality:"", password:"", adminKey:"", email:"" };
    AuthUI.error=""; AuthUI.mode="login";
    toast(`Welcome, ${res.user.fullName.split(" ")[0]}.`);
    state.go("home");
  } else {
    AuthUI.error = res.error;
    state._emit();
  }
}

const RequestsUI = { filter:"pending", search:"" };
function renderAccessRequests(){
  const requests = AuthAccess.listTokenRequests("all");
  const term = RequestsUI.search.trim().toLowerCase();
  let rows = requests;
  if(RequestsUI.filter!=="all") rows = rows.filter(r=>r.status===RequestsUI.filter);
  if(term) rows = rows.filter(r=>
    r.fullName.toLowerCase().includes(term) ||
    (r.nationality||"").toLowerCase().includes(term) ||
    fmt.dateMed(r.requestedAt).toLowerCase().includes(term));

  const counts = requests.reduce((a,r)=>{ a[r.status]=(a[r.status]||0)+1; return a; },{});
  const filters = [["pending","Pending"],["granted","Granted"],["rejected","Rejected"],["revoked","Revoked"],["all","All"]];

  const header = el("div",{class:"mm-page__header"},[
    el("div",{class:"mm-page__eyebrow"},"Administration"),

  const filterBar = el("div",{class:"mm-filter-bar",style:"justify-content:space-between;"},[

        onkeydown:(e)=>{ if(e.key==="Enter") state._emit(); }}),
      el("button",{class:"mm-btn mm-btn--secondary mm-btn--mini",onclick:()=>window.print(),title:"Print"},[el("span",{html:ICONS.print}),"  Print"])

        el("div",{class:"mm-empty__icon",html:ICONS.key}),

  const body = rows.map(r=>{
    const tok = r.grantedTokenId ? TokenStore.byId(r.grantedTokenId) : null;
    const actions = [];
    if(r.status==="pending"){
      actions.push(el("button",{class:"mm-btn mm-btn--primary mm-btn--mini",onclick:async()=>{
        const preset = await pickExpiry(); if(preset===null) return;
        const res = await AuthAccess.grantToken(r.requestId,{expiryPreset:preset});
        if(res.ok){ showGrantedToken(res.token); state._emit(); } else toast(res.error);
      }},"Grant"));
      actions.push(el("button",{class:"mm-btn mm-btn--ghost mm-btn--mini",onclick:async()=>{
        const reason = await promptReason("Reject request","Reason (optional, shown to candidate):","Reject"); if(reason===null) return;
        const res = await Promise.resolve(AuthAccess.rejectTokenRequest(r.requestId, reason));
        if(res.ok){ toast("Request rejected."); state._emit(); } else toast(res.error);
      }},"Reject"));
    }
    if(tok && tok.status==="unused"){
      actions.push(el("button",{class:"mm-btn mm-btn--danger mm-btn--mini",onclick:async()=>{
        const reason = await promptReason("Revoke token","Reason (optional, shown to candidate):","Revoke"); if(reason===null) return;
        const res = await Promise.resolve(AuthAccess.revokeToken(tok.tokenId, reason));
        if(res.ok){ toast("Token revoked."); state._emit(); } else toast(res.error);
      }},"Revoke"));
    }
    actions.push(el("button",{class:"mm-btn mm-btn--ghost mm-btn--mini",onclick:()=>showUserSummary(r.userId)},"View user"));

    const tokInfo = tok ? el("div",{style:"font-size:11px;color:var(--mm-fg-tertiary);margin-top:4px;font-family:var(--mm-f-mono);"},
      `••••-${tok.displayTokenLast4} · ${tok.status}`) : null;

    return el("tr",{},[
      el("td",{},[ el("div",{style:"font-weight:600;color:var(--mm-navy-800);"}, r.fullName), tokInfo ]),
      el("td",{}, r.ageRange||"—"),
      el("td",{}, r.nationality||"—"),
      el("td",{style:"font-family:var(--mm-f-mono);font-size:12px;"}, DeviceId.short(r.deviceId)),
      el("td",{}, r.requestedForTitle || "Any test"),
      el("td",{style:"white-space:nowrap;"}, fmt.dateTimeMed(r.requestedAt)),
      el("td",{}, statusChip(r.status)),
      el("td",{}, el("div",{class:"mm-table-actions"}, actions))
    ]);
  });

  const table = el("div",{class:"mm-table-wrap"},[
    el("table",{class:"mm-data-table"},[
      el("thead",{}, el("tr",{},["Candidate","Age","Nationality","Device","Requested test","When","Status","Actions"].map(h=>el("th",{},h)))),
      el("tbody",{}, body)
    ])
  ]);

  return el("section",{class:"mm-page"},[ header, filterBar, table ]);
}
